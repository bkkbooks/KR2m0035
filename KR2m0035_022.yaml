  - {type: page-break, offset: 0, content: '', id: KR2m0035_WYG_022-1a, image: WYG0655/WYG0655-0247a.png}
body:
  text: 親王世子郡王家祭之禮立廟七間中五間為堂左右二間隔以牆為夾室堂後楣以北五室中奉始封之王世世不祧高曾祖禰依世次為二昭二穆昭東穆西親盡則祧由昭祧者藏主於東夾室升昭之二位於一室以二室奉升祔之主由穆祧者藏主於西夾室升祔亦如之庭繚以垣南為中門又南為廟門左右各設側門庭東西廡各三間東藏遺衣冠西藏祭器樂器廟重檐丹楹采桷緑瓦紅堊壁階戺三出陛門繪五色花草出陛如之焚帛鑪在中門之内庭東南隅刲牲房在中門之外西向嵗以四時仲月諏吉祭其始封祖及高曾祖禰五世仲春之祭並出祧主合食右廟制祭期合食之禮既擇日徧告在廟所出子孫成人以上者届期會行禮府屬官僚咸陪祭先三日戒子弟屬官有執事於廟者讀祝一人通贊一人引贊一人職盥一人掌燎一人職拜褥二人以屬官為之奉香每案一人奉帛每案一人奉爵每位一人以子孫為之主人齋於外寢陪祭執事者咸致齋右戒執事齋祭前一日執事者入廟埽除拂拭主人盛服率執事詣廟引贊引主人入自東門執事者隨入升東階入堂左門北面視設神案堂中始封祖專案正位南向左東夾祧主共案東位西向右西夾祧主共案西位東向左次二昭共案東位西向右次二穆共案西位東向堂中少西設祝案一北向東序設香帛案一尊案一均西向設盥於東階上既備引贊引主人降詣庭東廊下展樂器祭器閲祭文詣刲牲所視殺牲畢由廟東門出各退右閱祭器視割牲祀日昧爽廟中然炬明鐙主人率陪祭者執事者咸朝服未仕者盛服入執事者入堂左門具器陳每案羊一豕一鉶二簠二簋二籩八豆八器未備者代以盤椀時物隨用鑪一鐙二每位匕一箸二祝陳祝文於祝案職香帛爵者陳香盤五尊五帛每位各一爵每位各三於負序東案上陳胙盤於爵北實帛於篚實酒於尊實水於盥盆加巾樂工陳樂於西階上樂六器工六人主人位堂檐内正中北面與祭伯叔以上尊行位東階上兄弟子孫位東階下以世為差世以齒為序官屬位西階下以爵為序北面祝立祝案西東面職香帛爵者序立尊案之東西面樂工立西階上北面通贊立堂門外東楹前職盥者立盥所燎人立燎鑪隅右陳設序位質明子弟之長者二人詣始祖室前啟室奉請神主又四人分詣東西夾室昭穆室前各奉請神主安設於几皆昭位考右妣左穆位考左妣右跪一叩興各退就原位立職拜褥二人布褥於主人拜位前通贊贊執事者各司其事引贊引主人陟東階至盥洗所盥手畢通贊贊就位引贊引主人就拜位立子弟屬官各就位立通贊贊迎神職香者奉香盤進樂作引贊引主人詣始祖位前贊跪主人跪贊上香職香者跪奉香主人三上香興以次詣左右祧位左右昭穆位前上香畢復位贊叩興主人宗族屬官行二跪六叩禮興樂止通贊贊奠帛爵行初獻禮樂作執事者揭尊冪勺挹酒實爵職帛者奉帛職爵者奉爵以次詣各神位前奠篚於案南獻爵於案北正中畢皆退樂暫止祝者至祝案前跪奉祭文竢案左引贊贊跪主人跪陪祭者皆跪贊讀祝祝讀祝畢興奉祭文奠於始祖案前帛篚内退樂作贊叩興主人率陪祭者三叩興樂止通贊贊行亞獻禮職爵者奉爵各獻於左如初儀贊行終獻禮奉爵各獻於右如亞獻儀既終獻引贊引主人詣始封祖位前奉福胙二人以正位前職帛爵者供事取胙槃詣始祖案前一抄簠簋之實於槃一取案北正中爵退至主人右跪竢接福胙二人跪竢於左以職拜褥者供事贊跪主人跪右執事進爵主人受爵拱舉以授左執事進胙受胙亦如之畢執事者各退贊叩興主人三叩興退復位通贊贊徹饌辭神樂作執事者徹畢引贊贊叩興主人率陪祭者行二跪六叩禮興樂止通贊贊奉祝帛送燎執事者跪奉祝帛香興祝前香帛後以次由堂中門出送燎所主人避立拜位旁東面職拜褥者徹褥竢過復位與祭尊屬降階立庭東西東西面通贊贊望燎引贊引主人降自東階詣燎位東面視燎畢告禮成主人退就庭東立子弟之長者各詣神位前奉主還室跪三叩闔室退執事者潔滌祭器謹藏之主人率陪祭執事者咸退乃分胙徧頒於族屬右行禮時祭之禮堂中設五案始祖考妣正位南向高曾祖禰依昭穆為左右與合食同均南向届日陳設每案專牲羊一豕一餘牲帛器數及禮節並與合食儀同右時祭時節致薦先一日潔備品物届日主人夙興率子弟盛服入廟埽除堂宇於始祖暨四親室前設案每案果六槃時羞六槃香槃一每位箸二琖三鑪鐙具陳設畢子弟之長者分詣各神位前啟室主人以次詣各案前跪上香三叩子弟取壺注酒於琖徧獻一廵主人就拜位前行二跪六叩禮子弟少後隨行禮畢乃徹果饌闔室各退右時節薦新因事致告届日夙興入廟啟室薦果槃四庶羞四主人上香子弟酌酒獻酒及行禮儀注並同薦新儀右因事告廟月朔日及望日謁廟禮節與致告同東西夾室祧位前每月朔望主人就室前啟室上香二跪六叩子弟獻酒隨行禮如前儀畢闔室退右朔望行禮貝勒貝子宗室公家祭之禮立廟五間中三間為堂後楣以北分五室奉始封祖暨高曾祖禰兩旁為夾室奉始封而下親盡祧主如前位廟及大門均綠瓦紅堊壁階五級廟不重檐門不備采餘如前制合食始祖專案專牲羊一豕一東夾室祧主暨二昭專案共牲羊一豕一西夾室祧主暨二穆亦如之時祭皆專案二昭同牲二穆同牲視親王籩豆各減二不用樂行禮皆一跪三叩餘儀與親王同時節則薦果槃四時羞槃四有事則告朔望則參果槃二庶羞槃二薦獻儀節均與親王同右貝勒貝子公家祭品官家祭之禮於居室之東立家廟一品至三品官廟五間中三間為堂左右各一間隔以牆北為夾室南為房堂南檐三門房南檐各一門階五級庭東西廡各三間東藏遺衣物西藏祭器庭繚以垣南為中門又南為外門左右各設側門四品至七品官廟三間中為堂左右為夾室為房階三級東西廡各一間餘制與三品以上同世爵公侯伯子視一品男以下按品為差等八九品廟三間中廣左右狹階一級堂及垣皆一門庭無廡以篋分藏遺衣物祭器陳於東西房餘與七品以上同在籍進士舉人視七品恩㧞嵗副貢生視九品堂後楣北設四室奉高曾祖禰四世皆昭左穆右妣以適配南向高祖以上親盡則祧由昭祧者藏主於東夾室由穆祧者藏主於西夾室遷室祔廟均依昭穆之次東序西序為祔位伯叔祖之成人無後者伯叔父之成人無後及其長殤十六嵗至十九者兄弟成人無後及其長殤中殤十二嵗至十五者妻先殁者子姓成人無後及其長殤中殤下殤九嵗至十一者皆以版按行軰墨書男統於東女統於西東西向嵗以春夏秋冬仲月擇吉致祭戒子弟讀祝一人贊禮一人執爵每案二人分薦祔位東西各一人凡在廟所出子孫年及冠以上者皆會行禮右廟制祭期先祭三日主人及在事者咸致齋前一日主人率子弟盛服入廟視潔除拂拭畢執事者於各室前設几几前供案堂南總香案一鑪擎具祔位東西各統設一案設祝案於香案之西設尊爵案於東序設盥槃於東階上視割牲一品至三品官羊一豕一四品至七品特豕八品以下豚肩不特殺視滌祭器三品以上每案俎二鉶二敦二籩六豆六七品以上籩四豆四八品以下籩二豆二皆俎一鉶敦數同代以時用槃椀者聽辦祭器之實俎實牲體鉶實羮敦實飯籩實時果餅餌魚腊獸腊之屬豆實炙胾時蔬之屬右致齋具牲饌届日五鼓主人朝服與祭執事者盛服入廟主人竢於東階下族姓竢庭東西以昭穆世次為序執事者陳鑪鐙於供案南陳尊爵於東序案代以壺琖者聽陳祭文於祝案實水於盥槃加巾主婦率諸婦盛服入詣㸑所視烹飪羮定入於東房治籩豆之實陳鉶敦匕箸醯醬以竢質明子弟之長者盥詣各室前跪一叩興啟室奉主以次設於几昭位考右妣左穆位考左妣右分薦者設東西祔位畢贊禮立堂東檐下西面諸執事分立東西序端相向贊就位主人升自東階盥詣中檐拜位立族姓行尊者立於東西階上卑者立於階下皆重行北面贊叅神主人入堂左門詣香案前跪執事二人司爵者充一奉香槃一挹尊酌酒詣主人左右跪左進香主人三上香右進爵主人酹酒於地以爵奠於案興退出右門復拜位及族姓行一跪三叩禮贊初獻主婦率諸婦出於房薦匕箸醯醬於几前案北跪一叩興徧及祔位退入於房庖人解牲體實於俎執事者奉以升各薦於供案主人詣高祖考案前執爵者奉爵主人獻爵奠於正中跪叩興以次詣曾祖祖禰案前獻爵如前儀分薦者徧獻祔位酒訖退立於拜位贊讀祭文主人跪族姓皆跪祝詣祝案之左跪讀祭文曰維某年月日孝孫某謹吿於某考某官府君某妣某氏之靈曰氣序流易時維仲春夏秋冬追感嵗時不勝永慕謹以潔牲庶品粢盛醴齊敬薦嵗事以某親某氏等祔食尚饗讀訖興以祭文復於案退主人以下一叩興贊亞獻庖人納羮飯於東房主婦率諸婦和羮實於鉶實飯於敦出薦於案及腊肉炙胾徧跪叩興退如初禮主人獻爵於各位之左贊三獻主婦率諸婦出於房薦餅餌果蔬叩退主人獻爵於各位之右分薦者徧獻祔位酒均如初獻儀贊受嘏祝取高祖供案酒饌降至香案旁主人詣香案前跪祝代祖考致嘏於主人主人啐酒嘗食反器於祝接以興主人一叩興復位贊送神主人以下一跪三叩贊望燎祝取祭文由中門出送燎主人退避東階下行軰長者咸降階主人詣燎位視燎畢與祭者出主人率子弟納神主上香行禮徹祭器傳於燕器潔滌謹藏之闔門各退右祭儀日中乃餕三品以上時祭徧舉四品至七品春秋二舉八品九品春一舉庖人熱酒饌僕人布餕席於堂東西北上陳醯醬於席四隅琖楪匙箸之屬皆辦與祭者尊卑咸在從曾祖諸父居東第一席從祖諸父居西第一席諸父次東一席諸昆弟次西一席諸子諸孫在東西之末各一席序定主人肅尊者入席從曾祖諸父即席從祖諸父東向尊者肅揖就位諸父東向揖西向揖就位諸昆弟揖如之復揖諸父就位諸子揖如諸父復揖諸昆弟諸孫揖如諸子復揖諸子皆就位主人離席僕執壺實酒從主人酌諸尊長酒毎酌一人肅揖尊長答揖徧就位子弟之長者離席僕人執壺從敬酌主人諸子弟咸避席揖主人答揖復位主人命諸子弟徧酌酒席中少者舉壺各酌於其長者既徧皆坐主人興舉酒請於尊長坐尊長乃嘗酒卒爵衆嘗酒卒爵僕人進食主人興請於尊長坐尊長舉箸嘗食乃皆食每進食子弟間行酒三廵長㓜獻酬交錯飲無算爵湯飯畢長者起主人請留長者告飽遂離席諸子弟咸隨離席以次出主人送長者於門外入命徹席餕庖人僕人皆盡右餕焚黄告祭之禮制書至主人以黄紙恭謄一通奉於㕔事正中諏吉日擇同姓或戚屬已仕者一人宣制戒子弟引贊二人通贊二人徧戒族姓届期會行禮前一日齋戒備告文祝文牲饌視新贈之爵為等至日夙興灑埽堂宇供張設饌案以追贈所及世數為凖香案施枷如儀設改題神主案於堂東西向使人宿宣制者主人朝服率子弟盛服入廟諸與祭者皆會主人詣贈主室前啟室焚香跪子弟一人奉告文跪於主人之左讀告文辭曰維某年月日孝子某或稱孝孫隨宜謹告於某考某官府君某妣某封某氏之靈曰某幸得列於位恭逢恩命贈及先人敬請神主祗受制書改題奉祀謹告讀訖興主人叩興奉考主子弟奉妣主及族姓出廟門竢於道左宣制者奉制書前引二人導行至廟衆跪接制書入中門升中階南向立衆皆隨入至階下序立主人奉考主在東子弟奉妣主在西族姓重行立其後皆北面通贊分立東面柱前贊宣制主人以下皆跪聽宣制畢奉主行三跪九叩禮衆隨行禮宣制官以制書供香案枷上主人奉主置改題案上揖勞宣制者宣制者答揖復揖辭降自西階主人從至廟大門外揖送入改題神主爵位訖奉主復位序立叅神讀祝三獻酒如時祭之儀祝辭曰維某年月日孝子某謹告於顯考某府君顯妣某氏之靈曰某恭承庭訓列位於朝仰荷皇仁推恩所生贈考為某銜妣為某銜感念先澤祿弗逮養兹以焚黄謹備牲醴用伸薦告尚饗祭畢焚黄並祝文奉主復於室闔室出主人以下皆退頒胙於宣制者餕族姓如儀右焚黄告祭嵗逢令節薦新物一二三品官每案時果四庶羞四羮飯具四品至七品官每案時果二庶羞二八品九品官每案時果庶羞各二餘同是日夙興主婦潔辦果饌主人盛服率族姓子弟入廟然鐙灑埽設案室前訖盥洗啟室子弟分陳匙箸壺琖之屬於案北主人序立於香案前族姓以次序列於主人之後主人跪焚香訖叩興子弟奉果羞從主人詣高祖考妣位前薦果薦羞畢子弟舉壺取琖酌酒進於主人主人奠酒訖子弟復奉羮飯從主人薦羮飯訖以次詣各案薦奠如前儀退至香案前率族姓子弟一跪三叩興子弟徹饌主人闔室皆退右時節薦新月朔望日主人豫備茶食之屬每案二器主人夙興盥洗盛服率族姓子弟入廟灑埽潔神案啟室序位於香案前主人跪焚香訖叩興子弟奉食及茶從主人詣各神案前以次供食供茶畢退復位率族姓子弟行禮如時薦之儀徹主人闔室皆退右朔望獻茶庶士貢監生員有頂帶者家祭之禮於寢室之北為龕以版别為四室奉高曾祖禰皆以妣配位如前儀南向前設香案總一服親男女成人無後者按軰行書紙位祔食男東女西相向事至則陳已事焚之不立版嵗以春夏秋冬節日出主而薦粢盛二槃肉食果蔬之屬四器羮二飯二前期主人及與祭者咸致齋薦之前夕主婦盛服治饌於房中厥明夙興主人吉服率子弟設香案於南然燭置祭文堂北設供案二昭東穆西均以妣配位均南向設祔案於兩序下各一男東女西東西向主人以下盥奉木主設於案設祔位於兩序案訖主人東階下立衆各依行軰東西序立主人詣香案前上香畢率在位者一跪三叩興主婦率諸婦出房中薦匕箸醯醬跪叩如儀退子弟奉壺主人詣神案以次斟酒薦熟訖皆就案南跪叩興子弟薦祔位畢主人跪在位者皆跪祝進至香案之右讀祭文辭見品官祭禮減潔牲二字餘同訖興退主人以下叩興再獻主婦薦飯羮三獻主婦薦餌餅時蔬主人斟酒跪叩均如初儀畢主人率族姓一跪三叩興祝取祭文及祔食紙位焚於庭衆出主人納木主徹退日中而餕春一舉布席於堂東西北上陳倚琖匙箸如其人數傳祭食於燕器熱酒饌族姓至主人肅入序位以行軰年齒為等旅揖即席進酒饌酬酢如禮湯飯畢長者離席告退主人送於門外諸子弟皆隨以出徹僕人餕餘食皆盡月朔望日主人及家衆夙興盥洗啟寢室然燭詣香案前依行軰序立主人上香訖子弟奉茶主人獻茶復位率衆一跪三叩興徹茶闔室衆退若家有吉事主人盥洗啟室然燭焚香以其事告行禮如朔望儀右庶士寢薦庶人家祭之禮於正寢之北為龕奉高曾祖禰神位嵗逢節序薦果蔬新物每案不過四器羮飯具其日夙興主婦治饌主人率子弟設案然鐙啟室奉神主於案上以昭穆序主人立於香案前家衆序立於主人下以行軰為先後主人上香一跪三叩興主婦陳匕箸醯醬薦羮飯果羞跪叩如儀主人酌酒進於各位前凡三次皆跪一叩興畢主人率衆一跪三叩興納主於室徹退日中衆餕神食嵗一舉論行軰先後同行序齒列坐酒行飯已肅揖以退月朔望日供茶然香鐙行禮告事亦如之均與庶士儀同右庶人寢薦欽定大清通禮巻十六
