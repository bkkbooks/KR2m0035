body:
  text: 甲丙戊庚壬年春分之朝皇帝親詣東郊朝日先二日禮部尚書一人至犧牲所眂牲如儀右眂牲是日太常寺卿率屬進齋戒牌銅人恭設於乾清門如儀皇帝乃齋於大內王公百官齋於邸第右致齋書祝版眂祝版北郊同儀均與祀前一日黎明大常寺官設香案於東郊宰牲亭外光祿寺少卿一人朝服上香御史禮部祠祭司官眂宰宰人瘞毛血如儀右眂割牲是日太常寺官潔壇上下藉以棕薦設神座於壇上西向工部司官張皇帝拜次於西階上如式右設神座張次將祀之日夜分太常寺卿率屬入壇具器陳牛一羊一豕一登一鉶二簠簋各二籩豆各十盞三十爐一鐙二中設一案少北東向供祝版南設一案北向陳赤璧一禮神制帛一色赤香盤一尊一爵三並設福胙加爵一凡牲陳於爼凡玉帛實於篚凡尊實酒承以舟疏布冪勺具鑾儀衛設洗於具服殿外樂部率太常協律郎設中和韶樂及樂舞於壝門內南北分列器數與北郊同右陳設陳設畢太常寺博士引禮部侍郎一人升壇眂玉帛齍盛及籩豆登爼之實如儀右省齍辨行禮位西階上幄次正中為皇帝拜位東向陪祀王公位壇下左右各二班百官位壝門外左右各五班重行異等均東面左班北上右班南上辨執事位壇上太常寺司拜牌拜褥官各一人立於皇帝拜位左右司祝一人司香一人司玉帛一人司爵一人光祿寺卿二人侍衛二人太常寺贊答福胙一人侍儀禮部尚書侍郎都察院左都御史副都御史樂部典樂各一人位南北序分立祝案尊案之次如常儀太常寺典儀一人司樂一人負南立於階下之左記注官四人於壝門外之右負北立紏儀御史四人禮部祠祭司官四人引禮鴻臚寺官四人分立王公百官拜位之次協律郎歌工樂工舞佾分立樂懸之次傳贊二人循壝門內牆西立位均南北序南北面掌燎官率燎人立於壝外西南隅右辨位其日五鼓步軍統領勒所部清蹕除道自東華門至壇門御道左右塗巷皆設布幛鑾儀衛陳法駕鹵簿北郊祭詳見儀不陪祀王公百官朝服咸會祇候送駕如儀日出前八刻太常寺卿赴乾清門奏時皇帝御禮服乘禮輿出宫前引後扈如常儀駕發警蹕午門鳴鐘鼓駕出東華門導迎樂前引不作提爐執鐙官左右騎導如詣北郊之儀駕至壇北門外降輿右贊引左對引太常寺卿二人恭導皇帝入北門中門詣具服殿更祭服鴻臚寺官引陪祀王公於殿外侍衛後引陪祀百官南班於拜位南北面北班於路西東面序立祇候右鑾輿出宫卯初刻司祝恭奉祝版設於祝案禮部尚書一人率太常寺卿屬詣神庫上香行禮恭請大明神位奉安於神座如儀太常寺卿至具服殿奏請詣壇行禮皇帝出次盥洗鑾儀衛官跪奉盥奉巾如儀司拜褥官豫布拜褥於壇上拜次贊引對引官恭導皇帝入壝左門升西階就拜位前東向立司拜牌官跪安拜牌退前引內大臣執爐鐙官侍衛均於階下止立後扈大臣隨侍鴻臚寺官引陪祀王公百官均就拜位序立典儀贊樂舞生登歌執事官各共乃職武舞執干戚進贊引奏就位皇帝就位立右盥洗就位典儀贊迎神司香奉香進至神位前祇俟司樂贊舉迎神樂奏寅曦之章辭曰羲馭兮寅賔光煜爚兮紅輪春已融兮交泰循典禮兮明禋嚴大采兮祇肅神之來兮如雲協律郎舉麾工鼓柷樂作司拜牌官起拜牌贊引奏就上香位及對引官恭導皇帝詣香案前對引官至祝案前止立司香跪贊引奏跪皇帝跪奏上香司香進香皇帝上炷香次三上瓣香興奏復位及對引官恭導皇帝復位司拜牌官安拜牌贊引奏跪拜興皇帝行三跪九拜禮傳贊贊跪叩興王公百官均隨行禮凡衆官行禮皆傳贊後同協律郎偃麾工戛敔樂止凡樂以舉麾鼓柷作以偃麾戛敔止後同右迎神典儀贊奠玉帛司樂贊舉奠玉帛樂奏朝曦之章辭曰杲黃道兮暾出東肅將享兮玉帛同美齊翼兮王君公盥以薦兮孚有顒樂作司玉帛奉篚詣神位前跪獻於案三叩興退樂止右奠玉帛典儀贊行初獻禮司樂贊舉初獻樂奏清曦之章辭曰御景風兮下帝扃酌黃目兮椒其馨爵方舉兮歌且舞漾和盎兮龍旗青樂作司樂舉節舞干戚之舞凡舞以節領之導引進退後同有司揭尊冪勺挹酒實爵司爵奉爵詣神位前跪奠於墊中退司祝至祝案前跪三叩奏祝版跪案左樂暫止贊引奏跪皇帝跪羣臣皆跪贊讀祝司祝讀祝辭曰維某年月日嗣天子御名謹告於大明之神曰惟神陽精之宗列神之首神光下照四極無遺功垂今昔率土仰賴兹當仲春式遵古典謹以玉帛牲醴之儀恭祀於神伏惟鑒歆賜福黎庶尚饗讀畢興奉祝版跪安神位前篚內三叩興退樂作贊引奏拜興皇帝率羣臣行三拜禮興樂止武功之舞退文舞執羽籥進右初獻典儀贊行亞獻禮司樂贊舉亞獻樂奏咸曦之章辭曰再舉勺兮鬱金香嘉樂合兮舞洋洋德恢大兮神哉沛淡容與兮進霞觴樂作舞羽籥之舞司爵奉爵詣神位前跪獻爵於左儀如初獻獻畢樂止右亞獻典儀贊行終獻禮司樂贊舉終獻樂奏純曦之章辭曰式禮莫愆兮昭清終以告虔兮休成願神且留兮鑒茹以妥以侑兮忱誠樂作舞同亞獻司爵奉爵詣神位前跪獻爵於右如亞獻儀獻畢樂止文德之舞退右三獻既終獻太常寺贊禮郎一人詣祝案前立贊答福胙光祿寺卿二人就南案奉福胙至神位前拱舉退祇立於皇帝拜位之右侍衛二人進立於左贊引奏跪皇帝跪左右官皆跪奏飲福酒右官進福酒皇帝受爵拱舉授左官次受胙如飲福之儀奏拜興皇帝三拜興又奏跪拜興皇帝復行二跪六拜禮王公百官均隨行禮典儀贊徹饌司樂贊舉徹饌樂奏延曦之章辭曰物之備兮希德馨神欲起兮景杳𡨕徹不遲兮咸肅穆照臨下土兮瞻曜靈樂作司玉帛詣神位前跪叩奉赤璧以退樂止右受福胙徹饌典儀贊送神司樂贊舉送神樂奏歸曦之章辭曰雲車征兮風馬翔猋萬里兮臨萬方報神功兮以時享祈神祐兮永無疆樂作贊引奏跪拜興皇帝率羣臣行三跪九拜禮興樂暫止典儀贊奉祝帛饌送燎司祝司帛詣神位前咸跪三叩司祝奉祝司帛奉篚興司香跪奉香司爵跪奉饌興以次恭送燎所皇帝轉立拜位旁北向司拜褥官徹拜褥俟祝帛過仍布拜褥皇帝復位立樂作陪祀王公百官退班贊引奏禮成恭導皇帝出壝左門入具服殿更衣樂止右送神燎祝帛祀禮既成禮部尚書率太常寺卿屬恭請神位復御儀與迎神同贊引恭導皇帝出具服殿至壇北門外乘禮輿法駕鹵簿前導導迎樂作奏祐平之章辭曰雍音肅送暾出自東兼燭垂曜與天同用秩典修皇敬通表瑞輝揚至公皇帝回鑾王公從各官以次退不陪祀王公百官仍朝服祗候駕至跪迎午門鳴鐘樂止王公隨駕入至內金水橋恭候皇帝還宫退太常寺官徹乾清門齋戒牌銅人送寺右回鑾常歲遣官朝日之禮先二日禮部尚書詣犧牲所眂牲承祭官暨陪祀文武百官均於邸第致齋先一日太常寺以祝版送內閣恭書皇帝遣某官某餘辭同前凡遣官同受而奉諸東郊神庫御史禮部祠祭司官光祿寺少卿朝服眂割牲瘞毛血有司供具並如儀及祀之日雞初鳴遣官朝服祇俟於壇外禮部侍郎省齍太常寺卿率屬恭請神位設於座訖卯初刻遣官由壇北左門入壝右門行禮於階下上香時贊升壇升降均由右階不飲福受胙王公不陪祀贊引以太常寺贊禮郎祝帛送燎遣官避立北旁餘均如前儀右遣官儀夕月丑辰未戌年秋分之夕皇帝親詣西郊夕月先二日禮部尚書一人至犧牲所眂牲如儀右眂牲致齋書祝版眂祝版東郊儀均與同祀日未明割牲於西郊宰牲亭內光祿寺少卿及御史禮部祠祭司官朝服眂宰宰人瘞毛血儀與東郊禮同右眂割牲侵晨太常寺官潔壇上下藉以棕薦張神幄設夜明神座専案東向設配位北斗七星次木火土金水五星次二十八宿次周天星辰神座同案南向工部司官張皇帝拜次於卯階上如式晡後太常寺卿率屬入壇具器陳夜明位前牛一羊一豕一登一鉶簠簋各二籩豆各十盞三十爐一鐙二星辰位同中設一案少南西向供祝版北設一案南向陳夜明前白璧一禮神制帛一色白香盤一尊一爵三並設福胙加爵一星辰位前禮神制帛十有一色青赤黑黃各一白七香盤一尊一爵三凡牲陳於爼凡玉帛實於篚凡尊實酒承以舟疏布冪勺具鑾儀衛設洗於具服殿外樂部率太常協律郎陳設樂懸舞佾與東郊同右設神座供張陳設省齍東郊儀同辨行禮位卯階上幄次正中為皇帝拜位西向分獻官一人位壇下之左當階陪祀王公位壇下左右百官位壝門外左右均西面左班南上右班北上辨執事位壇上太常寺司拜牌拜褥官各一人立於皇帝拜位左右司祝一人司香二人司玉帛一人司帛一人司爵二人光祿寺卿二人侍衛二人太常寺贊答福胙一人侍儀禮部尚書侍郎都察院左都御史副都御史樂部典樂各一人位南北序分立祝案尊案之次如常儀太常寺典儀一人司樂一人負北立於階下之右贊禮郎二人立分獻官位左右記注官四人於壝門外之左負南立紏儀御史四人禮部祠祭司官四人引禮鴻臚寺官四人分立王公百官拜位之次協律郎歌工樂工舞佾分立樂懸之次傳贊二人循壝門內牆東立位均南北序南北面並與東郊禮同掌燎官率燎人立於壝外東北隅右辨位申刻太常寺卿赴乾清門奏時皇帝御禮服乘輿出宫前引後扈如常儀鹵簿前導出西華門詣西郊與東郊禮同駕至壇北門外降輿右贊引左對引太常寺卿二人恭導皇帝入北門中門詣具服殿更祭服太常寺贊禮郎引分獻官於壝右門外北面立鴻臚寺官引陪祀王公於殿外侍衛後引陪祀百官南班於拜位南北面北班於路東西面序立祇候右鑾輿出宫酉初刻司祝恭奉祝版設於祝案禮部尚書一人率太常寺卿屬詣神庫上香行禮恭請神位入壇以次安奉座上如儀太常寺卿至具服殿奏請詣壇行禮皇帝出次盥洗鑾儀衛官跪奉盥奉巾如儀司拜褥官豫布拜褥於壇上拜次贊引對引官恭導皇帝入壝左門升卯階就拜位前西向立司拜牌官跪安拜牌退前引內大臣提爐官侍衛均於階下止立後扈大臣隨侍贊禮郎引分獻官鴻臚寺官引陪祀王公百官均就拜位序立典儀贊樂舞生登歌執事官各共乃職武舞執干戚進贊引奏就位皇帝就位立右盥洗就位典儀贊迎神司香奉香進至神位前祇俟司樂贊舉迎神樂奏迎光之章辭曰繼日代明兮象麗天式遵九道兮臨八埏玉律分秋兮西皓躔聿修毖祀兮樂在縣協律郎舉麾工鼓柷樂作司拜牌官起拜牌贊引奏就上香位及對引官恭導皇帝詣香案前對引官至祝案前止立司香跪贊引奏跪皇帝跪奏上香司香進香皇帝上炷香次三上瓣香興奏復位及對引官恭導皇帝復位司拜牌官安拜牌贊禮郎引分獻官由北階升詣星辰位前上香畢降階復位贊引奏跪拜興皇帝行二跪六拜禮傳贊官贊跪叩興王公百官均隨行禮凡衆官行禮皆傳贊後同協律郎偃麾工戛敔樂止凡樂以舉麾鼓柷作以偃麾戛敔止後同右迎神典儀贊奠玉帛行初獻禮司樂贊舉初獻樂奏升光之章辭曰少采兮將事玉帛兮載陳式舉黃流兮挹犧尊籩豆靜嘉兮肴核芬樂作司樂舉節舞干戚之舞凡舞以節領之導引進退後同有司揭尊冪勺挹酒實爵司玉帛奉玉帛詣夜明位前司帛奉篚詣星辰位前跪獻於案皆三叩興司爵奉爵分詣各案前跪奠於墊中皆退司祝至祝案前跪三叩奉祝版跪案左樂暫止贊引奏跪皇帝跪羣臣皆跪贊讀祝司祝讀祝辭曰維某年月日嗣天子御名謹告於夜明之神曰惟神配陽之德鍾陰之精周環九野普照萬方繼明於夕天下共賴兹當仲秋式遵古典謹以玉帛牲醴庶品之儀致祭惟神歆鑒福我