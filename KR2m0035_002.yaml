front:
  text: 欽定四庫全書欽定大清通禮
  hash: sha256:a6ab1acdfb252a83c6a1368f410961d2d4188683ddb5bd89462344078336cd97
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0035_WYG_002-1a, image: WYG0655/WYG0655-0006a.png}
body:
  text: 字位過密無法显示臣來保等恭承勅㫖編纂御定大清通禮今已成書謹奉表上進者臣等誠惶誠恐稽首頓首上言竊惟天秩天敘勅惇典而慎修人紀人綱本倫常以立極肇虞廷之咨命文在典謨繼周室以顯庸制垂官禮治神人而和邦國百王循由舊之章酌損益以洽時宜列代著維新之典然而叔孫綿蕞法家具習其儀散騎胥鈔衆論咸非其記開元之書未定不數唐時太常之禮粗成難遵宋代盖勅㡬貞度必職要而職詳斯表立坊垂乃世法而世則欽惟皇帝陛下治建中和業隆醇備平天成地經綸持五運之中觀賁乗乾制度洞六經之奥武烈承而文謨顯八表之軌來同聲律叶而身度章千億之程畫一固已夏時齊憲殷輅同經乃猶念典維勤觀民攸切謂國朝掌故雖㕘覈靡遺而會典全書恐浩繁難讀爰精睿鑒五禮兼該用煥天章一編是式文成法立親分甲乙於簡端字櫛句疏手别丹鉛於幾暇臣等仰睹大經大法既嶽峙以川渟凡諸貴少貴多亦條分而縷析盖王者以吉禮承祀事而大祀中祀羣祀統焉聖人以儼恪事神明而天神地示人鬼一矣圜丘方澤鉅典矞皇清廟明堂孝思洋溢他如農蠶布化功徳勸忠各極儀文度數之詳分司有恪悉徵周浹旁皇之致合敬無殊朝會以舉典常燕饗以示慈恵帝錫之繁禧既荐天保之福祉頻臻鳴鹿嘉賔承筐志美獻鳩國老執醤明恩本仁義於親賢嘉會所以合禮别等威於隆殺大文悉是流謙以若兵寓農祥義垂古昔文兼武備治洽隆平秉蒐狩之常經司馬實修其職遇師田之特舉春官必上其儀矧國家綏服懐柔逺過銅柱珠厓之界而盛世豐功偉績常播朱干玉戚之威三霄鳳紙頒來書庸不盡百代鴻猷允在頌烈無窮至如鶼鰈遐方贄通聲教海山諸國禮盡賔王凖大鴻臚朝貢通乎宴見推鄉祭酒師徒例以尊行凡諸揖讓之無愆益見典章之大備若夫經𫝊報本語美慎終辨服物而等人情孝治感孚上下權易戚以當大事仁風丕徧臣民共欽孺慕之難忘咸俾所生之無忝總乎經禮三百曲禮三千無非佐一代休明之志比於五緯經天五嶽鎮地適以定萬年文質之中節經欽定而書成允睹聖人之作兹繕全篇以恭進用垂册府之光臣等學愧面牆識慚窺管寅清曾典毎憂夙夜之常疎禁籞頻趨彌懼遵循之不逮南宫日永長年執簡旁皇北闕恩深此日開函悚惕伏願心𫝊周孔典邁唐虞式玉式金王度卑羣倫之矩範維人維烈單心偕奕䙫以楷模乙夜常披敬貯璚籖於秘閣酉山重啓光昭鉅典於寰區将見文煥功成與大訓圖球而並寳禮明樂備翊百王道法以俱留矣謹編次三十六册目録五十卷繕寫告成臣等無任曕天仰聖激切屏營之至謹奉表隨進以聞
