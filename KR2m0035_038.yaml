body:
  text: 欽定四庫全書欽定大清通禮卷三十二嘉禮恭進實録聖訓之禮監修總裁官撰表章豫諏進呈吉日奏聞禮部轉飭諸司供備前期內閣擬制辭及慶賀致辭皆隨時撰擬恭呈欽定付鴻臚寺屆期陳法駕鹵簿樂懸於太和殿前如常儀禮部鴻臚寺官設書案於保和殿內正中設表案於門外之左均東西肆工部官陳香亭龍亭表亭於實録館鑾儀衛備黃蓋龍旗御仗樂部備導迎樂如儀監修總裁提調纂修各官祗候館內王公按翼祇候內金水橋北文武百官祇候橋南均朝服舉案侍衛祗候保和殿外內監祗候乾清門外均蟒袍補服質明監修官奉表於亭纂修各官恭奉實録聖訓設龍亭內訖行三跪九叩禮興校尉舁行繖仗前導導迎樂作奏禧平之章辭曰昭示無坱謨烈聿皇垂布方䇿日星輝朗配典墳揚耿光永繹思綏萬邦進協和門香亭龍亭循中道入太和中門王公百官跪候過興表亭循道左入太和左門監修總裁以下官隨入以次陳亭於殿階下監修官恭奉表文纂修官詣亭跪三叩興恭奉實録聖訓亭徹鴻臚寺卿二人引奉書官升中階由太和殿中門入詣保和殿陳於中案監修官奉表文升左階由太和殿左門入詣保和殿陳於門外東案及總裁提調各官於丹陛東北面行三跪九叩禮興咸西面序立王公由太和左右門文武百官由昭德門貞度門入序立如常朝儀禮部尚書侍郎奏請御殿遂前導駕皇帝禮服乘輿出宫後扈大臣侍衛從至保和殿後階降輿入御殿侍衛布拜褥於書案前禮部尚書侍郎恭導皇帝就拜位北向敬受實録聖訓行三跪九叩禮興退立案東西向侍衛進舉書案及表案由殿北門詣乾清門內監恭接送入大內監修總裁以下各官出詣太和殿丹墀入百官班內序立右臨軒受書禮部尚書侍郎奏受書禮成恭導皇帝御中和殿侍班執事官行禮如儀畢乃御太和殿前引後扈午門鳴鐘鼓作樂鳴鞭均如常朝儀鴻臚寺卿二人立東簷下記注官侍班執事官各依常位立鳴贊贊齊班王公百官咸就拜位立贊進皆進贊跪皆跪鴻臚寺卿一人進至殿中檻外北面跪代奏臣工慶賀致辭畢興又一人出自丹陛前西面宣制答致辭畢皆退復位贊叩興丹陛大樂作王公百官行三跪九叩禮畢皇帝還宫鳴鞭作樂扈從如儀王公百官皆退翼日賜監修總裁以下各官燕於禮部如儀詳筵燕儀右臨軒受賀恭進實録聖訓禮畢監修官别繕皇史宬盛京藏本及內閣副本各一部既告竣禮部諏吉奏聞分送尊藏恭送皇史宬之禮屆吉日所司設香亭龍亭黃蓋龍旗御仗鼓樂於館如前儀黎明監修總裁率提調纂修各官朝服詣館恭奉實録聖訓陳於龍亭訖行三跪九叩禮如儀校尉舁行繖仗前導迎樂作樂章樂辭見前出東華門各官隨行詣皇史宬亭止恭奉實録聖訓入於金匱各官行禮如初禮畢皆退是日纂修官以副本送內閣尊藏右送皇史宬尊藏恭送盛京之禮先期禮部轉飭諸司供備欽命禮工二部尚書或侍郎各一人率其屬一人在館提調官一人纂修官二人欽天監官一人護送工部備車馬於朝陽門外按實録聖訓函數製行箱備香亭龍亭鑾儀衛備黃蓋龍旗御仗樂部備導迎樂屆期均祇候於館監修總裁官率提調纂修恭奉實録聖訓於行箱陳於龍亭豫設館內正中護送官朝服詣館行三跪九叩禮畢校尉舁行繖仗前導導迎樂作樂章樂辭見前護送官從出朝陽門外樂止載以車馬進發所經地守土文官治道路橋梁駐宿次舍武辨率士卒前後防護皆朝服跪迎道右送亦如之至盛京城外將軍五部侍郎府尹丞咸率其屬朝服出郊跪迎備香亭龍亭鼓樂奉迎以入恭設於崇政殿內各官按品列行序立行三跪九叩禮欽天監官豫諏尊藏吉日屆期恭舁龍亭詣翔鳳樓前提調纂修偕五部司官恭奉實録聖訓登樓尊藏於金匱既畢各官行禮如初皆退右送盛京尊藏玉牒告成恭進御覽監修諸王大臣豫諏進呈吉日奏聞禮部轉飭諸司供備屆期禮部鴻臚寺官設案於中和殿內正中均東西肆又設案於左右兩旁均南北肆工部官備龍亭采亭於宗人府玉牒館龍亭正肆南向采亭左右肆東西相向鑾儀衛備黃蓋龍旗御仗樂部備導迎樂如儀總裁王大學士尚書率提調纂修各官朝服祗候館內質明宗人府官奉玉牒分陳於龍亭采亭訖總裁以下各官詣龍亭前行三跪九叩禮興校尉舁行龍亭在前采亭在後總裁以下乘馬從繖仗前導導迎樂作奏禧平之章辭曰瓜瓞滋長椒實衍昌公姓千億福疇維嚮定角仁朱芾皇錫類洪咸樂康由大清中門入至天安門外各官下馬從至午門外王下馬從至太和殿階下纂修官恭奉玉牒以次升階詣中和殿分置各案訖王於階前大學士以下各官於丹陛南均北面序立行三跪九叩禮興進詣中案恭展玉牒退至殿外侍立禮部尚書侍郎奏請御殿遂前導駕皇帝禮服乘輿出宫御中和殿立於案左西向禮部尚書奏視玉牒恭導皇帝詣正中北面視中案所展玉牒畢皇帝還宫導從如儀總裁率提調纂修官奉玉牒詣乾清門授內監接入右臨軒親受禮部官移龍亭采亭於乾清門外所司設黃蓋龍旗御仗於太和殿階下設𨗳迎樂於東華門外恭俟御覽畢內監奉玉牒出提調纂修官接奉分設龍亭采亭內校尉舁行出保和殿中和殿太和殿繖仗前導由太和門協和門東華中門出導迎樂作樂章樂辭見前諸王大臣纂修各官從詣皇史宬敬奉尊藏畢各退翼日賜監修各官燕於禮部詳筵燕儀右送皇史宬尊藏玉牒告竣總裁官别繕盛京藏本禮部諏吉奏聞遣總裁王大臣一人提調官一人纂修官二人禮部工部大臣司官各一人欽天監官一人自宗人府恭送盛京尊藏於敬典崇謨二閣與恭送實録聖訓儀同右送盛京尊藏欽定大清通禮卷三十二
