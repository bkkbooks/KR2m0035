  text: 欽定四庫全書欽定大清通禮卷十吉禮
  hash: sha256:e9eb4d2333073c2684cd1881eec3e2067240bad35a1216d05d9fd41edd9d90da
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0035_WYG_016-1a, image: WYG0655/WYG0655-0171a.png}
body:
  text: 傳心殿經筵致祭傳心殿之禮傳心殿內皇師伏羲氏正位南向皇師神農氏皇師軒轅氏帝師陶唐氏帝師有虞氏王師夏王禹王師商王湯王師周文王王師周武王左右分序均南向先聖周公東位西向先師孔子西位東向歲以春秋仲月皇帝御經筵之日遣官一人祇告如特行崇典則皇帝親詣行禮太常寺豫日以祝版送內閣恭書祝文翰林院隨時擬撰先一日司祝由太常寺恭奉祝版導以御仗送至傳心殿祝版房設於案跪叩如儀祀日昧爽所司潔除殿內外展神幄工部司官藉棕薦太常寺卿率屬具器陳皇師帝師王師位前各設一案每案鉶一籩二豆二前設香案一陳爐一鐙二先聖先師位前每案鉶一籩二前設香案一陳爐一鐙二殿中設一案少西北向供祝版東設一案西向陳禮神制帛十色白香盤六爵十有八尊二西設一案東向陳禮神制帛一色白香盤五尊一爵十有五凡帛正位同篚東西位各異篚凡尊實酒承以舟疏布冪勺具乃辨位皇帝拜位在殿內正中北向鑾儀衛司拜褥官立於皇帝拜位之左稍後太常寺司祝立祝案西東面司香立東西案後負序東西面典儀立殿門外之東西面記注官立殿門外之西東面掌燎官率燎人立於東門外燎爐之隅日出前三刻司祝詣傳心殿祝版房恭奉祝版安於祝案司爵揭尊冪勺挹酒實爵司帛奉篚司爵奉爵進至各神位前奠於案司拜褥官豫布拜褥於殿門內正中各退太常寺卿赴乾清門奏時皇帝御補服乘輿出宫前引後扈如常儀駕至文華門內東門降輿前引內大臣侍衛均止立後扈大臣隨侍右贊引左對引太常寺卿二人恭導皇帝由殿垣西門入景行中門升中階進殿中門至拜位前北向立典儀贊執事官各共乃職贊引奏就位皇帝就位立司香各奉香盤詣神位前祇俟贊引奏就上香位及對引官恭導皇帝詣皇師伏羲氏香案前對引官至祝案前止立司香跪進香贊引奏上香皇帝上炷香三上瓣香畢以次詣各神位前上香如前儀贊引奏復位及對引官恭導皇帝復位立奏跪拜興皇帝行二跪六拜禮興司祝詣祝案前跪三叩奉祝版跪案左贊引奏跪皇帝跪贊讀祝司祝讀祝畢興奉祝版跪安神位前篚內三叩興退贊引奏拜興皇帝行三拜禮興又奏跪拜興皇帝行二跪六拜禮興典儀贊奉祝帛送燎司祝司帛詣神位前咸跪三叩司祝奉祝司帛奉篚興司香跪奉香興以次由中道出恭送燎所皇帝轉立拜位東西向司拜褥官徹拜褥俟祝帛過仍布拜褥皇帝復位立贊引奏禮成及對引官恭導皇帝出殿中門降中階詣文華殿御經筵進講儀詳嘉禮畢乘輿還宫執事官以次退右祗告儀遣官致祭傳心殿贊引太常寺贊禮郎二人引承祭官入殿垣東門循景行門東夾道至殿門外階下正中行禮上香出入殿左門祝帛送燎承祭官避立西旁東面餘如儀右遣官儀月朔望太常寺卿一人率屬詣傳心殿具器陳設酒果上香行禮如儀右常祀儀欽定大清通禮卷十
