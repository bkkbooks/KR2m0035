body:
  text: 欽定四庫全書欽定大清通禮卷四吉禮奉先殿致祭奉先殿之禮國家崇建奉先殿於景運門之東祗奉列聖列后神位日獻食月薦鮮朔朢朝謁時節展拜出入啟吿恭遇聖誕忌辰及諸令節慶典則於後殿上香行禮恭遇皇太后萬壽皇帝萬壽元旦冬日至及國有大慶則奉請神位於前殿祭饗皇帝親饗奉先殿前期三日皇帝齋執事各官咸致齋前一日内務府掌儀司官進祝版祝文隨事撰擬於神庫割牲瘞毛血潔治祭品各如儀屆日昧爽内監啟寢室神龕執事官公服入殿然炬明鐙具登鉶簠簋籩豆之實陳於案各以其序殿中少西北向設祝案東西序各設尊案分陳香盤奉先制帛皇后祔饗帛用素尊爵篚冪勺具均如太廟時饗儀司祝司香以内務府官充司帛司爵以侍衛充各以其職為位樂部率太常協律郎陳中和韶樂於殿階上分東西懸樂舞在其次司祝詣神庫祝案前跪三叩恭奉祝版興贊禮郎二人引由奉先門中門入殿中門跪安於祝案三叩興退内務府官省齍畢分詣後殿寢室前跪上香三叩興恭奉列聖列后神位以次行如遇皇后祔饗内務府官上香行禮恭奉神位隨行内監執鐙左右導引至前殿入中門以次奉安於寳座列聖列后位均南向皇后祔位東位西向奉安畢詣各香案前跪叩如初儀司拜褥官豫布皇帝拜褥於殿門内正中及各神位前内監設盥盤於奉先門左階下屆時掌儀司官詣乾清門吿時侍衛轉奏皇帝補服乘輿出宫前引後扈如常儀出景運門至誠肅門降輿贊引對引太常寺卿二人恭導皇帝入奉先左門内監跪奉盥盤帨巾如儀皇帝盥畢贊引對引恭導皇帝陞左階入殿左門詣拜位前北向立豹尾班侍衛止立階下前引大臣止立階上均東西面後扈大臣隨入僉立於皇帝拜位後左右典儀贊樂舞生登歌執事宫各共廼職武舞執干戚進贊引奏就位皇帝就位立典儀贊迎神司香奉香以次進至各案前祗竢司樂贊舉迎神樂奏貽平之章太廟時樂辭詳見此饗儀後仿樂作贊引奏詣香案前暨對引官恭導皇帝詣太祖髙皇帝香案前對引官至祝案前止立司香跪贊引奏跪皇帝跪奏上香司香進香皇帝上炷香三上瓣香興以次詣列聖案前上香如前儀畢贊引奏復位暨對引官恭導皇帝復位立贊引奏跪拜興皇帝行三跪九拜禮興贊引恭導皇帝詣皇后香案前司香跪進香皇帝立上香畢恭導皇帝復位立樂止典儀贊奠帛爵行初獻禮司樂贊舉初獻樂奏敉平之章樂作舞干戚之舞有司揭尊冪勺挹酒實爵司帛司爵以次進至各神位前司帛跪獻篚奠於案三叩興司爵立獻爵奠於墊中各退樂暫止司祝詣祝案前跪三叩興奉祝版跪案左贊引奏跪皇帝跪贊讀祝司祝讀祝畢興奉祝版跪安神位前篚内叩如初退樂作贊引奏拜興皇帝三拜興樂止武功之舞退文舞執羽籥進典儀贊行亞獻禮司樂贊舉亞獻樂奏敷平之章樂作舞羽籥之舞司爵詣各神位前獻爵於左如初儀樂止典儀贊行終獻禮司樂贊舉終獻樂奏紹平之章樂作舞同亞獻司爵詣各神位前獻爵於右如亞獻儀樂止文徳之舞退典儀贊徹饌司樂贊舉徹饌樂奏光平之章樂作徹畢樂止贊禮郎一人趨至神位前北面跪奏禮畢請還寢室三叩退司樂贊舉還宫樂奏乂平之章樂作贊引奏跪拜興皇帝行三跪九拜禮畢樂止典儀贊奉祝帛送燎司祝司帛咸詣神位前跪三叩奉祝帛興司香跪奉香興以次恭送燎所皇帝轉立拜位東旁西向司拜褥官徹拜褥竢祝帛過仍布拜褥皇帝復位立贊引奏禮成暨對引官恭導皇帝出殿左門降階由奉先左門出至誠肅門外陞輿還宫導從如來儀内務府官恭奉神位還寢室上香行禮與迎神同所司徹祭器内監闔門各退右親饗若遣皇子祭饗前殿祭前諸儀屆日殿内外陳設均與親饗同皇子拜位在殿檻外正中設盥盤於右階下皇子夙興補服步行至誠肅門掌儀司贊禮郎二人前導皇子由奉先右門入至西階下盥手升階詣拜位前行禮迎神上香出入殿右門祝帛送燎皇子避立西旁東面禮成仍自西階降出誠肅門還宫各退遣王公内大臣祭饗儀節均與皇子同右遣官祭饗皇帝因事親吿奉先殿前期致齋進祝版如儀屆日所司入後殿明鐙設祝案尊案薦脯醢果實如太廟中殿祗告儀内監啓神龕設盥盤司拜褥官布拜褥均如儀掌儀司官詣乾清門奏請皇帝補服乘輿出宫導引翊衛如儀駕至誠肅門降輿贊引對引恭導入奉先門循前殿東至後殿左階下前引大臣侍衛均止立皇帝盥内監奉盥奉巾如儀畢恭導皇帝陞左階入殿左門詣拜位前北向立後扈大臣僉立於後乃行祗吿禮迎神上香讀祝奠獻望燎行禮儀莭均與親饗同惟不設樂懸樂舞禮成贊引對引恭導皇帝由奉先左門出至誠肅門外陞輿還宫内監闔門衆各退右親詣祗吿皇帝遣皇子暨王公大臣祗告後殿出入由右門升降均由西階内務府官贊禮讀祝與遣官致祭前殿禮同餘均如親告儀右遣官祗告每月朔朢列聖聖誕列聖列后忌辰及上元清明霜降歲除日恭遇皇帝親詣後殿上香行禮是日所司詣後殿寢室前陳酒脯果實鑪鐙具司香官執事殿内掌儀司官請駕如儀皇帝補服忌辰素服乘輿出宫内務府總管前導至誠肅門降輿入恭導皇帝詣後殿各案前上香行禮儀與前殿上香同禮畢恭導皇帝還宫各退若遣官上香賛事以内務府賛禮郎升降出入均於右餘陳設同右親詣上香立春端陽重陽等莭掌儀司官入後殿明鐙内監啓寢室神龕案陳酒脯果實掌儀司官一人補服詣各案前上香行三跪九叩禮如儀四月八日七月朢日陳素果不設酒脯餘同右遣官上香列聖列后升祔奉先殿之禮前期内務府敬製升祔神位於神庫既成内務府總管上香行禮如儀欽簡奉后主大臣一人前三日掌儀司官入後殿陳設寢室前神龕香案寶倚寶牀揮柂及帷幔衾枕鑪擎供器如事生之儀届日掌儀司官詣前殿陳設寶座每案陳祭器設香帛尊爵鑪鐙具樂部陳樂懸樂舞奉后主大臣及執事官皆公服祗竢内監設盥盤於神庫門外之東司拜褥官豫布后主祗見拜位於殿中布皇帝拜位於稍後其日升祔太廟禮成皇帝還宫釋禮服更補服禮部尚書詣乾清宫奏請皇帝乘輿出宫前引後扈如常儀掌儀司官詣後殿寢室前上香行禮恭奉列聖列后神位奉安於前殿寶座跪叩如儀駕至誠肅門降輿賛引對引太常寺卿二人恭導皇帝詣神庫門外東盥手如儀入門詣帝主后主神位前上香行三拜禮奉后主大臣於門外隨行禮畢皇帝近前跪恭奉帝主興前行奉后主大臣趨入神庫門詣前跪恭奉后主興隨行贊引對引恭導皇帝入奉先左門前引大臣止陞東階後扈大臣侍衛均止進殿中門奉安帝主於寶座上退及案前跪三叩興贊引對引恭導皇帝就拜位立贊引北面跪奏皇后后主尊恭宣諡升祔奉先殿祗見皇帝帝主尊恭宣諡奉后主大臣恭奉后主跪安於祗見位興趨出殿西門贊引奏跪拜興皇帝恭代行三跪九拜禮興進前跪恭奉后主興奉安於寶座退及案前跪三拜興復位乃行大饗禮迎神上香讀祝奠獻望燎諸儀莭均與常饗同禮畢贊引對引恭導皇帝出奉先左門至誠肅門外陞輿還宫引扈如來儀掌儀司官恭請神位還御寢室上香行禮如初迎儀執事官徹藏祭器内監闔門衆各退皇后升祔奉先殿之禮前期所司敬製神位於殯宫配殿製寶座龕案於神庫既竣諏吉行題主禮以神輿恭奉回京升祔前一日皇帝親詣奉先殿祗告如儀届日神輿由東華門入皇子從王公以下文武百官朝服㑹門外跪迎候過興内務府官豫詣前殿陳設寶座具案陳恭請列聖列后神位奉安行禮均如儀司拜褥官豫布祗見拜褥於殿中神輿至誠肅門止贊引對引官二人導皇子詣輿前跪行三叩禮興恭奉神位由奉先左門入進殿中門奉安於祇見位少退立贊引跪奏皇后尊諡恭宣升祔奉先殿祇見列聖列后皇子恭代行三跪九叩禮畢進前跪恭奉神位興贊引贊賜坐皇子奉神位奉安於寶座跪三叩興退乃行大饗禮祭畢恭請神位還御寢室上香行禮均如常儀右升祔欽定大清通禮卷四
