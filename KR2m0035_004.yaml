body:
  text: 凡例一通禮與會典相為表裏謹遵諭㫖隨同會典節次進呈其間法古凖今咸秉聖明指示以備萬世率由一五禮之名肇於虞書五禮之目見於周禮首吉禮尊天祖也次嘉禮本人道也次軍禮征伐大權也次賔禮柔逺人也次凶禮以厚終也依序編纂有條不紊毎篇首弁以數言括其大指仍於目録下臚次諸儀之名以便繙閱一開元禮纂見於杜佑通典而修史者採之唐書今仿其式毎一儀中各就自然次序條分之儀繁者於毎節之後書右某事别之儀簡者於全文之末合書之期於節目分明以昭其辨一各禮儀文相同者於初見處備書之其餘則書如某儀或云與某儀同分行小註者曰見某儀曰後仿此比事類推以省繁複若夫大中小祀禮既不同則文不當省又凡隔卷同儀亦必於初見處備書之不用省文一書中祭器樂器鹵簿軍實之類悉據禮部兵部太常寺鑾儀衛文册參考經史辨名辨色辨數辨位與會典脗合以昭信守一通禮所重在行禮儀節詳悉紀載以便於遵循至於輿服器數止載名物若制度損益已有専書専圖者槩不重述一儀禮十七篇收於失散之後故祭祀昏䘮止存士禮唐六典則闕凶禮不載然辨上下定民志綱紀四方必自朝廷始是書首紀朝廟大典次及欽頒儀制通行直省郡邑各依類分附於後一禮時為大今古異尚從其儀也是書皆取見行儀注輯定其非皇朝成式雖有古制槩不摭拾至合於今制者存之務使文質得中垂為成法一是書恭照大清㑹典叙載儀注俾我國家萬年遵守通行所有順治康熙雍正三朝已行舊典年月次第另詳㑹典兹不備載
