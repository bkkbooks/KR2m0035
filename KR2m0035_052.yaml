body:
  text: 欽定四庫全書欽定大清通禮卷四十六凶禮列后喪禮由聖子皇帝主喪者初崩恭受遺誥命王大臣治喪事禮部內務府㑹疏喪儀皇帝成服皇子皇孫隨成服皇后率妃嬪暨皇子皇孫福晉皆同時成服王公百官宗室覺羅及內務府所屬官人皆給白布制服公主福晉以下二品命婦以上及內務府所屬婦女給白布制服如之皇帝居翼室喪服二十七日上諭用藍筆二十七日外易素服御門聽政詣几筵前仍喪服二十七月而除皇后服如之皇子皇孫及治喪儀王大臣殯宫守衛執事官人服百日羣臣服二十七日素服不剃髮百日奏疏文移用藍印十有五日遏音樂止昏嫁百日餘儀與列聖初崩同右初崩制服其日殮奠所司於奉安梓宫殿內正中施黃幔左右素帷內鑾儀校陳儀駕於宫門外諸執事皆辦皇帝立殿檐東西向哭皇子皇孫立丹陛西皇后率妃嬪公主皇子皇孫福晉立几筵殿內王公以下文武二品官以上立宫門外三品以下官立外門之外王公福晉夫人郡主以下二品命婦以上立宫門內丹墀西三品以下命婦立宫門外之西皆傳哭內務府總管命婦率尚茶女官奉茶尚膳女官奉膳由中門入皇帝詣几筵前跪衆皆跪尚茶女官跪進茶內監奉茶轉進皇帝舉茶奠於案行一拜禮衆皆隨行禮尚茶女官徹茶尚膳女官進膳揭巾冪皇帝視上食畢執事官進奠几於正中皇帝詣几前跪奉爵王大臣跪進爵皇帝祭酒三爵每祭一拜衆隨叩興乃徹饌哭止皇帝還翼室衆各退嗣是朝晡日中三奠朝晡進羮飯肴饌日中進果筵餘儀均與列聖殮奠同右殮奠朝晡日中奠越日禮部尚書侍郎一人率祠祭司官詣內閣祇領遺誥恭鐫謄黃頒於直省遣使齎諭朝鮮國王理藩院遣官分路往諭外藩䝉古均如頒遺詔儀誥下之日順天府府尹率屬制服跪迎奉安於公署直省文武官率屬素服郊迎入公廨奉安畢易制服均朝夕哭臨三日二十七日釋服不剃髮遏音樂止昏嫁各百日京師暨直省軍民男去冠飾女去首飾素服七日遏音樂止昏嫁二十七日朝鮮國王遣陪臣上表進香其使臣在京者給白布制服外藩䝉古王台吉公主福晉等入京行叩謁禮在二十七日以內皆制服後二十七日至者男去冠飾女去首飾各三日右頒遺誥諏日殷奠工部設祭文案於殿檐下之東內鑾儀校陳儀駕宫殿監侍導治喪儀王大臣內務府總管率執事官入陳饌筵羊酒畢仍導以出執事者出入皆導以官殿監侍後仿此內務府總管命婦率內管領妻奉冠服篚後奉篚均倣此豫設於供牀皇帝詣几筵前哭內外齊集者𫝊哭奠茶上食讀文三祭酒衆隨行禮徹奠皇帝避立於左祭文送至燎所首領內監接奉內務府命婦內管領妻奉冠服篚出皇帝跪候過興從行公主及在內福晉咸出隨行王公百官皆退避齊集之福晉命婦各於其位跪候過興隨行皇帝至燎所跪衆咸跪皇帝祭酒三爵每祭行一拜禮衆隨拜興畢哭止餘儀與列聖殷奠同右殷奠啓奠如殷奠儀奉移殯宫初祭大祭月祭列聖喪以上禮儀均見禮諏日恭上尊諡廟號制下禮部具疏請敕內閣敬擬尊諡進呈欽定恭上尊諡禮成翼日頒詔布告天下餘儀均與恭上列聖尊諡同右上尊諡百日祭清明中元冬日至嵗除在殯時薦列聖喪以上禮儀均見禮諏日行大葬禮前三日祗告天地太廟後殿奉先殿社稷前一日祖奠屆日奉移梓宫皇帝率皇子皇孫王公百官皇后率妃嬪皇子皇孫福晉以下命婦以上恭送在途朝夕奠梓宫至山陵奉安於享殿遣官祗告列聖陵寢並祭陵山后土之神翼日行遣奠禮奉安元宫前三日遣官祗告天地太廟後殿奉先殿社稷先一日奉移梓宫於寶城前葦殿行遷奠禮屆日梓宫御龍輴執事官恭奉循隧道木軌入元宫永安於寶牀是日行敬題神位禮恭奉還京在途虞祭至京升祔大葬禮成遣官致祭陵山后土之神均與列聖大葬禮儀同右大葬朞年小祥再朞大祥中月而禫皇帝釋服列聖喪以上禮儀均見禮若由皇帝主喪者初崩敕諭羣臣布告天下去冠飾輟朝皇子去冠飾即次哭踊妃嬪暨皇子福晉皆去首飾即次哭在京王公百官宗室覺羅及內務府所屬官人皆制服公主福晉以下二品命婦以上及內務府所屬婦女皆制服皇帝縞素以白綢為之旬有三日易素服閲二月釋服親詣几筵前視奠仍素服至朞年除皇子喪服百日易素服詣几筵前仍喪服二十七月而除皇子福晉服如之妃嬪服二十有七日皇孫及治喪儀王大臣殯宫守衛執事官人服百日羣臣服二十有七日素服不剃髮百日文移用藍印十有三日京朝官服內遏音樂止昏嫁餘儀與列后初崩同右初崩制服其日殮奠所司於奉安梓宫殿內正中施黃幔左右素帷內鑾儀校陳儀駕於宫門外諸執事皆辦皇帝親臨視奠至丹陛正中降輿哭後奠儀親臨視同皇子立丹陛東妃嬪公主皇子皇孫福晉立几筵殿內王公以下文武二品官以上立宫門外三品以下官立外門之外王公福晉夫人郡主以下二品命婦以上立宫門內丹墀西三品以下命婦立宫門外之西皆傳哭內務府總管命婦率尚茶女官奉茶尚膳女官奉膳由中門入尚茶女官跪進茶恭奠於案行一叩禮皇子以下皆北面跪叩徹茶尚膳女官揭巾冪上食畢執事官進奠几皇帝詣奠位坐西向奉爵大臣跪進爵皇帝受爵三奠皇子以下皆行三叩禮乃徹奠哭止皇帝乘輿還宫皇子返苫次衆各退嗣是朝晡日中三奠朝晡進羮飯肴饌日中進果筵餘儀均與列后殮奠同右殮奠朝晡日中奠越日內閣繕敕下禮部恭鐫謄黃頒於直省遣使齎諭朝鮮國王理藩院遣官分路往諭外藩䝉古均如頒詔儀敕下之日順天府暨直省文武官均去冠飾制服集公所哭臨三日二十七日釋服百日不剃髮軍民男去冠飾女去首飾素服七日自品官逹於民庶遏音樂止昏嫁各如其制服之日朝鮮國王遣陪臣上表進香其使臣在京者給布制服外藩䝉古王台吉公主福晉等入京行叩謁禮在二十七日以內皆制服後二十七日至者男去冠飾女去首飾各三日右頒敕諏日殷奠工部設祭文案於殿檐下之東內鑾儀校陳儀駕宫殿監侍導治喪儀王大臣內務府總管率執事官入陳饌筵羊酒畢仍導以出執事者出入皆導以宫殿監侍後仿此內務府總管命婦率內管領妻奉冠服篚後奉篚均仿此豫設於供牀皇帝親臨哭皇子以下內外齊集者傳哭奠茶上食讀文皇帝三奠酒皇子跪叩衆隨行禮徹奠皇帝還宫皇子避立於左王以下各退避祭文送至燎所首領內監接奉內務府總管命婦內管領妻奉冠服篚出皇子跪候過興皇子福晉隨行集序之命婦皆於其位跪候過興隨行至燎所送燎皇子福晉跪奉爵命婦跪進爵皇子福晉祭三爵每祭行一拜禮衆隨拜興畢哭止餘儀與列后殷奠同右殷奠啓奠如殷奠儀奉移殯宫初祭大祭月祭列后喪以上禮儀均同禮諏日遣使册諡禮部承㫖具疏請敕內閣敬擬册諡進呈欽定如部即冊諡業由禮諏吉疏聞欽定制下日屆期奏請命親王一人充册諡使郡王一人副之恭行册諡禮成翼日頒詔布告天下餘儀均與恭上列后尊諡同右册諡百日祭清明中元冬日至嵗除在殯時薦列后喪以上禮儀均同禮諏日行大葬禮先期敬題神位恭奉還京升祔奉先殿前三日遣官祇告天地太廟後殿奉先殿社稷前一日祖奠屆日奉移梓宫皇帝親臨奠酒皇子皇孫暨王公百官妃嬪皇子皇孫福晉及王福晉以下命婦以上恭送在途朝夕奠梓宫至山陵奉安於享殿遣官祇告列聖陵寢並祭陵山后土之神翼日行遣奠禮奉安元宫前三日遣官祇告天地太廟後殿奉先殿社稷先一日奉移梓宫於寶城前葦殿行遷奠禮皇帝親臨視葬屆日梓宫御龍輴執事官恭奉循隧道木軌入元宫永安於寶牀大葬禮成遣官祗告陵山后土之神均與列后大葬禮儀同右大葬朞年小祥再朞大祥中月而禫皇子釋服列后喪以上禮儀均同禮欽定大清通禮卷四十六
