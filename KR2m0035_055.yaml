front:
  text: 欽定四庫全書欽定大清通禮卷四十九凶禮
  hash: sha256:56ca6e203308fceb715c1635eb9485cf942859ed3f8145010763b34c68be643f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0035_WYG_055-1a, image: WYG0655/WYG0655-0493c.png}
body:
  text: 親王以下宗室将軍以上喪禮疾篤居正寢既終諸子號哭躃踊福晋側室貝勒以下夫人同及諸子婦跪哭兄弟姻戚立哭皆男哭於左女哭於右喪主以王公之長子無則長孫承重餘仿此及餘子皆剪髪辮去冠飾主婦以王公之福晉夫人無則承以冡婦餘仿此及諸婦以下皆去首飾散髪殮後乃綰遇奠獻仍散飭府屬官二人典喪儀餘掌事者隨所置治棺親王朱髤飾金龍世子郡王繪龍貝勒以下繪蟒均采棺朱髤鎮國将軍以下均朱棺戒辦殮具府屬及本旗所屬官皆先集素衣執事右初終是日府前陳列儀衛官屬告哀於禮部禮部以聞皇帝輟朝親王薨輟朝三日世子郡王二日貝勒一日貝子以下不輟朝宗人府徧布於宗室諸㑹喪者内外咸集親王薨和碩親王以下奉恩将軍以上民公侯伯都統尚書子爵以下佐領騎都尉以上及本翼宗室集於外固倫公主和碩福晋以下縣君奉恩将軍恭人以上集於内世子郡王薨親王以下叅領以上集於外餘與親王同貝勒薨世子郡王以下本旗佐領以上集於外和碩公主世子福晋以下集於内餘與郡王同貝子薨貝勒以下本旗叅領郎中以上集於外貝勒夫人以下集於内餘與貝勒同公薨貝子以下至奉國将軍集於外郡君貝子夫人以下集於内鎮國将軍卒輔國公以下集於外輔國将軍卒鎮國将軍以下集於外奉國将軍卒輔國将軍以下集於外奉恩将軍卒不㑹喪将至府第均男去冠飾女去首飾素服各就喪次竢殮畢乃退右輟朝㑹喪殮具既備布棺於堂中藉茵褥加衾枕垂其裔於四外親王世子郡王貝勒藉五層貝子公三層鎮國将軍以下一層届時奉尸於棺喪主以下憑棺哭盡哀乃蓋棺加錠卒殮設靈座於柩前幛以帷具奠案陳鑪擎爵饌果酒建丹旐於大門内之左喪主以下府屬官以上主婦以下府屬官員命婦以上俱成服宗人係本支所分應有服者亦成服每日清晨日中日晡均設奠府屬男婦皆集奠時喪主詣案前跪祭酒三爵每祭行一叩禮興舉哀府屬官皆隨行禮舉哀卒奠退右殮成服設奠諏日而殯前一日啟奠陳饌筵羊酒具楮幣喪主哭奠行禮諸成服者均隨行禮舉哀如儀發引日諸㑹喪者皆集執事者陳吉凶儀衛於大門外鞍馬散馬親王各十有五世子郡王各十有四貝勒各十有三貝子各十有二鎮國公各十輔國公各八鎮國将軍鞍馬七輔國将軍五奉國将軍四奉恩将軍三餘陳設各如其等若恭領冊寳印者親王世子賓郡王冊冊印設亭二奉冊寳印於亭中陳列門外左右舁夫親王世子八十人郡王以下六十有四人舉轝入設於堂上喪主以下哭踊奠獻畢執事者徹帷遷柩載於轝役夫舁行喪主哭從出大門施幃蓋親王紅錦黄幨世子郡王紅錦紅幨貝勒青幨貝子以下皆青幃青幨屬引遂發冊寶印亭前行次丹旐次列儀衛喪主以下男在轝前歩從女在轝後車從皆哭不絶聲途次掦楮幣過門橋府屬官奠酒靈輀将至殯所喪主以下豫於大門外跪哭迎候過興及殯室門外轝止脱載去幃蓋役夫舁棺安於室正中執事者奉冊寶印陳於左右喪主以下哭踊奠獻如儀右殯禮部疏請賜䘏皇帝遣官諭祭輔國将軍以上二次奉國将軍以下一次初祭翰林院撰擬祭文輔國将軍以下内閣撰擬户部供楮幣禮部供羊光祿寺供酒親王楮三萬世子楮二萬五千均羊九酒九郡王楮二萬三千羊七酒七貝勒楮萬有五千貝子楮萬均羊五酒五鎮國公楮九千輔國公楮八千均羊四酒四鎮國将軍楮五千羊二酒二輔國将軍楮四千羊一酒一奉國将軍初祭大祭共楮六千羊一酒二奉恩将軍初祭大祭共楮三千羊一酒二不撰祭文本家自備祭品楮幣各如制祭之日陳列儀衛於堂中靈座前設供案鑪鐙具中陳欽賜祭品左右分陳自備祭品設遣官奠位於案前設祝案於東北向設燎牀於南陳楮幣遣官至喪主率有服宗親及府屬官跪迎於大門外禮部官恭奉祭文由中門入陳祭文於東案遣官隨入就位立喪主以下皆就位跪執事官展祭文太常寺官立於祝案左北面讀文畢遣官跪執事官實酒於爵跪授遣官受爵拱舉奠於池三奠每奠行一叩禮喪主以下隨行禮畢興舉哀衆隨舉哀執事官恭奉祭文至燎所焚燎喪主以下望闕謝恩行三跪九叩禮乃送遣官於大門外如來儀是日大功宗親除服越日大祭供備楮幣羊酒遣官行禮如初祭儀是日朞服宗親及本屬旗員䕶軍人等咸除服右諭祭宗人府具疏請諡奉國将軍以下不疏請得㫖賜諡内閣擬諡以聞翰林院撰擬碑文工部給葬費親王白金五千兩世子四千兩郡王三千兩貝勒二千兩貝子千兩公鎮國将軍均五百兩輔國将軍四百兩營建墳塋周繚以垣親王四圍凡百丈世子郡王八十丈貝勒貝子七十丈公六十丈餘如其品垣南為門施金采貝勒以下不施其中為享堂南向親王五間世子以下公以上均三間餘如常制甬道正中工部立豐碑親王給白金三千兩世子二千五百兩郡王二千兩貝勒千兩貝子七百兩公四百五十兩鎮國将軍三百五十兩輔國将軍三百兩碑式親王以下鎮國公以上均交龍首龍趺鎮國輔國将軍如其品置守塋親王十户世子郡王八户貝勒貝子六户公四户将軍以下制各如其品右賜諡營葬百日設奠陳祭筵牲醴具楮幣親王世子均祭筵十有五羊九酒七尊楮二萬郡王祭筵十有三羊七酒七尊貝勒祭筵十羊酒各五楮均二萬貝子祭筵八羊酒各五楮萬有六千鎮國公祭筵七羊酒各四楮萬有四千輔國公同惟楮減二千鎮國将軍祭筵五羊酒各三楮萬有四千輔國将軍祭筵四羊酒各二楮萬有二千奉國将軍祭筵三羊酒各二楮萬奉恩将軍同惟楮減二千執事者陳設如儀府屬官及宗人成服者咸集喪主哭奠行禮衆皆哭隨行禮畢各退喪主始薙髪府屬男婦除服右百日卜葬親王不逾朞年郡王貝勒不逾七月貝子以下不逾五月将葬前期行祖奠禮儀與啟奠同執事者豫於墳塋設蘆棚張幕布席薦於壙外喪主親視鋪陳壙中之事遷柩之日陳列吉凶儀衛諸㑹葬者内外咸集喪主詣柩前行遣奠禮如祖奠儀舉哀役人舁柩行喪主以下哭從柩至墳塋暫安於席薦上喪主以下憑棺哭踊盡哀諸㑹葬者内外辭訣喪主止哭臨視乃奉安柩於壙正中合葬者男左女右藏誌石遂窆掩壙覆土喪主以下哭盡哀乃於塜前設案陳酒果告成事奠叩如前儀右葬朞年小祥至忌日備物致祭陳饌筵羊酒具楮幣均如百日奠之數喪主哭奠行禮如儀再朞與朞年祭禮同二十七月終喪乃即吉右祥祭終喪親王福晉喪禮部以聞得㫖㑹喪親王以下奉恩将軍以上集於外固倫公主親王福晉以下縣君奉恩将軍恭人以上集於内殮用采棺既殮内外成服立引旛於府門内之右發引儀衛從其封爵世子福晉以下均仿此備鞍馬不設散馬下仿此喪至墳塋皇帝賜祭一次官給羊酒各九楮二萬宗人府不請諡工部不給葬費不建碑餘自初喪及於終喪儀節均與親玊同世子福晉喪世子郡王以下奉恩将軍以上固倫公主以下奉恩将軍恭人以上㑹喪殮用采棺内外成服設奠自初喪及終喪儀節均與世子同惟百日致祭饌筵十有三羊七楮二萬遣官致祭給羊酒各七楮萬有七千郡王福晉喪内外㑹喪者與世子福晉喪同祭用羊酒亦如其數惟百日祭筵減一遣官致祭楮減二千其自初喪及終喪儀節並同郡王貝勒夫人喪内外㑹喪者與郡王福晉喪同惟固倫公主親王福晉不集遣官致祭給羊酒各五楮萬其自初喪及終喪儀節並同貝勒貝子夫人喪貝勒以下集於外郡主貝勒夫人以下集於内遣官致祭給羊酒各三楮七千其餘儀節均與貝子喪同鎮國公夫人喪貝子以下集於外郡君貝子夫人以下集於内遣官致祭給羊酒各二楮六千其餘儀節均與鎮國公喪同輔國公夫人喪内外㑹喪者如鎮國公夫人喪惟郡君不集遣官致祭給羊酒各二楮五千餘均與輔國公喪同右福晉夫人喪固倫公主喪采棺殮奠内外㑹喪及祭葬諸儀節均與親王福晉同若下嫁外藩翰林院撰擬祭文遣内大臣侍衛禮部理藩院官詣葬所讀文致祭如儀詳王公喪禮和碩公主喪與世子福晉同郡主喪與郡王福晉同縣主喪與貝勒夫人同郡君喪與貝子夫人同縣君喪與鎮國公夫人同鄉君喪與輔國公夫人同若下嫁外藩均遣官致祭如前儀右公主郡主縣主郡君縣君鄉君喪親王側福晉喪與世子福晉同惟諭祭一次禮部疏請候㫖遵行不撰祭文世子側福晉喪與郡王福晉同郡王側福晉喪與貝勒夫人同貝勒側夫人喪與貝子夫人同貝子側夫人喪與鎮國公夫人同鎮國公側夫人喪與輔國公夫人同輔國公側夫人喪輔國公以下㑹喪百日致祭楮萬饌筵六羊三其餘儀節與輔國公夫人喪同右親王以下側室喪附欽定大清通禮卷四十九
