front:
  text: 欽定四庫全書欽定大清通禮卷四十四賓禮
  hash: sha256:dd299017de9f0875d62c825090b537b2135762405dd3b76711e67c25c745cb70
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0035_WYG_050-1a, image: WYG0655/WYG0655-0434a.png}
body:
  text: 外藩親王見宗室親王之禮賓及門王府屬官入告主人降階迎賓辭主人升賓從賓入門而右西位東面主人入門而左東位西面各行二跪六叩禮畢即席序坐位如之賓之從官階上二跪六叩興入右門随坐於賓後執事者進茶賓受茶叩主人答叩飲茶叙語畢從官趨前楹跪一叩興趨出賓起離席叩王人答叩皆興賓辭出主人送賓於階下退府屬官送於府門外賓退屬官乃退若外藩郡王見主人迎送不降階相見賓二跪六叩主人答一跪三叩餘跪受賓辭出跪叩主人答跪不叩餘如親王見儀外藩貝勒見入自中門闑左王出坐迎貝勒行二跪六叩禮王立受王就位正坐貝勒侍坐從官行禮随坐如儀貝勒受茶一叩飲茶叙語畢從官先出貝勒離席跪叩辭退王出坐府屬官送於府門外外藩貝子公見府屬官引至殿外行二跪六叩禮王坐受辭出跪叩王坐受亦如之餘如貝勒見儀右宗室外藩親王相見外藩親王見宗室郡王之禮賓至主人迎於大門内肅賓入及階讓升主人由東賓由西及門讓入主人就右西面賓就左東面行二跪六叩禮東西序坐從官行禮随坐待茶辭退均如内外親王見儀主人送賓於大門内府屬官送於府門外各退若外藩郡王見與内外親王相見儀同外藩貝勒見與外藩郡王見親王儀同外藩貝子公見與外藩貝勒見親王儀同右宗室外藩郡王相見外藩親王見宗室貝勒之禮賓至主人出迎於府門外肅賓入賓先行主人少後從行升階亦如之主人入門而左東面賓入門而右西面各行一跪三叩禮東西序坐從官行禮随坐均如儀待茶辭退賓皆一叩主人答送賓於府門外乃退若外藩郡王見行禮坐次視親王主賓出入並行迎送及於大門府屬官送於門外外藩貝勒見行一跪三叩禮餘與内外郡王相見儀同外藩貝子公見行一跪三叩禮主人跪受餘與外藩貝勒見郡王儀同右宗室外藩貝勒相見外藩親王郡王貝勒見宗室貝子公之禮賓至主人迎於大門外賓自西先行主人自東少後行升階入門亦如之主人位左賓位右東西面各行一跪一叩禮序坐從官行一跪一叩禮随坐待茶如前儀從官先一叩辭退賓主各一叩興主人送賓於大門外候乘馬乃退若外藩貝子公見行一跪一叩禮餘與外藩貝子公見貝勒儀同右宗室外藩貝子公相見京官敵體相見之禮賓及門從者通名閽人入告主人肅衣冠出迎於大門内揖賓入每門讓於賓及階讓升及門讓入賓主皆北面再拜興主人為賓設坐西面賓禮辭揖主人答揖卒正坐賓為主人設坐東面揖如之主人揖賓就坐執事者進茶賓受茶拜手主人答拜飲茶叙語畢賓告辭揖主人答揖降階賓辭主人固請乃送賓於大門外視賓乘輿馬主人乃退尚書左都御史見大學士儀亦如之一品至八九品官敵體相見儀並同三品以下京堂官翰詹科道見大學士主人迎於儀門内送出大門外不視乘輿馬餘儀同科道見左都御史副都御史各部尚書主人送出大門外退不視乘輿馬餘儀同翰詹科道與閣部院寺監屬官相見均與敵體相見儀同有尊卑名分者均各盡其尊卑之禮右京官敵體相見閣部院寺監屬官見其長官之禮初見屬官公服詣署首領官引至堂上以銜名履歴呈於各長官坐案屬官以次向坐三揖長官避席答揖退若燕見至大門外下輿馬竢於門内閽人通名入見長官迎於階下詣㕔事㕔事以南向為率屬官當楣北面三揖長官東面答揖序坐屬官東位西面旅見則以次東西面長官位於西南東北面命坐揖茶至揖凡屬官揖長官皆答揖啓事畢三揖如初辭出長官送於二門外屬官出大門稍逺乘輿馬見大學士儀同右在京屬官見長官國學生見國子師之禮初見弟子公服具名柬國學首領官引至堂上北面三揖師立受辭退北面三揖出若燕見通名竢於門内師召入迎於階上弟子升階竢師前行随入堂當楣北面再拜師西面答揖師命坐弟子北面揖趨正師坐畢侍坐於側東位西面旅見則以次列坐北上師位於西南東北面請問揖茶至揖辭退北面三揖師皆答揖師出送前行弟子從及二門外弟子三揖竢師入乃退翰林院庶吉士見大學士及見教習庶吉士儀同右國學師弟子相見直省官敵體相見之禮賓至署從者通名門吏啓門賓肩輿入儀衛止儀門外主人出迎賓至外堂檐下降輿主人揖賓入毎門讓於賓及㕔事各再拜興主人為賓設坐西面賓禮辭揖主人答揖賓為主人設坐東面揖如之主人揖賓就位坐執事者進茶主賓各拜手飲茶叙語畢賓避席揖辭退主人答揖賓出主人送至外堂檐下視乘輿主人退賓肩輿出如來儀學政鹽政及欽差官與督撫相見儀同文職督撫司道以下府州縣佐雜以上武職提鎮以下千把總以上凡敵體官相見儀並同右直省官敵體相見直省文屬見長官之禮司道見督撫初見具銜名履歴公服詣署至大門外降輿入及儀門由左門入督撫迎於外堂屏内督撫先行司道随入及㕔事司道當楣北面禀叅督撫辭乃三揖督撫西面答揖督撫正坐司道東旁侍坐旅見則以次東西面命坐揖茶至揖凡司道揖督撫均答揖辭出三揖如初督撫送至屏門外司道三揖竢督撫入門復三揖趨出至大門外乘輿返若公事謁見常服通銜名三揖就坐餘如前儀知府見督撫督撫不迎送餘如司道見儀同知通判見督撫轅門下輿馬餘與知府見同州縣見督撫轅門外下輿馬升堂北面再拜辭退三揖督撫皆立受餘如知府見儀知府同知通判見司道司迎送於屏門外道迎送於堂檐下坐次知府等東位西面司道位於西南東北面餘如見督撫儀州縣見司道司道不出迎見畢辭出司送於階下道送於屏門外餘如知府見儀州縣見知府迎送於屏門外餘如見司道儀見同知通判迎送於堂檐下餘儀同直𨽻州知州見長官及接屬官儀與知府同直𨽻州州同州判見長官儀與州縣同敎職見督撫司道知府等官均如知縣見儀首領佐雜官見督撫行一跪三叩禮不坐見司道知府儀同府首領縣佐貳等官見同知通判如州縣見司道儀雜職官見同知通判行一跪三叩禮不坐雜職官見知縣如州縣見知府儀右直省文官見長官直省武屬見長官之禮副将見提督初見具銜名披執轅門外下馬門吏禀白𫝊命免披執易公服由左門入升堂北面禀叅辭三揖提督西面答揖坐次提督正坐副将侍坐茶畢辭退三揖如初提督送至階下常見不披執餘儀同見本鎮總兵官迎送於堂後屏外坐次副将東位西面總兵官位西南東北面餘如見提督儀叅将遊擊見提督北面跪三叩辭退三揖出提督起立答揖不送餘如副将見儀見總兵官如副将見提督儀見本鎮總兵官起立不送都司守備見提督暨總兵官披執北面跪自宣銜名三叩提鎮坐受命坐西面席地坐不設茶辭出三叩趨退提鎮不起立公事謁見常服不宣銜名餘儀同千把總見提督暨總兵官跪啓事不坐餘與都守同叅将遊擊見本協副将如見總兵官儀辭出副将離位送都司守備見副将行一跪三叩禮副将不揖不送餘如叅遊見儀都司守備初見本管叅将遊擊行庭叅禮辭出本管官離位送常見三揖本管官答揖出揖如初若非本管官送迎及大堂屏後餘儀同千總以下官見副将叅将遊擊與見總兵官同千總見都司守備與守備見叅遊同把總見都司守備跪三叩辭出都司起立不送餘與千總同右直省武職見長官司道見學政具名銜二門外下輿馬由中門入學政迎於堂檐下揖入行賓主禮若學政為三品以上大臣司道謁見與見督撫儀同知府同知通判見學政行三揖禮餘如見督撫儀州縣見學政與見督撫儀同凡州縣行禮學政避席答揖敎職見學政與知縣見同凡敎職行禮學政立受首領佐雜官見學政與見督撫儀同司道以下官見鹽政及欽差官均與見學政儀同運使鹽道見鹽政與司道見督撫儀同運同運判等官見鹽政與知府見督撫儀同科目出身鹽大使見鹽政與知縣見督撫儀同右直省官見學政鹽政順天奉天府屬官相見之禮同品官僚視直省敵體見儀治中通判見府尹如直省司道見督撫儀見府丞如司道見學政儀屬下州縣敎職見府尹如見督撫儀見府丞如見司道儀見治中通判如見府倅儀經厯以下官見府尹丞治中通判如直省首領官見知府府倅儀奉天府屬知府見府尹如直省知府見督撫儀見府丞如見學政儀府州縣見盛京五部侍郎如見府尹儀右京府官屬相見直省文武官相見之禮提督見總督由中門入總督出迎於大堂檐下揖讓入升堂三揖畢總督正坐提督僉坐若提督兼世職者總督東位西面提督西位東面辭出總督送至堂檐下視乘輿退見巡撫行賓主禮總兵官見總督與司道見儀同見巡撫行賓王禮副将見總督初見披執一跪三叩侍立待茶辭退三揖出見巡撫與知府見儀同叅将以下官見總督行一跪三叩禮千總以下官見司道儀同司道見提督如提督見總督儀見總兵官行賓主禮知府同知通判見提督總兵官如司道見提督儀州縣見提督具銜名由左門入提督迎於階下升堂北面三揖坐次提督正坐州縣侍坐辭出三揖如初提督送至屏門外見總兵官儀同八九品以下佐雜官見提督總兵官行一跪三叩禮右直省文武官相見直省滿漢官相見之禮鎮守将軍副都統與督撫提鎮相見行賓主禮司道以下官見将軍與見總督儀同見副都統與見總兵官儀同協領叅領見督撫與司道同佐領防禦見督撫與知府同驍騎校以下官見督撫與州縣同餘不相統屬者均行賓主禮右直省滿漢官相見儒學弟子員見學師之禮與國子生見國學師儀同學政涖任後釋奠學宫講學於彞倫堂敎職引學弟子員謁見均公服北面再拜學政立受嵗科試畢學弟子員列一二等者均公服祗竢於學政堂下學政升堂北面三揖學政立受閱卷畢退三揖出入泮謁見禮亦如之右直省學校師弟子相見士人敵體相見之禮賓及門從者通名主人出迎於大門外揖入及門及階揖如初登堂主賓均北面再拜興主人趨正賓坐賓禮辭主人卒正坐左還賓正主坐亦如之即席賓東位西面主人西位東面飲茶敘語畢賓退揖主人及階及門揖辭主人均答揖乃送賓於大門外揖如初若見父之執友與見尊長儀同右賓友相見受業弟子見師長之禮初見師未出先入設席正位竢於堂下師出召見乃奉贄入奠贄於席北面再拜師起答揖興謹問起居命之坐乃侍坐有問則起而對辭出三揖師不送常見侍坐請業則起請益則起師有敎立聽命坐乃坐師問更端仍起而對朝入一揖暮出一揖與同學弟子均以齒序右受業弟子見師長卑幼見有服尊親之禮及門從者通名竢外次尊長召入見升階北面再拜尊長西面答揖命坐視尊長坐次侍坐於側茶至揖叙語畢禀辭三揖凡揖尊長皆答出尊長不送若尊長來見卑幼迎送於大門外行禮坐次如前儀右卑幼見尊長欽定大清通禮卷四十四
