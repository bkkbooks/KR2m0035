body:
  text: 欽定四庫全書欽定大清通禮卷一吉禮禮有五經莫重於祭國家祀典孔明有大祀有中祀有羣祀殊事合敬周禮所謂以吉禮事邦國之鬼神示於是乎備焉謹詳其儀著於篇南郊冬日至大祀天於圜丘之禮先祀期五日遣親王一人詣犧牲所恭代眂牲所牧豫設香案於庭中南向一東西向各一遣官補服遇朝期則朝服太常寺贊禮郎二人前引詣香案前北面所牧立案右牧人牽牛羊過案前導以旗仗所牧跪告牷次東向眂鹿西向眂豕所牧跪告如前儀畢引由北門退右眂牲先三日昧爽太常寺進齊戒牌銅人設黃案於乾清中門之左太常寺卿率所屬咸補服常朝日朝服雨雪常服恭奉齊戒牌在前銅人在後導以御仗入自西長安門至午門徹仗太常寺官十人前引由中道入進太和門中左門後左門侍衛二人引至乾清門階下太常寺官恭設於案齊戒牌南向銅人西向太常寺卿行一跪三叩禮退皇帝致齊於大內頒制辭於羣臣曰某年月日冬至朕恭祀皇天上帝於圜丘惟爾羣臣其蠲乃心齊乃志各揚其職敢或不共國有常刑欽哉勿怠文武衙署恭書制辭於版安奉正堂自員外郎騎都尉以上咸齊於公署右齊戒先二日遣禮部尚書一人詣犧牲所省牲如眂牲儀右省牲是日昧爽太常寺司祝恭送祝版於內閣授中書舍人安奉潔室敬書祝辭於版畢內閣典籍豫設黃案於政事堂正中舍人奉祝版陳於案南向大學士詣案前立北面展祝文敬書御名畢舍人奉祝版仍安潔室俟翼日授司祝右書祝版祀前一日子初刻宰人豫鑿坎於宰牲亭外牆東廣深二尺太常寺官設香案於宰牲亭外光祿寺卿一人朝服太常寺贊禮郎二人前引詣香案前北面立三上香遂及御史二人禮部司官二人咸朝服眂宰宰人以鸞刀割牲以豆取毛血瘞於牆東之坎右眂割牲是日五鼓太常寺卿率屬掃除壇上下藉以棕薦設上帝神座於圜丘第一成南向列聖東西向四從於第二成大明東夜明西北斗七星五星二十八宿周天星辰在大明之次雲師雨師風伯雷師在夜明之次均施青幄工部司官張皇帝拜次於第二成午階上張大次於外壝左門外神路之東太常寺典簿陳牲俎於神厨博士辨籩豆登鉶之實登以太羮鉶以和羮簠以黍稷簋以稻粱籩以形鹽槀魚棗栗榛菱芡鹿脯白餅黑餅糗餌粉餈豆以韭菹醓醢菁菹鹿芹菹􅊵醢筍菹魚醢脾析豚拍酏食糝食以次展器於神庫右設神座幄供張展牲器昧爽太常寺設黃案於太和殿中御座之南設香亭於殿內左楹之東設奉祝版亭奉玉帛香亭於殿內右楹之西太常寺贊禮讀祝各官具玉帛於篚貯香於盤祇俟太和門外太常寺卿率屬贊事殿內屆時太常寺卿率欽天監博士二人至乾清門奏時皇帝龍袍補服乘輿出宫前引後扈如常儀詳見嘉禮朝賀儀至太和殿北階降輿御殿立左楹前西向記注官四人立殿右門外東面司祝自內閣奉祝版入太和中門玉帛香隨入前列提爐二太常寺贊禮郎十人導引升中階至丹陛上導引止司祝奉祝版各官奉玉帛香進殿中門以次陳於黃案三叩退太常寺卿展祝文贊禮郎布拜褥皇帝詣案前次第恭閲畢行一跪三拜禮興復位立太常寺卿韜祝版贊禮郎徹拜褥司祝各官進至案前三叩興恭奉祝版玉帛香依次設亭內三叩退司香官就香亭奉香合立於亭東司拜褥官布拜褥於香亭前退立司香之右太常寺卿二人恭導皇帝至香亭前立司香跪進香皇帝上香畢行一跪三拜禮興復位司拜褥官徹拜褥司香奉香合置亭內退鑾儀衛率校尉舁亭香亭在前祝版亭香帛亭以次由中道出前引如儀太常寺卿跪奏禮成皇帝乘輿還宫太常寺卿隨亭送南郊安奉神庫內是日徹乾清門齊戒牌銅人恭送齊戒牌銅人於齊宫導引如儀右閲祝版玉帛香厥明步軍統領飭所部清蹕除道自大清門至壇門鑾儀衛官校陳設大駕鹵簿導象四民尉二十有八人次寶象五民尉八十人雲麾使一人治儀正二人次靜鞭四民尉十有四人治儀正一人次前部大樂大號小號各四金口角四和聲署史十有二人次革輅駕馬四民尉三十有二人木輅駕馬六民尉三十有二人象輅駕馬八民尉三十有四人金輅駕象一民尉四十有四人玉輅駕象一民尉四十有四人雲麾使一人治儀正二人次鼓吹大樂金二金鉦四鈸二鼓二有架㸃二笛四雲璈二管二笙二金口角八大號十有六小號十有六金鉦四畫角二十有四掆鼓二十有四橫笛十有二拍板四仗鼓四金二掆鼓二十有四署史六十有八人民尉百七十有六人畫角前掆鼓後間以紅鐙各二民尉六人冠軍使一人整儀尉二人次引仗六御仗吾仗各十有六立瓜卧瓜各十有六星十有六鉞十有六出警旗一入蹕旗一旗尉九十人民尉六十有七人五色銷金小旗四十每色各八旗尉三十人民尉四十人雲麾使一人整儀尉二人次翠華旗二金鼓旗二門旗八民尉二十有四人日旗一月旗一雲旗五雷旗五八風旗八甘雨旗四民尉四十有八人列宿旗二十有八五星旗五五嶽旗五四瀆旗四神武朱雀白虎青龍旗四民尉九十有二人天馬天鹿辟邪犀牛赤熊黃羆白澤甪端遊麟彩獅振鷺鳴鳶赤烏華蟲黃鵠白雉雲鶴孔雀儀鳳翔鸞為旗二十民尉四十人五色銷金龍纛四十前鋒大纛八羽林大纛八驍騎纛二十有四旗尉四十人民尉百二十人雲麾使二人治儀正二人整儀尉二人次黃麾四儀鍠氅四金節四進善納言敷文振武旌各二褒功懷逺行慶施惠明刑弼教教孝表節旌各二民尉五十有六人龍頭幡四豹尾幡四絳引幡四信幡四民尉三十有二人羽葆幢四霓幢四紫幢四長夀幢四民尉三十有二人雲麾使二人治儀正二人整儀尉二人次鸞鳳赤方扇八雉尾扇八孔雀扇八單龍赤團扇八單龍黃團扇八雙龍黃團扇二十夀字黃扇八旗尉二十有