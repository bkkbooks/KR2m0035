勤農哉服田孔樂咨爾保介庤乃錢鎛七章我禮既畢我誠已將風馬電車旋駕九閶山川出雲為霖澤滂雨公及私興鋤利氓億萬斯年農夫之慶八章歌畢引退贊引奏拜興皇帝率羣臣行三拜禮興乃徹饌送帝神望燎並如常雩之儀禮畢皇帝還宫午門鳴鐘不陪祀王公百官常服跪迎如初儀右大雩因事祇告圜丘之禮遣親王一人將事及執事官致齊一日豫期翰林院具祝文隨事撰擬太常寺送內閣恭書奉諸南郊神庫潔備器陳至日五鼓設神座幄於圜丘陳鹿脯鹿醢醢棗榛葡萄桃實蓮實爐一鐙六爵墊一幄南中設一案少西北向供祝版司祝一人立於案西東面東設一案西向陳告祀制帛一香盤一尊一冪勺具爵三司香司帛司爵各一人立於案東西面糾儀御史一人東位西面一人西位東面太常寺典儀一人立第二成午階上之東掌燎立燎爐東南隅雞初鳴遣官豫俟於昭亨門外贊引太常寺贊禮郎二人豫俟於外壝南右門外均朝服黎明太常寺卿率屬詣皇穹宇奉請皇天上帝神位入壇恭設座上如儀遣官入昭亨右門至外壝南右門贊禮郎引入詣圜丘升西階至第三成午階上典儀贊就位執事官各共乃職贊禮郎引遣官就拜位北面立典儀贊迎神凡禮儀節次皆典儀唱贊後同司香奉香進至案前祇俟贊禮郎贊升壇引遣官升西階就香案前立贊跪遣官跪贊上香司香跪進香遣官上炷香次三上瓣香興贊復位引遣官自西階降復位立贊跪叩興凡遣官升降行禮皆贊皆引後同遣官三跪九叩興贊行初獻禮司帛奉篚司爵揭尊冪勺挹酒實爵以次進至案前祇俟遣官升壇詣神位前跪司帛跪奉篚遣官受篚拱舉奠於案司爵跪奉爵遣官受爵拱舉奠於墊中興贊讀祝遣官降自午階之左至第二成當階北面跪司祝詣祝案前跪三叩奉祝版跪案左讀祝畢興奉安神位前篚內跪叩如初退遣官行三叩禮興仍降西階復位次亞獻獻爵於左次三獻獻爵於右儀同贊送神遣官行三跪九叩禮興贊奉祝帛送燎司祝奉祝司帛奉篚皆三叩司香奉香以次降午階遣官避立西旁俟過復位贊望燎遣官降西階出內壝南右門詣燎所望燎贊禮郎告禮畢引由外壝南右門出太常寺卿率屬恭請上帝神位還御如儀各退右因事祇告列聖升配南郊之禮制下禮部具疏行欽天監諏吉工部於昭亨門外擇潔地設黃幄太常寺設香案於幄內禮工二部尚書上香行三跪九叩禮工部敬製升配神位既成諏吉鐫字內閣翰林官朝服敬書題字大學士滿漢各一人朝服視鐫上香行禮如儀升祔太廟禮成諏升配圜丘吉日以聞飭諸司敬謹供備右敬製神位戒辦眂牲致齊書祝版閲祝版眂割牲儀均與冬日至大祀同前二日遣官各一人祇告天地宗廟社稷如常告儀右祇告前一日太常寺卿率屬入壇潔蠲壇上下恭設上帝青幄暨列聖配幄畢乃恭設升配青幄寶座几案如儀鑾儀衛設龍亭黃蓋御仗於昭亨門外恭製神位黃幄前是日皇帝詣南郊齊宿鑾儀衛陳大駕鹵簿午門鳴鐘鼓樂陳而不作不陪祀王公百官朝服跪送如常儀駕至南郊降輦贊引對引官恭導皇帝詣皇穹宇上香行三拜禮畢恭導詣圜丘祇眂壇位乃導出昭亨門外升輿請齊宫大學士二人朝服祇俟於恭製神位黃幄前太常寺官具爐鐙大學士入幄右門詣案前上香行三跪九叩禮恭視工部以青節神位題字畢禮部尚書詣案前恭奉神位奉安於黃案上香行禮如前儀畢各退右眂神位屆日昧爽太常寺卿入壇陳設祭器樂部陳樂懸樂舞工部官張大次陪祀執事各官朝服豫集祇俟均如大祀儀禮部太常寺官十人前引神位恭俟於黃幄外太常寺卿詣齊宫奏時皇帝禮服出齊宫乘輦前引大臣十人前導後扈大臣隨侍如儀皇帝出廣利門至昭亨門右降輦盥手鑾儀衛官跪奉盥奉巾如儀畢贊引對引恭導皇帝入黃幄左門詣神位前行一跪三拜禮興進前跪恭奉神位興由中門出奉安神位於龍亭跪三拜興避立道左校尉舁亭前列御仗黃蓋禮部太常寺官左右導引前引大臣十人贊引對引太常寺卿二人恭導皇帝於亭後行陪祀王以下內大臣侍衛於昭亨左門外跪迎候過興隨行龍亭入昭亨左門百官跪迎於次候過北面祇立亭至內壝左門外止贊引對引恭導皇帝詣亭前跪三拜興進前跪恭奉神位入內壝左門至圜丘三成階下御仗黃蓋退前引大臣止立贊引對引恭導皇帝升壇太常寺司拜褥官豫布神位拜褥於正中布皇帝拜褥於稍後贊引跪奏廟諡皇帝祇見皇天上帝皇帝恭奉神位跪安於拜席退就拜位贊引奏拜興皇帝三跪九拜恭代行祇見禮畢贊引跪奏請升座皇帝進前跪恭奉神位興司拜褥官徹神位拜褥皇帝詣配幄前跪奉安神位於寶座退至幄外香案前贊引奏拜興皇帝行一跪三拜禮贊引對引恭導皇帝詣二成拜位立乃行大祀禮儀節均與冬日至同祀畢恭導皇帝出昭亨左門乘輿還宫大駕鹵簿前導樂陳而不作不陪祀王公百官祇候迎駕如前儀太常寺官恭請神位御皇穹宇上香行禮均如郊祀儀翼日頒詔布告天下儀詳嘉禮右升配升配圜丘禮成恭遇孟春上辛吉日秩祀祈榖壇乃奉神位配饗祈年殿祀前諸儀並同圜丘豫日有司恭設升配寶座於祈年殿屆日設龍亭黃蓋御仗於恭製神位黃幄前導引如儀皇帝恭奉神位由左階升入祈年左門奉安於寶座不再行祇見禮餘儀節均與上辛祈榖同右升配祈榖壇欽定大清通禮卷一
