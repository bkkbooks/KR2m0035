body:
  text: 欽定四庫全書欽定大清通禮卷三十六嘉禮皇帝時巡省方之禮命下禮部具議以聞乃宣布諸司及巡省之方豫期供備其方大吏飭文武官屬敬修乃守考乃職事無敢不敬戒駕所經行守土官陸治橋梁道路水備舟楫以俟既諏吉閣部院寺府監疏列正二官銜名請旨扈蹕武衛諸臣部勒羽林衛士軍卒嚴明紀律鑾儀衛官整裝御營次舍供張皆依時畢辦右戒辦啓行前一日遣官祇告奉先殿如常儀衛校以行營次舍先發至日昧爽鑾儀衛陳騎駕鹵簿詳見軍禮於聖駕所出禁門外扈從王公暨文武各官服征衣佩弓矢留京王公百官蟒袍補服咸按翼序列門外祇候鑾輅經行之地特命扈從大臣等護視田野青苗禁踐踏者稽察馱車舟楫禁隘道爭先者皆出郊先發屆時皇帝御征衣乘輿出宫導從扈衛如常儀鼓吹振作鹵簿前導扈從王公各官咸跪候過興乘騎隨發留京王公百官跪送候過興各退駕出郊鑾儀校韜鹵簿御前張黃龍曲蓋領侍衛內大臣率侍衛佩弓矢親軍二十人執豹尾槍前後翊衛豹尾槍後扈從諸王貝勒貝子公為一隊次公侯伯以下文武各官為一隊次八旗官軍依旗為隊每隊齊馬首按部就班從人輜重隨後扈從次第進發鴻臚寺官豫傳百里內守土文官率紳士耆民武辨率本軍肅隊於御道右百步外序列駕至跪迎候過興隨至行宫行禮右鑾輿發京師鑾輿既啓行有司豫庀駐蹕行營重城張幔殿黃幄詳見軍禮五里外逺斥堠八旗護軍布幕環列於重城之外閣部院寺府監扈從官布幕環列於護軍之外皆以御營為向駕至詣行營王公離東旌門百步內下馬從大臣羣官百步外下馬從均候宫門前奏事如常及夜嚴鼓侍衛率禁旅分番警巡五漏交外營從官衛士聼角聲治行裝蓐食陸續前發扈從王公大臣豫至駕所出旌門外道右按翼序列內大臣侍衛於宫門前序列辨色皇帝御輿出宫翊衛如儀衆騎從地方文武官跪送道右如初迎禮右行營駐蹕御道所經名山大川及古昔帝王聖賢名臣忠烈陵寢祠墓在三十里以內者行在禮部奏遣扈從大臣各一人齎香帛致祭如儀詳見吉禮右祭所過名山大川將至巡省之方將軍總督都統巡撫總兵官出境奉迎提督學政布政使按察使道府以下州縣以上文官副將以下守備以上武官於本界奉迎皆蟒袍補服恭俟道右駕至跪候過興隨行至行宫紳士耆民隨守土官後跪迎翼日望秩於方嶽及祭古昔帝王功德隆重者先聖先師皆親詣行禮境內山川先賢名臣忠烈祠墓遣官致祭並如儀詳見吉禮右望方嶽秩山川百神駐蹕行宫日覲地方大吏察其所屬能否而黜陟之清問民生利弊隨宜興除臨視河防指授方略召試陳詩獻賦之士量授以官廣泮宫取士之額以勵文風親閲方鎮重兵辨將備材武軍士技勇以講武事所過府州縣蠲免正賦訪問黎老凡男婦年七十以上者賜銀布有差右考績行慶惠省方禮畢乃以回鑾吉日宣示在京羣臣鑾輿旋蹕地方文武大吏率屬跪送如奉迎禮內閣得旨宣布各部院寺府監駕將至王公暨文官京堂武官副都統以上內廷供奉記注翰林官科道等官咸蟒袍補服豫出郊至駐蹕行營外道右序立祗候駕至跪候過興隨至行營恭請聖安各退翼日黎明序列於聖駕所入禁門外祗候駕至跪迎皇帝還宫遣官祗告於奉先殿如初禮右回鑾欽定大清通禮卷三十六
