body:
  text: 卷之四十九親王以下喪親王福晉以下喪公主以下鄉君以上喪卷之五十品官喪庶士喪庶人喪臣等謹案欽定大清通禮五十卷乾隆元年奉敕撰越二十一年告成首紀朝廟大典及欽頒儀式其餘五禮之序悉凖周官而體例則依仿儀禮惟載貴賤之等差節目之先後而不及其沿革惟載器物之名數陳設之方隅而不及其形製蓋沿革具於㑹典則例形製具於禮樂圖式各有明文足資考證故不復述也考儀禮古經殘缺諸儒所說多自士禮上推於天子且古今異制後世斷不能行其一朝令典今有𫝊本者惟開元禮政和五禮新儀大金集禮明集禮大抵意求詳悉轉涉繁蕪以備掌故則有餘不能盡見諸施行也我皇上聲律身度典制修明特命酌定此編懸為令甲自朝廷以逮於士庶鴻綱細目具有程規事求其合宜不拘泥於成迹法求其可守不夸飾以浮文與前代禮書鋪陳掌故不切實用者回殊記曰禮從宜又曰大禮必簡三代聖王納民軌物其本義不過如斯賜名曰通禮信乎酌于古今而逹於上下為億萬年治世之範矣乾隆四十五年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
