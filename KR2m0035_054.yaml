  text: 欽定四庫全書欽定大清通禮卷四十八凶禮
  hash: sha256:76e2e2da98b6cc89aeaa212f2876a0ca952ebffaf03b17c64e76bf460512485b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0035_WYG_054-1a, image: WYG0655/WYG0655-0483c.png}
body:
  text: 皇太子喪禮未分封之皇子薨逝有追封皇太子者禮部內務府承旨會疏喪儀簡王大臣典喪事皇太子年已冠皇帝服十有三日未冠皇帝去冠飾素服輟朝七日已昏並已生子皇太子福晉及所生皇孫皆成服百日外易素服二十七月而除如奉有遵月日皆欽定制服旨行皇太子近侍內監執事人等皆成服百日奏遣王公散秩大臣人數臨時奏定及侍衛九十人內務府所屬官員護軍等六百人皆成服至大祭日而除王以下文武有頂帶官以上咸去冠飾素服七日直省官去冠飾素服三日外藩蒙古王台吉及公主福晉等服內來京者皆去冠飾首飾朝鮮國使臣在京者素服七日自王公逹於軍民遏音樂止昏嫁畿內於初祭日止直省三日既殮設奠所司於奉安金棺宫內陳帷幔列几筵陳儀仗於宫大門外皇帝親臨至月臺正中降輿哭詣奠位坐西向執事官進奠几奉爵大臣跪進爵皇帝祭酒三爵皇孫北面跪行三叩禮若非並皇親臨奠酒孫年幼遣官行禮王以下文武有頂帶官以上序立於門外左右公主福晉以下一品夫人以上序立於門內之右內務府成服婦人立命婦後皆傳哭隨行禮卒奠皇帝乘輿還宫皇孫返苫次衆各退朝晡設奠上食儀同日中進果筵不設儀仗不集序右初喪諏日奉移殯宫豫日行啓奠禮陳儀仗內外集序如初具楮幣三萬陳祭筵十有五羊七酒七尊讀文祭文翰林院撰擬皇孫哭奠衆傳哭隨行禮如儀屆日所司陳大升輿於奉安宫大門之外執事官役皆辦王公百官以金棺所經門街列定班位集序公主福晉以下豫詣殯所集俟屆時皇帝親臨奠酒皇孫跪叩如前儀執事王大臣率官校進恭行奉移禮金棺至門外登輿禮部尚書或侍郎一人祭酒三每祭一叩畢啓行前𨗳後從如儀皇帝還宫皇孫步行恭送王公百官各於集序之位跪迎哭候過從行及於殯宫門外皇孫率衆迎於門外之東皆哭輿止校尉恭舁入門公主福晉以下哭迎於門內之西至殯室恭安正中陳設帷幔靈牀案几如前皇孫入哭奠爵三每奠行一叩禮衆傳哭隨行禮畢退右殯諏日初祭所司陳儀仗於殯宫大門之外每祭皆陳後同張黃幕於門外稍西置奠案設祭文案於簷下祭文翰林院撰擬具楮幣二十三萬五千於燎所陳饌筵六十有三羊二十有一酒二十有五尊於几筵前及階左右又設爵案一於各案之末內監設冠服篚於靈牀王公百官於門外公主福晉命婦於門內辨位集俟屆時皇孫或遣大臣入門立於簷下哭尚茶獻茶尚膳上食揭巾冪皇孫詣几筵前跪哭暫止司祝詣讀文位讀祭文畢復於案奉爵官進爵皇孫受爵三奠每奠一叩興復位立哭如初衆皆隨叩興傳哭徹奠司祝奉祭文內監奉冠服篚均送燎所皇孫詣燎位奠爵行禮如初興哭衆隨叩興哭畢乃退翼日繹祭陳祭筵九羊三酒三尊楮幣萬有五千禮部工部內務府光祿寺大臣執事內務府成服男婦集序如儀諏日大祭陳設祭品哭奠讀文行禮均如初祭次日繹亦如初祭繹之儀月奠陳祭筵十有七羊七酒七尊楮幣五萬陳儀仗集序哭奠如初再周三周月奠同右既殯奠越日行册諡禮前期工部製册寶翰林院撰册寶文送內閣恭書禮部疏請命正副使各一人詣殯所將事前一日遣官祇告太廟後殿奉先殿如常告儀屆日鑾儀衛設儀仗於殯宫大門之外內務府官設册寶案於几筵前左右設香案於正中又設祭文案於左鴻臚寺官設册寶案於太和門階上正中鑾儀衛陳采亭於階下正副使暨執事官皆素服立於階下之東內閣學士自閣奉册寶絹製至太和門階上分陳於案跪三叩興退禮部尚書侍郎引正副使由東階升詣册寶案前跪一叩興正使奉册副使奉寶由中道左降階安設亭內跪叩如初興校尉舁亭繖仗前導正副使暨執事官從由中路中門出內大臣侍衛於午門內金水橋旁王以下奉恩將軍以上於午門外常朝所跪送公侯伯以下四品官以上豫往殯宫大門外集俟册寶亭至皆跪迎亭由中門入及二門止正副使詣亭前跪三叩興正使奉册副使奉寶以次進殿中門恭陳於案跪叩如初退近檻北面立執事官贊上香正使詣香案前上香畢復位贊宣册宣册官奉册文宣讀訖仍復於案宣寶如宣册之儀正使偕副使行一跪三叩禮興出殿右門立俟承祭官致祭奠帛讀祝三獻行禮如儀祭畢奉祝帛絹册寶送燎正副使還復命衆各退翼日禮部以册諡禮成頒示直省及朝鮮國國王率其陪臣素服跪迎國中遏音樂止昏嫁三日右册諡百日陳祭筵十有九羊七酒七尊楮幣七萬讀文哭奠行禮儀與月奠同未葬以前清明中元冬日至嵗除日均於殯所陳祭品哭奠如儀惟冬至不哭右百日奠時薦卜葬前期工部治園寢營葬具將竣欽天監諏葬日禮部內務府疏聞遍布諸司供備奉移前一日祖奠陳設祭筵羊酒內外集序哭奠行禮如啓奠之儀至日陳大升輿執事官役皆辦內外集者咸豫會屆時皇帝親臨奠酒皇孫跪叩均如前儀奠畢執事王大臣率官校恭行奉移禮金棺至門外登輿皇帝還宫皇孫往送門外王以下文武有頂帶官以上門內公主福晉以下一品命婦以上各於其位哭候金棺過止哭金棺啓行前導後從分班恭送沿途計道里遠近分宿次各以織葦為行殿及夕金棺奉安於行殿正中陳果筵皇孫哭奠行禮衆隨行禮均如儀厥明奠亦如之及夕又奠在途日同至園寢日守陵不值班之貝勒公大臣各官皆出數里外跪迎道右舉哀候過從行至園寢大門外輿止皇孫率衆跪迎校尉恭舁金棺由中門入暫安享殿行遣奠禮陳果筵送葬王公以下暨在陵之大臣各官及貝勒夫人以下命婦皆集量地分班異等各序於其位皇孫詣金棺前哭奠爵三每奠一叩衆傳哭隨行禮畢退葬日所司豫於園寢前設幕陳葬車於幕內徑逹石牀高下與齊乃行遷奠禮陳儀仗內外集序如前陳祭筵十有五羊七酒九尊楮幣三萬哭奠行禮如遣奠儀卒奠執事官役奉移金棺至幕內陳於葬車去幠北向奉安皇孫哭奠爵三叩衆各於其位隨哭叩皇孫詣幕側跪俟執事官役恭奉金棺由葬車逹於石牀以車出乃窆實土封石門成葬皇孫哭入園寢前跪奠爵三叩衆隨哭叩如初卒哭乃返右葬既葬奉安神主於園寢享殿先期匠人於廡室敬製神主鐫諡工竣奉安於案內閣禮部工部大臣各一人朝服上香行禮如儀諏吉行題主禮所司設神主案於殿內正中前設香案設題主案於香案之東豫置主櫝於案上屆時禮部尚書或侍郎啓櫝恭奉神主於案大學士詣案前行一跪三叩禮興西面恭題畢退禮部尚書恭奉神主跪安於正中案上三叩興退乃行虞祭禮陳牛一羊二帛一爵三上香奠帛讀祝獻爵承祭官行禮如儀右題主期年小祥陳果饌羊酒如百日奠之儀遣官致祭禮部工部內務府大臣各一人往襄厥事再期大祥陳果筵醴酒守園寢官一人承祭如未葬與小祥儀同二十七月終喪右祥終喪皇子喪禮未分封之皇子薨逝內務府會禮部疏列喪儀布諸司戒辦皇帝輟朝素服五日已昏並已生子皇子福晉及所生皇孫皆成服百日外易素服二十七月而除如奉有皆欽定制服月日遵旨行皇子近侍內監執事人等皆制服百日奏遣王公及散秩大臣三人侍衛六十人內管領二人內務府派出佐領下男婦皆成服至大祭日而除既殮設奠所司於奉安金棺殿內設帷幔列几筵陳儀仗於門外皇帝親臨至月臺正中降輿哭詣奠位坐向西執事官進奠几奉爵大臣跪進爵皇帝祭酒三皇孫北面跪行三叩禮若非皇孫親臨奠酒並年幼遣官行禮王以下四品官以上公主福晉以下一品夫人以上各於其位集序皆傳哭隨行禮奠畢皇帝還宫皇孫返苫次衆各退朝晡上食儀同日中進果筵不設儀仗不集序右初喪諏日而殯所司陳大升輿設儀仗執事官役皆辦王公以下豫集如初公主福晉以下豫至殯所集俟屆時皇帝親臨奠酒皇孫跪叩如前儀執事官率校尉奉移金棺登輿禮部尚書或侍郎一人祭酒三每祭一叩畢啓行前導後從如儀皇帝還宫皇孫恭送王公各官於集序之位跪候過從行及於殯所門外皇孫率衆迎於門外之東皆哭輿止校尉恭舁入門公主福晉以下哭迎於門內之西至殯室恭安正中陳設帷幔靈牀案几如前皇孫入哭奠爵三每奠行一叩禮衆傳哭隨行禮畢退右殯諏日初祭所司陳儀仗於殯宫大門之外每祭皆陳後同張黃幕於門外稍西置奠案設祭文案於簷下祭文翰林院撰擬具楮幣十有五萬於燎所陳饌筵三十有一羊九酒九尊於几筵前及階左右又設爵案一於各案之末內監設冠服篚於靈牀內外集序如初皇孫或遣大臣入門立簷下哭尚茶獻茶尚膳上食揭巾冪皇孫詣几筵前跪哭暫止司祝至讀祝位讀祭文畢復於案奉爵官進爵皇孫受爵三奠每奠一叩興復位立哭如初衆皆隨叩興傳哭徹奠送燎皇孫詣燎位奠爵三叩如初興哭衆隨叩興哭畢乃退翼日繹祭陳果筵五羊五酒五尊楮幣四千內外不集序內務府官祭酒行禮如儀諏日大祭陳設祭品哭奠讀文行禮儀與初祭同翼日繹祭儀與初祭次日繹同周月陳祭筵十有五羊九酒七尊楮幣二萬哭奠如儀再周三周月奠同右既殯奠如奉旨追封擇吉行追封禮前期工部製册寶翰林院撰擬册寶文送內閣恭書如式禮部疏請命正副使各一人詣殯所將事屆日鑾儀衛設儀仗於殯所大門外內務府官設册寶案於几筵前左右設香案於正中又設祭文案於左鴻臚寺官設册寶案於內閣鑾儀衛豫設采亭於午門前屆日正副使暨執事官皆素服詣內閣至册寶案前行一跪三叩禮興正使奉册副使奉寶由午門中門出分陳亭內跪叩如初興校尉舁亭繖仗前導正副使暨執事官隨行亭田中道出長安門至殯所門外止正副使詣亭前跪三叩興正使奉册副使奉寶由中門入陳於案跪叩如初退近檻北面立正使詣香案前上香畢復位立宣册官至册案前奉册文宣讀仍復於案次宣寶如宣册之儀正使偕副使行一跪三叩禮興乃進饌讀祭文奠酒行禮如儀右封諡百日陳設祭品如月奠之數哭奠行禮如初未葬以前清明中元冬日至嵗除日均於殯所陳祭品哭奠如儀惟冬至不哭右百日奠時薦卜葬前期工部治園寢營葬具將竣諏葬日禮部內務府疏聞諸司供備奉移前一日祖奠陳儀仗果饌十有五筵羊九酒五尊楮幣二萬哭奠內外集序行禮儀與百日同至日陳大升輿執事官役皆辦內外集者咸豫會屆時皇孫承命往送詣金棺前哭盡哀跪奠酒三叩興如前與皇帝親臨奠酒親奠儀同校尉舁行門外王以下四品官以上門內公主福晉以下一品命婦以上各於其位哭候過止哭及登輿啓行前導後從分班恭送均如儀沿途計道里分宿次各以織葦為行幕及夕金棺奉安於行幕正中陳果筵皇孫哭奠行禮衆隨哭跪叩畢乃退厥明奠亦如之在途日同至園寢及大門外輿止皇孫率衆跪迎校尉舁金棺由中門入暫安於享堂行遣奠禮陳設果饌哭奠行禮均如祖奠儀葬日所司豫於園寢前設幕陳柩牀於幕內乃行遷奠禮陳饌筵一羊一哭奠行禮如遣奠儀卒奠奉移金棺至園寢前幕內陳於柩牀去幠北向奉安皇孫哭奠爵三叩衆於其位隨哭叩皇孫詣幕側跪俟執事官役恭奉金棺由柩牀達於石牀以柩牀出乃窆實土封石門成葬皇孫哭入園寢前跪奠爵三叩衆隨哭叩如初卒哭乃返右葬既葬奉安神主於園寢享堂先期匠人於廡室敬製神主鐫諡工竣奉安於案內閣禮部工部大臣各一人朝服上香行禮如儀諏吉行題主禮所司設神主案於享堂正中前設香案設題主案於香案之東豫置主櫝於案上屆時禮部大臣啓櫝恭奉神主於案大臣一人詣案前行一跪三叩禮興西面恭題畢退禮部大臣恭奉神主跪安於正中案上三叩興退右題主期年小祥陳果饌羊酒如月奠之數遣官致祭禮部工部內務府大臣各一人往襄厥事再期大祥陳果筵醴酒守園寢官一人承祭如未葬與小祥儀同二十七月終喪右祥終喪欽定大清通禮卷四十八
