body:
  text: 欽定四庫全書欽定大清通禮卷二吉禮北郊夏日至大祭地於方澤之禮先祭期五日遣親王二人詣犧牲所恭代眂牲儀與祀南郊禮同右眂牲先三日皇帝致齋於大内頒制辭於羣臣曰某年月日夏至朕恭祭皇地祇於方澤惟爾羣臣其蠲乃心齊乃志各揚其職敢或不共國有常刑欽哉勿怠陪祀王公百官敬書誓命各齋於公署如祀南郊儀右齋戒省牲書祝版眂割牲南郊祀儀均與同先一日五鼓太常寺卿率屬埽除壇上下藉以㯶薦設皇地祇神座於方澤第一成居中北向列聖東西向四從於第二成五嶽東啟運天柱二山從之五鎮西隆業昌瑞永寧三山從之四海在五嶽之次四瀆在五鎮之次均施黄幄工部司官張皇帝拜次於第二成子階上張大次於外壝北門外神路之東太常寺典簿陳牲俎於神㕑博士辨簠簋籩豆豋鉶之實以次展器於神庫右設神座幄供張展牲器其日昧爽太常寺設黄案於中和殿中御座之南太常寺卿祇候贊事殿内司祝由内閣奉祝版暫奉於太和殿内初昕太常寺卿率欽天監博士至乾清門奏時皇帝龍袍補服乗輿出宫至中和殿後降輿御殿立左楹前西向記注官四人於殿右門夾檻内外立東面司祝由太和殿奉祝版前列提鑪二太常寺贊禮郎十人引至中和殿外階下止司祝奉祝版由中階進殿中門陳於案三叩興退太常寺卿展祝文贊禮郎布拜褥皇帝詣案前恭閱畢行一跪三拜禮興復位立太常寺卿韜祝版有司徹拜褥司祝進至案前三叩恭奉祝版興由殿中門出太常寺卿跪奏禮成皇帝還宫太常寺官送祝版至北郊奉安神庫内是日恭進齋戒牌銅人於齋宫徹乾清門齋戒牌銅人如祀南郊儀右閲祝版厥明步軍統領飭所部清蹕除道自東華門至壇門鑾儀衛官校陳設法駕鹵簿導象四民尉二十有八人次寶象五民尉八十人雲麾使一人治儀正二人次静鞭四民尉十有四人治儀正一人次前部大樂大號小號各四金口角四和聲署史十有二人次革輅駕馬四民尉三十有二人木輅駕馬六民尉三十有二人象輅駕馬八民尉三十有四人金輅駕象一民尉四十有四人玉輅駕象一民尉四十有四人雲麾使一人治儀正二人次鼓吹大樂大號八小號八金鉦四畫角二十有四掆鼓二十有四横篴十有二拍板四仗鼓四金二掆鼔二十有四署史六十有八人民尉百六十有四人畫角前掆鼓後間以紅鐙各二民尉六人冠軍使一人整儀尉二人次引仗御仗吾仗各六立𤓰卧𤓰各六星六鉞六出警入蹕旗各一民尉六十有七人五色銷金小旗二十毎色各四民尉四十人雲麾使一人整儀尉二人次翠華旗二金鼓旗二門旗八民尉二十有四人日月旗各一雲雷旗各五八風旗八甘雨旗四民尉四十有八人列宿旗二十有八五星旗五五嶽旗五四瀆旗四神武朱雀白虎青龍旗四民尉九十有二人天馬天鹿辟邪犀牛赤熊黄羆白澤甪端遊麟彩獅振鷺鳴鳶赤烏華蟲黄鵠白雉雲鶴孔雀儀鳳翔鸞為旗二十民尉四十人五色銷金龍纛二十前鋒大纛八羽林大纛八驍騎纛二十有四民尉百二十人雲麾使二人治儀正二人整儀尉二人次黄麾四儀鍠氅四金節四進善納言敷文振武旌各二褒功懐逺行慶施恵明刑弼教教孝表節旌各二民尉五十有六人龍頭旛四豹尾旛四絳引旛四信旛四民尉三十有二人羽葆幢四霓幢四紫幢四長夀幢四民尉三十有二人雲麾使二人治儀正二人整儀尉二人次鸞鳳赤方扇八雉尾扇八孔雀扇八黄赤二色單龍團扇各八雙龍團扇各八夀字黄扇八民尉百二十有八人雲麾使一人治儀正二人整儀尉二人次赤素紫素方繖各四五色四季花繖十間以五色九龍繖十民尉六十人次九龍黄蓋十翠華蓋二紫芝蓋二九龍曲柄黄蓋四民尉四十有八人鑾儀使一人雲麾使一人治儀正二人整儀尉二人次儀刀二十親軍四十人弓矢二十親軍四十人豹尾槍二十䕶軍四十人殳四親軍八人㦸四親軍八人雲麾使一人治儀正二人整儀尉四人次仗馬十䕶軍二十人冠軍使雲麾使各一人次金方几一金交倚一金缾二金盥盤一金盂一金合二金鑪二拂二立夏陳列處暑収旗尉二十有二人雲麾使一人治儀正二人次九龍曲柄黃華蓋一武備院掌蓋司蓋四人前引佩刀大臣十人提鑪二執鑪侍衛二人金輦在中左右奉輦鑾儀使二人扶輦冠軍使一入雲麾使一人治儀正二人整儀尉二人旗尉民尉各十有八人後扈佩刀大臣二人豹尾班執豹尾槍侍衛十人佩儀刀侍衛十人佩弓矢侍衛十人領侍衛内大臣一人侍衛班領二人次後管宗人府王公二人前鋒䕶軍統領一人散秩大臣一人給事中御史二人各部郎中四人員外郎並用侍衛班領一人署侍衛班領一人侍衛什長二人次黃龍大纛二領侍衛内大臣一人内大臣散秩大臣並用司纛侍衛什長二人建纛親軍四人佩鳴螺親軍六人凡職事官均采服親軍䕶軍旗尉民尉各服其服辰刻不陪祀王以下公以上滿漢文武百官朝服咸會祇候送駕如儀巳刻太常寺卿赴乾清門奏請詣北郊齋宿皇帝龍袍補服乗禮輿出至太和門階下降輿鑾儀衛進金輦掌鑾儀衛内大臣一人跪奏請陞輦鑾儀使二人奉輦扶輦官四人納陛於輦前正中皇帝乗輦駕士三十二人轝輦駕發警蹕鑾儀使二人率官校夾輦而趨午門鳴鐘鼓皇帝由協和門東華門出導迎樂前引不作左右塗巷皆設布幛䕶軍統領步軍統領率弁校辟除如詣南郊儀右鑾輿出宫駕至北郊由壇西門入至方澤北門外掌鑾儀衛内大臣一人跪奏請皇帝降輦奉輦納陛如儀前引内大臣十人右贊引左對引太常寺卿二人恭導皇帝由外壝北右門至皇祇室詣皇地祇香案前立司香太常寺少卿一人跪進香皇帝跪受香拱舉仍授司香興三上香畢以次詣列聖前上香如儀贊禮郎布拜褥皇帝行三跪九拜禮兩廡從位遣分獻官上香行禮皇帝詣方澤陞子階第一成恭眂皇地祇位列聖配位贊引官以次跪奏畢暨對引官恭導皇帝由内壝西右門詣神庫恭眂籩豆贊引跪奏如前儀遂遣官並眂牲牢畢皇帝由内壝北右門出至神路西陞輦詣齋宫從祀王公百官采服分班祇竢皇帝降輦乗禮輿入宫乃退隨壇齋宿如祀南郊之儀右眂神位壇位牲器齋宿将事之夕夜分太常寺卿率官屬入壇然炬明鐙具器陳於案各以其序第一成皇地祇幄内犢一豋一簠二簋二籩十有二豆十有二金鑪一黄鐙金鐙各二爵墊一列聖幄内皆犢一豋一簠簋各二籩豆各十有二金鑪一黄鐙金鐙各二爵墊一幄北中設一案少西南向供祝版西設一案東向陳黄琮一郊祀制帛一色黄奉先制帛二色白香盤三尊三匏爵九壺一實福酒盤一實胙肉東設一案西向陳奉先制帛三色白香盤三尊三匏爵九凡牲陳於俎凡玉帛實於篚凡尊實酒承以舟疏布冪勺具第二成四從幄内皆牛一羊一豕一豋一鉶簠簋各二籩豆各十琖三十鑪一鐙四各設一案陳禮神制帛各一嶽鎮色用青赤黄白黑五山色用白四海色用青赤白黑四瀆色用黑尊一爵三香盤一俎篚勺冪具鑾儀衛冠軍使設洗於外壝右門外大次樂部率太常協律郎設中和韶樂於二成階下金編鐘在西玉編磬在東西應鼓一柷一麾一東敔一琴瑟笙簫篴塤箎搏拊旌節及羽籥干戚之屬東西依數分比均與南郊禮同右陳設陳設畢禮部侍郎一人由東階升第一成太常寺博士前引詣皇地祇位前省眂玉帛齍盛及豋俎籩豆之實以次詣列聖位前省齍畢仍由東階降至第二成從位前周眂如儀右省齍辨行禮位第一成子階上為讀祝受福胙皇帝拜位第二成黄幄次為皇帝行禮拜位南向第二成階下為陪祀王貝勒貝子公拜位左翼東位西上右翼西位東上庭中夾神道東西為分獻官拜位外壝門外為陪祀百官拜位文五品武四品以上東西各五班均面南重行異等西位東上東位西上辨執事位第一成太常寺官二人立皇帝拜位前一司拜牌東面一司拜褥西面司祝一人立祝案西東面司香三人司玉帛一人司帛二人司爵三人序立西案之西東面司香三人司帛三人司爵三人序立東案之東西面光禄寺卿二人立西司香之後侍衛二人立東司香之後太常寺贊賜福胙一人立西司爵之次均南上侍儀禮部尚書一人侍郎一人立東案之北西面都察院左都御史副都御史各一人樂部典樂一人立西案之北東面均南上階下太常寺典儀一人西立東面第二成司拜牌拜褥官各一人分立黄幄次東西與第一成子階同第二成階下記注官四人東立西面引王公行禮鴻臚寺官二人糾儀御史四人禮部祠祭司官二人分立拜位左右均東西面司樂協律郎樂工序立東西樂懸之次歌工立樂工之次樂舞生文武八佾分行序立西在歌工之右東在歌工之左皆西列東上東列西上太常寺𫝊贊四人二人循内壝牆立二人循外壝牆立外壝門外糾儀御史四人禮部祠祭司官四人分立從祀百官之次鴻臚寺序班東西各一人立於糾儀官之次稍後均東西面掌瘞官一人率瘞人立於瘞坎之西北隅右辨位祀日日出前七刻司祝詣神庫恭請祝版設於祝案跪叩如儀禮部尚書一人率太常寺卿屬恭請神位鑾儀衛官校豫設鳳亭一於皇祇室階下正中北向又設鳳亭五於左右稍後均北向又設鳳亭四於北稍後均東西向至時太常寺官啟神龕禮部尚書詣皇祇室各香案前上香行禮如儀太常寺卿率屬分詣皇祇室及從位前各行一跪三叩禮先請四從位奉至丹墀東西向次請列聖神位於殿内東西向俟請皇地祇神位北向先行乃奉列聖神位以從既出殿乃奉四從神位以從依次奉安於鳳亭内跪叩如初校尉舁亭太常寺官十人前引禮部尚書從由方澤南門入至子陛亭止皇地祇居中列聖左右稍後均北向從位再後東西向太常寺官詣各亭前跪三叩興恭請皇地祇列聖神位陞子階詣第一成四從神位陞東西階詣第二成以次奉安於神座各行一跪三叩禮退右請神位太常寺卿赴齋宫奏請詣壇行禮皇帝御祭服乗禮輿出齋宫鑾儀使進金輦於齋宫門外納陛奉輦如儀皇帝陞輦鑾儀衛校鳴齋宫鐘前引後扈如常儀皇帝至外壝門外神路西降輦右贊引左對引太常寺卿二人恭導皇帝詣大次少竢太常寺贊禮郎引分獻官於外壝左門外序立鴻臚寺官引陪祀王公於外壝門外侍衛後百官於行禮位後按翼東西序立祇候太常寺卿告奉安神位畢奏請行禮皇帝出大次鑾儀衛官跪奉盥奉巾如儀盥畢司拜褥官豫布拜褥於第二成拜次退贊引對引官恭導皇帝由外壝北右門入陞子階就第二成拜位司拜牌官安拜牌退侍衛至内壝門外前引内大臣執鑪鐙官至第二成階下均止立後扈大臣隨侍凡壇隨侍陞同鴻臚寺官引階下王公咸就拜位立太常寺贊禮郎引分獻官入内壝左門至分獻拜位立鴻臚寺官引文武百官均就拜位序立典儀贊樂舞生登歌執事官各共廼職武舞執干戚進贊引奏就位皇帝就拜位立右就次盥洗就位皇帝既就位典儀贊瘞毛血迎神司樂贊舉迎神樂奏中平之章辭曰吉蠲兮玉宇開薰風兮自南來鳳馭紛兮後先嶽瀆靄兮徘徊肅展禮兮報功沛靈澤兮九垓協律郎舉麾工鼓柷樂作贊引奏跪拜興皇帝行三跪九拜禮𫝊贊贊跪叩興王公百官均隨行禮凡衆官行禮均𫝊贊後同協律郎偃麾工戞敔樂止凡樂以舉麾鼓柷作以偃麾戞敔止後同右迎神典儀贊奠玉帛左右司香奉香盤以次進香案前恭候左司玉帛官暨司帛官由西案奉篚右司帛官由東案奉篚以次進至神位前恭候司樂贊舉奠玉帛樂奏廣平之章辭曰式時吉土兮中壇毖我郊兆兮孔安辟公趨蹌兮就列考鐘伐鼓兮舞干黄琮