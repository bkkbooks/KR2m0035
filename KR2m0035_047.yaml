body:
  text: 欽定四庫全書欽定大清通禮卷四十一軍禮大軍出征奏捷上所獲於京師乃獻俘於太廟社稷祗告成事獻俘太廟之禮前期有司諏吉以聞翰林院撰祝文祝辭隨時撰擬太常寺以祝版送內閣恭書受而奉諸神庫承祭官執事官應陪祀之文武百官咸致齊御史禮部光祿寺官眂割牲均如儀屆日五鼓宗室官入廟恭請中殿神位奉安於前殿供備陳設陪祀執事各官詣廟祇俟均朝服兵部司官朝服率解俘將校豫以白組繫俘頸由西長安門至天安右門入候於太廟街門外黎眀承祭官朝服至俘跪伏承祭官入廟就位陪祀執事各官咸就位立祗告獻俘讀祝行三獻禮陪祀官均隨行禮是日並遣官告祭後殿凡陳設行禮儀節並與時饗同儀詳吉禮右太廟獻俘同日獻俘社稷前期有司供備翰林院撰祝文陪祀王公百官致齊均如祭太廟之儀屆日獻俘太廟禮畢兵部司官以俘候於社稷街門外承祭官朝服至俘跪伏承祭官就拜位行禮陪祀官均隨行禮凡陳設及行禮儀節並與春秋祈報禮同儀詳吉禮禮畢兵部司官以俘仍由原入之門出各官皆退右社稷壇獻俘獻俘翼日皇帝御午門受俘受俘之禮前期兵部遍布諸司戒辦屆日工部官設御座於午門樓正中武備院官張黃蓋於樓檐下鑾儀衛官陳法駕鹵簿樂部和聲署陳樂懸設鐃吹軍樂於樓下設丹陛鹵簿左當闕左門之北右當闕右門之北靜鞭仗馬在其次設丹墀鹵簿於闕左門闕右門之南金鼓在其次丹陛大樂在金鼓之次輦輅設於天安門外金水橋南馴象設輦輅南均夾甬道分列如儀鴻臚寺序定班位內大臣率侍衛蟒袍補服立兩翼樓階上護軍統領率護軍立階下均佩刀環衛前引大臣十人立樓檐外階上東西面後扈內大臣二人在御座旁左右僉立豹尾班侍衛佩刀侍衛在御座後左右翼立記注官立前楹之西東面北上承㫖大臣二人鴻臚寺鳴贊二人立於階下東西面鑾儀衛𫝊鳴鞭官立西鳴贊官之次東面均北上侍儀內閣大學士學士翰林院學士都察院左都御史副都御史立丹陛鹵簿之北東西面紏儀御史四人禮部司官四人鴻臚寺官四人立丹陛鹵簿之南又御史四人禮部司官四人鴻臚寺官四人立丹墀鹵簿之南均東西面北上王貝勒貝子公拜位在丹陛鹵簿內甬道東西文武百官拜位在丹墀鹵簿內甬道東西重行異等均北面東位西上西位東上兵部刑部尚書侍郎立於西丹墀鹵簿之後右陳設序位漏未盡王公朝服立闕左右門北百官朝服立闕左右門南均按翼東西祇俟兵部司官率解俘將校以俘由西長安門至天安右門入立於右翼金鼓之後刑部司官立兵部司官之次黎明執事官咸就位禮部尚書侍郎詣乾清門奏時遂前導駕皇帝禮服乘輿出宫前引後扈如常儀午門鳴鐘鼓駕至太和門大樂鐃吹金鼓振作禮部尚書侍郎恭導皇帝登午門樓至前楹降輿御黃幄升座畢樂止鑾儀衛官𫝊鳴鞭校尉三鳴鞭鳴贊贊進俘丹陛樂作奏慶平之章命將樂辭詳見凱旋儀序班引解俘將校自丹墀鹵簿之南進至御道西北面贊進少進贊跪叩興將校行三跪九叩禮興樂止贊退引將校退復原位立鳴贊贊受俘兵部司官率將校以俘至右翼金鼓之下北面跪匐伏兵部尚書趨至午門前御道西跪奏平定某地所獲俘囚謹獻闕下興少退東面立刑部尚書趨至兵部尚書之右承㫖大臣𫝊制鴻臚寺官接宣曰所獻俘交刑部刑部尚書趨進北面跪領㫖訖興偕兵部尚書退復位兵部司官以俘交刑部司官械繫由原入之門出鳴贊贊齊班丹陛樂作序班分引王公百官各就拜位立聽贊行禮如常儀畢樂止鳴鞭如初駕興大樂鐃吹金鼓振作午門鳴鐘皇帝乘輿還宫樂止衆官皆退是日賜解俘官兵燕於兵部翼日午門外賜解俘官兵冠履銀幣有差右受俘欽定大清通禮卷四十一
