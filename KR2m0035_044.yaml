front:
  text: 欽定四庫全書欽定大清通禮卷三十八嘉禮
  hash: sha256:f562ff8c5a6e44b430580dbb1d546e225764d59e36b52dd652f3059732c3d60d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0035_WYG_044-1a, image: WYG0655/WYG0655-0399a.png}
body:
  text: 歳孟春望日孟冬朔日舉鄉飲酒之禮於學宫京師禮部侍郎一人監其禮順天府府尹為主人以鄉之年髙六十以上有徳行者一人為賓其次一人為介又其次為衆賓以博士一人為司正以博士弟子習禮者二人司爵二人贊禮二人引禮一人讀律令僚佐皆與前期戒賓賓禮辭許戒介亦如之右戒賓介先一日司正率執事者詣講堂肄儀設監禮席次於庭東北向布賓席於堂西北南向主人席於東南西向介席於西南東向衆賔之長三人席於賔西南向東上皆専席不屬衆賔席於西序東向僚佐席於東序西向皆北上司正席於主人之東北向設律令案一於主介間正中東西肆又設尊案一於東序端南北肆樂部和聲署設樂懸於西階下如儀右陳設布席届日質明執事者入具饌設尊於案實酒於尊加冪勺觶爵在尊北讀律者奉律令陳於中案既辦禮部侍郎朝服詣學宫就次監禮主人率司正及僚屬咸朝服入乃速賓介主人立東階下西面僚佐序立於主人之後西面北上司正讀律令者立僚佐之南北面西上贊禮者一人立東階下又一人立庠門之外均西面届時賓介盛服至序立於庠門外之右介居賓南衆賓居介南皆東面北上執事者以賓至告於主人主人出迎賓西面揖賔介以下東面答揖主人入門左賓揖介介揖衆賔以次入門右當階主人揖及階揖賔皆答揖主人與賔讓升三譲賔三辭主人升賔乃升主人東階上賔西階上贊者贊拜主人北面再拜賔答拜興即席主人降階延介一讓升介升拜如賔禮就位主人復揖衆賔衆賔以次皆升主人三揖賔長三人各答一揖衆賔皆就位主人率僚佐以下咸就位右迎賓介贊禮者贊揚觶執事者引司正由東階升詣堂中北面立贊揖司正揖賓介以下答揖司爵詣酒尊所舉冪酌酒於觶進授司正司正揚觶而語曰恭惟朝廷率由舊章敦崇禮敎舉行鄉飲非為飲食凡我長幼各相勸勉為臣盡忠為子盡孝長幼有序兄友弟恭内睦宗族外和鄉里無或廢墜以忝所生語畢贊者贊司正飲酒司正立飲畢以觶受執事者反於案贊揖司正揖賔介以下皆揖司正復位右揚觶贊讀律令引禮引讀律令者就中案前北面立賓介主人以下聼贊咸起立旅揖如司正揚觶禮乃讀律令曰律令凡鄉飲酒序長幼論賢良髙年有徳者居上其次序齒列坐有過犯者不得干豫違者罪以違制失儀則揚觶者以禮責之讀畢復位賔主以下皆坐右讀律令贊者贊舉饌案執事者奉饌案於賔席次介次衆賔主人以下徧舉訖贊獻賔主人起離席北面立司爵詣酒尊所酌酒實爵授主人主人受爵詣賔席奠於案稍退賔避席立於主人之左贊拜主人再拜賔答拜皆復位立次獻介如獻賔之禮次獻衆賔之長者三人每獻一人主人揖賔長避席答揖皆復位執事者徧獻衆賔爵訖贊賔酢主人賔離席司爵酌酒授賔賔受爵介及賔長咸離席從詣主人席前拜送爵主人答拜如前儀復位皆坐右獻賓賓酢主人酒數行工升歌周詩鹿鳴之章卒歌笙奏御製補南陔詩辭曰我逝南陔言陟其岵昔我行役瞻望有父欲養無由風木何補我逝南陔言陟其岵今我行役瞻望有母母也倚廬歸則寜止南陔有筍籜實勹之孱孱孩提孰噢咻之慎爾温凊潔爾㫖肴今爾不飬日月其滔閒歌周詩魚麗之章笙奏御製補由庚詩辭曰由庚便便東西朔南六符調爕八風節宣王庚容容朔南西東維敬與勤百王道同王庚廓廓東西南朔先憂而憂後樂而樂王庚恢恢南朔東西皇極孰建惟徳之依乃合樂歌周詩闗雎之章卒歌工告備出執事者行酒主賔以下飲無算爵右樂賓贊禮贊徹饌案衆起離席主人率僚屬在東西上賔介在西東上皆北面贊拜主人再拜賔介以下皆再拜賓降西階出介及衆賓從立庠門外之右東面北上主人降東階出僚屬從送賔於庠門外之左西面皆再拜興賔介退禮卒無愆禮部侍郎出主人率僚屬送於庠門外皆退右徹饌賔出直省府州縣鄉飲酒之禮以守牧令為主人省㑹及監司分駐之地皆以監司視其禮儀注同前右直省鄉飲酒欽定大清通禮卷三十八
