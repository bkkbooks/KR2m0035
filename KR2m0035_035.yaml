body:
  text: 欽定四庫全書欽定大清通禮卷二十九嘉禮頒朔之禮欽天監豫推來歳時憲書成式二月恭進御覽乃鐫於版四月驛送直省各布政司依式刋造均以嵗十月朔日頒行是日鴻臚寺欽天監官設案於午門外正中左右各一均東西肆又設二案於甬道左右均南北肆工部官設香亭一龍亭一於欽天監堂中設綵亭八於左右樂部和聲署陳樂於香亭前黎明欽天監監正率屬朝服陳恭進皇帝皇太后皇后時憲書於龍亭陳王公百官時憲書於采亭鑾儀校以次舁行香亭在前次龍亭次采亭鼓吹前導導迎樂作奏禧平之章辭曰欽若誠亶皇正朔頒分秒無忒玉衡齊貫敬授時宜暑寒穯事明民庶歡由東長安門入至午門外亭止恭奉皇帝皇后前時憲書陳於正中左案恭奉皇太后前時憲書陳於右案奉王公百官時憲書陳於東西案欽天監官四人對舉左右案二人前引入午門中門監正監副從至太和門陳於左右階上監正等於丹墀左行三跪九叩禮内務府掌儀司官奉時憲書至乾清門慈寧門恭進皇帝皇太后皇后欽天監官徹案出右獻朔其日王貝勒以下文武百官朝服畢㑹午門外東西闕下鴻臚寺鳴贊二人進立於甬道左右糾儀御史二人禮部司官二人進立於鳴贊之北皆東西面宣制鴻臚寺官一人立糾儀官之北西面鳴贊贊齊班鴻臚寺引親王郡王貝勒貝子公按翼序立於甬道内引文武百官序立於甬道左右皆北面東班西上西班東上贊進皆進贊跪皆跪贊宣制宣制官宣制曰某年時憲書頒給衆官曉諭天下宣畢贊叩興衆行三跪九叩禮興退禮部欽天監乃頒朔扵王公百官親王郡王貝勒貝子公以下八旗暨部院府寺監長貳各官皆以次跪領所屬官次日赴欽天監祗領遂頒布於郊甸右京師百官受朔嵗屆頒朔之日各省㑹總督若廵撫率在城文官將軍率在城武官受朔是日首縣扵督撫署内向闕列屏設案布政使以所刋時憲書設扵龍亭鼓吹前導舁詣公署恭陳扵案質明文武官朝服畢㑹通贊贊齊班引禮二人引各官文東武西重行異等以品為序咸就拜位北面立如朝賀之儀贊跪叩興衆行三跪九叩禮興以次祗受時憲書畢各退布政使分發專城之道轉行所屬州縣衛分駐之提鎭協轉行所屬標營到日行禮祗領與省㑹同遂頒布於民間右直省受朔每歳十月朝鮮國王遣其陪臣齎咨赴禮部受來歳之朔禮部豫取欽天監時憲書函封鈴印訖頒朔翼日設案扵儀制司堂上正中㑹同四譯館大使引朝鮮國陪臣服本國公服入儀制司郎中公服就案坐吏奉時憲書置於案贊禮者一人立於案右贊進大使引陪臣詣案前贊跪陪臣跪贊受朔吏奉時憲書授陪臣陪臣恭受興退乃歸報朝鮮國王王朝服祗受如禮遂頒布於其國人右朝鮮國受朔歳立春前日順天府府尹率所屬迎春東郊如禮詳見直省製春山按欽天監所推春圖飾土牛及勾芒神春山一案芒神執策立土牛左合設一案各三案送禮部恭獻皇帝皇太后皇后禮部豫取學弟子員七十有五人天文生八人於立春前一時自部分舁案依次由東長安門至午門外祗竢禮部尚書侍郎率其屬順天府府尹具進春表章及丞率其屬咸朝服畢㑹欽天監官報時屆入自中門執事者舉四案從昭徳門至後左門外禮部官屬前引尚書侍郎及府尹從内監接舁入詣乾清門前引官止立階下府尹於門外跪進表章内監啟門舉各案入恭進皇帝皇后前又奉二案從熙和門詣永康左門外前引後從如儀内監接舁入以獻皇太后前各官出皆退右進春直省迎春之禮先立春日各府州縣扵東郊造芒神土牛春在十二月望後芒神執策當牛肩在正月朔後當牛腹在正月望後當牛膝示民農事早晩屆立春日吏設案於芒神春牛前陳香燭果酒之屬案前布拜席通贊執事者於席左右立府州縣正官率在城文官丞史以下朝服畢詣東郊立春時至通贊贊行禮正官一人在前餘官以序列行就拜位贊跪叩興衆行一跪三叩禮執事者舉壺爵跪於正官之左正官受爵酌酒酹酒三授爵於執事者復行三叩禮衆随行禮興乃舁芒神土牛鼓樂前導各官後従迎入城置於公所各退右直省迎春欽定大清通禮卷二十九
