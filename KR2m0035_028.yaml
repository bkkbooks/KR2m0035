front:
  text: 欽定四庫全書欽定大清通禮卷二十二嘉禮皇帝大昏之禮制下禮部徧布諸司供備諏納采大徴奉迎吉日以聞㑹工部製金册金寳翰林院撰制册文進呈欽定送内閣㳟鐫如儀册后詳儀納采之禮内務府官備
  hash: sha256:6b66ed543d5fdccd20d3e62ac738500fa944c7ae1f08c45356a6a54c10f81d2f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0035_WYG_028-1a, image: WYG0655/WYG0655-0295c.png}
body:
  text: 文馬十鞍轡具甲胄十幣百布二百以竢將屆期禮部奏請命尚書一人充納采使内務府總管一人充副使屆日黎明禮部鴻臚寺官設節案一於太和殿内正中東西肆内閣官自内閣奉節陳於案退内務府官以龍亭分載甲胄布帛陳於丹陛上左右陳文馬於丹陛下左右黎明正副使入祗竢於丹墀東鴻臚寺序班二人立使者之右少後授節大學士一人立殿東檐下宣制鴻臚寺官一人立大學士之右少後均朝服西面鳴贊二人朝服分立殿外東西柱前東西面欽天監官報吉時屆鳴贊贊齊班序班引使者就丹墀東班拜位立北面西上贊進少進贊跪叩興行三跪九叩禮興序班引使者升東階至丹陛北面立鳴贊贊有制使者跪宣制官進至殿中門之左西面宣制曰皇帝欽奉皇太后懿㫖納某女某氏為后命卿等持節以禮納采宣畢大學士進殿左門詣案奉節由中門闑左出至丹陛以授正使正使受節偕副使興前行降中階左内務府官率校尉舁禮物龍亭随降衛士牽文馬從御仗前導由太和中門出詣皇后邸第右傳制遣使納采是日后父飭子弟潔掃邸第有司豫設案於㕔事正中一東西肆左右各一南北肆使者持節至邸將及門下馬后父朝服出迎於大門外道左跪候過興使者入中門升中階登堂陳節中案偕副使退就案東西面立龍亭随入至儀門外止内務府官奉甲胄布帛入登堂陳於左右各案衛士以馬入陳於庭左右訖后父升自西階詣中門外北面跪使者少進西面傳㫖納采復位后父聴制行三跪九叩禮興受諸禮物使者詣案奉節出副使從后父跪送於大門外如初内務府官皆出使者乘馬復命還節有司右使者傳制納采納采禮成有司詣皇后邸設燕皇帝特命公主大臣命婦燕后母於内命内大臣侍衛八旗公侯以下滿漢二品以上官燕后父於外外燕朝服后父為賔席東上内燕常服后母為賔席西上序坐行酒三廵如常燕儀右納采筵燕次行大徴禮所司備黄金二百兩白金萬兩黄金茶器一白金茶器二盆二幣千文馬二十鞍轡具閑馬二十䭾甲二十備賜后父后母黄金百兩茶器一白金五千兩茶器一盆一帛五百布千馬六鞍轡具甲胄一弓一韔矢一服朝服各二襲衣各二稱皆冬一夏一貂裘各一帶一備賜后兄弟及從人服物有差屆日有司陳大徴禮物於丹陛上陳賜物於丹陛下禮部奏請命使傳制授節於太和殿儀如納采使者承制持節詣皇后邸執事官陳禮物於堂陳賜物於階上陳䭾馬於庭中使者傳制后父聽制行禮儀注均與納采同傳制訖后父降階率子弟詣庭東向節行三跪九叩禮豫徃大門外祇竢后母率諸婦出詣庭西向節行六肅三跪三叩禮畢退使者持節出后父以下跪送使者復命還節退右大徴及大昏前一日遣官各一人祗告天地太廟奉先殿如常儀右祇告屆日行册迎禮禮部奏請命大學士一人充冊迎使尚書一人副之所司豫疏列内外執事官奏請命内大臣十人侍衛十人充䕶從官命二品以上命婦四人充前導七人充後扈十人充㳟侍其日内鑾儀衛設皇太后儀駕鹵簿樂懸於慈寧宫常次如儀禮部鴻臚寺官設節案册寳案於太和殿内設龍亭於内閣門外鑾儀衛陳法駕鹵簿樂部和聲署陳樂懸各依常次如式又陳中宫車輅於太和門階下陳儀駕鹵簿於午門外内務府官陳冠服於車輅之南黎明内閣禮部官自閣奉金册金寳及宣讀册文寳文分設龍亭内禮部侍郎奉節同詣太和殿㳟陳各案王公文武百官記注糾儀執事各官朝服陪位册迎使序立於丹墀東扈從内大臣侍衛在其後均朝服授節大學士宣制鴻臚寺官舉册寳案内閣禮部官朝服序立於殿檐下並如册后遣使之儀欽天監官報吉時屆禮部尚書侍郎詣乾清門奏時遂前導駕皇帝禮服乘輿出宫前引後扈如常儀出隆宗門至永康左門降輿入立於慈寧門外東位西向内監轉奏皇太后陞慈寧宫寳座禮部尚書侍郎恭導皇帝就正中拜位北向行三跪九拜禮畢皇太后還宫皇帝自永康左門乘輿仍入隆宗門由保和殿北門出御太和殿午門鳴鐘鼓作樂鳴鞭序班引正副使就拜位行禮畢升東階北面跪宣制官宣制詞曰皇帝欽奉皇太后懿㫖納某氏為皇后兹當吉月令辰備物典册命卿等以禮奉迎宣畢大學士授節於正使偕副使興執事官舉册寳案随降中階設龍亭内以次出太和門皇帝還宫鳴鞭作樂並如册后遣使之儀册迎使出扈從内大臣侍衛從出至太和門外册迎使持節在前次册寳亭次中宫女輅冠服儀駕鹵簿遂行詣皇后邸右臨軒遣使册迎是日歩軍統領飭所部清蹕除道自大清門至於后邸宫殿監督領侍率内監備交泰殿内外舖陳恭侍命婦朝服豫詣殿外祇竢導從命婦贊引侍儀宣讀女官朝服及給事后邸内監彩服均詣皇后邸祇竢有司設節案一於邸第内堂正中南設香案均東西肆設册寳案於東西各一均南北肆設皇后拜位於香案前北向宣讀女官二人立東案之南西面侍儀女官四人立拜位左右東西面内監於外堂階下承應使者持節至邸下馬后父率子弟朝服出迎於大門外如前儀使者入升中階立於外堂之東副使在其左均西面册寳亭随入權設於外堂左右内務府官奉冠服授内監齎入轉授女官以進皇后内鑾儀校陳鳳輿於階上正中陳車輅儀駕鹵簿於階下左右至大門内樂部和聲署陳導迎樂於大門左右后父升自西階詣外堂中門外正中北面跪使者西面𫝊制册復位后父聽制行三跪九叩禮興退至階西内監入轉奏皇后御禮服贊引女官恭導出閤門外道右竢后母及諸婦朝服詣外堂門内道右正使授節於内監副使自龍亭奉册寳以授内監均奉自中門入后母以下跪候過興皇后立候過随入内監奉節册寳陳於各案退贊引女官引皇后就拜位跪宣讀女官次第宣册寳皇后受册受寳行禮均如宫中册立儀内監奉節出授使者皇后及母祗送如初贊引導皇后入閤少憇女官奉册寳仍授内監分設於龍亭右受册寳册禮既成欽天監官報陞輿吉時屆内鑾儀校進鳳輿於内堂階下正中南向前導命婦恭導皇后出閤後扈命婦翼擁降階后母率諸婦送至輿前皇后陞禮輿后母及諸婦少退册迎使持節出乘馬先行后父跪送如初興少退次導迎樂陳而不作次儀駕鹵簿車輅次册寳亭次皇后鳳輿啟行出大門命婦乘騎導從内監歩行左右扶輿内大臣侍衛在後乘騎䕶從由大清門中門入至金水橋册迎使下馬持節入皇后輿至午門外鳴鐘鼓儀駕鹵簿至九鳳曲蓋前導執事命婦下馬歩行導從内大臣侍衛於金水橋歩從由午門太和門中門入中左門後左門至乾清門龍亭止册迎使復命還節偕内大臣侍衛各退内監奉册寳於亭前行恭導命婦導鳳輿入乾清中門至乾清宫階下轉啟皇后降輿詣交泰殿導從命婦退恭侍命婦祇迎皇后入中宫内監奉册寳授守寳内監退合卺吉時屆宫中設合卺燕監督領侍具奏皇帝禮服御中宫行合卺禮給事宫人恭侍命婦皆退右合卺翼日尚膳潔具皇后盥饋皇太后御席又具皇太后醴饗皇后御席内監侍豫設朝見拜位於慈寧宫内正中北向又設醴位於東西南向質明皇太后儀駕鹵簿樂懸陳設如常儀内監轉啟皇后行朝見禮皇后禮服出中宫乘輿導從如儀詳見三大節詣慈寧宫降輿引入丹陛上西位東向立内監轉奏皇太后禮服出内宫中和韶樂作陞座樂止贊引命婦引皇后詣正中拜位行六肅三跪三拜禮興少退立尚食進席於皇太后前皇太后舉酒嘗食贊引命婦引皇后復行二肅一跪一拜禮興引詣醴位坐尚食進席於皇后前皇后舉酒嘗食畢興内監侍徹贊引引詣拜位行禮如初少退西向立皇太后降座作樂還宫贊引引皇后出乘輿還中宫執事命婦皆退右朝見越日皇帝率羣臣詣皇太后宫行禮乃御太和殿王公百官上表稱賀頒詔宣示天下直省文武官各進表箋稱賀皇后詣皇太后宫行禮詣皇帝前行禮公主福晉命婦詣皇后宫行禮均如册后之儀午刻樂部和聲署陳樂懸於太和殿常次尚膳供御膳羞光祿寺備燕席皇帝御太和殿賜后父及其族屬燕王公百官咸與后父布席於殿内王公之末其族屬按翼於本旗序品列坐駕陞寳座時王公以下陪位如常后父率其族屬詣丹墀東北面行三跪九叩禮畢均引入班就位坐陳席奏樂行酒如太和殿筵燕儀皇太后御慈寧宫賜后母及其親屬燕公主福晉夫人大臣命婦咸與内監陳樂懸内務府官供饌具后母布席於夫人之末其親屬按品布席於命婦之位皇太后陞寳座時公主以下陪位后母率其親屬詣丹墀東北面行六肅三跪三拜禮畢均引就位坐陳席奏樂行酒如慈寧宫筵燕儀右禮成慶賀筵燕欽定大清通禮巻二十二
