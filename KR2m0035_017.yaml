序位行禮儀節均與太學遣官釋奠同祝辭曰維某年月日某官某致祭於至聖先師孔子曰惟先師德隆千聖道冠百王揭日月以常行自生民所未有屬文教昌明之會正禮和樂節之時辟雍鐘鼓咸恪薦於馨香泮水膠庠益致嚴於籩豆兹當仲春秋祇率彜章肅展微忱聿將祀典以復聖顔子宗聖曾子述聖子思子亞聖孟子配尚饗右祝辭迎神樂奏昭平之章辭曰大哉孔子先覺先知與天地參萬世之師祥徵麟紱韻答金絲日月既揭乾坤清夷初獻樂奏宣平之章辭曰豫懷明德玉振金聲生民未有展也大成爼豆千古春秋上丁清酒既載其香始升舞羽籥之舞亞獻樂奏秩平之章辭曰式禮莫愆升堂再獻響協鼖鏞誠孚罍甗肅肅雍雍譽髦斯彥禮陶樂淑相觀而善三獻樂奏敘平之章辭曰自古在昔先民有作皮辨祭菜於論思樂惟天牖民惟聖時若彜倫攸敘至今木鐸舞均如初徹饌樂奏懿平之章辭曰先師有言祭則受福四海黌宫疇敢不肅禮成告徹毋疏毋瀆樂所自生中原有菽送神樂奏德平之章辭曰鳬繹峩峩洙泗洋洋景行行止流澤無疆聿昭祀事祀事孔明化我蒸民育我膠庠右樂章樂舞崇聖祠同時致祭正獻以督學使者主之若按試他郡則以布政使一人攝分獻以教諭訓導執事以學弟子貟餘陳設行禮並如太學崇聖祠祭儀祝辭曰惟某年月日某官某致祭於肇聖王裕聖王詒聖王昌聖王啓聖王曰惟王奕葉鍾祥光開聖緒盛德之後積久彌昌凡聲教所覃敷率循源而溯本宜肅明禋之典用申守土之忱兹屆仲春秋聿修祀事配以先賢顔氏先賢曾氏先賢孔氏先賢孟孫氏尚饗右崇聖祠祝辭監司分駐各府者主其地文廟之祭他府州縣以長官為正獻其二及所屬兩序分獻崇聖祠皆教諭正獻前後兩廡皆食餼學弟子貟各一人分獻陳設器數行禮儀節與省會同右直省府州縣釋奠儀月朔釋菜望日上香教授教諭訓導等官分班行禮與太學同右朔望釋菜上香儀直省府州縣附廟左右各建忠孝節孝名宦鄉賢四祠歲春秋釋奠禮畢教諭一人公服詣祠致祭是日清晨廟戶啓祠門拂拭神案執事人入陳羊一豕一籩四豆四爐一鐙二陳祝文於案左陳壺一爵三帛一香盤一於案右引贊二人引主祭官入詣案前北面立禮生自右奉香盤主祭官三上香訖引贊贊跪叩興主祭官跪三叩興禮生自右授帛主祭官受帛拱舉仍授禮生獻於案上禮生挈壺酌酒實爵自右跪授爵主祭官受爵拱舉仍授禮生興獻於正中讀祝者取祝文跪案左引贊贊跪主祭官跪讀祝辭曰維某年月日某官某致祭於忠義孝弟之靈曰惟靈稟賦貞純躬行篤實忠誠奮發貫金石而不渝義問宣昭表鄉閭而共式祇事懋彜倫之大性摯莪蒿克恭念天顯之親情殷棣蕚模楷咸推夫懿德綸恩特闡其幽光祠宇維隆歲時式祀用陳尊簋來格几筵尚饗讀畢以祝文復於案退主祭官俯伏興執事者酌酒獻於左又酌酒獻於右退引贊贊跪叩興主祭官跪三叩興執事者以祝帛送燎引贊引主祭官出執事者徹皆退各祠致祭儀同節孝祠祝曰維某年月日某官某致祭於節孝之靈曰惟靈純心皎潔令德柔嘉矢志完貞全閨中之亮節竭誠致敬彰閫內之芳型茹氷蘗而彌堅清操自勵奉盤匜而匪懈篤孝傳徽絲綸特沛乎殊恩祠宇昭垂於令典祇循歲祀式薦尊醪尚饗名宦鄉賢二祠祝文各省州縣所在異辭不悉載右忠孝節孝名宦鄉賢祠祭儀附欽定大清通禮卷十一
