body:
  text: 春秋釋奠先師孔子之禮大成殿內至聖先師正位南向復聖顔子述聖子思子東位西向宗聖曾子亞聖孟子西位東向兩序先賢東閔子損冉子雍端木子賜仲子由卜子商有子若皆西向西冉子耕宰子豫冉子求言子偃顓孫子師朱子熹皆東向兩廡先賢東蘧瑗淡臺滅明原憲南宫適商瞿漆雕開司馬耕梁鱣冉孺伯虔冉季漆雕徒父漆雕哆公西赤任不齊公良孺公肩定鄡單罕父黑榮旗左人郢鄭國原亢廉潔叔仲會公西輿如邽巽陳亢琴張步叔乘秦非顔噲顔何縣亶樂正克萬章周敦頤程皓邵雍西林放宓不齊公冶長公晳哀髙柴樊須商澤巫馬施顔辛曹恤公孫龍秦商顔高壤駟赤石作蜀公夏首后處奚容蒧顔祖句井疆秦祖縣成公祖句兹燕伋樂咳狄黑孔忠公西蒧顔之僕施之常申棖左丘明秦冉牧皮公都子公孫丑張載程頤先儒東公羊髙伏勝董仲舒后蒼杜子春諸葛亮王通范仲淹歐陽修楊時羅從彥李侗吕祖謙蔡沈陳淳魏了翁王柏趙復許謙吳澄胡居仁王守仁羅欽順西榖梁赤髙堂生孔安國毛萇鄭康成范寧韓愈胡瑗司馬光尹焞胡安國張栻陸九淵黃幹真德秀何基陳澔金履祥許衡薛瑄陳獻章蔡清陸隴其均北上東西向崇聖祠殿內中肇聖王木金父左裕聖王祈父右詒聖王防叔次左昌聖王伯夏次右啓聖王叔梁紇皆南向先賢顔無繇孔鯉東位西向曾點孟孫氏西位東向先儒東廡周輔成程珦蔡元定西向西廡張迪朱松東向均北上嵗以春秋仲月上丁遣官將事特行崇典則皇帝親詣行禮先二日禮部尚書一人詣犧牲所眂牲如儀右眂牲致齋書祝版眂祝版帝王儀均同廟先一日宰人豫鑿坎於宰牲亭之西國子監官設香案一於宰牲亭外光祿寺少卿一人朝服詣香案前上香遂及御史禮部祠祭司官國子監丞朝服眂宰宰人割牲以豆取毛血瘞於坎如常儀右眂割牲將事前夕國子監祭酒率屬潔蠲殿內外藉以棕薦拂拭神座工部司官張大次於大成門外之左夜分太常寺卿國子監祭酒各率其屬入具器陳先師位前牛一羊一豕一登一鉶二簠二簋二籩十豆十爐一鐙二四配位前各羊一豕一鉶二簠二簋二籩八豆八爐一鐙二十二哲位前鉶一簠一簋一籩四豆四東西各羊一豕一爐一鐙二殿中設一案少西北向供祝版其南東設一案西向陳禮神制帛九色白香盤四尊三爵二十有七西設一案東向陳禮神制帛八香盤三尊二爵三十有四凡牲陳於俎凡帛正位四配異篚十二哲東西共篚凡尊實酒承以舟疏布冪勺具東廡二位同案每位爵一實酒每案簠一簋一籩四豆四先賢案前羊二豕二香案一爐一鐙二先儒案前羊一豕一香案一爐一鐙二設案一於南北向陳禮神制帛二香盤二尊三虛爵六俎篚冪勺具西廡陳設同崇聖祠正位前各羊一豕一鉶二簠簋各二籩豆各八爐一鐙二配位前簠一簋一籩四豆四東西羊豕各一爐一鐙二中設一案少西供祝版東設一案陳禮神制帛七色白香盤六尊四爵二十有一西設一案陳禮神制帛二香盤一尊三爵六兩廡東二案西一案每位爵一實酒餘陳設簠簋籩豆羊豕爐鐙如配位之數各南設一案陳禮神制帛一香盤一尊一虛爵三俎篚冪勺皆具鑾儀衛官設洗於大次之外樂部率太常協律郎設中和韶樂於殿外兩階金編鐘在東玉編磬在西皆十有六懸以虡業東應鼓一柷一麾一西敔一東西分列琴六瑟四簫六笛六箎四排簫二塤二笙六搏拊二旌二羽籥三十有六太常寺官設洗於崇聖祠階下之東如式右陳設陳設畢太常寺博士引禮部侍郎一人入廟恭詣大成殿周省齍盛及籩豆登鉶之實次詣兩廡省畢引詣崇聖祠正殿及兩廡省眂如儀右省齍辨行禮位殿門內正中為皇帝拜位北向階下甬道左右為分獻官拜位正殿分獻官六人在前兩廡分獻官四人在後均北面陪祀王公位階上東西各二班百官位階下分獻官之南東西各五班重行異等東位西上西位東上均北面辨執事位鑾儀衛司拜褥官二人立於皇帝拜位之左稍後太常寺司祝一人立祝案西東面司香四人司帛四人司爵九人立東案之東西面司香三人司帛三人司爵八人立西案之西東面侍儀禮部尚書侍郎各一人都察院左都御史副都御史各一人樂部典樂一人分立東西案之南東西面太常寺典儀一人立殿左門外西面司樂協律郎樂工歌工文德之舞六佾於階上樂懸東西序立記注官四人於西階下序立紏儀御史四人禮部祠祭司官四人引禮鴻臚寺官四人分立王公百官拜位之次掌燎官率燎人立於燎爐之隅兩廡國子生司香司帛司爵東西各二人序立南案之南均北面承祭崇聖祠官拜位在階下分獻官四人拜位在承祭官後讀祝拜位在殿中門檻內均北面太常寺司祝典儀掌燎各一人正殿國子官司香七人司帛九人司爵九人兩廡國子生司香司帛司爵東西各三人立位與前儀同右辨位其日五鼓步軍統領率所部清蹕除道自東華門至廟門御道左右塗巷皆設布幛鑾儀衛陳法駕鹵簿北郊祭詳見儀不陪祀王公百官朝服咸會祇候送駕如儀日出前六刻司祝恭請祝版設於祝案太常寺卿赴乾清門奏時皇帝御祭服乘禮輿出宫前引後扈如常儀駕發警蹕午門鳴鐘鼓駕出東華門導迎樂前引不作執爐鐙官左右騎導如詣東郊之儀右鑾輿出宫駕將至太常寺贊禮郎豫引四配兩序兩廡分獻官十人於大成西側門外序立鴻臚寺官豫引陪祀王公於廟左右門外序立候駕至隨入引陪祀百官入大成左右側門豫於行禮位稍南東西序立祇候駕至廟門外降輿右贊引左對引太常寺卿二人恭導皇帝由中門入就大次少俟太常寺卿奏請行禮皇帝出次盥鑾儀衛官跪奉盥奉巾如儀司拜褥官豫布拜褥於殿門內正中贊引對引官恭導皇帝入大成中門升階進殿中門至拜位前北向立前引內大臣止立殿簷下提爐官執鐙官侍衛均於階下止立後扈大臣隨侍贊禮郎引分獻官東西各五人於甬道左右鴻臚寺官引陪祀王公升東西階引百官於庭中左右均就拜位北面序立典儀贊樂舞生登歌執事官各共乃職文舞執羽籥進贊引奏就位皇帝就位立右就次盥洗就位典儀贊迎神司樂贊舉迎神樂奏昭平之章辭曰大哉至聖德盛道隆生民未有百王是崇典則昭垂式兹辟雍載虔簠簋載嚴鼓鐘協律郎舉麾工鼓柷樂作贊引奏就上香位及對引官恭導皇帝詣先師香案前對引官至祝案前止立司香跪進香贊引奏上香皇帝上炷香三上瓣香畢奏復位及對引官恭導皇帝復位奏跪拜興皇帝行二跪六拜禮興王公百官均隨行禮協律郎偃麾工戛敔樂止凡樂以舉麾鼓柷作以偃麾戛敔止後同右迎神典儀贊奠帛爵行初獻禮司樂贊舉初獻樂奏宣平之章辭曰覺我生民陶鑄賢聖巍巍泰山實豫景行禮備樂和豆籩嘉靜既述六經爰斟三正樂作司樂舉節舞羽籥之舞凡舞以節領之導引進退後同有司揭尊冪勺挹酒實爵正位司帛一人奉篚司爵一人奉爵以次詣先師位前司帛跪獻篚奠於案三叩興司爵獻爵奠於墊中皆退左右司香六人奉香盤司帛六人奉篚司爵十有六人奉爵進至四配十二哲位前贊禮郎引正殿分獻官升東西側階入殿左右門至各神位前上香奠帛獻爵如儀仍由殿左右門出降階復位兩廡司香司帛奉香盤帛篚各進至香案前贊禮郎引分獻官上香奠帛司爵由南案前奉爵東西序進各詣先賢先儒位前獻爵畢皆退復位司祝至祝案前跪三叩奉祝版跪案左樂暫止贊引奏跪皇帝跪羣臣皆跪贊讀祝司祝讀祝辭曰維某年月日皇帝御名致祭於至聖先師孔子曰惟師德配天地道冠古今刪述六經垂憲萬年兹當仲春秋祗奉舊章謹以牲帛酒果致祭配以復聖顔子宗聖曾子述聖子思子亞聖孟子尚饗讀畢興奉祝版跪安先師位前篚內三叩興退樂作贊引奏拜興皇帝率羣臣行三拜禮興樂止右初獻典儀贊行亞獻禮司樂贊舉亞獻樂奏秩平之章辭曰至哉聖師克明明德木鐸萬年惟民之則清酒既醑言觀秉翟太和常流英材斯植樂作舞同初獻正位司爵奉爵詣先師位前恭獻於左贊禮郎引分獻官詣四配十二哲兩廡隨分獻如初樂止右亞獻典儀贊行終獻禮司樂贊舉終獻樂奏敘平之章辭曰猗歟素王示豫物軌瞻之在前師表萬祀酌彼金罍我酒惟旨登獻雖終弗遐有喜樂作舞同亞獻正位司爵奉爵詣先師位前恭獻於右四配十二哲兩廡均隨分獻如亞獻儀樂止文德之舞退右三獻典儀贊徹饌司樂贊舉徹饌樂奏懿平之章辭曰璧水淵淵芹芳藻潔既歆至聖亦儀前哲聲金振玉告兹將徹鬷假有成日月昭揭樂作徹畢樂止右徹饌典儀贊送神司樂贊舉送神樂奏德平之章辭曰煌煌辟雍四方來宗甄陶樂育多士景從如土斯埴如金在鎔佐豫敷治俗美時雍樂作贊引奏跪拜興皇帝率羣臣行二跪六拜禮興樂止右送神典儀贊奉祝帛饌送燎司祝司帛詣先師位前咸跪三叩司祝奉祝司帛奉篚興司香跪奉香司爵跪奉饌興以次由中道出恭送燎所皇帝轉立拜位旁西向司拜褥官徹拜褥俟祝帛過仍布拜褥皇帝復位立四配十二哲兩廡香帛饌均送焚燎太常寺贊禮郎引分獻官退鴻臚寺官引陪祀王公百官退立拜位東西樂作贊引奏禮成暨對引官恭導皇帝仍由大成中門出升輿樂止法駕鹵簿前導導迎樂作奏祐平之章辭曰先聖垂軌千載是祇虔奉師表景行行止奠兩楹神降之啓後人文在兹不陪祀王公百官仍朝服祇候駕至跪迎午門鳴鐘樂止王公隨駕入至內金水橋恭候皇帝還宫各退太常寺官徹乾清門齋戒牌銅人送寺右禮成回鑾崇聖祠同時遣官致祭贊引太常寺贊禮郎引承祭官入祠垣左門引分獻官隨入承祭官詣階下盥手典儀贊執事官各司其事贊禮郎贊就位引承祭官分獻官就位立典儀贊迎神司香奉香盤就各香案前立贊禮郎贊升階引承祭官升東階入殿左門贊詣肇聖王位前贊跪承祭官跪俯伏贊上香司香跪奉香承祭官上炷香三上瓣香畢俯伏興次詣左右正位前跪上香儀同退及殿左門北面揖出降階復位贊禮郎引分獻官升東西階入殿左右門分詣配位前跪上香如儀咸退及門北面揖出降階復位引兩廡分獻官分詣兩廡從位前跪上香揖出復位均如前儀贊禮郎贊跪叩興承祭官分獻官行三跪九叩禮興典儀贊奠帛爵行初獻禮贊禮郎引承祭官升階贊詣中案前贊跪承祭官跪俯伏司帛跪奉篚承祭官受篚拱舉以授司帛興奠於案司爵跪奉爵承祭官受爵拱舉以授司爵興詣神位前奠於墊中退承祭官俯伏興以次詣左右正位前跪奠帛獻爵儀同贊禮郎贊就讀祝位引承祭官詣拜位立司祝至祝案前跪三叩奉祝版跪案左贊跪承祭官分獻官皆跪贊讀祝司祝讀祝辭曰維某年月日皇帝遣某官某致祭於肇聖王裕聖王詒聖王昌聖王啓聖王曰惟王誕生至聖為萬世王者之師功德顯著兹當仲春秋謹以庶品之儀致祭配以先賢顔氏先賢曾氏先賢孔氏先賢孟孫氏尚饗讀畢興奉祝版跪安肇聖王位前篚內三叩興退贊禮郎贊叩興承祭官分獻官行三叩禮興贊復位引承祭官退及殿左門北面揖出降階復位贊禮郎引正殿分獻官升東西階入殿左右門詣配位前引兩廡分獻官分詣兩廡從位前跪俯伏奠帛獻爵俯伏興退及門揖出復位均如正獻儀亞獻各獻爵於左終獻各獻爵於右均如初儀典儀贊徹饌有司徹饌畢贊送神贊禮郎贊跪叩興承祭官分獻官行三跪九叩禮興典儀贊奉祝帛饌送燎司祝司帛司香司爵各奉祝帛香饌以次恭送燎位如儀承祭官避立西旁俟過復位贊禮郎引詣燎所視燎贊禮畢仍引由祠垣左門出各退右崇