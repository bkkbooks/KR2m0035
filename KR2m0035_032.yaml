body:
  text: 欽定四庫全書欽定大清通禮卷二十六嘉禮册封皇貴妃之禮命下禮部諏吉以聞乃遍布諸司供備豫期工部製册禮部製寶均以金送內閣鐫字行禮如儀右諏日具册寶屆期禮部奏請命大學士尚書一人充册封使侍郎內閣學士一人充副使右命使先一日遣官各一人祇告太廟後殿奉先殿如常儀右祗告至日五鼓禮部鴻臚寺官設節案册寶案於太和殿內鑾儀衛官設采亭於內閣門外內閣禮部官奉節册寶出陳於亭內鑾儀校舁行導以繖仗禮部官前引詣太和殿及階亭止奉冊寶隨節以升設於殿內各案質明大學士一人朝服立節案之東封使朝服立丹墀之東均西面欽天監官報吉時已屆正使由東階升副使從至丹陛左北面跪大學士詣案奉節由殿中門出授正使正使受節偕副使興所司舉册寶案從降中階仍設亭內導引如初以次詣皇貴妃宫右遣使發冊是日內鑾儀衛設皇貴妃儀仗於本宫門外明黃曲蓋一拂二爐盒盆盂各一瓶二皆黃金質几倚各一節二明黃色紅色黑色花繖六紅黑二色瑞草繖四雉羽扇四金黃紅黑三色素扇鳳旗紅黑二色素旗各二卧瓜立瓜吾仗各四明黃色翟輿一輿一車一凡擎執輿尉皆內鑾儀校充內監設節案香案於宫內正中東西肆設册寶案於東西均南北肆封使既受命由協和門至景運門外正使西面授節內監內監奉節舁册寶亭至宫門奉册寶隨節詣皇貴妃宫皇貴妃禮服出迎於宫門內道右立候過內監奉節册寶陳於各案退皇貴妃就拜位北面跪女官宣讀冊文寶文皇貴妃恭受冊寶行六肅三跪三拜禮畢送節於宫門內道右均如皇后受冊之儀內監持節至景運門授正使正使持節副使從詣後左門復命册封禮成還節有司各退右受冊翼日皇貴妃詣皇太后宫行六肅三跪三拜禮乃詣皇帝前行禮皇后前行禮並如儀右禮成朝見册封貴妃之禮命下所司供備製冊寶既諏吉奏請命使遣官祇告太廟後殿奉先殿至日遣使發冊並如册封皇貴妃之儀是日內鑾儀衛設貴妃儀仗於本宫門外金黃曲蓋一拂二爐盒盆盂各一瓶二皆黃金質几倚各一節二金黃紅黑三色花繖六紅黑二色瑞草繖四雉羽扇四鳳旗四卧瓜立瓜吾仗各二金黃色翟輿一輿一車一凡擎執輿尉皆內鑾儀校充餘宫內陳設宣册寶受冊寶及朝見儀注與皇貴妃禮同右册封貴妃册妃之禮命下備册印奏請命使祗告太廟後殿奉先殿至日遣使發册儀與册封貴妃同是日內鑾儀衛設妃采仗於本宫門外金黃曲蓋一拂二爐盒盆盂各一瓶二皆白金質几倚各一節二金黃色素繖二紅黑二色花繖四素扇四鳳旗四卧瓜立瓜吾仗各二金黃色翟輿一輿一車一凡擎執輿尉皆內鑾儀校充餘宫內陳設宣册印受册印及朝見儀注均與貴妃禮同右册妃册嬪之禮命下備制册奏請命使至日發册不設印案儀與册妃同是日內鑾儀衛設嬪采仗於本宫門外紅曲蓋一爐盒盆盂各一瓶二皆白金質几倚各一節二金黃色紅色花繖各二紅色素扇二鳳旗二金黃輿二車一凡擎執輿尉皆內鑾衛校充餘宫內陳設不設印案宣册受册暨朝見儀注均與妃禮同右册嬪欽定大清通禮卷二十六
