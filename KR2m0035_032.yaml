body:
  text: 欽定四庫全書欽定大清通禮卷二十六嘉禮册封皇貴妃之禮命下禮部諏吉以聞乃徧布諸司供備豫期工部製册禮部製寳均以金送内閣鐫字行禮如儀右諏日具册寳屆期禮部奏請命大學士尚書一人充册封使侍郎内閣學士一人充副使右命使先一日遣官各一人祇告太廟後殿奉先殿如常儀右祗告至日五鼓禮部鴻臚寺官設節案册寳案於太和殿内鑾儀衛官設采亭於内閣門外内閣禮部官奉節册寳出陳於亭内鑾儀校舁行導以繖仗禮部官前引詣太和殿及階亭止奉冊寳随節以升設於殿内各案質明大學士一人朝服立節案之東封使朝服立丹墀之東均西面欽天監官報吉時已屆正使由東堦升副使從至丹陛左北面跪大學士詣案奉節由殿中門出授正使正使受節偕副使興所司舉册寳案從降中階仍設亭内導引如初以次詣皇貴妃宫右遣使發冊是日内鑾儀衛設皇貴妃儀仗於本宫門外明黄曲蓋一拂二鑪盒盆盂各一缾二皆黄金質几倚各一節二明黄色紅色黒色花繖六紅黑二色瑞草繖四雉羽扇四金黄紅黑三色素扇鳳旗紅黑二色素旗各二卧瓜立瓜吾仗各四明黄色翟輿一輿一車一凡擎執輿尉皆内鑾儀校充内監設節案香案於宫内正中東西肆設册寳案於東西均南北肆封使既受命由協和門至景運門外正使西面授節内監内監奉節舁册寳亭至宫門奉册寳随節詣皇貴妃宫皇貴妃禮服出迎於宫門内道右立候過内監奉節册寳陳於各案退皇貴妃就拜位北面跪女官宣讀冊文寳文皇貴妃恭受冊寳行六肅三跪三拜禮畢送節於宫門内道右均如皇后受冊之儀内監持節至景運門授正使正使持節副使從詣後左門復命册封禮成還節有司各退右受冊翼日皇貴妃詣皇太后宫行六肅三跪三拜禮乃詣皇帝前行禮皇后前行禮並如儀右禮成朝見册封貴妃之禮命下所司供備製冊寳既諏吉奏請命使遣官祇告太廟後殿奉先殿至日遣使發冊並如册封皇貴妃之儀是日内鑾儀衛設貴妃儀仗於本宫門外金黄曲蓋一拂二鑪盒盆盂各一缾二皆黄金質几倚各一節二金黄紅黑三色花繖六紅黑二色瑞草繖四雉羽扇四鳳旗四卧瓜立瓜吾仗各二金黄色翟輿一輿一車一凡擎執輿尉皆内鑾儀校充餘宫内陳設宣册寳受冊寳及朝見儀注與皇貴妃禮同右册封貴妃册妃之禮命下備册印奏請命使祗告太廟後殿奉先殿至日遣使發册儀與册封貴妃同是日内鑾儀衛設妃采仗於本宫門外金黄曲蓋一拂二鑪盒盆盂各一缾二皆白金質几倚各一節二金黄色素繖二紅黑二色花繖四素扇四鳳旗四卧瓜立𤓰吾仗各二金黄色翟輿一輿一車一凡擎執輿尉皆内鑾儀校充餘宫内陳設宣册印受册印及朝見儀注均與貴妃禮同右册妃册嬪之禮命下備制册奏請命使至日發册不設印案儀與册妃同是日内鑾儀衛設嬪采仗於本宫門外紅曲蓋一鑪盒盆盂各一缾二皆白金質几倚各一節二金黄色紅色花繖各二紅色素扇二鳳旗二金黄輿二車一凡擎執輿尉皆内鑾衛校充餘宫内陳設不設印案宣册受册曁朝見儀注均與妃禮同右册嬪欽定大清通禮卷二十六
