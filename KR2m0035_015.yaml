body:
  text: 廟饗厯代帝王之禮正殿七室中室太昊伏羲氏炎帝神農氏黄帝軒轅氏左室少昊金天氏顓頊髙陽氏帝嚳髙辛氏帝堯陶唐氏帝舜有虞氏右室夏王禹啟仲康少康杼槐芒泄不降扄厪孔甲臯發商王湯太甲沃丁太庚小甲雍巳太戊仲丁外壬河亶甲祖乙祖辛沃甲祖丁南庚陽甲盤庚小辛小乙武丁祖庚祖甲廩辛庚丁太丁帝乙次左周武王成王康王昭王穆王共王懿王孝王夷王宣王平王桓王莊王僖王惠王襄王頃王匡王定王簡王靈王景王悼王敬王元王貞定王考王威烈王安王烈王顯王慎靚王次右漢髙祖惠帝文帝景帝武帝昭帝宣帝元帝成帝哀帝光武帝明帝章帝和帝殤帝安帝順帝沖帝昭烈帝晉元帝明帝成帝康帝穆帝哀帝簡文帝宋文帝明帝孝武帝齊武帝陳文帝宣帝魏道武帝明元帝太武帝文成帝獻文帝孝文帝宣武帝孝明帝又次左唐髙祖太宗高宗睿宗𤣥宗肅宗代宗徳宗順宗憲宗穆宗文宗武宗宣宗懿宗僖宗後唐明宗後周世宗宋太祖太宗真宗仁宗英宗神宗哲宗髙宗孝宗光宗寧宗理宗度宗端宗遼太祖太宗景宗聖宗興宗道宗又次右金太祖太宗世宗章宗宣宗哀宗元太祖太宗定宗憲宗世祖成宗武宗仁宗泰定帝文宗寧宗明太祖惠帝成祖仁宗宣宗英宗景帝憲宗孝宗武宗世宗穆宗愍帝位均南向凡異代同室者皆隔别之兩廡東風后倉頡䕫伯夷伊尹傅說召公奭畢公髙召穆公虎仲山甫張良曹參周勃魏相鄧禹耿弇諸葛亮房元齡李靖宋璟郭子儀許遠李晟裴度曹彬李沆王曾富弼文彦博李綱韓世忠文天祥宗翰穆呼哩布呼宻徐逹常遇春楊士竒于謙劉大夏西力牧臯陶龍伯益仲虺周公旦太公望吕侯方叔尹吉甫蕭何陳平劉章丙吉馮異馬援趙雲杜如晦狄仁傑姚崇張巡李泌陸贄耶律赫嚕吕䝉正冦凖范仲淹韓琦司馬光趙鼎岳飛斡魯宗望巴延托托劉基李文忠楊榮李賢位均東西向以北為上歳春秋仲月諏吉遣官將事特行崇典皇帝親詣行禮先二日禮部尚書一人詣犧牲所眡牲如儀右眡牲致齋書祝版眡割牲眡祝版東西儀均同郊祀先一日太常寺官入廟潔蠲殿宇内外藉以㯶薦拂拭神座工部司官張御幄於景徳門外階下之左南向夜分太常寺卿率屬入具器陳三皇位前分設三案五帝位前統設三案夏商周代設一案右二龕左三龕各設三案每位爵三實酒毎案豋一鉶二簠簋各二籩十豆十其前皆設香案一各鑪一鐙二每室牛一羊一氶一殿中設案一少西北向供祝版東設一案西向西設一案東向分陳每室尊一每案香盤一虚爵三毎位禮神制帛一色白設福胙於東案尊爵之旁加爵一凡牲陳於爼凡帛每案同篚凡尊實酒承以舟疏布冪勺具兩廡東設案十各鉶二簠一簋一籩豆各四每位爵三實酒統羊二豕二前設香案四各鑪一鐙二又設案於南北向陳尊二香盤四虚爵十有二素帛四十爼篚冪勺具西廡帛三十有九餘陳設同鑾儀衛設洗於黄幄外樂部率太常協律郎設中和韶樂於殿外階上分東西懸陳樂舞於樂懸之次如常儀右陳設陳設畢太常寺博士引禮部侍郎一人入廟省眡正殿牲帛齍盛及籩豆豋鉶之實畢次詣兩廡周眡如儀右省齍辦行禮位殿門内正中為皇帝行禮拜位北向階下甬道左右為分獻官拜位北面陪祀王公位階上東西各二班百官位階下分獻之南東西各五班重行異等均北面東位西上西位東上辨執事位司拜褥鑾儀衛官二人立於皇帝拜位之左稍後太常寺司祝一人立祝案西司香九人司帛九人司爵九人光祿寺卿二人太常寺贊答福胙一人立東案之東司香七人司帛七人司爵七人侍衛二人立西案之西侍儀禮部尚書侍郎各一人都察院左都御史副都御史各一人樂部典樂一人立東西案之南太常寺典儀一人於殿左門外立司樂協律郎樂工歌工舞佾於階上樂懸東西序立記注官四人於西階下序立糾儀御史禮部祠祭司官各二人於陪祀王公拜位之次序立又御史二人祠祭司官二人鴻臚寺官二人於陪祀百官拜位之次序立掌燎官率燎人立於燎鑪之隅右辨位其日五皷歩軍統領率所部清蹕除道自西華門至廟門御道左右塗巷皆設布幛鑾儀衛陳法駕鹵簿北郊祭詳見儀不陪祀王公百官朝服咸㑹祗候送駕如儀日出前六刻司祝恭請祝版設於祝案太常寺卿赴乾清門奏時皇帝御祭服乗禮輿出宫前引後扈如常儀駕發警蹕午門鳴鐘皷駕出西華門導迎樂前引不作提鑪執鐙官左右騎導如詣西郊之儀右鑾輿出宫駕將至鴻臚寺官豫引陪祀王公於廟門外序立候駕至隨入太常寺贊禮郎豫引兩廡分獻官四人於景徳西側門外序立陪祀百官按班入景徳東西側門外於行禮位稍南東西序立祗候駕至由廟中門入降輿右贊引左對引太常寺卿二人㳟導皇帝入幄次少竣太常寺卿奏請行禮皇帝出次盥鑾儀衛官跪奉盥奉巾如儀司拜褥官豫布拜褥於殿門内正中贊引對引官㳟導皇帝入景徳中門陛中階進殿中門至拜位前北向立前引内大臣止立殿檐下提鑪官執鐙官侍衛止立階下後扈大臣隨侍贊禮郎引分獻官東西各二人於甬道左右鴻臚寺官引陪祀王公升東西階引陪祀百官於廟庭左右均就拜位北面序立典儀贊樂舞生登歌執事官各共廼職武舞執干戚進贊引奏就位皇帝就位立右就次盥洗就位典儀贊迎神左司香二人右司香一人奉香盤東西趨進均折而北詣中一室三皇香案前左司香七人右司香六人奉香盤分詣各室香案前祗候司樂贊舉迎神樂奏肇平之章辭曰撫時兮極隆造經綸兮顯庸總古今兮一揆貽大寳兮微躬仰徽猷兮有嚴閟宫予稽首兮下風協律郎舉麾工皷柷樂作贊引奏就上香位暨對引官恭導皇帝詣太昊伏羲氏香案前對引官至祝案前止立司香跪進香贊引奏上香皇帝上炷香三上瓣香畢以次詣炎帝神農氏皇帝軒轅氏香案前上香儀同左右各室司香跪上香畢皆趨退贊引奏復位暨對引官恭導皇帝復位奏跪拜興皇帝行二跪六拜禮王公百官均隨行禮協律郎偃麾工戞敔樂止凡樂以舉麾皷柷作以偃麾戞敔止後同右迎神典儀贊奠帛爵行初獻禮有司揭尊冪勺挹酒實爵司帛奉篚司爵奉爵以次詣各神案前司樂贊舉初獻樂奏興平之章辭曰莽若雲兮神之行予仰止兮在廷承筐篚兮既登偃靈蓋兮翠旌鑒予情兮歆享薦芳馨兮肅成樂作司樂舉節舞干戚之舞凡舞以節領之導引升降後同司帛跪獻篚奠於各案三叩興司爵立獻爵於各墊中退贊禮郎引分獻官升東西階詣兩廡以次跪上香畢興立香案前執事生奠帛獻爵如儀皆退司祝至祝案前跪三叩奉祝版跪案左樂暫止贊引奏跪皇帝跪羣臣皆跪賛讀祝司祝讀祝辭曰維某年月日皇帝致祭於太昊伏羲氏炎帝神農氏黄帝軒轅氏帝金天氏帝高陽氏帝高辛氏帝陶唐氏帝有虞氏夏十四王商二十六王周三十二王漢十九帝晉七帝宋三帝齊一帝陳二帝魏八帝唐十六帝後唐一帝後周一帝宋十四帝遼六帝金六帝元十一帝明十三帝曰仰惟諸帝應運代興作君作師撫育烝黎創治維艱基業用宏守文不易謨烈是承風教既遠功徳可稱報於仲春秋神其式憑尚饗讀畢興祝版跪安太昊伏羲氏神位前篚内三叩興退樂作贊引奏拜興皇帝率羣臣行三拜禮興贊禮郎引分獻官降階復位樂止武功之舞退文舞執羽籥進右初獻典儀賛行亞獻禮司樂賛舉亞獻樂奏崇平之章辭曰貳觴兮酒行念昔致治兮永清瞻龍衮兮若英願紹錫兮嘉平樂作舞羽籥之舞司爵奉爵以次詣各案前恭獻於左兩廡贊禮郎引分獻官分獻如初樂止右亞獻典儀贊行終獻禮司樂贊舉終獻樂奏恬平之章辭曰鬱鬯兮獻終萬舞洋洋兮沐清風龍鸞徐整兮企予示周行兮廸予衷樂作舞同亞獻司爵獻爵於右兩廡隨分獻均如亞獻儀畢樂止文徳之舞退右三獻既終獻太常寺贊禮郎一人少前西面立贊答福胙光祿寺卿二人奉福胙至太昊伏羲氏位前拱舉退祇立於皇帝拜位之右侍衞二人進立於左贊引奏跪皇帝跪左右官皆跪奏飲福酒右官進福酒皇帝受爵拱舉授左官次受胙如飲福之儀奏拜興皇帝三拜興又奏跪拜興皇帝率羣臣行二跪六拜禮典儀贊徹饌司樂贊舉徹饌樂奏淳平之章辭曰盍肴烝兮畢升五音㑹兮滿盈禮将徹兮䖍告鑒孔忱兮載翼載登樂作徹畢樂止右受福胙徹饌典儀贊送神司樂贊舉送神樂奏匡平之章辭曰羽幢繚繞兮動回風和鸞並馭兮歸天宫五雲擁兮髙馳翔願回靈盼兮錫年豐樂作贊引奏跪拜興皇帝率羣臣行二跪六拜禮興樂止右送神典儀贊奉祝帛饌送燎司祝司帛詣各神案前咸跪三叩司祝奉祝司帛奉篚興司香跪奉香司爵跪奉饌興以次由中道出恭送燎所皇帝轉立拜位旁西向司拜褥官徹拜褥竢祝帛過仍布拜褥皇帝復位立兩廡香帛饌均送焚燎太常寺贊禮郎引分獻官退鴻臚寺官引陪祀王公百官均退立拜位東西旁樂作樂章與上並為一闋辭曰駕羣龍兮一氣中焄蒿芬烈兮實𡨕通望神光兮遥燭惟終古兮是崇贊引奏禮成恭導皇帝仍由景徳門中門出陞輿法駕鹵簿前導導迎樂作奏祐平之章辭曰時敘羣品端在一欽衣徳凝命荷天之任景軌儀誠既歆肅駿奔顒若臨不陪祀王公百官仍朝服祇候駕至跪迎午門鳴鐘樂止王公隨駕入至内金水橋恭候皇帝還宫各退太常寺官徹乾清門齋戒牌銅人送寺右禮成回鑾遣官致祭之禮先二日眂牲如儀承祭官分獻官暨文官郎中武官㕘領世爵輕車都尉以上均於邸第致齋先一日太常寺以祝版送内閣恭書受而藏諸廟内神庫光祿寺少卿御史禮部祠祭司官朝服眂割牲瘞毛血有司供具並如儀及祀之日雞初鳴承祭官及分獻官朝服祇竢於廟禮部侍郎入廟省齍畢質明承祭官王公入景徳左門領侍衛内大臣尚書等入右門升左階位於階上領侍衛内大臣尚書等位階下北面迎神贊就上香位出入殿左門承祭官分獻官及陪祀官行三跪九叩禮不飲福受胙王公不陪祀贊引以太常寺贊禮郎祝帛送燎避立西旁東面餘均如儀右遣官儀皇帝時廵省方有古昔帝王陵寝在其地者間行特典親詣致祭親祭之禮有司諏吉豫期守土官潔埽享殿内外扈從王公暨文武官陪祭視京師帝王廟地方文官知府武官副将以上與朝臣陪祭者以其班序班詳朝㑹儀先一日皇帝率羣臣齋行在太常寺官具祝版凡祭祀皆贊行在有司襄送内閣中書舍人敬書祝文翰林院隨時撰擬於版訖授太常寺官豫送祭所右具祝版是日昧爽光祿寺卿一人眂割牲守土官於祭所神廚設香案光祿寺卿公服上香宰人牽牲告腯遂及守土官眂宰瘞毛血如儀右眂割牲祭之前夕工部司官張黄幄於享殿二門内之左鑾儀衛官設洗於幄次及夜分太常寺卿屬率守土官入享殿具神位前陳設牛一羊一豕一豋一鉶二簠簋各二籩豆各十鑪一鐙二設案一於享殿中少西北向供祝版設案一於東西向陳禮神制帛一色白香盤一尊一冪勺具爵三乃辨位設皇帝拜位於享殿内正中北向司拜褥二人立於左稍後陪祀王公位階上百官位階下東西序立重行異等均北面司祝司香司帛司爵分立祝案尊案之次記注官立西階下東面紏儀御史禮部祠祭司官引禮鴻臚寺官分立王公百官拜位左右東西面典儀一人立享殿東檐下西面掌燎官率燎人立燎鑪之隅右供張陳設序位祭日漏未盡守土大吏率屬治道清蹕自行宫至祭所氾埽無令塵揚鑾儀衞官陳騎駕鹵簿詳軍禮於行在宫門外領侍衞内大臣及内大臣勒所部翊衛官䕶軍統領宗人府王公勒所部後管官采服分班於行