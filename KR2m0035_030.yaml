front:
  text: 欽定四庫全書欽定大清通禮卷二十四嘉禮
  hash: sha256:3109928601813dbd7bb554734e51754f8cf3bec7d0f109ab1f70ddf51a4252d5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0035_WYG_030-1a, image: WYG0655/WYG0655-0315c.png}
body:
  text: 官員七品以上自昏及為子孫主昏豫訪門第清白女年齒相當者使媒氏往通言俟許男年十六以上女年十四以上身及主昏者無期以上服皆可行下士庶人同右議昏納采諏日主人具書書辭隨宜後倣此請女為誰氏出並問生年月日别具昏者生年月日附於書使媒氏豫告女家屆日夙興以子弟一人為介公服侍於廳事主人公服奉書出西面授介再拜介避拜受書出如女家其日女氏主人設案於廟灑掃廳事待賔亦使子弟一人為擯公服以俟賔至擯告主人如賔服出迎於門外揖入升堂賔左主人右入堂少湥賔東面奉書致詞從者陳禮物於庭主人北面再拜受書賔避拜請退俟命擯揖賔欵於别室主人以書入詣廟陳於案上啓櫝告事如常告儀乃具復書具女所出及生年月日附於書擯延賔升堂主人奉書出西面授賔再拜賔受書避拜授從者請退主人請醴賔賔禮辭許饌者布席於中堂賔東主西揖讓就位進饌行酒三巡賔興離席告退揖主人答揖送賔於門外如初介還復命主人納書如授書儀醴介以家人之禮右納采納幣諏日具書備禮物一品章服一稱章如其品幣表裏各七兩以製衣服繒帛七兩以製襟裯布七兩容飾合二十事叉釧簪珥之屬二品至四品幣表裏各五兩繒帛五兩布五兩容飾合十有六事餘同一品五品至七品幣表裏各三兩繒帛三兩容飾合十有二事餘同四品媒氏豫告女家屆日夙興主人遣使奉書及禮物如女家女氏主人受書及禮物告廟具復書授賔醴賔還復命主人禮介並同納采右納幣昏期諏吉具書備禮物三品以上羊酒四品以下鵝酒豫日主人遣使如女家女氏主人迎賔入賔致詞請期主人辭遜賔乃奉書告期主人拜受具復書授賔賔還復於主人皆如納幣儀右請期昏期前一日女家使人奉箕帚於壻室陳衾帷茵褥器用具至日壻家筵於室中位東西列别設案於牖下陳壺一盞四合卺剖匏為二合四盞以備三酌之用設醮爵於堂下之東壺盞具初昏壻公服俟於堂下有官者各以其服若其子孫則攝盛三品以上攝五品服五品以上攝七品服六品以下攝八品服儀從亦如之壻馬一乘二燭前馬婦輿一乘或車隨宜襜蓋飾采絹垂流蘇五品以上前後左右各二六品以下前二後二均俟於門外主人公服出醮子若自主昏則以有服尊長醮後仿此位於堂東西面昏者升自西階再拜執事者升授爵昏者跪受卒爵反於執事者父命之迎應唯俯伏興降出乘馬執事者隨以雁儀從在前婦輿在後如女家其日女父告於廟詞曰某之第幾女某將以今日歸某氏敢告餘如常告儀還醮女於內堂父東母西姆相女具服加飾服視壻之等出至父母前北面再拜侍者斟酒醴女如父醮子儀父訓女以宜家之道母為之整冠裾申以父命女識之不唯壻既至主人迎於門外揖讓入壻執雁從入至廳事主人東階上西面壻西階上北面立奠雁再拜主人不答拜姆為女加景蓋首出壻揖降女從主人不降送姆導女升輿二燭前輿壻乘馬先俟於門婦至降輿壻導升西階入室踰閾媵婦家送者布壻席於東御壻家迎者布婦席於西壻婦交拜訖姆脫婦景媵御設匕箸醯醬壻揖婦就筵坐饌入卒食媵取盞實酒酳壻御取盞實酒酳婦三酌用卺卒酳壻出媵御施衾枕壻入燭出右親迎厥明婦夙興盥潄櫛總以棗栗腵修詣舅姑室姆入設席於堂中為位舅東姑西均南向舅姑即席婦執笲實棗栗升自西階北面拜奠於席舅坐撫之婦興降階執笲實腵修升拜奠席姑坐撫之舅姑興入於室右婦見舅姑婦具酒饌設匕箸醯醬行盥饋禮舅姑就坐婦奉饌入獻舅姑視卒食乃酌酒酳舅姑送酒皆再拜舅姑卒飲興乃共饗婦侍者布婦席於阼階上西向具酒饌設匕箸醯醢舅姑於堂中臨之婦卒食姑酳之婦拜受卒飲舅姑先降自西階婦降自阼階退饗婦送者男於外女於內酬以布帛右婦盥饋舅姑饗婦三日婦見於廟厥明執事者設饌具主人啓櫝陳主如常祭禮主人布席階下之東昏者在後主婦布席階下之西婦在後各就位再拜主人升上香獻酒讀告詞曰某之第幾子某今已昏畢率新婦見餘辭如祭式俯伏興退立於東婦進當中階下北面再拜興復位主人復位及主婦以下行再拜禮畢納主徹退若同居有尊者婦見如見舅姑禮見夫之伯叔母與見姑同答以肅拜見娣姒小姑以夫之齒序拜皆答拜夫兄弟之子若女婦受拜答以肅拜右廟見廟見之明日昏者以贄視分所應用往見婦之父母主人迎於門外揖讓入升堂奠贄壻北面再拜主人西面答拜請見主婦主婦立於門內壻立於門外再拜主婦門內答拜出主人醴以一獻之禮右壻見婦父母士昏禮八品以下官同納采諏日具書媒氏告於女家主人使子弟一人為介奉書如女氏女氏主人出迎賔揖讓入門升堂賔東面致詞奉書主人西面受書再拜賔避拜請退俟命主人使子弟待賔以書入告於寢如儀具復書出授賔賔受書主人布席禮賔畢賔揖辭主人送之如初介還復命主人拜受書禮介行家人禮諏日納幣具書備禮物章服一稱八品以下官如其品士視九品布帛合五兩容飾八事食品六器媒氏告於女家主人遣使奉書物行禮女家受禮告寢復書禮賔賔復主人均如納采昏有日主人備鵝酒書昏期於柬使媒氏奉如女家告女氏主人報柬授媒氏復昏前一日女家使人以奩具張陳壻室至日壻家筵於室中位東西面别以案陳合卺器設醮爵於堂東初昏壻攝公服俟於堂下壻馬一乘二燭前馬婦輿一乘襜蓋前飾綵絹二俟於門外主人盛服醮子於堂東命之迎壻出乘馬如女家雁及婦輿從其日女氏主人告於寢如儀畢主人位內堂東主婦位內堂西父醮女如壻儀壻至女家門外主人出迎壻執雁從入主人東階上西面壻西階上北面奠雁再拜主人不答拜姆加女景蓋首出壻揖之降主人不降送姆導女升輿女家亦以二燭前輿壻乘馬先俟於門婦至降輿壻導婦入室踰閾媵布壻席於東御布婦席於西壻婦交拜訖姆脫婦景壻揖婦即席壻東婦西坐行合卺禮厥明婦夙興俟見舅位堂東姑位堂西皆南向婦以贄見於舅姑再拜舅姑受贄婦具酒饌行盥饋禮舅姑就位婦奉饌舅姑卒食一酳婦再拜送酒舅姑卒飲共饗婦於胙階及饗婦送者均與官員禮同三日婦見祖禰於寢陳設如薦儀主人在東昏者從主婦在西婦從參神再拜主人升詣香案前上香奠酒告畢俯伏興退立於東婦進當中闑再拜興復位主人復位及主婦以下皆再拜興禮畢退見祖禰之明日壻以贄見婦之父母迎入奠贄再拜主人答拜見主婦壻拜於寢門外主婦答拜於門內出主人醴壻皆如儀右士昏庶人昏禮納采諏日書昏者生年月日以授媒氏奉如女家女氏主人受書告於寢書女為誰氏出及生年月日授媒氏道逺具饌近則否媒氏復命主人禮之納幣備禮物服一稱用帛無章布五兩容飾六事或四事食品四器媒氏奉如女家女氏主人受之饗媒氏復命如納采禮昏有期備鶩書昏期於柬使媒氏奉如女家告女氏主人許使媒氏氏復昏前一日女家使人以奩具陳於壻室至日壻家筵於室中東西為位别以案陳合卺器設醮爵於廳事東序初昏壻盛服俟於階下壻馬一乘二燭前馬婦輿一乘襜蓋無飾俟於門外主人盛服至廳事東位西面壻升主人醮之命之迎壻再拜出乘馬如女家雁及婦輿從其日女家告於寢醮女以俟壻既至主人出迎於門外導入壻執雁從入升堂主人東階上壻西階上北面奠雁再拜姆加女景蓋首出壻揖之降婦從降姆以女登輿二燭前輿壻乘先俟於門婦至降輿壻揖入室踰閾布席壻婦交拜訖姆脫婦景壻揖婦就位坐壻東婦西行合卺禮婦夙興盛服以贄見舅姑於堂拜獻如禮饋酒食於舅姑舅姑饗婦及婦送者三日婦見祖禰於寢如常薦禮明日壻往見婦之父母婦父設酒食禮壻如儀右庶人昏欽定大清通禮卷二十四
