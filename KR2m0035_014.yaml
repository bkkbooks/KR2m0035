body:
  text: 欽定四庫全書欽定大清通禮卷八吉禮先農歲仲春吉亥皇帝親饗先農之禮先二日禮部尚書一人至犧牲所眂牲如儀右眂牲致齋東西儀同郊祀先一日遣官一人詣奉先殿以耕藉告行禮如常儀右祭告書祝版眂割牲眂祝版東西儀同郊祀是日清晨太常寺卿率屬潔壇上下藉以棕薦為瘞坎於壇東南隅設先農神座於壇正中南向施黃幄工部司官張皇帝拜次於南階上如式右設神座供張將事之夕夜分太常寺卿率屬入壇具器陳牛一羊一豕一登一鉶二簠簋各二籩豆各十盞三十爐一鐙二壇南中設一案少西北向供祝版東設一案西向陳禮神制帛一色青香盤一尊一爵三設福胙於尊爵之旁加爵一牲陳於爼帛實於篚尊實酒承以舟疏布冪勺具鑾儀衛冠軍使設洗於壇東樂部率太常協律郎設中和韶樂及樂舞於壇下東西分列器數與東西郊祀同右陳設省齍東西儀同郊祀辨行禮位壇上幄次為皇帝拜位正中北向壇下東南為望瘞位東向陪祀王公位樂懸北東西各二班百官位樂懸南東西各五班重行異等東位西上西位東上均北面辨執事位壇上太常寺司拜牌拜褥官各一人立皇帝拜位左右司祝一人司香一人司帛一人司爵一人光祿寺卿二人侍衛二人太常寺贊答福胙一人侍儀禮部尚書侍郎都察院左都御史副都御史樂部典樂各一人位東西序分立祝案尊案之次如常儀壇下太常寺典儀一人司樂一人東立西面記注官四人西立東面紏儀御史四人禮部祠祭司官四人引禮鴻臚寺官四人分立王公百官拜位之次協律郎歌工樂工舞佾分立樂懸之次均東西面掌瘞官率瘞人立於瘞坎之南北面右辨位其日五鼓步軍統領率所部清蹕除道自大清門至壇門御道左右塗巷皆設布幛鑾儀衛陳法駕鹵簿北郊祭詳見儀於午門外不陪祀王公百官咸朝服會闕下祇候送駕如常儀辰初二刻太常寺卿赴乾清門奏時皇帝御祭服乘禮輿出宫前引後扈如儀駕發警蹕午門鳴鐘鼓導迎樂陳而不作提爐官左右騎導由正陽門詣壇如郊祀之儀右鑾輿出宫駕將至司祝奉祝版設於祝案禮部尚書一人率太常寺卿屬詣神庫上香行禮恭請先農神位奉安壇座上如儀鴻臚寺官豫引陪祀王公於壇門內按翼序立候駕至隨行引陪祀百官東班於拜位南北面西班於拜位西東面序立祇候駕至壇東門內降輿右贊引左對引太常寺卿二人恭導皇帝至壇東盥鑾儀衛官跪奉盥奉巾如儀司拜褥官豫布拜褥於壇上拜次贊引對引官恭導皇帝由中階升就拜位前北向立司拜牌官跪安拜牌退前引內大臣提爐官侍衛均於階下止立後扈大臣隨侍鴻臚寺官引陪祀王公百官均就拜位序立典儀贊樂舞生登歌執事官各共乃職武舞執干戚進贊引奏就位皇帝就位立右盥洗就位典儀贊瘞毛血迎神司香奉香進至神位前祇候司樂贊舉迎神樂奏永豐之章辭曰先農播榖克配彼天立我蒸民於萬斯年農祥晨正協風滿旜曰豫小子宜稼于田協律郎舉麾工鼓柷樂作司拜牌官起拜牌贊引奏就上香位暨對引官恭導皇帝詣香案前立對引官至祝案前止立贊引奏上香司香跪進香皇帝上炷香次三上瓣香畢奏復位暨對引官恭導皇帝復位立司拜牌官安拜牌贊引奏跪拜興皇帝率羣臣行三跪九拜禮協律郎偃麾工戛敔樂止凡樂以舉麾鼓柷作以偃麾戛敔止後同右迎神典儀贊奠帛爵行初獻禮司帛奉篚有司揭尊冪勺挹酒實爵以次至案前恭俟司樂贊舉初獻樂奏時豐之章辭曰厥初生民萬彚莫辨神錫之休嘉種乃誕斯德曷酬何名可贊我酒惟旨是用初獻樂作司樂舉節舞干戚之舞凡舞以節領之導引進退後同司帛跪獻篚奠於案三叩司爵跪獻爵奠於墊中興各退司祝至祝案前跪三叩興奉祝版跪案左樂暫止贊引奏跪皇帝跪羣臣皆跪贊讀祝司祝讀祝辭曰維某年月日皇帝致祭於先農之神曰惟神肇興農事萬世永賴兹當東作之時躬耕藉田祈諸物豐茂為民立命謹以牲帛酒醴庶品之儀致祭尚饗讀畢興奉祝版跪安神位前三叩興退樂作贊引奏拜興皇帝率羣臣行三拜禮樂止武功之舞退文舞執羽籥進右初獻典儀贊行亞獻禮司樂贊舉亞獻樂奏咸豐之章辭曰無物稱德惟誠有孚載升玉瓚神肯留虞惟兹兆庶豈異古初神曽子之今其食諸樂作舞羽籥之舞司爵獻爵於左儀如初獻樂止右亞獻典儀贊行終獻禮司樂贊舉終獻樂奏大豐之章辭曰秬秠穈芑皆神所貽以之饗神式食庶幾神其丕佑佑我黔黎萬方大有肇此三推樂作舞同亞獻司爵獻爵於右如亞獻儀樂止文德之舞退右三獻既終獻太常寺贊禮郎一人少前西面立贊答福胙光祿寺卿二人奉福胙至神位前拱舉退祇立於皇帝拜位之右侍衛二人進立於左贊引奏跪皇帝跪左右官皆跪奏飲福酒右官進福酒皇帝受爵拱舉授左官次受胙如飲福之儀贊引奏拜興皇帝三拜興又奏跪拜興皇帝行二跪六拜禮王公百官均隨行禮典儀贊徹饌司樂贊舉徹饌樂奏屢豐之章辭曰青祇司職土膏脈起日涓吉亥舉耕藉禮神安留俞不我遐棄執事告徹豫將舉趾樂作徹畢樂止右受福胙徹饌典儀贊送神司樂贊舉送神樂奏報豐之章辭曰匪且有且匪今斯今靈雨崇朝田家萬金考鐘伐鼓戞瑟鳴琴神歸何所大地秧針樂作贊引奏跪拜興皇帝率羣臣行三跪九拜禮樂止右送神典儀贊奉祝帛饌送瘞司祝司帛詣神位前咸跪三叩司祝奉祝司帛奉篚興司香跪奉香司爵跪奉饌興以次恭送瘞所皇帝轉立拜位東旁西向司拜褥官徹拜褥俟祝帛過仍布拜褥皇帝復位立典儀贊望瘞司樂贊舉望瘞樂奏慶豐之章辭曰肅肅靈壇昭昭上天神下神歸其風肅然玉版蒼幣瘞埋告虔神之聽之錫大有年樂作陪祀王公百官退贊引奏詣望瘞位皇帝詣望瘞位望瘞贊引奏禮成恭導皇帝詣太歲殿上香樂止禮部尚書率太常寺卿屬恭請神位復御上香行禮如儀皇帝入具服殿更衣乃行親耕禮儀詳嘉禮畢還宫太常寺官徹乾清門齋戒牌銅人送寺右望瘞禮成遣官饗先農之禮先一日太常寺以祝版送內閣恭書受而奉諸神庫至日雞初鳴遣官朝服詣壇贊引太常寺贊禮郎二人引由壇右門入行禮於階下上香贊升壇升降均由東階不飲福受胙王公不陪祀祝帛送瘞避立西旁饗畢順天府府尹率屬行耕藉禮詳嘉禮餘均如前儀右遣官儀直省府州縣各建先農壇歲以仲春亥日致祭省會以總督若巡撫一人主之若有故則布政使以次攝陪祀文武官及各執事人均如祭社稷之禮先二日主祭陪祭執事各官致齋公所掃除壇壝內外祭日雞初鳴執事人入設先農神案於壇正中南向陳鉶一簠二簋二籩豆各四案前設爼陳羊一豕一又前設香案一陳祝文香盤爐鐙左設一案東向陳帛一尊一爵三陳福酒胙肉於尊爵之次設洗於階下之東質明引班引陪祭官入引贊引主祭官入通贊贊執事者各司其事贊就位引主祭官至階下盥手就拜位立陪祭官按班就東西拜位立均北面迎神上香讀祝行三獻禮祝辭曰維某年月日某官某致祭於先農之神曰惟神肇興稼穡立我蒸民頌思文之德克配彼天念率育之功常陳時夏兹當東作咸服先疇洪惟九五之尊歲舉三推之典恭膺守土敢忘勞民謹奉彝章聿修祀事惟願五風十雨嘉祥恆沐神庥庶幾九穗雙岐上瑞頻書大有尚饗餘儀與祭社稷同祭畢率屬行耕藉禮府州縣歲祭先農主祭官陪祭官暨各執事並同社稷祭期牲帛器數行禮儀節與省會同右直省府州縣先農壇先蠶歲季春吉巳皇后親饗先蠶之禮先二日禮部尚書一人至犧牲所眂牲儀與饗先農同右眂牲是日昧爽太常寺進齋戒牌銅人內監豫設黃案一於交泰殿之左內務府總管一人及宫殿監侍豫俟於乾清門太常寺卿率所屬恭奉齋戒牌在前銅人在後前引如儀至乾清門內務府總管以授宫殿監侍恭設於交泰殿案上齋戒牌南向銅人西向設畢跪三叩興退皇后乃齋陪祀妃嬪公主福晉以下文官三品武官二品命婦以上咸致齋右致齋眂割牲先農儀與饗同先一日奉宸苑卿率屬潔壇上下藉以棕薦為瘞坎於壇西北施黃幄於壇上太常寺官恭設先蠶神座於幄內正中南向工部司官張皇后拜幄於南階上如式太常寺典簿具牲爼博士辨簠簋籩豆登鉶之實以次展於神厨太常寺卿詣神庫以恭請神位之儀指授蠶宫令退贊禮郎引內務府總管一人詣神厨周眂牲牢籩豆太常寺官以陳設之儀指授宫殿監侍訖皆退右設神座幄供張展牲器至日雞初鳴內務府總管及宫殿監侍率內監入壇具器陳牛一羊一豕一登一鉶二簠簋各二籩豆各十盞三十爐一鐙二東設一案西向陳禮神制帛一色青香盤一尊一爵三設福胙於尊爵之旁加爵一牲陳於爼帛實於篚尊實酒承以舟疏布冪勺具內監設洗於具服殿樂部率掌儀司內監陳樂於壇下應鼓一在東琴四瑟二簫六笛六笙六杖鼓二方響十六雲璈二板二東西分列如式右陳設辨行禮位壇上正中為皇后拜位北向壇下西北為望瘞位西向當階左右為陪祀妃嬪公主福晉拜位北面稍南左右為陪祀命婦拜位按翼分列重行異等東位西上西位東上均北面辨執事位司拜褥女官二人立於壇上皇后拜位左右相儀女官二人立拜位後左右均東西面司香女官一人司帛女官一人司爵女官一人奉福胙女官二人序立東案之東西面接福胙女官二人立於壇西東面壇下典儀司樂女官各一人當階左立西面傳贊女官六人二人立於壇南東西面二人立於妃嬪公主福晉拜位左右二人立於命婦拜位左右均東西面樂工歌工以童內監為之序立於東西樂懸之次女官掌瘞者立於瘞坎之西北隅右辨位未明前三刻步軍統領飭所部清蹕除道自神武門至壇門御道左右塗巷皆設布幛陪祀公主福晉命婦及執事女官朝服豫集壇內鑾儀衛率內監陳儀駕鹵簿於順貞門外大儀輿一乘民尉三十有四人儀輿二乘旗尉十有二人黃輿二乘民尉三十有四人次五色龍鳳旗十旗尉二十人卧瓜四立瓜四旗尉十有二人吾仗四旗尉六人次黃赤二色龍鳳扇八雉尾扇八旗尉三十有二人次赤素方繖四五色四季花繖十旗尉二十有八人五色九鳳繖十旗尉二十人次金節二旗尉四人次拂二立夏陳列處暑收香爐二金合二盥盤一盂一瓶二金倚一方几一旗尉二十有二人次黃色九龍曲蓋一旗尉三人鳳輿一乘旗尉八人凡擎執旗尉民尉各服其服皆內監充辰正初刻太常寺卿暨內務府總管各一人赴乾清門奏時宫殿監督領侍轉奏皇后御禮服乘鳳輿出宫如儀陪祀妃嬪咸乘輿從由順貞門神武門北上門入陟山門至內壝左門相儀女官二人跪奏請降輿皇后降輿妃嬪咸降輿從前引女官十人右贊引左對引女官二人恭導皇后入具服殿少俟妃嬪隨入配殿祇俟傳贊女官引公主福晉命婦等於具服殿門外東西序立祇候右車駕詣壇辰正一刻蠶宫令詣神庫上香跪三叩興恭請先蠶神位內監十人前引入壇奉安座上畢相儀奏請行禮皇后出具服殿盥司盥跪奉盥司巾跪奉帨巾盥畢詣壇妃嬪以下隨行司拜褥女官豫布拜褥於壇上拜次贊引對引女官恭導皇后升中階就拜位前北向立前引十人止立壇下相儀二人隨侍傳贊引妃嬪公主福晉及命婦均就拜位序立典儀贊執事者各共乃職贊引奏就位皇后就位立右盥洗就位典儀贊迎神司香奉香進至香案前祇俟司樂贊舉迎神樂奏庥平之章辭曰軒轅御籙時西陵位正妃柔桑沃載陽遲黼黻玄黃供祀事稱繭更繅絲龍精報貺椒屋宗師樂作贊引奏就上香位暨對引恭導皇后詣香案前立