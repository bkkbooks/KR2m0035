body:
  text: 欽定四庫全書欽定大清通禮卷二十一嘉禮尊封皇祖妃嬪皇考妃嬪之禮制下禮部諏吉以聞豫期製寶工部製册寶皇貴太妃太妃冊貴太妃太嬪冊印册均送內閣鐫文行禮如儀尊崇詳見儀右諏日具册寶屆期前一日遣官各一人祇告太廟後殿奉先殿如常儀右祇告至日內監設仗均儀皇貴太妃妃以貴太妃仗太下采仗於太妃太嬪宫門外接册寶內監俟於門左右鑾儀衛備采亭於內閣門外五鼓禮部尚書一人朝服詣內閣內閣禮部官奉册寶印於亭內鑾儀校舁行册亭前寶印亭後導以繖仗禮部司官十人前引大學士一人暨禮部尚書後隨恭送至太妃太嬪宫門外授內監內監奉册寶印入獻太妃太嬪內監出告禮成大學士尚書各退右遣官尊封若尊加太妃封號皇帝親詣行禮內監設太妃座於宫內稍東西南向如同日並封妃座皇貴太妃貴太西南東南向僉設旁設太妃座東西禮部鴻臚寺官設案於宫門正中東西肆又設案於門東南北肆武備院官設皇帝拜位於中案前北向辨執事官位奉册寶大學士二人同日並封奉冊寶兼用內閣學士位東案之東西面宣讀官二人同日並封各用宣讀官一人位西檐下侍儀御史二人禮部官二人位西階下均東面鴻臚寺鳴贊二人位東西柱前東西面漏未盡鑾儀衛陳法駕鹵簿於太和殿前如常儀設采亭於內閣門外禮部侍郎內閣學士奉金册金寶及宣讀册文寶印文於亭內鑾儀校舁行禮部官前引如儀由中路降升至太和殿內册亭左肆寶印亭右肆稍僉向如同日並封依位次為左右僉設旁設各從其宜皆冊亭在上亭在寶印下禮部尚書侍郎詣乾清門奏時皇帝禮服乘輿出宫前引後扈如常儀至太和殿北階降輿御殿閲册寶印畢鑾儀校舁亭出皇帝乘輿導引扈衛如初詣太妃宫至宫門階下亭止禮部侍郎內閣學士奉金册金寶由中階升設於中案退大學士二人奉宣讀册文寶印文升中階設於東案就立案東執事官咸入侍立駕至宫門中階下降輿禮部尚書侍郎恭導以下行禮皆恭導升中階立於門左西向內監轉啓太妃太妃禮服出升座皇帝就正中拜位北向立大學士進至中案左鳴贊奏進册大學士跪進册文皇帝立受拱舉仍授大學士大學士興陳於中案贊進寶印亦如之大學士皆退自東階降鳴贊贊宣册宣讀官北面跪啓函奉冊宣讀訖納於函贊宣寶印儀同興皆退自西階降內監舉册寶印案進設太妃座前退鳴贊奏跪拜興皇帝行二跪六拜禮太妃起避立座旁太妃降座還內宫禮部尚書奏禮成皇帝降中階乘輿還宫執事官皆退右親進册寶欽定大清通禮卷二十一
