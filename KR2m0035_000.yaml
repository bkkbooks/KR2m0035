body:
  text: 御製大清通禮序伊古承天之道治人之情莫善乎禮顧其為用往往詳於朝廟略於鄉閭及考儀禮十七篇所紀獨多士禮自后蒼有推而達之之説儒者奉為本經其等差節度互見於周官戴記然時有抵牾朱子嘗建議請修通解而未既厥業信乎完書之難而行典禮觀會通章志貞教經世者所宜重也經禮三百曲禮三千會典蓋經禮之遺矩而通禮亦曲禮之濫觴朕臨御之初敕儒臣搜訂前聞折中令甲準時會之宜衡質文之紀釐為全帙用詔方來越嵗己卯排纂裁就寧詎謂副在有司執以蒞事而已哉蓋嘗深維大順大同之化初不越納身軌物與天下共之焉耳三代以下漢稱近古觀叔孫通之朝儀公玉帶之明堂不過椎輪粗具後此如唐開元禮宋太常因革禮元通禮明集禮取足徴一朝掌故逮承用日久俗尚寖尋精意逺而敝攰隨之既茍簡慢易而無以稱其情甚且改錯偭規敢於侈汰而冒其上故禮之通也於是乎始難六經之士雖欲闡教正俗然居下不獲若考亭家禮涑水書儀黨孰間以為兔園陳策其事不關功令故禮之通也於是乎尤難是編也約而賅詳而不縟圭臬羣經羽翼會典使家誦而户習之於以達之人倫日用之間興孝悌而正風俗則朕淑世牖民之意或在斯乎或在斯乎因禮官之請爰為序以諗其端
