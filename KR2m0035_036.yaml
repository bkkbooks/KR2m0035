body:
  text: 欽定四庫全書欽定大清通禮卷三十嘉禮歲仲春吉亥皇帝躬耕帝藉之禮前期禮部疏請得㫖遍布諸司供備詔親王郡王三人六部都察院通政司大理寺卿二九人從耕順天府備躬耕絲鞭耒耜飾以黃服耜黃犢稻種青箱備從耕三王麥榖九卿豆黍青箱鞭及耒耜朱飾服耜黝牛皆依期畢辦右戒辦先一日遣官祇告奉先殿是日黎明順天府官豫設案二於太和殿東檐下以龍亭三分載躬耕鞭耒種箱采亭四分載麥榖豆黍種箱鑾儀衛備曲蓋御仗樂部和聲署設鼓吹均俟於午門外府尹率屬奉耕器入陳於第一案鞭左耒右奉種箱陳於第二案稻種中肆麥榖左豆黍右皇帝御中和殿閲先農壇祝版畢儀詳吉禮記注官退俟丹墀皇帝暫御保和殿户部尚書侍郎率屬舉案入太和殿南左門出殿北左門詣中和殿內正中陳鞭耒案於北陳種箱案於南皆東西肆遂及禮部尚書侍郎序立丹陛之南重行西面禮部尚書奏請御中和殿記注官升西階復位立皇帝御殿閲耕器五榖種畢奏禮成皇帝出殿門乘輿還宫扈從如儀户部官舉案復於太和殿東檐下順天府官升左階徹案奉鞭耒種箱出午門外仍設各亭內鑾儀校舁行前列繖仗導迎樂作奏禧平之章辭曰晨作農正鸞輅勸耕穜稑嘉種降康延慶帝藉開農政行我稼同明賜成出大清門正陽門由先農壇東門詣藉田耕所右閲耒耜榖種是日工部官灑掃觀耕臺上下藉以棕薦張次於具服殿之東設御屛寶座於臺上正中南向武備院官供御座鋪陳順天府官陳御鞭種箱龍亭於藉田之左陳耒耜龍亭於藉田之右陳麥榖豆黍種箱采亭於從耕藉田左右陳耕器農器於臺下東西兩旁如儀右陳設乃辨位藉田之北正中為皇帝躬耕位户部尚書一人在右順天府府尹一人在左禮部尚書一人太常寺鄉一人鑾儀衛使一人在前耆老二人農夫二人掌耕犢鴻臚寺序班表左右從耕田首東班王二人户部兵部工部通政司各一人西上西班王一人吏部禮部刑部都察院大理寺各一人東上皆順天府官屬丞倅二人從耆老一人農夫二人掌耕牛樂部典樂一人和聲署正二人丞二人立於藉田南北面工歌禾詞者十有四人司金司鼓司板司笛司笙司簫各六人頂帶耆老四人披蓑戴笠執錢鎛者二十人麾五色采旗者五十人耆老三十有四人農夫三十人相間為班魚貫東西序立署正一人立於北東面鴻臚寺鳴贊一人立於東西面一人立於西東面侍儀御史二人分立鳴贊官之北東西面記注官四人立臺南階下之西東面不從耕王公大學士及三品以上官夾臺東西隅翼立陪位右序位鑾輿出宫儀詳吉禮屆日皇帝親饗先農儀詳吉禮禮畢前引內大臣贊引對引太常寺卿恭導皇帝詣具服殿更黃龍袍少俟鑾儀衛官率輿尉回輿於觀耕臺東階外從耕三王九鄉暨陪位王公以下咸蠎袍補服詣耕藉所按班東西祇候執事官依位序立禮部尚書太常寺卿奏時遂及前引大臣十人恭導皇帝出殿南向詣耕藉位和聲署正舉旗三麾歌工樂工以下齊赴藉田北前引大臣退於兩旁侍立從耕三王九卿就耕位東西面立鳴贊贊進耒耜户部尚書奉耒耜贊進鞭順天府府尹奉鞭均北面跪進興退皇帝右秉耒左執鞭禮部尚書太常寺卿鑾儀衛使恭導行躬耕禮耆老牽牛農夫扶犁順天府府尹執青箱户部尚書隨播種左右鳴金鼓采旗招颭工歌三十六禾詞唱和從行辭曰光華日月開青陽房星晨正呈農祥帝念民依重耕桑肇新千藉考典章吉蠲元辰時日良蒼龍鑾輅臨天閶青壇峙立西南方犧牲簠簋升芬芳皇心祗敬天容莊黃幕致禮䖍誠將禮成移蹕天田旁土膏沃洽春洋洋黛犁行地牛服韁司農穜稑盛青箱洪縻在手絲鞭揚率先稼穯為民倡三推一墢制有常五推九推數遞詳王公卿尹咸贊襄甸人千耦列鴈行耰鋤既畢恩澤滂自天集福多豐穰來牟蕎蘥森紫芒華薌赤甲秈稈䄱秬秠三種黎白黃稷粟堅好碩且香䕷芑大穗盈尺長五菽五豆充壠場穄粢􅓱䵖九色糧蜀秫玉黍兼東牆烏禾同收除童粱雙岐合穎遍理疆千箱萬斛收神倉四時順序百榖昌八區九有富蓋藏歡騰億兆感聖皇皇帝三推三返㫖加每歲奉返一推一畢歌止順天府府尹以青箱復於龍亭鳴贊贊受耒户部尚書跪受耒耜贊受鞭順天府府尹跪受鞭皆興復置各龍亭內皇帝御補服禮部尚書奏請御觀耕臺暨太常寺卿恭導皇帝升中階御寶座後扈內大臣隨升立御座兩旁記注官升西階東靣北上序立從耕三王九卿以次受鞭耒耆老牽牛農夫扶犁順天府屬丞倅一人執青箱一人隨播種三王五推五返九卿九推九返畢釋鞭耒入侍班位立執事官以青箱復各采亭內序班引順天府官屬及耆老農夫服本色服持農器至臺前西偏北面東上重行序立聼贊行三跪九叩禮退至藉田終畝右親耕禮部尚書奏禮成皇帝降東階乘輿由先農門出法駕鹵簿前導導迎樂作奏祐平之章辭曰翩彼桑扈仁氣布和千畝親御百祥膺荷保介歆穜稑多帝手推民樂歌皇帝回鑾王公從各官以次退不陪祀王公百官朝服集午門外跪迎午門鳴鐘王公隨駕入至內金水橋恭候皇帝還宫各退右鑾輿回宫若逢時巡省方盛典遣官祭先農壇儀詳吉禮禮畢是日順天府府尹率屬耕藉九推九返農夫終畝畢望闕行三跪九叩禮儀與直省同奉天府直省府州縣各於東郊先農壇側擇沃壤為藉田嵗仲春吉亥有事先農之日省㑹總督若巡撫率在城文官耕藉是日首縣知縣視土宜備榖種青箱朱鞭耒服耜黝牛及他農器耕器豫陳耕所耆老率農夫披蓑戴笠俟於田間通贊學弟子員分立田首又向闕張畫屏設香案一南向通贊立香案之南引班教諭訓導立通贊之南皆東西面致祭先農儀詳吉禮禮畢各官易蟒袍詣藉田通贊贊行耕藉禮督撫以下就耕所執事者授耒耜與鞭皆右秉耒左執鞭進耕督撫以府佐二官一人執種箱一人播種布政使按察使以首領官執箱播種各道以州縣佐二官執箱播種知府知縣以丞史執箱播種皆耆老一人牽牛農夫二人扶犁各九推九返畢釋鞭耒以次序立田首西面北上農夫遂終畝告畢事各官補服望闕立通贊贊齊班引班分引督撫以下至香案前按班序立重行北面耆老農夫稍逺列行北靣隨立贊跪叩興行三跪九叩禮興各退若府不附省州縣衛不附府者正官率佐二丞史耕藉各以耆老二人執箱播種餘儀與省㑹同右直省府州縣耕藉欽定大清通禮卷三十
