body:
  text: 欽定四庫全書欽定大清通禮卷五吉禮陵寢皇帝親謁列聖列后陵寢之禮命下徧布諸司供備諏吉起鑾前一日遣官祗告奉先殿如常儀謁陵前期有司潔除陵内外届日皇帝御素服乗輿出行宫羣臣素服隨從駕至陵於隆恩門外降輿王以下各官至下馬碑稍遠咸降騎禮部尚書侍郎二人導駕由隆恩門左門入陵寢門左門奉爵大臣暨欽命隨入之大臣扈從王公百官止立門外皇帝至寶城祭臺前西向立司拜褥官豫布拜褥於臺北正中禮部尚書侍郎恭導皇帝就位北向行三跪九拜禮不賛鴻臚寺官引王公百官於陵寢門外按左右翼列班重行北面隨行禮畢有司設奠几酒罍於拜位正中皇帝詣几前北向跪羣臣皆跪奉爵大臣跪進爵皇帝三奠酒每奠率羣臣行一拜禮興西向舉哀羣臣東西面序立咸舉哀畢禮部尚書侍郎導駕出隆恩門左門陞輿還行宫扈從如来儀羣臣皆退凡詣陵展謁儀並同右親謁皇太后皇后謁陵皇太后至降輿處降輿皇后妃嬪公主以下隨降輿守陵女官二人恭導皇太后皇后至寶城明楼前北向行六肅三跪三拜禮妃嬪公主等位皇后之後隨行禮興執事女官進奠几於正中皇太后詣位跪奠酒三爵每奠行一拜禮西向舉哀皇后妃嬪公主以下隨行禮舉哀畢女官恭導以出乗輿還行宫右后妃謁奠歳清明中元冬至除夕列聖列后忌辰及國有大慶皆大饗於隆恩殿恭遇皇帝親謁行禮前期陵寢奉祀官潔備牲帛器数翰林院具祝文隨事撰擬授太常寺官奉安潔室屆日工部官張幄次於隆恩門外之東執事官素服入隆恩門西門詣隆恩殿燃炬明鐙具器陳於案帝后皆同案每案牛一羊二尊四鑪鐙具每位奉先制帛一羮飯脯醢十有八器餅餌果實六十有五器夏則薦𤓰茶盌一爵三有墊匕一筯二凡牲實爼帛實篚尊實酒承以舟疏布冪勺具如遇皇貴妃祔饗位於西旁東向用素帛一餅餌果實減十有一器餘同陳設畢内監啓寢室神龕禮部尚書詣行宫告時皇帝御素服乘輿出行宫扈從大臣侍衞翼衞如常儀駕至隆恩門外降輿贊引對引太常寺卿二人恭導皇帝入大次少竢内府奉祀官恭請神位奉安於寶座如儀鴻臚寺官引王公於隆恩門外两廂前祗竢陪祀各官豫入至隆恩殿階下按翼祗竢禮部尚書告奉安神位畢奏請行禮皇帝出次盥洗鑾儀衞官跪奉盥奉巾如儀司拜褥官豫布拜褥於殿門内正中贊引對引恭導皇帝由隆恩門左門入陞左階入殿左門西向立鴻臚寺官引王公於階上引百官於階下東西面立内府官獻茶於各案如儀畢典儀贊執事官各共廼職贊引奏就位恭導皇帝就正中拜位前北向立鴻臚寺官引王公百官咸就拜位立重行北面東位西上西位東上贊引對引恭導皇帝詣香案前贊引奏跪皇帝跪羣臣皆跪奏上香司香跪奉香皇帝上炷香三上瓣香興奏復位皇帝復位立奏跪拜興皇帝行三跪九拜禮王公百官均隨行禮興典儀贊奠帛爵行初獻禮司帛奉篚司爵奉爵以次詣各神位前司帛跪奉篚奠於案三叩興司爵立獻爵奠於墊中各退司祝詣祝案前跪三叩興奉祝版跪案左贊引奏跪皇帝跪羣臣皆跪贊讀祝司祝讀祝畢興奉祝版跪安神位前篚内叩如初退贊引奏拜興皇帝率羣臣行三拜禮興典儀贊亞獻司爵獻爵於左如初獻儀贊三獻司爵獻爵於右儀如亞獻畢贊引奏跪拜興皇帝率羣臣行三跪九拜禮典儀贊送燎司祝司帛詣神位前咸跪三叩司祝奉祝司帛奉篚興司香跪奉香司爵跪奉饌興以次由中道出恭送燎所皇帝轉立拜位東旁西向司拜褥官徹拜褥王公百官退避側立東西面竢祝帛過仍布拜褥皇帝復位立贊引奏望燎暨對引官恭導皇帝詣望燎位望燎贊引奏禮畢恭導皇帝出殿左門降東階入陵寢左門至明楼前皇帝西向立舉哀鴻臚寺官引王公百官東西序立於陵寢門外咸舉哀遇冬至及舉慶典致祭不哀畢導駕出隆恩門左門外陞輿還行宫執事官恭請神位還御寢室衆皆退右親祭遣官祭饗於隆恩殿承祭官及陪祭執事各官咸朝服將事忌辰素服屆日奉祀官陳設爼豆進祝版内監入殿啓寢室神龕禮部贊禮郎預引陪祭官先詣階下東西序立祗竢内府官奉安神位畢乃引承祭官入隆恩門右門升西階就正中拜位立陪祭官各就拜位立承祭官上香升降均由西階出入殿右門祝帛送燎避立西旁餘行禮儀節均與親饗同禮成内府奉祀官恭奉神位還御承祭官及各官出易素服竢徹饌畢闔門承祭官立隆恩門外左階上西面各官序立階下東西舉哀各退冬至暨慶典祭畢不舉哀餘同右遣官致祭恭遇皇帝時廵盛京祗謁祖陵啟鑾前一日親告於奉先殿如儀駕發陳騎駕鹵簿不作樂在京王公百官常服跪送御道所經守土官常服跪迎盛京文武官朝服出境迎候朝鮮國王遣其陪臣奉表起居駕至興京盛京祖陵均行展謁禮皇太后皇后妃嬪恭謁各如儀翼日率羣臣朝服親饗於享殿祭畢易素服入陵寢門舉哀乃親奠親藩功臣之墓並遣官徧祭近陵妃園寢宗藩祖塋勲臣祠墓陞崇政殿受賀儀詳嘉禮燕賚官兵有差鑾輿旋蹕盛京各官朝服跪送御道所經守土官及在京王公百官朝服跪迎禮成親告於奉先殿如儀越日禮部疏請行慶賀禮詳朝賀儀右謁祭祖陵恭遇皇帝詣皇后陵寢皇帝乘輿入中門禮部尚書侍郎不導引循享殿左至明樓前階下降輿陞階西向坐奠酒扈從王公百官鴻臚寺官引於大門外按翼重行北面行三跪九叩禮皇帝奠酒時行禮舉哀各退恭遇皇太后率皇后妃嬪致奠皇太后由中門入至明楼前降輿西向坐奠酒皇后以下降輿行禮如謁各陵儀如遇皇后忌辰及清明中元冬至歲暮國有慶典遣官致祭於享殿是日執事官入殿具器陳於案畢退出司祝奉祝版至殿中門外内監接奉跪安於祝案三叩司祝於門外之左隨行禮内監啟寢室神龕尚茶於中門外獻茶内監接奉茶奠於案屆祭時引贊官二人引承祭官就拜位司香内監奉香盤進引贊引承祭官至殿右門引贊官止承祭官入右門引贊趨至中門外左右贊上香畢承祭官出殿右門引贊仍引至拜位行三跪九叩禮初獻内監奠帛獻爵如儀司祝進至中門之左跪内監詣祝案前三叩奉祝版跪授司祝司祝三叩接奉讀畢仍授内監跪安於篚内三叩司祝隨行禮亞獻三獻如初獻儀祝帛送燎内監二人詣案前司祝司帛於門外各行一跪三叩禮内監奉祝授司祝奉帛授司帛咸接以興恭送燎所禮成奉請神位還御寢室乃徹餘均如各陵祭儀右皇后陵寢祭奠歲季春清明節敷土於寶城之禮先一日陵寢工部官進懸楮錢寶樹一座奉安於隆恩殿内東旁歲暮舁出焚燎取潔土貯筐以竢屆日遣官素服將事贊禮郎二人一人導引一人荷土簣隨行至方城前衆皆止遣官荷土循明楼西磴道升方城至石欄西以土合於一筐奉筐恭升寶頂跪敷土於正中降以筐授贊禮郎引出易朝服詣隆恩殿致祭如儀若恭遇皇帝親詣行禮是日皇帝素服禮部尚書太常寺卿導駕入陵寢左門後扈内大臣隨侍王公大臣二人恭荷土筐從行皇帝進至方城前工部尚書侍郎恭進䕶履皇帝納履恭荷土簣扈從王公大臣前後翼衛導駕官恭導皇帝由明樓東磴道陞至方城石欄東王公大臣以土合於一筐跪進皇帝受筐衆皆止皇帝奉筐陞寶頂跪敷土正中畢降授筐脱履導駕官恭導皇帝出隆恩門入大次竢奉安神位畢行時饗禮右敷土列聖聖誕日奉祀官詣陵埽除拂拭陳列酒果上香行三跪九叩禮右聖誕萬壽聖節守陵王公大臣分詣行禮每案陳果十有二盤每位爵三帛一讀祝奠獻唱贊行禮同時饗儀右萬壽節月朔朢日執事人夙興詣陵拂拭神龕展帷幔每案陳熟羊一果十有二盤每位爵三守陵官上香奠獻行三跪九叩禮十月朔唱贊餘不贊畢徹退右朔朢謁奠因事祗吿陵寢遣官各一人將事帝后同案每案陳果實十二盤羊一每位爵三奠獻讀祝行禮與時饗同右祗吿皇帝遣皇子謁陵之禮皇子至下馬牌降輿馬奉祀禮部官導引至隆恩門外升左階行三跪九叩禮不贊畢西面舉哀不奠酒哀止引退如來儀若展謁於陵寢門外禮部官引至隆恩門左門止内務府奉祀官導引皇子入至陵寢左門外行禮如儀祭陵日皇子蟒袍補服由隆恩門右門進至階上虚中位於左行禮陳設贊引奠獻如遣官時饗儀親王郡王貝勒貝子宗室公謁陵奉祀禮部官引詣隆恩門階上按左右翼行三跪九叩禮不贊右皇子謁陵文武三品以上官奉命出使道過陵寢由奉祀禮部官引至大門外北面行三跪九叩禮不贊遇時祭則入陪祀官之列按翼隨行禮歸時展謁亦如之右羣臣恭謁妃園寢及皇太子園寢四時遣官祭奠行二跪六叩禮不贊出入殿左門餘讀祝奠獻諸儀節與陵寢時饗同右園寢致祭欽定大清通禮卷五
