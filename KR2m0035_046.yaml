body:
  text: 欽定四庫全書欽定大清通禮卷四十軍禮皇帝親征之禮命下内閣諏啓行吉日以聞兵部承制宣攝内外諸司各随職供備從征将士部勒禁旅前後備六軍頒行軍律令右諏吉戒辦前期三日遣官各一人祗告天地宗廟社稷太嵗如常儀右告祭屆日遣官致祭道路之神於天安門外列礮於演武場遣八旗都統或副都統致祭司礮之神均如儀鑾儀衛陳騎駕鹵簿於午門外前列鐃歌大樂金二金鉦四鈸二鼓二㸃二篴四雲璈二管二笙二金口角八大號小號各八次御仗六吾仗六立瓜六臥瓜六星六鉞六次五色銷金小旗十五色銷金龍纛十次單龍赤扇六雙龍黄扇六五色四季花繖十次豹尾槍䕶軍十人佩弓矢親軍十人佩儀刀親軍十人凡親軍䕶軍均乘馬擎執以旗尉乘馬如之堂子街門外左右列䝉古畵角十有六海螺二百親軍䕶軍分掌之兵部設御營黄龍大纛於堂子内門外之南内大臣侍衛守之設八旗羽林纛八火器營纛八按翼分列於黄龍大纛後各以本旗叅領一人守之不從征王公暨滿一品官蟒袍補服從征王以下大臣服征衣佩刀豫往堂子街門内東面祇竢從征六軍分翼列陣於都門外司礮官設三礮於軍前歩軍統領勒所部辟除御道所司以皇帝行營次舍先發屆吉時禮部尚書侍郎詣乾清門請駕皇帝御征衣佩刀出宫乘騎前列九龍華蓋一武備院卿騎導領侍衛内大臣侍衛咸服征衣佩弓矢乘騎前後翊衛午門鳴鐘鼓騎駕鹵簿前導樂陳而不作駕至長安橋軍士吸角吹螺駕入堂子街門王公以下跪候過興随入武備院官豫布皇帝拜褥於圜殿外甬道正中及旗纛前鑾儀衛移鹵簿起堂子至駕所出都門外皇帝降騎角螺止禮部尚書侍郎恭導由内門中門入就圜殿外拜位南向立前引大臣止立門外後扈大臣随侍鴻臚寺官引王公位丹陛上引衆官位丹墀東西鳴贊奏跪拜興皇帝行三跪九拜禮王公等随行禮畢螺角齊鳴禮部尚書侍郎恭導皇帝出堂子内門詣旗纛前望纛行三跪九拜禮不贊王公等随行禮畢角螺止皇帝乘騎導迎樂作奏祐平之章辭曰禋祀隆永維統百靈延福儲祉奠安神鼎修祀祠通紫庭降福祥昭徳馨領侍衛内大臣侍衛班領率親軍䕶軍舉黄龍大纛扈蹕王公以下咸騎從右告祭堂子駕出都門至陳兵處司礮三舉礮各旗滿漢将弁士卒咸於馬上屏息俯伏候過整隊随行駕至郊不從征王以下文武百官咸蟒袍補服跪送候過興皆退六軍經行之地有司豫修橋梁平道路直省文武大臣出境迎候三品以下守土官迎於本界外藩王公率屬迎於所部皆蟒袍補服紳士耆民結采於門設香案跪接均與時廵同右鑾輿進發車駕既載途大軍分隊前驅旗尉韜鹵簿領侍衛内大臣侍衛翼駕行庀駐蹕行營周視地勢建御營於正中前鋒軍過御營前分列東西二營逺斥堠八旗䕶軍及驍騎張左右翼分列十六營火器營軍礮軍綿甲軍列為四營外藩軍附左翼列為一營緑旗軍各自為營皆環御營為向御營内張帳殿黄幄周以黄幔為城南設旌門列黄龍大纛於門外左右環城廵警二十有一處領侍衛内大臣侍衛率親軍周廵宿衛幔城外設網城東西南樹旌為三門環城設廵警八處䕶軍統領各率羽林䕶軍森嚴守衛禁語譁稽出入網城外布幕為重營東西南北各為一門䕶軍叅領侍衛鑾儀衛官及䕶軍執事人毎重扈蹕閣部院寺從征各官列幕於重營之外大軍分翼牧馬前軍牧於路左留路右以待後軍牧放禁毋越次駕駐行營升礮三諸軍悉止從官奏事如常儀夜漏初下嚴更鼓禁斷行人内外禁旅各分番廵警五漏交御營鳴鐘前營角聲起角聲初嚴外營蓐食治軍装再嚴前軍㧞營徐進三嚴左右軍後軍輜重悉發從征王公百官恭竢於旌門外辨色升礮警蹕皇帝乘騎出營翊衛如儀羣臣随後騎從右軍營駐蹕軍行所至随時遣使致祭名山大川及風雨之神各如儀将及所征之地遣使齎勅往諭不庭親御軍門簡閱将士申嚴紀律諸軍秉睿謨宸算分道進發奏克㨗乃班師右徂征皇帝親征既克有罪乃諏吉凱旋徧布六軍戒辦前期一日遣官致祭旗纛之神如儀屆日鑾輿先發諸軍整旅徐旋所在有司治橋梁道路外藩王公直省文武大臣暨守土官紳士耆老恭迎如初駕将至京内閣宣下諸司𫝊告在京王公百官咸蟒袍補服郊迎至日鑾儀衛陳法駕鹵簿自郊外五里至堂子門外駕至郊王公百官跪候過興随行駕入都門大樂鼓吹前導至堂子内門禮部尚書侍郎恭導皇帝降輿致祭堂子如初儀王公等均随行禮畢鑾儀衛移設鹵簿起堂子至午門外皇帝乘輿入東長安門至午門百官跪候過興王公随入至内金水橋候駕還官皆退右凱旋大師凱旋翼日遣官祇告天地宗廟社稷太嵗並遣官致祭陵寢及随征旗纛司礮之神右告至廼行飲至之禮燕從征将士於御苑皇帝親勞之策勲行賞各有差右飲至策勲禮部諏吉疏請御殿受賀宣布諸司戒辦屆日鑾儀衛陳法駕鹵簿樂部和聲署陳樂懸侍班執事官王公百官朝服咸集皇帝御太和殿受中外羣臣表賀如朝賀儀頒詔布告天下詳見嘉禮分遣京堂四品以上官致祭嶽鎮海瀆前代帝王先師闕里右舉行慶典御製碑銘勒石太學以告成功編次親征方畧宣付史館右告成紀功命将出征之禮皇帝命大将軍統帥諸軍出討寇亂先期内閣大學士擬銜名奏請欽定既得旨禮部製印欽天監諏啓行吉日送内閣以聞兵部徧布諸司供備前期三日昧爽鴻臚寺官豫設勅印案於太和殿内東楹之南内閣侍讀二人自閣奉勅印入陳於案各退鑾儀衛率官校陳法駕鹵簿樂部率和聲署陳樂懸王公百官咸蟒袍補服入就班位序立如常朝儀詳見嘉禮出征大将軍暨從征各官蟒袍補服入竢於丹墀之東西面禮部尚書侍郎詣乾清門請駕午門鳴鐘鼓皇帝龍袍補服乘輿出宫導從扈衛如常儀至太和殿北階降輿入工舉麾鼓柷中和韶樂作奏隆平之章辭曰臨軒策将聖武恢仙仗挾風雷龍驤虎賁羣英來專閫正藉勒銘才神機翊上台恩隆轂是推皇帝御太和殿陞座工偃麾戞敔樂止鑾儀衛官𫝊鳴鞭階下三鳴鞭戲竹交丹陛樂作奏慶平之章辭曰金殿宸開銅龍啓推轂恩隆典儀九重上争歌喜起敷聲教盡仰天威鴻臚寺官引大将軍升自東階立丹陛之東北面接勅印官二人以從征内閣官充之從升立於左西面分引從征各官按左右翼就丹墀東西拜位均北面序立贊進少進贊跪皆跪樂暫止贊受勅大學士一人入殿左門就東案奉勅由中門循左闑出授大将軍大将軍祗受轉授接勅官跪奉以興退竢於左贊受印大學士一人奉印授大将軍如受勅儀樂作贊叩興大将軍暨從征各官行三跪九叩禮興樂止奉勅印官降自東階由太和門中門出大将軍從出從征各官皆出鑾儀衛官𫝊鳴鞭如初駕興中和韶樂作奏顯平之章辭曰絳霄瑞靄六龍廻寰㝢靖氛埃天戈遥指閶闔開敦忠秉信閫外裁風雲列陣該崇墉計日摧鋒車電掣天馬徠軍聲歡騰九埃皇帝還宫樂止王公百官咸退右頒勅印出師日五鼓鑾儀衛陳法駕鹵簿於午門外如常儀文武百官蟒袍補服按翼集午門外東西闕下大将軍暨從征各官服征衣王貝勒貝子公滿大學士将軍都統尚書蟒袍補服均東面豫竢於堂子街門内兵部建八旗大纛各一於堂子内門外之南軍士執螺角列竢於街門外從征将士按翼分立於甬道左右質眀禮部尚書侍郎詣乾清門請駕皇帝龍袍補服乘輿出宫午門鳴鐘鼓法駕鹵簿前導樂陳而不作百官跪送如常儀駕至長安橋軍士吸角吹螺大将軍從征各官暨王公大臣等跪候過興随行駕進堂子街門螺角止禮部尚書侍郎恭導皇帝降輿就位行禮如儀羣臣咸随行禮畢恭導皇帝出堂子内門螺角齊鳴皇帝至纛前行禮大将軍暨從征各官均随行禮畢螺角止導迎樂作奏祐平之章辭曰維文武畧勲業猷崇欽承睿算往征不恭扇仁風在師中月三㨗奏膚功午門鳴鐘皇帝回鑾是日並遣官以師行祇告奉先殿如常儀右祗告其日昧爽工部官豫張黄幄於東長安門外南向武備院官供御座鋪陳光禄寺官備酒以竢皇帝祗告堂子禮畢王公大臣先至東長安門分翼序立大将軍暨從征将士先至幄外恭竢皇帝至幄前降輿羣臣跪迎入幄陞座内大臣侍衛翊立左右皇帝召大将軍入親賜巵酒大将軍跪飲畢退率從征将士謝恩行三跪九叩禮畢佩櫜鞬辭駕皇帝命乘馬乃各乘馬啓行樂作皇帝乘輿還宫王公百官送駕如儀各退乃遣官祖餞大将軍於都門外禮部官豫張幕於門外道左望闕設畵屏香案案前布拜席内務府官設燕於幕内光禄寺官備茶酒竢於幕側鴻臚寺官二人蟒袍補服竢於香案左右承㫖餞送之王公大臣侍衛各官蟒袍補服竢於幕外大軍按翼肅隊夾道東西分列大将軍至下馬從征各官咸下馬王公大臣侍衛迎入鴻臚寺官引就拜位聽贊行三跪九叩禮畢鴻臚寺官分引就燕席禮部兵部尚書侍郎奉茶燕畢望闕謝恩行禮如初儀王公大臣侍衛送至幕外視大将軍啓行各退右祖餞或王公大臣先出師疆場皇帝即軍中命為大将軍先期臨軒遣正副使各一人持節齎勅印以往至日大将軍率屬郊迎豫於演武場築壇備鋪陳壇上正中設勅印案前為香案均南向執事及所屬官弁咸集祗竢屆時正副使蟒袍補服登壇陳勅印於案退東面立大将軍蟒袍補服詣香案前引贊贊跪大将軍跪宣勅官東面宣讀勅文訖正使奉勅副使奉印以次授大将軍大将軍祇受轉授從官跪接興復於案贊叩興大将軍行三跪九叩禮興正副使退大将軍奉勅印涖事正副使還朝持節復命如儀右遣使頒勅印大将軍戰勝滅寇諏吉凱旋先期具疏以聞乃振旅還朝将至京師先遣官入奏皇帝命廷臣以茶酒出郭迎勞大将軍率從征将士望闕謝恩行三跪九叩禮畢還朝從征将士以次歸營伍翼日黎眀鹵簿樂懸陳設王公百官陪位均如頒勅印儀鴻臚寺官陳設黄案於丹陛正中屆時皇帝御太和殿中和韶樂作奏隆平之章辭曰慶溢朝端靄祥雲河山清晏鈴旗迢遞送歸鞭赫元戎繄良翰靖獻寸誠丹載干戈和佩鸞功成萬里勒銘還遐邇共騰歡陞座樂止大将軍出班從征内閣官二人恭奉勅印升丹陛大将軍詣案前跪以次恭納勅印於案退就班位丹陛樂作奏慶平之章辭曰决勝從容籌上将師行肆靖遐方宣武畧更敷文徳垂衣治端拱眀堂大将軍乃率從征将士謝恩聽贊行三跪九叩禮畢樂止駕興中和韶樂作奏顯平之章辭曰雉扇徐廻遍堯封齊銷烽燧依依楊栁六師歸逮春耕修農耒論賞策勲随九重深五絃揮敷天率土裒時對日月耀眀威皇帝還宫樂止羣臣咸退右凱旋如窮寇乞命請降乃封章入告得㫖報可諏吉納降所司豫於大軍之左築受降壇南向壇南百歩外樹表建受降旗将校守之屆日所司詣壇鋪陳設大将軍座於壇上正中設案於座南陳勅印設叅贊大臣座於左右東西僉向侍衛記室官立大将軍左右引禮立壇南左右将領按隊伍立壇下左右均東西面按品為序北上從征軍士戎服按翼肅隊陳列壇外至時兵部總尉領降人立受降旗表下祗竢引禮二人詣軍門請大将軍升壇軍門鼓吹三舉礮大将軍戎服乘騎出營鼓吹節鉞前導引禮官騎導叅贊大臣暨侍從官騎從節鉞将至壇兵部總尉揮降人於表前北面跪匐伏大将軍至壇前下馬羣官咸下馬引禮引大将軍陟中階登壇南面升座叅贊大臣以下咸就位鼓吹振作舉礮三兵部總尉揮降人膝行詣壇下匐伏乞命大将軍宣諭皇帝威徳受降量加賞賚降人泥首伏謝仍膝行退大将軍降座乘騎還營軍門鼓吹舉礮導引侍從如初乃露布以聞率大軍凱旋如前儀右納降師旋諏吉祗告天地宗廟陵寢社稷先師孔子並致祭旗纛礮神各如儀羣臣恭進賀表皇帝陞殿受賀如朝賀儀御製碑銘勒石太學分命儒臣編纂方畧垂示武功乃燕勞大将軍諸從征者咸與燕儀詳嘉禮翼日論功行賞有差右告成燕賚若命重臣經畧軍務節制将帥出征不庭其頒勅印祭堂子餞送受降凱旋之儀均與大将軍同欽定大清通禮卷四十
