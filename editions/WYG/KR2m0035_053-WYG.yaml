  text: 欽定四庫全書欽定大清通禮卷四十七凶禮
  hash: sha256:bffd8912107e9672a56512f2da9d79e304c16366f823f3ede029375da8ec8b38
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0035_WYG_053-1a, image: WYG0655/WYG0655-0473a.png}
body:
  text: 皇貴妃喪禮疾革自大内移入吉安所初薨内務府㑹禮部疏列喪儀布諸司戒辦皇帝輟朝五日素服十日若殯期逾十日及殯而止簡王大臣治喪事命所生皇子即喪次届時奉安金棺於殿内正中内監設几筵張帷幔内鑾儀校陳儀仗内外成服皇子公主皇子福晉皇孫皇孫福晉持服之日候㫖欽定王貝勒貝子公皇貴妃戚族成服者至大祭日而除内務府總管一人散秩大臣三人侍衛九十人内務府三旗佐領下官及其妻以三分之一成服均至大祭日而除皇貴妃本管領下官員及執事男婦宫人内侍皇子侍從成服者隨皇子而除既殮設奠王以下文武四品官以上去冠飾素服集於宫門外左右公主福晉以下一品命婦以上去首飾素服集於門内之右内務府婦女位於命婦後奠時傳哭隨行三叩禮畢各退嗣是朝晡日中皆設奠朝晡上食内鑾儀校陳儀仗内外集序哭奠行禮如前儀日中進果饌不列儀仗不集序右初喪成服設奠諏日殯前期祇告奉移行啟奠禮所司陳儀仗於大門外毎奠皆陳後同張黄幕於門外稍西置案陳楮幣萬有五千於燎所陳果饌筵七羊五酒五尊設爵案於各案之末内管領妻設冠服篚於靈牀内外會喪者各於其位集竢如初届時皇子由右門入立宫檐下尚茶獻茶尚膳上食揭巾冪皇子詣案前跪衆各於其位跪哭暫止内務府官進爵皇子祭酒三爵每祭一叩興復位立衆隨跪叩興傳哭奠畢徹儀仗皇子退王以下皆退内管領妻奉冠服篚内侍六人恭引出儀門成服婦女隨出至燎所安於燎牀乃燎皇子福晉奠酒三爵三拜興哭衆咸拜興哭畢乃退若皇帝親臨奠酒至月臺正中降輿詣奠位坐西向奠酒三爵皇子北面跪每奠行一叩禮後奠儀親臨視同餘如儀右啟奠届日奉移所司陳大昇轝於大門外治喪儀王大臣暨執事官咸㑹舁尉夫役均服其服分班序立班數量地遠近每班八十人王公以下於大門外左右集如初公主福晉以下皆豫詣殯所於大門内西旁集竢届時治喪儀王大臣工部内務府鑾儀衛大臣率執事官入飭校尉三十有二人恭移金棺皇子跪奠三爵每奠一叩若與前皇帝親臨視奠親奠儀同哭盡哀候啟行先詣殯所祇竢金棺出門外登大昇轝禮部大臣祭轝三奠爵三叩王公以下各於其位跪哭候過從行在途儀仗騎導揚紙錢過門橋祭酒執事官夾道翼衛節示進止後扈侍衛等及恭送之王公各官依序從至殯所門外轝止皇子迎於門外跪哭衆咸跪哭候過興校尉恭舁入大門皇子由右門隨入公主福晉以下皆跪迎哭候過興金棺至殯室恭安正中張帷幔陳設如初皇子三奠三叩奠畢出反喪次衆退既殯朝夕日中仍設奠内務府成服婦人輪班入哭日三次及百日止右殯諏日行初祭禮届日設冠服陳儀仗内外集序如初陳果饌筵三十有五羊二十一酒二十有一尊楮幣十有八萬九千設祭文案於檐下祭文翰林院撰擬届時禮部大臣奉祭文禮部祠祭司官二人恭引由中門入設於案皇子詣案前跪衆咸跪哭暫止司祝詣祭文案前立讀文畢復於案皇子奠酒衆隨行禮畢司祝奉祭文禮部大臣恭引送燎所焚燎餘均如啟奠儀翼日繹陳果饌七筵羊三酒三尊楮幣萬有五千禮部工部尚書侍郎内務府總管光禄寺卿率屬執事致祭如儀諏日大祭陳設祭品哭奠讀文行禮如初祭翼日繹與前繹祭儀同週月陳果饌十有一筵羊五酒五尊楮幣二萬一千哭奠如前儀再週三週月陳設行禮與初週月同百日讀文致祭陳果饌十有五筵羊七酒七尊楮幣五萬哭奠行禮均如前儀越百日日一上食朔望朝晡仍設奠遇清明中元冬至陳設果饌羊酒如月奠儀嵗除日陳果饌十有五筵羊七酒七尊均於殯所哭奠如儀右既殯奠諏日行贈諡禮前期一日遣官祗告太廟後殿奉先殿如常告儀届日内鑾儀校設儀仗於殯所大門外陳采亭於午門前内務府官設冊寳案於几筵前左右設香案於正中又設祭文案於左陳祭品十有五筵羊五酒五尊如儀王以下四品官以上公主福晋以下一品命婦以上皆豫㑹如初儀執事官引正副使素服詣内閣於冊寳案前跪三叩興正使奉冊副使奉寳冊寳皆絹製由午門中門出安采亭内跪叩如初興校尉舁亭導以繖仗正副使暨執事官從至殯所門外亭止正副使詣亭前跪三叩興奉冊寳由中門入陳於案跪叩如初退近閾北面立乃上香正使詣香案前上香副使就位立竢畢宣讀官進恭奉冊寳文於各案前立以次宣讀訖復於案退讀文致祭行禮如儀祭畢冊寳送燎正副使復命衆各退右贈諡卜葬前期工部治園寢山陵不若從葬别治營葬具欽天監諏葬日治喪儀王大臣禮部内務府㑹疏以聞徧布諸司供備先奉移一日祖奠陳儀仗果饌十有五筵羊七酒七尊楮幣三萬七千哭奠内外集序行禮如啟奠之儀奉移日陳大昇轝舁尉九十有六人執事官役戒辦内外送葬者咸豫㑹届時所生皇子承命徃送詣金棺前哭盡哀跪奠酒三叩興若與前皇帝親臨視奠親奠儀同校尉舁行皇子恭送門外王以下四品官以上門内公主福晉以下一品命婦以上及内務府婦人各於其位跪哭候過止哭興大昇轝啟行前導後扈分班恭送均如儀沿途計道里遠近分宿次各以織葦為行幕及夕金棺同轝安於行幕正中陳果筵皇子哭奠三爵三叩衆隨哭跪叩畢乃退厥明奠亦如之及夕又奠在途日同至園寢日守陵不值班之貝勒公大臣各官咸於十里外跪迎道右舉哀候過從行至園寢大門外轝止皇子率衆跪迎校尉恭舁金棺入門暫安於享殿内皇子奠爵叩如初退翼日遣奠陳儀仗具祭品楮幣如祖奠儀王公以下暨守陵貝勒以下各官貝勒夫人以下命婦皆集量地分班異等各序於其位哭奠行禮如祖奠儀将葬所司近園寢設幕陳葬車於幕内又設柩牀一於石牀前髙下與齊豫日遷奠陳果饌十有三筵羊五酒五尊楮幣三萬哭奠集序行禮如遣奠儀卒奠儀仗送燎執事官役恭移金棺至園寢前幕内去幠北向奉安皇子哭奠爵三叩衆皆哭隨叩畢各退葬日内外集序如初治喪儀王大臣率執事官飭校尉匠役皆辦届時皇子入幕哭奠爵三叩衆各哭於其位隨叩皇子出幕旁跪竢金棺御葬車執事者奉車行升柩牀逹於石牀以車及柩牀出乃窆實土封石門成葬皇子哭詣月臺前跪奠三爵毎奠一叩衆皆哭如初卒哭乃返右葬諏吉於園寢潔室敬製神位工峻遣大學士禮部尚書各一人朝服詣神位前上香行一跪三叩禮奉安寢室遇大祭陳設享殿如儀右製神位朞年小祥陳果饌十有五筵羊七酒七尊遣禮部大臣讀文致祭工部内務府大臣各一人徃襄厥事再朞大祥陳果筵醴酒守園寢官一人承祭如未葬與小祥儀同惟不讀文二十七月終喪右祥祭終喪貴妃喪禮疾革奉移吉安所初薨内務府㑹禮部疏列喪儀布諸司戒辦皇帝輟朝素服五日命所生皇子公主持服皇子福晉皇孫皇孫福晉隨成服奏遣王公等及内務府總管一人散秩大臣三人侍衛六十人内務府應成服之官員男婦暨戚族宫人等均成服其制服日月均與皇貴妃喪同内務府大臣治喪事内監於奉安金棺殿内張帷幔設靈牀几案具噐陳各如式既殮廼奠陳儀仗王以下三品官以上公主福晉以下一品命婦以上皆集内外各為位傳哭行禮朝晡設奠上食儀如之日中進果筵不設儀仗不集序諏日殯陳大昇轝於門外舁尉八十人執事官役皆辦王公以下皆豫集如初公主福晉以下詣殯所集竢届時恭移金棺皇子奠酒三叩興哭送登轝啟行前𨗳後扈送者序從至於殯所門外皇子率衆跪迎於門外之東皆哭轝止校尉三十有二人恭舁金棺入門公主福晉以下哭迎於門内之西至殯室恭安正中皇子哭奠如初出反喪次諏日初祭陳果饌三十有一筵羊十有九酒十有九尊楮幣十有四萬九千設冠服讀文祭文翰林院撰擬皇子哭奠或遣大臣三叩興衆皆哭隨行禮送燎時姻戚命婦一人奠酒翼日繹陳果饌五筵羊三酒三尊楮幣萬致祭如儀諏日大祭如初祭翼日繹亦如之週月陳果饌十有一筵羊五酒五尊楮幣二萬哭奠如初再週三週月奠同百日讀文致奠陳果饌羊酒數同月奠哭奠如初遇清明中元冬至嵗除日皆陳果饌二筵羊一酒一尊致奠如儀卜葬前期營治園寢既竣諏葬日疏聞布諸司供備前一日祖奠陳儀仗果饌十有三筵羊五酒五尊楮幣三萬哭奠内外序集如初儀奉移日陳大昇轝舁尉人數詳見前執事官役皆辦内外集者咸豫㑹届時所生皇子承命往送詣金棺前哭盡哀跪奠三爵三叩興校尉舁行皇子恭送門外王以下三品官以上門内公主福晉以下一品命婦及内務府婦人各於其位哭候過止哭大昇轝啟行前𨗳後扈分班恭送均如儀沿途量定宿次以織葦為行幕金棺同轝安行幕正中皇子哭奠三爵每奠一叩興衆隨叩畢退厥明奠亦如之及夕又奠在途日同至園寢日守陵不值班之貝勒公大臣各官皆出數里外迎於道右哭候過從行至園寢門外轝止皇子率衆跪迎校尉恭舁金棺入門暫安於享殿内皇子奠爵叩如初退翼日遣奠陳儀仗具果饌羊酒如祖奠之數送葬羣臣暨守陵貝勒以下各官貝勒夫人以下命婦皆集量地分班異等各序於其位哭奠行禮均如祖奠儀豫日遷奠陳設禮儀如遣奠奠畢儀仗送燎執事官役恭移金棺至園寢前幕内去幠北向奉安皇子哭奠爵三叩衆皆哭隨叩畢各退葬日執事官役皆辦集者如初届時皇子入幕哭奠爵三叩各於其位哭隨叩皇子出幕旁跪竢金棺奉安葬車執事者奉車行升柩牀逹於石牀以車及柩牀出乃窆實土封石門成葬皇子哭入園寢前跪奠爵三叩興衆皆哭叩如初卒哭乃返諏吉敬製神位工竣遣内閣禮部大臣行禮鐫字飾以石青奉安寢室如儀朞年小祥陳果饌羊酒楮幣各如月奠儀遣禮部大臣致祭工部内務府大臣襄事再朞大祥陳果筵醴酒守園寢官承祭如常祭儀二十七月終喪右貴妃喪妃喪禮疾革奉移吉安所初薨内務府㑹禮部疏列喪儀皇帝輟朝素服三日命所生皇子公主持服皇子福晉皇孫皇孫福晉隨成服奏遣王公及内務府總管散秩大臣侍衛内務府應成服之官員男婦等均成服其制服日月均與貴妃喪同既殮設奠陳儀仗王以下三品官以上公主福晉以下一品命婦以上皆集序傳哭行禮朝晡上食日中進果筵諏日奉移殯宫既殯初祭大祭陳饌筵羊酒具楮幣設冠服讀文皇子哭奠行禮内外齊集者皆傳哭祭之明日皆繹週月百日皆致奠卜葬奉移園寢前一日祖奠奉移日皇子哭奠往送王以下三品官以上公主福晉以下一品命婦及内務府婦人候金棺啟行皆跪哭在途分班恭送朝夕奠至園寢翼日遣奠奉安前一日遷奠葬日奉金棺於葬車執事官校移車行升柩牀永安於石牀以車及柩牀出封石門成葬皇子哭奠酒三每奠一叩卒哭返諏吉敬製神位奉安寢室朞年小祥再朞大祥皆致祭品物及行禮儀節均與貴妃喪同右妃喪嬪喪禮疾革奉移吉祥房初薨内務府㑹禮部疏列喪儀皇帝輟朝素服二日命所生皇子及公主持服皇子福晉皇孫皇孫福晉隨成服奏遣王公及内務府總管内務府應成服之官員男婦等均成服其制服月日均與妃喪同既殮設奠陳采仗王以下一品官子爵以上公主福晉以下一品命婦以上皆集序𫝊哭行禮朝晡上食日中進果筵諏日奉移殯宫陳大昇轝舁尉六十有四人其餘哭奠集序奉移儀節均與妃喪同既殯初祭陳果饌二十一筵羊十有一酒七尊具楮幣十萬五千設冠服讀文皇子哭奠祭酒三爵每祭一叩内外集者傳哭行禮翼日繹果饌三筵羊三酒三尊楮幣六千大祭如初祭儀惟不讀文翼日繹亦如之週月果饌七筵羊三酒三尊楮幣萬有四千再週三週月百日奠皆同卜葬奉移園寢前一日祖奠果饌九筵羊三酒三尊楮幣二萬奉移日皇子哭奠往送集序王以下一品子爵以上公主福晉以下一品命婦及内務府婦人候金棺啟行皆跪哭在途分班恭送朝夕奠至園寢翼日遣奠奉安前一日遷奠葬日執事官校恭舁金棺永安於石牀封石門成葬皇子哭祭酒三爵每祭一叩卒哭返諏吉製神位奉安寢室朞年小祥再朞大祥皆致祭儀節均與妃喪禮同右嬪喪太妃太嬪薨凖生前封號治喪有追封者視追封之號治喪薨於大内内務府官典喪薨於所生之子府第或官典喪事或命其子治喪均臨時請㫖餘並如前儀右太妃太嬪喪貴人喪禮疾革奉移吉祥房初薨皇帝命所生皇子公主持服皇子福晉皇孫皇孫福晉隨成服内務府應成服之官員男婦咸成服制服月日候㫖而除既殮廼奠貝勒以下一品官以上貝勒夫人以下一品夫人以上内外集序朝晡日中行禮舉哀如儀諏日而殯行初祭禮陳果饌十有五筵羊九酒七尊楮幣六萬三千五百皇子奠酒三每奠一叩衆隨行禮傳哭禮畢退翼日繹陳祭筵羊酒各三楮幣五千大祭與初祭同翼日繹亦如之週月百日皆奠果饌羊酒楮幣陳設行禮均與嬪喪奠同葬有日前期祖奠陳設與百日同内管領率所屬男婦分班集序行禮如前儀奏遣皇子大臣官員送往園寢金棺至園寢翼日遣奠葬前一日遷奠皆如祖奠儀葬日奉安金棺於壙窆封畢皇子哭祭酒三每祭一叩卒哭返朞年小祥致祭行禮如常祭儀右貴人喪欽定大清通禮卷四十七
