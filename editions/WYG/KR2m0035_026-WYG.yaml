body:
  text: 欽定四庫全書欽定大清通禮卷二十嘉禮恭上皇太后尊號徽號之禮制下禮部尚書一人赴内閣承制諏吉以聞乃徧布諸司供備豫期禮部工部官㑹製册寳於内務府既辦擇良辰恭鐫册文寳文是日所司豫設案於内閣政事堂中設册寳亭二香亭一於製造所門外内閣大學士學士禮部工部尚書侍郎咸朝服集政事堂祗竢至吉時工部司官奉册禮部司官奉寳設亭内鑾儀校舁行香亭在前次册亭次寳亭前列御仗二華蓋一禮部官屬先導至内閣門外亭止有司奉册寳恭設於案册東寳西退閣部大臣均行三跪九叩禮大學士一人奉册一人奉寳以授匠人鐫字於潔室右諏日具册寳屆期前一日遣官各一人祇告天地太廟後殿奉先殿社稷如常儀右祗告是日内閣具奏書書詞隨時撰擬盛於函黎明鑾儀衛豫陳皇太后儀駕鹵簿於慈寧門外至長信門外内監陳中和韶樂於慈寧宫檐下陳丹陛大樂於長慶門内鹵簿樂懸詳見三大節禮部鴻臚寺官豫設案一於慈寧門外又設案一於中和殿内均正中南向武備院卿豫設皇帝拜位於慈寧門案南北向大學士一人朝服奉奏書函中書舎人前導至中和殿階下導者止大學士以奏函入中和殿陳於案外其緘展書加函上退竢於東檐禮部尚書侍郎二人詣乾清門奏時遂前導駕皇帝禮服乘輿出宫内大臣侍衛前引後扈如常儀至中和殿北階降輿詣殿内案前北向閱奏書畢轉立東次西向大學士一人進納書函内恭奉由殿中門出禮部尚書侍郎導引前行皇帝乘輿從至永康門外奉奏書大學士由中門入至慈寧門東階下導者止奉奏書大學士進陟中階近案前折旋就左門之東負序西面立皇帝降輿入左門禮部尚書侍郎恭導以下行禮皆恭導陞慈寧門東階循南牖西向立後扈内大臣從升凡行禮進退皆從立於後前引十大臣領侍衛内大臣豹尾班侍衛至東階下止立如三大節儀大學士一人由西階升就立西檐下宣讀官一人從升少後立均西面鴻臚寺鳴贊一人立於東楹西面一人立於西楹東面禮部尚書轉傳内監奏請皇太后御慈寧宫皇太后禮服出宫中和韶樂作樂章與三大節同陞座樂止皇帝詣拜位北向立奉奏書大學士暨西檐大學士咸進至案前左右立鳴贊贊跪皇帝跪大學士跪進奏書於右興退皇帝受奏書恭獻大學士跪接於左興陳案上退鳴贊贊宣奏書宣讀官進至案前北面跪啟函恭奉奏書宣讀訖仍納於函興退皆復位奏拜興丹陛大樂作樂章與三大節同皇帝行三跪九拜禮興樂止復位禮部尚書轉傳内監奏禮成皇太后降座中和韶樂作樂章與三大節同還宫樂止皇帝降階導從如來儀出永康左門乘輿還宫内監舉奏書案入大學士以下皆退右進奏書至日五鼓所司陳皇帝法駕鹵簿樂懸於太和殿外陳皇太后儀駕樂懸於慈寧宫均如儀設案於太和殿内又設案於慈寧宫門内及階下均正中南向又設案於階上左門之東西向序定班位慈寧門外案南中正為皇帝進册寳位北向奉册寳大學士二人位左案之東西面接册寳大學士二人位西檐下東面宣讀官二人位西檐大學士之後鴻臚寺鳴贊二人分立於前檐東西面前引後扈内大臣侍衛王公文武百官記注糾儀傳贊各官立位拜位均與三大節同右陳設序位雞初鳴王公文武百官朝服畢㑹所司設龍亭二於内閣門外禮部侍郎詣閣暨内閣學士奉金册金寳於盝奉宣讀册文寳文於函分置亭内鑾儀校舁行前册亭後寶亭禮部官屬十人前引導以儀仗二華蓋一由中路降升至太和殿階下前引止亭至殿内册亭左肆寳亭右肆奉册寳官奉金册金寳陳於案册東寳西鴻臚寺官引王以下入八分公以上由太和左右門入於丹陛上序立引公侯伯子男文武二品以上官於右翼門外序立引三品以下官於午門外序立禮部尚書侍郎二人詣乾清門奏時遂前導駕皇帝禮服乘輿出宫前引後扈如常儀至太和殿北階降輿中和清樂作皇帝御殿北向閲册寳訖樂止右臨軒閲册寳皇帝既祗閱册寳訖奉册寳官奉册寳置亭内鑾儀校舁行詣慈寧宫皇帝乘輿從王公暨文武二品以上官各於所立位跪候龍亭御駕過興以次從至永康門外龍亭由中門入至慈寧門東階下亭止皇帝降輿禮部尚書侍郎恭導以下行禮皆恭導入左門禮部侍郎内閣學士奉金册金寳陳於階下案大學士二人奉宣讀册文寳文由中階升陳於左案遂就位立皇帝陞自東階循南牖西向立大學士二人由西階升就立西檐下宣讀官二人從升立少後鳴贊立東西楹鴻臚寺官引王公百官咸依班位序立與三大節同禮部尚書轉傳内監奏請皇太后御慈寜宫皇太后禮服出宫中和韶樂作樂章與三大節同陞座樂止禮部侍郎内閣學士就階下案奉金册金寳升中階陳於中案退皇帝就拜位北向立鴻臚寺官引王公以下文武百官咸北面就位立大學士就案奉宣讀册文寳文暨西檐大學士咸進至中案前左右立鳴贊奏跪皇帝跪羣臣皆跪奏進册大學士跪進册於右興退皇帝受册恭獻大學士跪接於左陳於中案興退奏進寳如進册之儀贊宣册宣册官進至案前北面跪啟函恭奉册文宣讀訖仍納於函興退贊宣寳如宣册之儀畢皆復位内監四人舁册寳案二人前導由中門入陳於慈寧宫檻外正中南向退奏拜興丹陛大樂作樂章與三大節同皇帝率王公羣臣行三跪九拜禮興午門外序立百官承傳随班行禮畢樂止皇帝復東次立王公以下各退就班位立禮部尚書轉傳内監奏禮成皇太后降座中和韶樂作樂章與三大節同還宫樂止皇帝降階出永康左門乘輿還宫翊衛如來儀羣臣各退右進册寳皇帝既率羣臣上册寳禮畢内監移設丹陛樂於慈寜門東西檐下設皇后皇貴妃貴妃妃嬪拜位於慈寧宫月臺上設公主福晉命婦拜位於丹陛上北向内監轉奏皇后皇后率六宫公主福晉命婦詣慈寧宫行禮如三大節之儀右中宫率六宫公主福晉命婦朝賀翼日所司入太和殿鋪陳鑾儀衛官陳法駕鹵簿仗馬歩輦五輅馴象鼓吹常朝象樂部和聲署陳樂懸均於常次皇帝御殿受賀百官行禮均如三大節之儀頒詔布告天下頒詔詳見儀右臨軒受賀欽定大清通禮卷二十
