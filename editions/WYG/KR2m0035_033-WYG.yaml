front:
  text: 欽定四庫全書欽定大清通禮卷二十七嘉禮册封親王世子郡王之禮命下禮工二部製親王及世子冊寳以金郡王册印銀質金飾冊寳若嗣封王注名於印世相𫝊授豫期禮部諏吉
  hash: sha256:cd58814a6fbe1708ac034c675dd419699832bcbe10cc0d692c4d47d295359d4b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0035_WYG_033-1a, image: WYG0655/WYG0655-0329c.png}
body:
  text: 奏請命内大臣散秩大臣一人為使内閣學士翰林院學士禮部侍郎一人副之屆日鴻臚寺官設案於太和殿丹陛正中東西肆王府官備鼓吹一部於長安門外鑾儀衛設采亭於禮部堂上儀制司官陳節册寳印於亭内校尉舁亭由東長安門入至太和殿階下亭止奉節升階陳於案封使及執事官朝服竚於丹墀禮部侍郎升東階就節案左立封使升東階諸案前北面西上侍郎舉節西面授正使正使持節偕副使降階鑾儀校舁采亭從導以御仗出太和中門至長安門外封使及執事官咸乘馬鼓吹前導詣王邸第右遣封使是日府屬官豫設節案於府堂内正中前設香案左設册寳案皆東西肆設樂於儀門内設儀仗於庭中繡花曲蓋一銷金繖二繡花繖二繡花扇二皆紅色孔雀扇二青色立瓜卧瓜骨朶吾仗各曰纛四旗十大刀二豹尾槍二明輿一乘馬六世子減繡花繖二立瓜卧瓜骨朶吾仗纛旗豹尾槍各二加紅繖一郡王復減紅繖一大刀二餘均與親王同東西分列封使及府門下馬正使持節前行府屬引贊引王朝服迎於大門外道右跪候過興隨入樂止副使奉制冊禮部官奉寳印随節升自中階陳節於堂内中案陳冊寳印於左案就立案東宣册官禮部官立封使後均西面引贊引王升西階就堂内北面立樂作贊行三跪九叩禮興樂止進至香案前跪禮部官詣册案展制册宣册官西面宣讀訖以制冊授正使正使授王王祇受轉授從官從官跪接興復於案宣讀官宣寳印副使授王如受册儀封使皆復位立王退至拜位樂作行禮如初禮畢樂止王出大門外道右立正使奉節出副使及執事官從至門外王跪送節候過興退封使囬還節有司皆退右封親王世子郡王冊封長子貝勒貝子之禮命下工部製制册以紙為之中書科中書繕文訖送禮部既有日禮部奏請命内閣侍讀學士侍讀翰林院侍讀學士侍講學士侍讀侍講一人為使禮部郎中員外郎主事一人副之屆日鴻臚寺官設案於太和殿階下正中禮部儀制司官奉節册於采亭鑾儀校舁行入至殿階下陳節於案陳采亭於案左封使及執事官入竢丹墀禮部侍郎就節案左立封使詣案前北面侍郎舉節西面授正使正使持節鑾儀校舁亭導以御仗副使及執事官從出太和中門至長安門外乘馬詣府第如諸王之儀是日府屬官設樂於儀門内設儀仗於庭中銷金繖二繡花扇二立瓜卧瓜骨朶吾仗各二纛一旗六明輿一乘馬六貝子減銷金繖一卧𤓰馬餘同東西分列長子貝勒貝子迎節册受册送節均如諸王之儀右封長子貝勒貝子册封公主之禮命下工部製册以金鐫字送禮部禮部諏吉奏請命使持節徃封如親王之儀右遣封使是日府屬官豫設節案於公主府堂内正中前設香案左設册案皆東西肆設樂於儀門内設儀仗於庭中曲蓋一紅寳花繖二孔雀扇二青花扇二立瓜卧瓜骨朶吾仗各二纛二車一乘和碩公主減青花扇餘同東西分列封使及府門下馬正使持節入采亭從公主禮服率侍女迎於儀門内道右跪候過興副使奉册随節升自中階以節册陳於堂内各案就案東立宣册官禮部官立封使後均西面侍女引公主由西階升詣堂中北面立樂作行六肅三跪三拜禮興樂止進至香案前跪禮部官詣册案展制册宣册官西面宣讀訖以制册授副使副使西面授内監内監跪接授侍女侍女跪授公主公主祗受仍授侍女接以興復於案公主興退就拜位樂作行禮如初禮畢樂止侍女引退正使奉節出副使及執事官從公主跪送節於儀門内如初迎禮封使囬還節有司皆退右封公主册封福晉夫人之禮間五嵗禮部彚疏請封所司製册親王福晉世子福晉金册郡王福晉銀質金飾貝勒貝子夫人紙册送禮部禮部奏請命使視親王郡王貝勒貝子是日鴻臚寺官設案於太和殿階下禮部官奉節册節册視彚封人為數於采亭鑾儀校舁行入至殿階下陳節於案陳亭於案左各府屬官備鼓吹於長安門外封使及執事官朝服入竢丹墀禮部侍郎率屬立節案左封使詣案前禮部官奉各節授正使鑾儀校舁亭副使及執事官從出太和中門至長安門外乘馬鼓吹前導詣各府第各府設樂於門内設儀仗於庭中曲蓋一紅寳花繖二孔雀扇二青寳花扇二立瓜卧瓜骨朶吾仗纛各二車一乘世子福晉減寳花扇郡王福晉復減曲蓋卧𤓰貝勒夫人復減寳花繖一骨朶纛餘與親王福晉同貝子夫人不設儀仗東西分列迎節冊受册送節均如諸公主之儀右封福晉夫人凡封郡主縣主郡君之禮閒五嵗由部彚請遣使徃封均用紙冊郡主儀仗視郡王福晉縣主郡君視貝勒貝子夫人餘儀同前右封郡主縣主郡君欽定大清通禮卷二十七
