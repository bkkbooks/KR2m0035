front:
  text: 欽定四庫全書欽定大清通禮卷三十四嘉禮皇帝臨雍之禮命下禮部諏吉具疏以聞徧布諸司供備豫期行取衍聖公五經博士孔氏裔
  hash: sha256:f905408c2ed98e1d525f15c0fb4082e0e72df7248fa7e0a5d4d57edf8ffc41b3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0035_WYG_040-1a, image: WYG0655/WYG0655-0359a.png}
body:
  text: 俊秀五人東野氏孔氏顔氏曾氏孟氏仲氏閔氏冉氏言氏卜氏顓孫氏端木氏有氏裔各二人乘傳赴京及各氏子孫見列朝官者直省在京之進士舉人貢監生各學教習肄業諸生咸詣太學觀禮國子監祭酒司業擬經書篇目撰講章豫進御覽欽定恭繕以竢右諏日戒辦届期五鼓國子監祭酒率屬灑掃學宫内外工部司官張御幄設寳座於彞倫堂正中南向武備院官供御座鋪陳鴻臚寺官於幄前稍左設經案東西肆左右各設講案均南北肆未明祭酒奉御覽講章陳幄左案書左經右奉進講副本陳書於左案陳經於右案退右陳設辨堂内外班位講官滿漢祭酒二人位堂内左案西面滿漢司業二人位右案東面記注官位西柱下東面侍班王公位講官後大學士九卿詹事位王公後糾儀給事中御史位班末聼講羣官暨諸生位東西階下執事舉經案國子官二人位堂左右門内鴻臚寺鳴贊二人立東西檐下宣制官一人立東鳴贊官之右序班二人立於階上又序班四人分立庭内左右皆東西面北上辨庭中拜位東班衍聖公祭酒西班司業率國子官各學教習五經博士進士舉人聖裔賢裔如見列朝官則以品序貢監生東位西上西位東上皆重行北面右辨位鑾輿出宫儀詳吉禮皇帝詣大成殿釋奠先師詳吉禮釋奠儀禮畢出大成門就大次更補服少竢王公以下咸更補服王公於大次之南祇候大學士偕朝官衍聖公率五􅀴博士聖裔賢裔先詣彛倫堂庭内東西祇候祭酒司業率所屬及各學教習進士舉人諸生於太學門内階下東西序立祗候禮部尚書奏請皇帝詣彛倫堂行講學禮太學鳴鐘鼓皇帝出大次至廟門外乗輿前引後扈如常儀禮部尚書侍郎恭導入太學中門王公隨入祭酒以下跪候過興均隨入皇帝陞堂降輿御寳座禮部尚書侍郎前引内大臣止立門外侍衛夾两階翼立後扈内大臣於御座两旁侍立王公立階上左右記注官升西階入右門就位執事官咸就位鳴贊贊齊班序班分引衍聖公祭酒司業以下至庭東西拜位北面立贊進衆進贊跪叩興行三跪九叩禮興退復位皇帝賜王公大臣坐鴻臚寺官引王公由左右門入序班引衍聖公大學士九卿詹事升東西階隨入咸按班就位一叩坐翰詹四品以下官國子官六堂各學師儒五經博士各氏後裔進士舉人肄業諸生進就東西階下圜堂外聼講鳴贊贊進講滿漢祭酒二人升東階入自左門司業二人升西階入自右門均北面立贊舉案國子官進舉􅀴案恭設御前皇帝賜講官坐祭酒司業各就東西講案一叩坐祭酒以次講書義司業以次講經義講畢贊舉案國子官舉􅀴案復幄東出王公大臣起立聼講官退復位祭酒司業出降階復庭中東西拜位國子官各學敎習進士舉人諸生從就拜位北靣立右講書禮部尚書進奏𫝊制鳴贊贊有制祭酒以下皆跪宣制官進至中門左宣制曰聖人之道如日中天講究服膺用資治理爾諸師生其勉之宣畢退鳴贊贊叩興祭酒以下行三跪九叩禮興以次先詣成賢街道右序立祇候皇帝賜王公大臣茶如儀詳見朝儀畢仍引自左右門出降階東西序立祗候禮部尚書奏禮成皇帝降座乗輿扈衛如來儀由太學門出祭酒以下咸跪送候駕過興退法駕鹵簿前導導迎樂作奏禧平之章辭曰崇聖尊道乾徳下交思樂多士化流芹藻鼓篋徴􅀴術昭聼講環宏育陶皇帝還宫儀詳吉禮右禮成囘鑾臨雍禮成衍聖公率五經博士各氏後裔祭酒司業率屬暨各學敎習進士舉人貢監肄業諸生各具表送禮部翼日五鼔鴻臚寺官豫設表案於太和殿内之左南北肆禮部儀制司官奉表陳於案樂部率和聲署入展樂懸鑾儀衛率官校入陳法駕鹵簿均依常次記注官侍班執事各官王公文武百官立位拜位如三大節朝賀儀辨丹墀内謝恩班位衍聖公祭酒在東司業在西國子官各學敎習五經博士進士舉人各氏後裔貢監生以次從東西班後立位東西面北上拜位北面東班西上西班東上與太學行禮同漏未盡王公百官朝服畢㑹如常儀五經博士暨諸生各以其職公服随㑹午門外闕下質明鴻臚寺序班以次引入執事官咸入就位禮部尚書侍郎奏請御殿午門鳴鐘鼔皇帝禮服乗輿出宫御太和殿作樂鳴鞭並如常儀丹陛樂作鴻臚寺序班分引謝恩各官就丹墀東西拜位北面立鳴贊贊進皆進贊跪皆跪樂暫止贊進表宣表官入殿左門就案奉衍聖公表文出至檐下正中北面跪大學士二人左右跪展表宣表官宣畢興仍奉進復於案祭酒表設而不宣退樂作謝恩各官聼贊行三跪九叩禮興引退復位樂止賜王公大臣衍聖公祭酒司業茶畢鳴鞭作樂皇帝還宫禮均與朝儀同禮部官以表送内閣王公百官皆退是日賜衍聖公等燕於禮部詳筵燕儀右表謝皇帝東廵狩詣闕里講書於詩禮堂前期禮部具奏命行在大臣㑹衍聖公選聖裔賢裔二人充經書直講翰林院官擬篇目撰講章豫進御覽欽定恭繕以竢右戒辦届期工部官張御幄設寳座於詩禮堂正中南向武備院官供御座鋪陳鴻臚寺官於御幄前設經書案堂東設勅案均東西肆設講案於西檐下南北肆是日黎明内閣中書奉勅陳堂内東案翰林院官奉御覽講章陳於幄前中案奉進講副本陳於講案皆書左經右畢退右陳設辨班位記注官立堂内西柱下東面大學士一人立東檐下宣勅官一人立大學士後皆西面鴻臚寺卿二人鳴贊二人立東西階上東西面序班二人立於庭西執事官一人立序班之下均東靣右序位鑾輿出行宫儀詳吉禮皇帝詣大成殿釋奠先師詳吉禮儀闕里釋奠禮畢出同文門至奎文閣前就大次少竢扈從大學士以下京堂科道以上守土官廵撫司道於承聖門左以次序立衍聖公率東野氏孔氏顔氏曾氏孟氏仲氏閔氏冉氏言氏卜氏顓孫氏端木氏有氏五經博士及直講官於門右以次序立禮部尚書奏請皇帝詣詩禮堂行講學禮皇帝出大次乘輿前引後扈如常儀至承聖門外各官跪迎候過興随入門内左右序立如初司道官候於門外皇帝至詩禮堂前降輿御寳座禮部尚書侍郎前引内大臣止立門外侍衛夾東西階下翼立後扈内大臣於御座兩旁侍立記注官升西階入右門就位大學士升東階立東檐下執事官咸入就位鳴贊贊齊班序班引衍聖公以下就庭西拜位北面立贊跪叩興行三跪九叩禮興贊􅊰書直講一人出班升西階詣講案前跪三叩興就案西東面講四子書畢降階復位次直講一人出班升階講經如講書之儀右進講鴻臚寺卿進至中門之左奏宣勅鳴贊贊跪衍聖公以下皆跪大學士入左門就案奉勅出堂中門授宣勅官奉至階前西面宣勅曰至聖之道與日月並行與天地同運萬世帝王咸所師法下逮公卿士庶罔不率由爾等逺承聖澤世守家𫝊務期型仁講義履中蹈和存忠恕以立心敦孝弟以修行斯須弗去以奉先訓以稱朕懐爾等其祗遵毋替宣畢奉勅降中階左西面授衍聖公衍聖公恭受執事官趋進跪奉以興退贊叩興衍聖公率博士以下謝恩行三跪九叩禮興豫往毓粹門外祇候各官咸出禮部尚書奏禮成皇帝降座導從如來儀至毓粹門就大次更常服出祗謁孔林儀詳吉禮禮畢還行宫各退右禮成還行宫欽定大清通禮卷三十四
