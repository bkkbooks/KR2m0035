  text: 欽定四庫全書欽定大清通禮卷二十三嘉禮
  hash: sha256:fd44bd383f0292c184ca140029d8687b4acd310be64d13c36bf75a3b6b0c4f9f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0035_WYG_029-1a, image: WYG0655/WYG0655-0304c.png}
body:
  text: 皇子昏禮内務府豫劄欽天監諏指昏吉日並列大臣命婦中偕老者奏襄昏事既得㫖以告於福晉家屆期贊禮大臣偕福晉父蟒袍補服詣乾清門東階下福晉父北面跪贊事大臣西面稱有㫖今以某氏女作配於皇子某為福晉福晉父承㫖訖行三跪九叩禮興退右指昏廼諏吉納幣内務府備黄金項環一釵六珥六均以珠飾釧四黄金衣鈕百白金衣鈕二百黑貂皮三貂皮百有四十狐皮二百有五十黑獺皮七采幣表裏各百棉三百斤賜福晉父母黄金十兩白金七百兩貂冠狐裘佩帶刀帨鞾襪具馬二匹鞍轡具屆日内務府官以采亭載諸禮物如福晉家福晉父朝服迎於大門外内務府官入陳幣於堂陳馬於庭陳賜物於階上以納幣告福晉父祇受訖率其子弟序立庭東福晉母率諸婦出序立庭西望闕行三跪九叩禮内務府官退福晉父送於大門如初迎禮右納幣是日所司備伶樂一部燕席五十羊三十有六詣福晉家設内外筵燕外燕於㕔事東西布席相向北上福晉親族職官及不入直之公侯伯内大臣侍衛一二品官朝服畢㑹午刻鴻臚寺官引入升堂福晉親族及本旗大臣侍衛東位西面各旗公侯伯等官西位東面就席一叩序坐司茶奉茶衆受茶飲茶皆一叩司筵奉果食酌酒伶工入奏衆獻酬樂闋興出司筵徹果食衆易蟒袍補服仍入就位司筵奉饌酌酒奏樂獻酬交錯如初樂闋興鴻臚寺官引衆官詣堂下望闕北面序列聴贊行三跪九叩禮興退内燕於中堂福晉親屬諸婦及一二品命婦咸㑹内務府管領妻量人給事行酒如外堂燕儀右納幣燕㑹及昏前一日福晉家豫以粧奩送皇子宫舖陳屆日質明皇子蟒袍補服詣皇太后皇帝皇后前行禮若妃嬪所出並於妃嬪前行禮各如儀内務府選随從女官八人豫詣福晉家閣前祇竢賛事命婦豫詣皇子宫内别室祗候自宫門至於福晉家歩軍統領飭屬灑掃清道鑾儀衛備儀仗采輿内務府總管一人官屬二千人蟒袍補服䕶軍四十人偕如福晉家奉迎及大門主人揖入如納幣禮升輿吉時屆内鑾儀校奉采輿陳於中堂福晉禮服出閣随從女官翊升輿母送於閣門外姑姊妺戚屬送於輿前竢下簾退父率子弟送於門竢過退内校舁采輿行鐙八炬十前導女官随從出大門乘馬前列儀仗内務府總管率屬及䕶軍前後導䕶行至紫禁城門外衆下馬歩入及儀仗止於宫外女官随采輿入至皇子殿前降輿女官㳟導福晉出輿引入宫合卺吉時屆贊事命婦上合卺酒設燕皇子與福晉行合卺禮執事者皆退是日於皇子宫近處張幕結采燕福晉父母戚屬羣官如納幣之儀右奉迎合卺昏禮既成翼日皇子及福晉夙興朝服内務府管領妻二人導詣皇太后皇帝皇后前行朝見禮皇子三跪九叩福晉六肅三跪三叩次詣所出妃嬪前行禮皇子二跪六叩福晉四肅二跪二叩各如儀退右朝見公主下嫁之禮内務府豫劄欽天監諏指昏吉日並列大臣命婦中偕老者奏襄昏事既得㫖禮部以告於額駙家屆期贊事大臣偕額駙蟒袍補服詣乾清門東階下額駙北面跪贊事大臣西面稱有㫖今以某公主擇配某人額駙祗受命行三跪九叩禮興退右指昏初定諏日額駙家備駝一馬八羊八十有一酒九十尊屆期詣午門前㳟進得㫖分納所司是日光祿寺官備筵燕武備院官張黄幔於中和殿北階下内務府官陳金器反坫禮部理藩院尚書侍郎内務府總管光祿寺卿同視布席設御筵於保和殿寳座前正中殿内東西布席各五行前引大臣一行内外親王世子固倫額駙二行郡王貝勒貝子公和碩額駙三行内大臣一等台吉四行都統副都統二等台吉五行相向北上寳座後東西為豹尾班侍衛席又西為記注官席均南向殿門外檐下東為侍衛席西為三等台吉席禮部尚書侍郎席黄幔左内務府總管席黄幔右均東西向樂部陳中和韶樂於保和殿檐下陳丹陛樂於中和殿後階均北向午刻欽命入燕之王大臣侍衛及執事各官蟒袍補服畢㑹保和殿前按翼序立理藩院尚書侍郎率額駙父額駙及其族人朝服詣慈寧宫門外鴻臚寺官引至東階下北面行三跪九叩禮畢引詣保和殿前入班序列禮部尚書侍郎赴乾清門奏時皇帝袞衣龍袍乘輿出宫前引後扈如常儀御保和殿陞座鴻臚寺官引額駙父等出班北面聴贊行三跪九叩禮興王公以下就位額駙父等均引入班就位跪叩坐賜茶畢進爵大臣進皇帝酒跪叩如太和殿燕禮額駙父等出殿外北面随跪叩興復位徧爵作樂升歌行酒儀注均與太和殿燕禮同燕畢引額駙父等詣丹陛拜位行禮如初皇帝還宫衆退理藩院尚書侍郎鴻臚寺官引額駙父等至乾清門西階下序列行三跪九叩禮退是日内監設中和韶樂及丹陛樂於慈寧宫常次如儀尚膳女官設皇太后筵於寳座前南向設皇后筵於東西南向又以次設皇貴妃貴妃妃嬪席於東西少後僉向額駙母及其族中諸婦設席於嬪席之下少南西位東面進爵命婦侍衛命婦設席於丹陛下東位西面午刻皇后率妃嬪詣慈寧宫皇太后陞寳座筵燕賜茶進觴徧爵作樂升歌行酒額駙母及諸婦行禮各如儀既畢皇太后還宫皇后妃嬪皆還内宫内監引額駙母及諸婦詣皇后宫行六肅三跪三叩禮退右初定燕㑹下嫁前一日額駙蟒袍補服率族人詣皇太后皇帝皇后宫門前行三跪九叩禮各如儀内務府官率鑾儀校以公主粧奩詣額駙邸第内管領命婦二人偕女侍随徃舖陳至日黎明額駙家備九九禮物文馬十有八鞍轡具䭾甲十有八馬二十有一駝六羊八十有一酒九十尊詣午門㳟納午刻筵燕於保和殿慈寧宫如初定禮是日所司豫奏請王福晉貝勒貝子夫人中結髪偕老者欽命陪送内務府大臣命婦二人内管領命婦十人充導從皆盛服於宫門外别室祇候贊事命婦豫詣額駙邸别室祇候自公主所出宫門至額駙邸歩軍統領飭屬灑掃清道鑾儀衛備儀仗采輿内務府總管一人官屬四人内管領二人䕶軍叅領二人䕶軍校二人蟒袍補服偕䕶軍二十人於所出宫門前祇候升輿吉時屆公主吉服詣皇太后皇帝皇后前行禮若妃嬪所出並於妃嬪前行禮各如儀畢命婦翊升輿下簾内校舁輿行出宫儀仗前列鐙八炬十前導陪送福晉夫人及随從命婦乘輿隨行内務府總管内管領乘騎稍逺導從叅領及䕶軍乘騎䕶行詣額駙邸第及門衆下馬歩入儀仗止及儀門各官止輿入至㕔事正中降輿命婦階下降輿升堂導公主出輿福晉夫人降輿随公主入室額駙及禮賔於外堂額駙母禮女賔於中堂徧饗諸執事者各如禮合卺吉時屆贊事命婦上合卺酒設燕額駙與公主行合卺禮衆退右于歸合卺下嫁禮成翼日行朝謝禮公主額駙夙興朝服公主詣皇太后皇帝皇后及所出妃嬪前行禮額駙詣慈寧門外東階下乾清門外内右門外行禮各如儀畢還邸第右朝謝親王昏禮為未分家之子娶同將及冠訪朝臣女或外藩王女年齒相當者奏聞請㫖命下以次行禮如奉㫖賜昏者是日王朝服詣太和殿前謝恩如儀初定王府備燕五十席酒五十尊若聘外藩女用鞍馬甲胄白金器七九牲五九使官屬之長齎如女家昏家禮請親王以下輔國公以上公主福晉以下郡君貝子夫人以上禮部轉𫝊公侯伯以下侍郎男以上畢㑹燕男布席於外堂女布席於内堂獻酬行酒如皇子初定燕儀右定昏次行納幣禮王府備黄金項飾一金珥一具金釵大小各三指環十均綴以􅈿珠采繒衣裳九襲衾褥七具黄金二十兩白金千兩給女父母朝衣一冠帶鞾具采衣裳各一金珥一具鞍馬二若聘外藩親王女用鞍馬十有二甲胄十有二閑甲二十有四繒六十布六百白金器三具聘郡王貝勒台吉女白金器同鞍馬甲胄各減二閑甲減四繒減十布減百餘物與上同王府官公服齎詣福晉家主人公服迎入使者陳禮物於堂有馬則陳於庭以納幣告主人拜受使左右徹之送使者如禮右納幣昏前一日女家豫以粧奩送王府舖陳至日王禮服竢於次使其長史率官屬備儀仗禮輿如福晉家迎升輿吉時屆納禮輿於中堂福晉禮服出閤送女者翊升輿母送於閤門外姑姊妺戚屬送於輿前父送於外堂子弟送於門外鐙炬前輿送女者升車從詣王府由中門入及堂前降輿王出次竢於堂送女者導福晉出輿王揖先入福晉從入室行合卺禮其日王府設燕席六十酒六十尊聘外藩女用牲五九親王以下侍郎男以上公主福晉以下郡君貝子夫人以上咸㑹如定昏燕禮饋贈外藩王貝勒台吉及福晉夫人等送女來者冬夏衣各一襲貂裘一帶一弓一韔矢一服甲胄各一鞍馬二采繒三十布二百白金器三具女之兄弟時衣一襲給随從男婦三十人衣服有差右成昏若奉㫖賜昏者成昏之明日王及福晉夙興朝服詣大内謝恩行禮如皇子昏儀右謝恩世子郡王昏禮納幣用指環八采繒衣裳八襲衾褥六具黄金十兩白金七百兩初燕席四十酒四十尊昏燕席五十酒五十尊餘物凖親王若聘外藩親王女鞍馬甲胄繒帛白金器如親王聘外藩郡王女之數昏禮既成饋贈外藩親王郡王及福晉送女來者並女之兄弟及随從男婦衣物均凖親王外藩貝勒台吉及夫人送女來者給采繒二十有五布百有五十白金器二具餘凖親王給随從男婦二十有五人衣服有差凡昏儀與親王同右世子郡王昏長子貝勒昏禮納幣用指環六采繒衣裳七襲衾褥五具黄金五兩白金五百兩給女父母繒衣不綴采鞍馬一閑馬一餘物視郡王初燕席三十酒三十尊昏燕席四十酒四十尊郡王以下尚書子爵以上郡主郡王福晉以下郡君貝子夫人以上咸㑹燕儀同郡王若聘外藩女定昏用鞍馬甲胄繒布白金器五九筵燕用牲三九納幣用鞍馬八甲胄各八閑甲十有六繒四十布四百白金器二具昏燕用牲五九昏禮既成饋贈外藩親王郡王及福晉送女來者並女之兄弟及随從男婦衣服均凖郡王貝勒台吉夫人送女來者給采繒繒合二十有五布百有五十白金器二具餘凖郡王随從男婦二十人給衣服有差凡昏儀與郡王同右長子貝勒昏貝子昏禮納幣用指環四釵大小各二衣裳六襲不綴金珠衾褥四具白金四百兩給女父母視貝勒減閑馬一餘衣物數同初燕昏燕席酒各減十貝勒以下公以上暨本旗官屬郡君貝勒夫人以下縣君輔國公夫人以上咸㑹燕儀同貝勒若聘外藩女定昏鞍馬甲胄繒布白金器三九筵燕用牲二九納幣鞍馬六甲胄各六閑甲十有二繒三十布三百白金器二具昏燕用牲三九饋贈親王郡王及福晉送女來者女之兄弟及随從男婦衣物均凖貝勒貝勒台吉夫人送女來者給采繒繒合十有五布七十白金器一具餘凖貝勒随從男婦十有五人給衣服有差凡昏儀與貝勒同右貝子昏宗室公昏禮鎮國公納幣用衣裳五襲白金三百初燕十有八席昏燕二十有八席酒如席數貝子以下奉國將軍以上貝子夫人以下奉國將軍淑人以上及本府官屬㑹燕餘並同貝子若聘外藩女定昏鞍馬甲胄繒布白金器二九筵燕用牲數如之納幣鞍馬五甲胄各五閑甲十繒二十有五布二百五十白金器二具昏燕用牲三九饋贈送女來者衣物凖貝子輔國公納幣衣裳減一襲衾褥減一具無白金初燕昏燕席各減二酒如之貝子貝子夫人不㑹燕餘儀物與鎮國公同若聘外藩女定昏行一九禮初燕用牲二九納幣甲胄各減一閑甲減二繒減五布減五十白金器二具昏燕用牲三九饋贈送女來者衣物凖鎮國公凡昏儀均與貝子同右宗室公昏宗室將軍昏禮鎮國將軍納幣用衣裳繒三襲布一襲衾褥繒二具布一具金項飾一釵二珥二初燕用牲六昏燕席十有五餘儀與輔國公同輔國將軍納幣衣裳衾褥各減繒一初燕減牲一昏燕減五席奉國將軍納幣禮物如輔國公初燕復減一牲昏燕減二席餘如鎮國將軍之禮儀同右宗室將軍昏閑散宗室昏禮納幣數如奉國將軍減金釵二初燕牲二昏燕六席閑散覺羅昏燕五席餘同宗室昏儀均與奉國將軍同右閑散宗室覺羅昏郡主于歸之禮將及筓訪外藩䝉古王子年齒相當者奏聞請㫖命下以次行禮若奉㫖賜昏者額駙先詣乾清門謝恩如公主指昏之儀初定額駙家備燕五十席酒五十尊若外藩王貝勒台吉等尚郡主用駝馬羊七九牲五九遣人納於王府王受之其日㑹燕如納福晉初定燕儀右定昏次行納幣禮額駙家備鞍馬七甲胄七若外藩王等之子用馬六十牛六十羊六百遣人齎詣以獻於王王納之如定昏禮右納幣昏前一日王使人以粧奩張陳額駙室至日額駙朝服祇竢邸第王使其官屬備儀仗禮輿送郡主于歸升輿吉時屆郡主禮服侍女引出閤詣王前辭次詣福晉前辭均行四肅二跪二叩禮執事官進輿於中堂侍者引郡主升輿王府䕶衛官前導鐙炬前輿侍婢八人男婦五户媵如額駙邸第額駙出迎於門外輿至導入至内堂降輿媵導郡主出輿額駙偕入室行合卺禮其日額駙第設昏燕如親王納福晉之儀右成昏若奉㫖賜昏者成昏之明日額駙偕郡主夙興朝服詣大内謝恩行禮如親王納福晉儀右謝恩縣主于歸之禮納幣視郡主鞍馬甲胄各減二初燕昏燕儀凖郡王若嫁於外藩王貝勒台吉等納幣視郡主馬減十牛減十羊減百媵婢七人男婦四户餘同右縣主出嫁郡君于歸之禮納幣鞍馬四甲冑四初燕昏燕凖貝勒若嫁於外藩定昏行七九禮初燕用牲三九納幣馬四十牛四十羊四百昏燕用牲五九媵婢六人男婦四戶縣君納幣鞍馬甲胄各三初燕昏燕凖貝子若嫁於外藩定昏行七九禮初燕用牲二九納幣馬三十牛三十羊三百昏燕用牲三九媵婢五人男婦三戶鄉君納幣鞍馬甲胄各二初燕昏燕凖宗室公若嫁於外藩定昏行七九禮納幣馬二十有五牛如之羊二百五十初燕昏燕用牲如縣君媵鎮國公女婢四人輔國公女婢三人男婦皆二戶凡昏儀均與郡主同右郡君縣君鄉君出嫁欽定大清通禮卷二十三
