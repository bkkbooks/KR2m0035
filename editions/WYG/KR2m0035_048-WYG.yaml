front:
  text: 欽定四庫全書欽定大清通禮卷四十二軍禮
  hash: sha256:31c23ab8a92bc72c41772b11f1114abc4bd1fb0c277626586622add1266554eb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0035_WYG_048-1a, image: WYG0655/WYG0655-0426a.png}
body:
  text: 日食救䕶之禮前期五月欽天監豫推京師各省及䝉古諸部落朝鮮國所見日食分秒時刻疏聞下禮部徧布中外屆期祇行救䕶前一月具疏𫝊在京文官漢武官㑹禮部行救䕶禮八旗滿洲䝉古漢軍都統副都統率屬於所部警備各救䕶於公署至日順天府官飭役赴部潔埽堂署内外設香案於露臺上鑪檠具早晚随日為向布百官拜席於香案後鑾儀衛率官校至部陳金鼓於儀門外龍旗御仗各二引仗各六鼓二十有四金鉦一畫角十有二掌以民尉列甬道東西百官朝服詣部祇候乃辨位宗人府吏部翰林院詹事府通政司吏科國子監為一班内閣戸部戸科禮科太常寺鴻臚寺欽天監為二班兵部兵科理藩院鑾儀衛上駟院武備院太僕寺歩軍統領及漢武官為三班刑部都察院大理寺刑科光禄寺順天府京縣五城為四班内務府工部工科中書科太醫院為五班每班皆禮部尚書侍郎一人領之禮部官屬各附於班末紏儀御史四人禮部司官四人鴻臚寺鳴贊二人序班二人分列於香案前左右欽天監博士一人候時樂部署史二人奉鼓竢於露臺下欽天監官報日初虧鳴贊贊齊班序班引百官至拜位前立重行異等贊進少進贊跪叩興衆行三跪九叩禮興贊上香禮部尚書進至香案前三上香畢復位贊跪皆跪贊伐鼓署史奉鼓進跪於左禮部尚書伐鼓三聲儀門外金鼓振作乃按班更番上香祇跪御史禮部鴻臚寺官更番祇立並如前儀欽天監官報日復圓金鼓聲止鳴贊贊齊班百官至拜位前立聽贊行禮如初畢各退是日禮部祠祭司官二人欽天監博士二人赴觀象臺測騐向日設香案初虧復圓行三跪九叩禮如儀右日食救䕶月食救䕶於太常寺前期欽天監禮部疏聞屆日陳設執事及行禮儀節並與救䕶日食禮同右月食救䕶直省府州縣衛遇日月食各按欽天監推定時刻分秒随地救䕶省㑹於督撫署府州縣衛各於公署均以督撫及正官一人領班行禮正貳教職二人紏儀學弟子員二人通贊二人引班隂陽官一人報時至日班首官上香伐鼔衆官祗跪行禮並與京師救䕶同右直省救䕶欽定大清通禮卷四十二
