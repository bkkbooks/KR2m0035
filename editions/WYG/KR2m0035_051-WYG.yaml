body:
  text: 欽定四庫全書欽定大清通禮卷四十五凶禮周官凶禮有五喪居其首昭慎終也唐顯慶禮刪國恤之條後世遂末由詳考厥制下逮臣庶罕得遵循或泥古而失其情或從俗而違於義者有之我朝孝治光昭與成周嫓美三年之喪自天子達於庶人其間稱情立文垂為典則王道使民無憾胥於是乎見焉謹詳著於篇列聖喪禮疾大漸召嗣皇帝侍側王大臣數人承簡命入恭紀遺詔初崩王大臣奉嗣皇帝正主喪位去冠飾哭踊宫中自皇后皇貴妃貴妃妃嬪以下咸去首飾陳小殮冠服嗣皇帝奉以進哭踊視小殮畢所司恭奉梓宫於宫中正殿嗣皇帝哭踊憑梓宫視大殮畢命王大臣治喪事禮部内務府㑹疏喪儀辨服制嗣皇帝成服皇子皇孫隨成服皇后皇貴妃貴妃妃嬪以下公主皇子皇孫福晉同時成服王公百官宗室覺羅及内務府所屬官人皆給白布制服公主福晉以下三等侍衛妻以上及内務府所屬婦女咸去首飾給布制服如之皇帝服三年喪居翼室百日以内上諭用藍筆惟天地大祀越紼行事百日以後素服聽政詣几筵前仍喪服二十七月而除皇后皇貴妃貴妃妃嬪服同皇子皇孫居宫中别室治喪儀王大臣及殯宫守衛執事官人百日除服公王福晉以下侍衛妻以上及内務府所屬婦女服同羣臣八旗文武官居闕左門外漢官居各公署服二十七日而除皆百日不薙髪素服二十七月奏疏文移用藍印二十七日止昏嫁朞年遏音樂二十七月右初崩成服既殮廼奠所司於几筵殿内設綴衣中黄左右白供牀南向坐褥具左右各設牀列黼扆十有四南設供案香合鑪鐙具鑾儀衞陳法駕鹵簿於乾清門至太和門外諸執事皆辦辨内外哭位嗣皇帝立殿檐東西向哭衆傳哭皇子皇孫立丹陛東西面皇后立綴衣内東向皇貴妃貴妃妃嬪公主皇子皇孫福晉立於後殿下丹墀右為諸王福晉夫人郡主以下至二品命婦哭位隆宗門外為三四品命婦以下哭位乾清門外為王以下公侯伯子男及二品以上官哭位王公以下二品官以上宗室覺羅哭命進内瞻仰者入乾清門内序特景運門外為三品以下文武官哭位非命婦齊集之日右翼官於隆宗門外序立皆分左右翼序立東西面北上内監啟門治喪儀王大臣及執事官率尚茶奉茶尚膳奉膳由中門入至殿前皇帝入殿左門詣几筵前正中立尚茶跪進茶衆皆跪皇帝舉茶奠於案行一拜禮衆隨行禮尚茶徹茶次尚膳進膳掲巾冪皇帝親上食畢執事官進奠几於正中皇帝詣几前跪奉爵王大臣跪進爵皇帝祭酒三爵每祭一拜興衆隨叩興乃徹闔門哭止皇帝還翼室衆各退嗣是朝晡日中三奠朝晡進羮飯肴饌日中進果筵儀均如前右殮奠朝晡日中奠越日恭頒遺詔工部官設黄案於凡筵殿内之東内閣學士自閣奉詔書内閣官前引至乾清門大學士奉詔書由中門入至几筵殿檐下皇帝恭受奉安於東案跪三拜興由殿左門出西向立竢大學士入右門詣黄案前跪三叩奉詔書興出殿中門皇帝跪候詔書過興還翼室大學士奉至乾清門外授禮部尚書尚書跪受祠祭司官以雲盤接奉出頒詔於天安門樓王公百官喪服率軍民集外金水橋跪聽宣讀畢舉哀行三跪九叩禮詔下禮部恭鐫謄黄頒於天下順天府府尹率屬制服跪迎於府署開讀在京候選官及教習進士舉貢肄業國子生等咸集朝夕哭臨三日詔至直省将軍督撫率所屬文武官暨薦紳師生耆老素服出郊跪迎入公廨開讀分駐之提鎮率所屬将弁道府州縣率所屬丞倅掾吏紳士耆老素服跪迎於治所開讀均易喪服北面行禮朝夕哭臨三日喪服二十七日不薙髪止昏嫁百日遏音樂期年京師暨直省軍民男去冠飾女去首飾素服二十七日止昏嫁一月遏音樂百日遣使頒詔於朝鮮國國王率羣臣素服恭迎止鼓樂使者就館不受燕饗餘如常儀使還國王遣陪臣上表進香納方物其使臣有在京者給白布制服遣理藩院官分路頒詔外藩䝉古王台吉公主福晉等入京行叩謁禮在二十七日以内令制服後二十七日至者男去冠飾女去首飾各三日右頒遺詔越日諏吉嗣皇帝詣凡筵前祗告受命出更禮服御太和殿即皇帝位儀詳吉禮禮畢反喪服右祗告即位諏日殷奠前期翰林院撰擬祭文至日五鼓工部官設幕於乾清門外之西置奠几陳燎牀於燎所具楮幣九萬設祭文案於殿檐下稍西鑾儀衞官校陳鹵簿王公百官公主福晉命婦各集於其位如前儀侍衛班領導治喪儀王大臣内務府總管率執事官入陳爼豆於几筵前列祭筵二十有一羊九酒十有一尊於丹陛左右陳設畢侍衛仍導以出司祝奉祭文禮部尚書侍郎二人㳟引由乾清門中門入設於案出執事者出入皆導以侍衛班領後仿此内監奉冠服篚設於供牀屆時禮部尚書奏請皇帝自翼室出詣几筵哭就位内外集序傳哭獻茶上膳如前儀司祝進至案前奉祭文至檐外正中北面跪禮部尚書侍郎二人左右跪展祭文執事官進奠几皇帝於几前跪衆各於其位跪哭暫止讀祭文畢仍復於案退傳哭如初奉爵王大臣跪進爵皇帝祭酒三爵每祭一拜興衆隨叩興乃徹司祝奉祭文禮部尚書侍郎恭引内監奉冠服篚宫殿監侍二人内大臣十人恭引均由中門出送燎所皇帝由乾清左門出跪候冠服過從行王公内大臣侍衛於乾清門外跪候過隨豹尾槍後從行鴻臚寺豫引三品以下各官於燎所東西列跪候過皇帝詣燎位前跪衆皆跪奉爵王大臣跪進爵皇帝祭酒三行禮如前儀興稍後西向立衆隨叩興奉爵王大臣灌畢哭止皇帝還翼室衆退右殷奠諏日奉移殯宫豫日以奉移祇告於几筵啟奠陳設讀文祭文翰林院撰擬奠獻内外集序均如殷奠儀右啟奠屆日五鼓鑾儀衛陳法駕鹵簿治喪儀王大臣率執事官校入徹綴衣黼扆豫送殯宫工部陳大昇轝於景運門外校尉民夫均服其服分班立竢戒在途執事官役謹敬集事王公百官於梓宫所出門外列定班位豫竢皇后妃嬪暨公主福晉夫人命婦豫往殯宫集竢屆時禮部尚書奏請皇帝詣梓宫前哭執事官進奠几皇帝祭酒三爵毎祭一拜興立於左治喪儀王大臣工部鑾儀衛使率執事官校進小轝恭奉梓宫啟行皇帝哭從梓宫出乾清門中門直班内大臣侍衛於門外跪哭至景運門外登大昇轝初班校尉恭舁皇帝西向跪凡换班皆跪後同禮部尚書祭轝奠酒三爵每奠行一叩禮興校尉舁行法駕鹵簿前導皇帝於梓宫左歩行恭送治喪儀王大臣禮部工部内務府及恭送之王貝勒貝子公等夾道隨行文武百官咸跪哭候過興隨行經過門橋内大臣祭酒三爵每祭一叩興靈駕至殯宫大門外大昇轝止皇帝於門外之左跪迎哭衆隨跪哭校尉㳟舁梓宫入中門至殯殿皇帝隨入立於殿檐東王公至輔國将軍大學士公侯伯子男至副都統副都御史䝉古王至台吉於大門外序立東西面其餘文武百官於旁門外序立治喪儀王大臣率官校入殿奉安梓宫於殿内正中設綴衣黼扆如初皇帝詣奠位奠爵衆隨叩如前儀既畢徹饌闔門哭止皇帝居側殿苫次還宫二十七日後倚廬皇后妃嬪以下還宫衆各退既殯朝夕上食日中進果筵如初二十七日之後皇帝詣殯宫奠酒日一次既週月閒日一次再週月閒二日一次餘日命皇子諸王分詣恭奠内務府官䕶軍領催等於大門外之東命婦婦人於大門内之西各更班齊集每日隨朝晡日中三奠舉哀行禮治喪儀王大臣恭視桼飾梓宫凡四十有九次右奉移殯宫諏日行初祭禮前期翰林院撰祭文屆日工部設幕於殯宫門外之西置奠几設祭文案於殯殿西檐下陳燎牀於燎所具楮幣四十萬鑾儀衞陳法駕鹵簿於大門外治喪儀王大臣内務府總管等率所司陳爼豆於殯殿内列祭筵八十有一羊二十有七酒四十有一尊於丹陛左右設奠几於正中司祝奉祭文禮部尚書侍郎引入設於檐下西案内監陳冠服篚於供牀均如初儀王公百官於大門外分位集竢福晉以下二品命婦以上於二成門内之右集竢内府入直之命婦婦人於二門外集竢在内公主福晉等集於殿内屆時皇帝喪服詣几筵前哭衆傳哭獻茶上膳讀文畢皇帝奠酒行禮衆隨行禮及送燎皇帝出殿左門跪候冠服過從行至大門外王公以下皆跪候過從行三品以下各官鴻臚寺豫引於燎所左右列跪候過冠服祭文送至燎所㳟安於燎牀皇帝詣奠位跪衆皆跪奉爵王大臣進爵皇帝奠爵三每奠一拜興衆隨叩興奉爵大臣灌畢哭止退均如殷奠之儀翼日繹祭遣官行禮陳饌筵十有一羊五酒五尊楮幣三萬不設鹵簿不齊集不讀祝禮部工部内務府光禄寺堂屬官執事餘如儀右初祭諏日行大祭禮前期撰祭文執事諸司供僃至日陳設祭筵内外集序讀文哭奠送燎均如初祭次日繹亦如之右大祭週月陳饌筵二十有一羊九酒九尊具楮幣十萬皇帝喪服哭奠行禮王公百官素服去冠飾隨跪叩傳哭均如初儀朞年以内未葬月有奠祭筵十有一羊五酒五尊餘陳設禮儀均與殷奠同右月奠諏日恭上尊諡制下先期禮部具疏請命總理王大臣内閣九卿暨翰詹科道文六品武四品以上官集議恭擬尊諡廟號進呈欽定工部豫製香册香寳及宣讀絹册絹寳於製造所翰林院撰册文寳文既辦擇良辰恭鐫是日所司豫設案於内閣政事堂中設册寳亭二香亭一於製造所門外内閣大學士學士禮部工部尚書侍郎咸素服集政事堂祗竢工部官奉册寳設亭内鑾儀校舁行至内閣門外亭止有司奉册寳恭設於案退大學士等行三跪九叩禮大學士一人奉冊一人奉寳以授匠人鐫字於潔室恭上尊諡前一日遣官各一人祇告天地太廟奉先殿社稷如常告儀詳吉禮至日五鼓鴻臚寺官豫設册寳案各一於太和門正中南向鑾儀衛官設黄亭二於階下南北肆設法駕鹵簿於殯宫大門之外内務府太常寺官設香案於殿内正中左右設宣讀册寳各一案又左設香册香寳案漏未盡執事官咸入王以下公以上於協和門外集序均素服禮部侍郎二人詣内閣奉宣讀册文寳文於函至太和門階下豫設亭内退大學士二人自閣奉香册香寳於盝至太和門階上恭陳案上跪三叩興退祇竢於丹墀東質明欽天監官報時屆禮部尚書詣乾清門奏請皇帝素服乗輿出宫至太和門北階降輿司拜褥官豫設拜褥於門檻外正中皇帝由太和左門出詣案前立北向閲册寳訖就拜位立行一跪三拜禮興轉立東次西向司拜褥官徹拜褥大學士二人進詣案前跪三叩興奉册寳分設亭内跪三叩興禮部尚書奏禮畢皇帝易喪服豫詣殯宫配殿祇竢鑾儀校恭舁冊亭寳亭以次行禮部官十人前引導以御仗二華葢一奉冊寳大學士暨執事官從王公於所集之位跪候亭過興以次從至殯宫門外公侯伯以下四品官以上皆跪迎黄亭由大門中門入至内門止禮部尚書侍郎二人奉宣讀册文寳文豫陳於殿内左右案大學士二人詣亭前跪三叩興奉香册香寳禮部尚書侍郎恭引由中門中路進殿中門陳於左案跪叩如初退欽天監報時屆禮部尚書詣配殿奏請贊引對引太常寺卿二人恭導皇帝由大門左門入就正中拜位前立鴻臚寺官引王公於階下東西公侯伯以下文武四品官以上於大門外按翼序立典儀贊執事官各共廼職贊引奏就位皇帝就拜位北向立司香奉香合進贊引恭導皇帝詣香案前立司香跪贊引奏跪皇帝跪奏上香司香進香皇帝受香合拱舉仍授司香興三上香奏復位皇帝復位立奏跪拜興皇帝率羣臣行三跪九拜禮興贊引奏跪皇帝跪羣臣皆跪典儀贊進册大學士自東案奉香册跪進於左皇帝受册拱舉授禮部尚書跪接興奉安於案跪三叩興退進寳於右如進册之儀廼宣册宣册官詣案北面跪恭奉絹册宣訖復於案三叩興退宣寳儀同贊引奏跪拜興皇帝率羣臣行三跪九拜禮興廼奠帛讀祝三獻爵如儀禮畢執事官奉祝帛禮部尚書侍郎二人詣册寳案前跪三叩興奉宣讀册文寳文送燎所由中道出皇帝轉立拜位東旁西向竢過復位贊引奏禮成皇帝還宫衆退翼日頒詔天下儀詳吉禮右上尊諡百日陳饌筵二十有五羊九酒十有三尊楮幣十有一萬五千内外集序讀文哭奠如初祭儀右百日祭嵗逢清明中元冬日至嵗除日梓宫在殯均以時致奠皇帝親詣行禮豫日諸司供備屆日陳祭筵羊酒具楮幣内外集序讀文清明不用祭文哭奠冬日至不哭餘均如前儀右時薦諏日行大葬禮前期禮部疏聞豫簡王公大臣相度吉壤工部營治山陵如制内閣撰擬陵名進呈欽定先期禮部㑹内務府疏聞徧布諸司供備廼封陵山遣禮部尚書侍郎致祭太常寺具祝版香帛皇帝御中和殿閲視如儀祭日有司設壇於陵東南承祭官奠獻行禮如告祭五陵山之儀山陵工竣復祭陵山同日並遣官致祭后土司工之神如興工祭儀右封祭廼簡大臣為嚮導總領率嚮導官相視梓宫所出之都門至山陵量地逺近計日分程工部平治道路為行殿於宿次行殿及陵旁均設廬供張畢備前期三日遣官各一人以奉移山陵祇告天地太廟後殿奉先殿社稷均如儀右視途祇告前奉移一日祖奠陳祭筵三十有一羊九酒十有五尊楮幣十有五萬内外集序讀文哭奠如啟奠儀右祖奠屆日五鼓所司陳法駕鹵簿大昇轝於殯宫門外設册寳亭於階下執事官各共乃事治喪儀王大臣率官役豫入殯殿出綴衣黼扆王公百官素服畢集四品以下官豫於都城外集竢王以下三品官以上於門外鹵簿之末左右序立三旗内務府官於大臣班後序立福晉以下二品命婦以上集於大門之内内務府命婦婦人集於門外屆時禮部尚書奏請皇帝喪服詣梓宫前哭祭酒三爵每祭行一拜禮衆傳哭隨叩畢皇太后詣梓宫旁三奠爵皇后率妃嬪暨公主福晉郡主等皆集於殿内哭拜如儀卒奠皇帝退立於左西向皇太后皇后妃嬪以下退立殿後奉册寳官奉香册香寳安於亭内治喪儀王大臣工部鑾儀衛率執事官校尉進小轝恭移梓宫由中門出内外集者各於其次跪哭候過皇帝由殿左門出詣大昇轝之左北向跪候梓宫登轝禮部尚書祭酒三行三叩禮畢皇帝興歩行恭送皇太后皇后以下瞻仰梓宫啟行由閒道詣宿次福晉命婦亦由閒道先行靈駕發册寳亭及騎駕鹵簿前導治喪儀王大臣禮部工部内務府鑾儀衞官屬夾道廵行豹尾班侍衛佩儀刀弓矢侍衞扈從三品以上官按品隨行校尉按班舁轝及更班皇帝率衆跪候凡途中更班皆跪候後同畢廼行梓宫出都門内大臣祭酒三叩凡過門橋皆祭酒後同四品以下官各於其次跪哭候過興皇帝乗輿由閒道豫往宿次候迎王公百官乗馬分班以從靈駕至宿次皇帝恭迎於幔城北門外跪哭王公百官均隨跪哭候過興梓宫奉安於行殿正中藉以氊毯前設供牀案几左右陳册寳陳騎駕鹵簿於門外王公百官接翼按品序立所司進果筵皇帝行晡奠禮祭酒三爵三拜衆隨叩卒奠闔門皇帝退居廬治喪儀王大臣戒所在官軍祇嚴宿衞翼日昩爽皇帝詣行殿朝奠舉哀祭酒衆隨舉哀行禮均如晡奠儀治喪儀王大臣率舁校進靈駕發導引翼衛如前儀皇帝率王公百官跪候過從行里許仍乗輿由閒道詣宿次豫竢羣臣歩從至舁校更班之所乃乗馬皇太后皇后妃嬪瞻仰啟行仍乗輿先詣宿次御道所經百里内守土官素服跪迎於道右舉哀候過赴宿次於網城門外行三跪九叩禮屆奠時於右翼班末隨行禮如儀凡在途之日並同右宿次朝夕奠靈駕将至陵皇帝皇太后皇后妃嬪豫至陵恭竢守陵貝勒公大臣官員於十里外跪迎鑾儀衛陳設鹵簿如儀靈駕至皇帝迎於大門之左跪哭王公百官隨駕先至者均隨跪哭迎從梓宫後行者近陵橋止馬歩從靈駕至享殿門橋南大昇轝止皇帝跪視降轝校尉恭舁梓宫由享殿中門入皇帝由左門入奉安梓宫於享殿正中陳設几筵畢皇帝詣殿内奠酒率羣臣舉哀行禮如儀出還居廬衆退皇太后皇后妃嬪等入享殿右門詣殿内奠拜畢均回行宫是日遣官祗告各陵並后土皇陵山神各如儀翼日遣奠所司陳鹵簿於享殿門外設幕於門内之左置奠案陳祭文於殿檐下陳祭筵二十有五羊七酒十有五尊楮幣九萬往送王公百官及在陵貝勒公大臣官員皆按班集序屆時皇帝由享殿左門入詣殿内哭奠讀文行禮衆隨哭行禮均如祖奠之儀右遣奠諏日奉安𤣥宫前三日遣官各一人祗告天地太廟後殿奉先殿社稷如常告儀工部官豫以織葦為殿於方城門外接方城以木為平臺陳龍輴於葦殿正中設戧橋於方城前及陵門外布木軌於隧道内自方城徑逹𤣥宫寳牀之前先一日皇帝行遷奠禮如遣奠儀卒奠王公百官於隆恩門外按品集序如初福晉以下命婦婦人豫詣方城西旁立竢皇帝於幄次少竢執事王大臣率屬戒辦屆時皇帝詣梓宫前哭祭酒三每祭一拜衆皆哭隨行禮畢皇帝退立於丹陛之左執事者入殿恭奉梓宫降中階循殿東行皇帝跪候過興豫入陵左門梓宫登戧橋由陵中門入至平臺奉安梓宫於寳城前葦殿正中登龍輴北向去幠陳設几筵畢皇帝詣梓宫前哭祭酒三每祭一拜衆皆哭隨行禮乃徹送燎皇帝仍由左門出還居廬右遷奠奉移近𤣥宫奉安日所司慎簡工役執事王大臣祇率供事内外集序如初屆時皇帝詣葦殿内哭祭酒每祭一拜衆皆哭隨行禮畢皇帝出陵門外跪候梓宫御龍輴執事奉輴循􅁤行入於𤣥宫侍衛執鐙前導王大臣隨入敬視永安於寳牀上禮部内務府大臣奉册寳陳於左右石案執事以龍輴及木􅁤出封石門大葬禮成遣官祇告陵山后土之神皇帝哭入陵左門詣祭臺前奠爵行禮衆皆哭隨行禮卒哭皇帝乃出詣幄次右奉安山陵是日恭題神主行虞祭禮所司陳黄輿於隆恩殿丹陛之下設寳座於殿内正中南向前設供案陳設牲牢爼豆又設帛案香案各一陳制帛香盤尊爵鑪鐙具設祭文案於西檐下設題主案於香案之東南北肆司拜褥官豫設皇帝拜位於殿内正中司祝司帛司香司爵以次序立於殿内東西典儀立殿外東階掌燎立於隆恩門外燎所奉櫝大臣豫由東配殿恭奉神主櫝陳於案滿漢大學士各一人朝服入竢禮部尚書詣幄次奏時皇帝御素服加冠飾執事暨陪祀官服同出次贊引對引太常寺卿二人恭導皇帝由隆恩左門入陞東階進殿左門詣拜位北向立鴻臚寺官引陪祀王以下入八分公以上於露臺上序立引文五品武四品以上官於丹墀内序立奉櫝大臣進啟櫝奉神主㳟設於東案大學士二人詣案前行一跪三叩禮興就位恭題神主畢啟櫝大臣恭奉神主跪安於寳座三叩興退廼行虞祭禮上香讀祝三獻爵送燎均如隆恩殿親饗之儀詳見吉禮右題主虞祭祭畢鑾儀衞率官校移設黄輿於露臺上正中南向太常寺卿一人北靣跪奏請神位登輿升祔太廟三叩興退贊引恭導皇帝詣寳座前行一跪三拜禮興恭奉神位贊引對引暨大學士恭導由殿中門出奉安於黄輿三拜興退立於左校尉舁輿導以御仗黄葢内大臣十人大學士四人前引皇帝率王以下各官跪候過隨行神輿出隆恩中門大學士退立左右皇帝由左門出先詣宿次恭竢神輿出龍鳯門内大臣豫詣紅門外祇竢侍衛禮部尚書侍郎率官屬十人進前恭導至紅門外止立内大臣乗馬導行侍衛扈從王公百官序從均乗馬至宿次所司豫張黄幄奉安神位黄輿前設供案陳果品十有二爵三實酒又設香案一於正中前為拜位太常寺卿奏請行夕奠禮恭導皇帝詣香案前上香行三跪九拜禮畢還居廬翼日朝奠親詣上香行禮畢出幄次轉立於左所司徹案校尉舁輿禮部尚書暨太常寺卿恭引至綱城南門外止内大臣侍衛前導後扈如初神輿出皇帝跪候過興仍先詣宿次恭竢王公各官於網城外跪候過隨行御道所經守土官朝服跪迎道右至宿次行謁見禮三跪九叩退在途毎日儀同神輿至都城前一日皇帝還京豫竢遣官恭代夕奠就香案前上香畢退至幄外行禮次日恭代朝奠如之奠畢校尉舁輿出次遣官於西跪候神輿過隨行是日王公百官均朝服從神位還京升祔太廟至大清門王以下文武百官跪候過興神輿至天安門贊引對引恭導皇帝跪迎如儀儀詳吉禮右神位還京朞年小祥皇帝詣陵於寳頂方城前行禮前期翰林院撰擬祭文執事諸司供備部院大臣官員三分之一隨往先一日皇帝謁陵儀詳吉禮禮畢還居廬所司豫張黄幄於明樓前丹陛之上幄内設供牀一設祭文案於階上之西設燎牀於隆恩門外燎所殿東設幕置奠案祭日黎明内監奉冠服篚安設供牀所司陳祭筵三十有一羊九酒十有五尊禮部尚書奉祭文安於西案鴻臚寺官引王公大學士内大臣侍衛於陵門外公侯伯子男以下文武百官於配房前按翼序立均去冠飾素服守陵貝勒公夫人以下命婦及内務府婦女於方城前丹陛下庭西之末集序皇帝喪服乗輿出行宫内大臣侍衛扈從至隆恩門外降輿禮部尚書侍郎恭導皇帝詣幄次少竢屆時禮部尚書侍郎奏請遂前𨗳駕由隆恩左門入陵左門詣明樓前黄幄内拜位立尚茶舉茶案設於階下正中奉茶升階恭獻於案灌畢退尚膳奉湯飯進獻於案掲冪司祝及展祭文官詣祝位跪皇帝跪衆咸跪司祝讀文畢復於案三叩退奉爵大臣進爵皇帝恭奠三爵每奠行一拜禮興衆隨叩興皇帝復位立舉哀衆隨舉哀乃徹鴻臚寺豫引百官於燎所東西稍遠立司祝奉祭文禮部尚書侍郎前引送至燎所避立東旁竢内監奉冠服篚出内監四人前引皇帝跪候過隨行出陵中門内大臣十人恭導侍衞扈從王以下跪候過隨行百官均跪候過至燎所皇帝詣奠酒位跪衆皆跪奉爵大臣進爵皇帝奠酒三爵拜如初興舉哀衆隨叩興舉哀奉爵大臣灌畢哀止皇帝仍由左門出還居廬衆各退遣官致祭去冠飾素服出入自右門立於丹陛西旁燎位奠酒禮部官進爵餘均如前儀如朞年山陵未竣梓宫猶在殯宫祭日陳設禮儀内外集序均如初祭再朞大祥皇帝詣陵致祭或遣官行禮所司陳祭筵羊酒讀文集序舉哀均如初朞儀三年既周致祭儀同自後逢忌辰致祭詳陵寝儀右朞年致祭中月而禫皇帝詣陵致祭前期翰林院撰擬祭文執事諸司供備部院大臣各官以其半隨往所司陳祭筵羊酒如百日致奠之數内外集序皇帝喪服率羣臣舉哀讀文致祭奠酒行禮均如朞年祭儀是日週二十七月皇帝皇后均除服羣臣皆即吉右終喪除服欽定大清通禮卷四十五
