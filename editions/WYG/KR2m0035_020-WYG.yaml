front:
  text: 欽定四庫全書欽定大清通禮卷十四吉禮
  hash: sha256:1c02a88374aadcb9a993f73be041e2485846a161aa17a4693699aed3d55ffd0c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0035_WYG_020-1a, image: WYG0655/WYG0655-0225a.png}
body:
  text: 祭都城隍神之禮每嵗萬壽聖節遣官一人將事是日廟祝潔掃廟宇内外太常寺具祝版備器陳牛一羊一豕一果實五盤鑪一鐙二設案一於殿中少西北向供祝版設案一於殿東西向陳禮神制帛一色白香盤一尊一爵三設洗於東階下和聲署設樂於西階上器數見祀眞武禮承祭官拜位在階上正中太常寺司祝司香司帛司爵分立祝案尊案之次典儀立殿外東檐下掌燎率燎人立燎鑪之前均如常儀黎明承祭官朝服詣廟贊引太常寺贊禮郎二人引承祭官由左側門入贊盥洗承祭官盥手畢升東階至拜位前北面立典儀贊執事官各共廼職贊禮郎贊就位承祭官就位立典儀贊迎神樂作辭曰佳麗皇都勝保障神力宏萬方輻輳尨夜不驚正直聰明癉彰如影荷靈貺篤其慶固金甌䕶玉京贊禮郎贊就上香位引承祭官入殿中門至香鑪前立贊上香司香跪奉香承祭官上炷香三上瓣香畢贊復位承祭官復位立贊跪叩興承祭官行三跪九叩禮興典儀贊奠帛爵行初獻禮司帛跪獻篚於案三叩興司爵立獻爵於正中皆退司祝詣祝案前三叩興奉祝版跪案左樂暫止典儀贊讀祝贊禮郎贊跪承祭官跪司祝讀祝辭曰維某年月日皇帝遣某官某致祭於都城隍之神曰兹朕誕辰惟神永垂䕶佑謹以牲醴致祭尚饗讀畢興奉祝版跪安於篚内叩如初興退樂作贊禮郎贊叩興承祭官行三叩禮興典儀贊行亞獻禮司爵奉爵獻於左儀如初獻退典儀贊行終獻禮司爵奉爵獻於右如亞獻儀退典儀贊送神贊禮郎贊跪叩興承祭官行三跪九叩禮興典儀贊奉祝帛送燎司祝司帛詣神位前咸跪三叩奉祝帛興司香跪奉香興以次送至燎所承祭官避立拜位西竢祝帛過復位立典儀贊望燎贊禮郎引承祭官詣望燎位視燎贊禮畢引承祭官仍由東側門出樂止各退嵗秋諏吉遣官致祭神位前陳鉶二簠二簋二籩十豆十餘牲帛尊爵鑪鐙同前送神時典儀贊徹饌有司乃徹餘均如前儀祝辭曰維某年月日皇帝遣某官某致祭於都城隍之神曰惟神正直實贊靈化捍禦之功都邑所頼祇嚴嵗祀用答神庥尚其歆兹永福黎庶尚饗右祭都城隍廟祭東嶽神之禮每嵗萬壽聖節遣官一人將事是日廟祝潔掃廟宇内外太常寺官具祝版備器陳牛一羊一豕一果實五盤鑪一鐙二殿中少西設案供祝版東設一案陳禮神制帛一色青香盤一尊一爵三和聲署設樂於西階上太常寺設洗於東階下少南承祭官拜位在階上正中司祝司香司帛司爵典儀掌燎各以其職為位承祭官朝服行禮迎神上香初獻讀祝亞獻三獻送神望燎儀均與祭都城隍廟同祝辭曰維某年月日皇帝遣某官某致祭於東嶽泰山之神曰兹朕誕辰惟神永逺黙佑謹以牲醴庶品之儀致祭尚饗樂辭曰維嶽崧高五泰岱常祀殊累朝玉檢柴望始虞木德條風吹萬畢煦宅東㝢以生物仰天齊鑒有孚右祭東嶽祭黑龍潭神之禮嵗春秋諏吉遣官一人將事是日太常寺具祝版備器陳羊一豕一簠簋各二籩豆各十鑪鐙具殿中少南設案供祝版北設一案陳禮神制帛一色白香盤一尊一爵三和聲署設樂於南階上太常寺設洗於東階下之北承祭官拜位在階上正中司祝司香司帛司爵典儀掌燎各以其職為位承祭官朝服行禮迎神上香初獻讀祝亞獻三獻徹饌送神望燎儀均與秋祭都城隍廟同祝辭曰維某年月日皇帝遣某官某致祭於昭靈沛澤龍王之神曰惟神德潤生民膏流甸服雨暘時若夙彰孚應之靈年榖順成溥被盈寜之福念神庥之丕著惟典祀之宜崇兹値仲春秋用申報饗尚其歆格鑒此精誠尚饗樂辭曰興雨祁祁應歴嵗恩屢覃湫幽神御農扈具瞻寸合崇朝十千有渰黍膏溥矣麥湛賽神庥以作甘右祭黑龍潭龍神玉泉山龍神祠嵗以春秋仲月與黑龍潭廟同日致祭遣官一人將事太常寺官設祝案於殿中少西供祝版東設一案陳香帛尊爵設洗於東階之南和聲署設樂於西階上餘供牲牢品物遣官行禮儀節及所用樂辭均與祭黑龍潭龍神同祝辭曰維某年月日皇帝遣某官某致祭於惠濟慈佑龍王之神曰惟神潤下流膏應時澤物珠泉湧地毓靈脈於山林玉液成川暢清流於畿甸滋畇畇之繡壤允資灌注之功通翼翼之漕艘長助輓輸之利聿昭靈貺宜奉明禋兹値仲春秋用申報饗尚其歆格鑒此精誠尚饗右祭玉泉山龍神祭后土神司工神之禮凡大興作諏吉遣官各一人將事豫日工部官於營建所在因其方設左右二壇以織葦為殿圖繪結綵祭日五鼓太常寺官具祝版祝文翰林院隨事撰擬設神案各一於壇内正中以黄紙書后土之神司工之神皆為位供案上各陳羊一豕一餅餌十有五盤果實五盤鑪鐙具設祝案於中少右供祝版左設一案陳帛一色白香盤一尊一爵三和聲署設樂太常寺設洗如式司祝司帛司香司爵典儀掌燎各以其職為位承祭官拜位在壇内香案前正中贊禮郎引承祭官朝服行禮迎神上香初獻讀祝亞獻三獻送神望燎均與祭都城隍廟同樂辭曰仰眺銀河上閣道如駕梁儼神宅只愉矣穆將揆日鳴櫜繄神斯掌奠椒酒以禋享荷神庥澤未央右祭后土司工迎吻祭窑神門神之禮各遣官一人將事豫日工部官設壇於琉璃窑及迎吻所經之門以織葦為殿圗繪結綵祭日五鼓和聲署設樂於各壇前設導迎樂於窑門外太常寺官具祝版祝文翰林院隨事撰擬設神位陳羊豕餅餌果實香帛尊爵鑪鐙設洗與祭司工儀同承祭官暨禮部太常寺有職事工部内務府管工各官咸朝服簪花披紅乃陳吻於窑前和聲署樂作辭曰和氣嘉祥應聖日華耀明仰方泰紫俯奠泰寧繚廓紘瀛此惟表正食神德蒙神慶享明禋億萬齡琉璃窑及各門辭同太常寺贊禮郎引琉璃窑承祭官詣窑神位前行禮引各門承祭官詣門神位前行禮均與祭司工儀同祭畢導迎樂作辭曰皇作宫殿因地順天如竹苞矣美哉輪奐鳥翼飛松桷梴芋且寜居萬年鑾儀衛校舁吻禮部太常寺官前導承祭官從所經諸門承祭官迎於門前及工所管工官列班恭迎以入俟安吻事竢各退右迎吻祭窑神門神嵗春秋諏吉祭司倉神之禮通州祭於大西倉倉場侍郎主祭各監督陪祀京倉左翼於海運右翼於興平朝陽門外於儲濟各以本倉監督主之各監督分行陪祀祀用羊一豕一果實十盤壺爵鑪鐙具主祭官朝服質明將事率陪祀官行二跪六叩禮上香三獻爵燎楮帛如儀退右祭倉神欽定大清通禮卷十四
