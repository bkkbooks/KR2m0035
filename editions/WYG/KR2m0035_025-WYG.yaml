body:
  text: 欽定四庫全書欽定大清通禮卷十九嘉禮皇帝登極之禮既諏吉諸司下所屬供備王公大學士率文武百官前期進表内閣先一日遣官各一人祗告天地太廟社稷各朝服將事如常儀禮畢出易服退右祗告是日五鼓歩軍統領勒所部屯禁城諸門所司入太和殿鋪陳御座南正中設一案東西肆前楹之東設二案西設一案皆南北肆又中設一案於丹陛上設黄繖雲盤於丹墀鑾儀衛率官校入備鑾輿陳法駕鹵簿樂部率和聲署入展樂如儀詳見三大節夜漏未盡禮部尚書奉表入陳東楹南案内閣中書奉筆硯入陳西案内閣學士一人奉詔書入陳東楹北案大學士率學士詣乾清門請皇帝之寳學士恭奉大學士從入殿内恭設於中案退記注侍班執事各官王公百官班位如常儀詳見三大節右陳設序位質明王公文武百官畢㑹午門闕下朝服序入均如常儀皇帝詣几筵前行祇告受命禮出更禮服詣皇太后宫皇太后禮服陞座皇帝行禮畢禮部尚書侍郎二人率欽天監候時官奏時午門鳴鐘鼓皇帝由乾清門左門出乘輿禮部尚書侍郎恭導内大臣十人前引二人後扈豹尾班執槍侍衛十人佩刀侍衛十人翊衛随行由保和殿御中和殿座鴻臚寺官引侍班導從各官按班行禮儀見三大節畢侍班官先趨出外朝就位禮部尚書進至檐前奏請即皇帝位駕興導引翊衛如初御太和殿陞寳座南面卽皇帝位鑾儀衛官三傳鳴鞭丹墀内三鳴鞭鴻臚寺卿引王公於丹陛上鳴贊引文武百官於丹墀内就拜位北面立贊進皆進贊跪皆跪贊叩興王以下文武百官行三跪九叩禮興鴻臚寺官引退復位立大學士進殿左門就東案奉詔陳於中案少退西面立内閣學士進就中案北面用寳訖退禮部尚書進至檐下大學士奉詔由闑東出殿中門授禮部尚書禮部尚書跪受興奉至丹陛案前北面恭設於案行一跪三叩禮興復奉降中階至丹墀陳於雲盤禮部儀制司官一人跪受興十人前導由中道出頒布天下頒詔詳儀皇帝降座至殿後階乘輿入殿左門至乾清門左門外降輿入還側殿易服大學士率學士奉皇帝之寳送乾清門各退是日表陳而不宣宫懸大樂皆設而不作餘儀與三大節同右百官朝見欽定大清通禮卷十九
