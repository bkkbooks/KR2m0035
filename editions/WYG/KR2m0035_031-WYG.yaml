front:
  text: 欽定四庫全書欽定大清通禮卷二十五嘉禮册立皇后之禮制下禮部尚書一人赴内閣承制乃諏吉以聞徧布諸司供備豫期禮部工部官㑹製册寳於内務府恭送内閣鐫册文寳文内閣大學士學士禮部工部尚書侍郎朝服行禮
  hash: sha256:fac9e8e2a076a338cc78d9ec062cc8d636cc41638a1715129e9817b82cd9061b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0035_WYG_031-1a, image: WYG0655/WYG0655-0320c.png}
body:
  text: 如儀尊崇詳禮右諏日具册寳屆期禮部奏請命大學士充册立使尚書充副使右命使前一日遣官各一人祇告天地太廟後殿奉先殿如常儀右祇告至日五鼓所司詣太和殿中設一案東西肆左右各設一案均南北肆設龍亭二於内閣門外鑾儀衞陳法駕鹵簿仗馬歩輦五輅馴象鼓吹常朝象樂部和聲署陳樂懸各依常次王公文武百官記注糾儀執事各官朝服陪位如常儀漏未盡工部官以節送内閣内閣禮部官自内閣奉金册金寳及宣讀册文寳文各陳於亭内禮部侍郎奉節鑾儀校舁亭禮部官十人前引導以繖仗由中路降升至太和殿階下亭止導引官皆止内閣禮部官奉金册金寳隨節升中階入殿中門陳節中案陳册左案陳寳右案退鑾儀校廻亭南向質明册使副使祇竢於丹墀東鹵簿之南大學士一人立殿東檐下西面宣制鴻臚寺官一人立大學士後舉册寳案内閣禮部官分立東西檐下東西面均朝服欽天監官報吉時已屆禮部尚書侍郎詣乾清門奏時遂前導駕皇帝禮服乘輿出宫前引後扈如常儀午門鳴鐘鼓至太和殿後階降輿入工舉麾鼓柷中和韶樂作奏隆平之章樂辭見常朝儀後仿此皇帝陞座工偃麾戛敔樂止中和韶樂以舉麾鼓柷作偃麾戛敔止後同鑾儀衞官贊鳴鞭丹墀内三鳴鞭戲竹交丹陛樂作止皆以戲竹交為節丹陛大樂作奏慶平之章鴻臚寺鳴贊官贊齊班序班引正副使就丹墀東班拜位立北面西上贊進少進贊跪叩興行三跪九叩禮興樂止序班引正副使升東階至丹陛北面立鳴贊官贊有制正副使跪宣制官進至殿中門之左宣制曰某年月日册立某妃某氏為皇后命卿等持節行禮如奉皇太后懿㫖則曰欽奉皇太后懿㫖宣畢大學士進殿左門詣中案奉節由中門闑左出至丹陛以節授正使正使受節偕副使興内閣禮部官進殿左右門舉册寳案出中門正使持節前行副使從以次降中階内閣禮部官奉册寳設龍亭内鑾儀校舁行導引如初由太和門出皇帝賜王公大臣茶如常儀畢皇帝降座鳴鞭如初中和韶樂作奏顯平之章皇帝還宫樂止王公百官咸退右臨軒遣使是日内鑾儀衞陳儀駕鹵簿於皇后宫階下及宫門外詳見三大節儀内監設丹陛樂於宫門内設節案一於宫内正中南為香案均東西肆設册寳案於東西各一均南北肆設皇后拜位於香案前北向女官四人立拜位左右東西面宣讀女官二人立東案之南西面宫殿監率内鑾儀校豫候於景運門册使既受命出由協和門至景運門外西面立正使奉節授内監内監持節内鑾儀校接舁册寳亭至皇后宫門外亭止内監奉册寳詣皇后宫皇后具禮服出内宫丹陛樂作贊引女官二人引皇后迎於宫門内道右候過随行入宫内監奉節陳於中案奉金册册文金寳寳文陳於東案退贊引女官引皇后就拜位北向立樂止贊跪皇后跪贊宣册宣册女官就案奉宣讀册文西面立宣畢授侍右女官女官跪接贊受册女官以册奉皇后皇后受册授侍左女官女官跪接奉以興陳於西案次宣寳受寳亦如之樂作皇后行六肅三跪三拜禮畢少退東向立樂止内監進至中案奉節出贊引女官引皇后送於宫門内道右候過還宫内監奉節至景運門授册使正使持節副使從詣後左門復命册立禮成還節有司各退右受册翼日皇帝率羣臣詣皇太后宫行禮乃御太和殿受賀如三大節之儀頒詔宣示天下頒詔詳儀皇后詣皇太后宫行禮詣皇帝前行禮妃嬪公主福晉命婦詣皇后宫行禮均如三大節儀右禮成朝賀欽定大清通禮卷二十五
