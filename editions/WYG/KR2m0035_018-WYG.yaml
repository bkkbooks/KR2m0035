body:
  text: 欽定四庫全書欽定大清通禮卷十二吉禮天神孟夏常雩後嵗間不雨廼祇告天神壇以祈甘雨祈而應則報祀雨潦祈晴冬旱祈雪亦如之祈吿之禮有司豫日諏吉遣官一人將事文武官應陪祀者咸與祈禱同日祗告各以地祇太嵗二壇參之一分祈前期各於邸第致齋一日太常寺具祝文翰林院隨時撰擬備脯醢果實潔壇壝内外如告各壇廟之儀右諏日致齋供具祀日五鼓太常寺卿率屬入壇設雲師雨師風伯雷師凡四案於壇正中南向每案陳鹿脯鹿醢免醢棗榛蔔萄桃實蓮實其前各設香案皆鑪一鐙二設案一於南少西供祝版又東設一案陳禮神制帛四色青一黑一黄一白一香盤四尊四虛爵十有二凡帛異篚尊實酒承以舟疏布冪勺具設洗於階下之東設燎鑪於内壝南左門外樂部率太常協律郎入設樂懸於階下之南編鐘在東柷從編磬在西敔從東應鼓一麾一琴瑟笙簫篴塤箎搏拊之屬東西分比陳樂舞於樂懸之次均北面如式以次序祀官及執事官位承祭官位南階下正中陪祀官位内壝南門外東西各五班重行異等東位西上西位東上均北面太常寺司祝一人立祝案西東面司香四人司帛四人司爵四人立尊案東西面典儀一人立東階下西面司樂協律郎樂工歌工舞佾依懸序立如常位糾儀御史二人禮部祠祭司官二人分立階上左右又御史二人禮部祠祭司官二人鴻臚寺官二人分立陪祀官拜位左右均東西面掌燎官率燎人立燎鑪之東南隅右陳設序位漏未盡承祭官暨陪祀執事各官咸素服詣壇祇竢贊引太常寺贊禮郎二人豫竢於門質明太常寺卿詣神庫上香行禮太常寺官屬詣各神位前跪三叩興奉請入壇恭設石座内雲師左雨師右風伯次左雷師次右安訖跪叩如初退贊禮郎引承祭官自外壝南左門入内壝南左門贊盥洗承祭官盥手如儀引詣階下鴻臚寺序班引陪祀官至内壝南門外典儀贊樂舞生登歌執事官各共廼職武舞執干戚進贊禮郎贊就位承祭官暨陪祀官咸就拜位立典儀贊迎神司香奉香進至案前祇竢司樂贊舉迎神樂奏祈豐之章辭曰雲車馳兮風斾征雷闐闐兮雨􅁳㝠表六合兮穹青横大川兮揚靈紛總總兮來會穆予心兮齋明協律郎舉麾工鼓柷樂作贊禮郎贊升壇引承祭官升東階詣雲師香案前立贊跪承祭官跪贊上香司香跪奉香承祭官上炷香三上瓣香興次詣雨師風伯雷師案前上香畢贊復位引承祭官降階復位贊跪叩興承祭官暨陪祀官三跪九叩興協律郎偃麾工戛敔樂止凡樂以舉麾鼓祝作以偃麾戛敔止後同右盥洗就位迎神典儀贊奠帛爵行初獻禮司樂贊舉初獻樂奏華豐之章辭曰束帛戔戔兮筐篚將昭誠素兮鬯馨香瘼此下民兮侯有望神垂鴻祐兮未渠央有司揭尊冪勺挹酒實爵樂作司樂舉節舞干戚之舞凡舞以節領之導引進退後同司帛奉篚進至各案前跪獻於案三叩興司爵奉爵詣各案北跪奠於墊中皆退司祝詣祝案前跪三叩興奉祝版跪案左樂暫止贊禮郎贊跪承祭官暨陪祀官皆跪典儀贊讀祝司祝讀祝訖興以祝版跪安於篚内三叩興退樂作贊禮郎贊叩興承祭官暨陪祀官行三叩禮興樂止武功之舞退文舞執羽籥進典儀贊行亞獻禮司樂贊舉亞獻樂奏興豐之章辭曰疏冪兮再啟芳齊兮載陳惠邀兮神貺福我兮民人樂作舞羽籥之舞司爵奉爵各奠於左如初獻儀獻畢樂止典儀贊行終獻禮司樂贊舉終獻樂奏儀豐之章辭曰犠尊兮三滌㫖酒兮思柔誠無斁兮嘉薦神燕娭兮降休樂作舞同亞獻司爵奉爵各奠於右如亞獻儀獻畢樂止文德之舞退右三獻典儀贊徹饌司樂贊舉徹饌樂奏和豐之章辭曰禮既成兮孔殷潔明粢兮苾芬廢徹兮不遲至敬兮無文樂作有司徹畢樂止典儀贊送神司樂贊舉送神樂奏錫豐之章辭曰流形兮露生苞符兮孕靈介我稷黍兮曰雨而雨神之格思兮祀事孔明樂作贊禮郎贊跪叩興承祭官暨陪祀官均行三跪九叩禮興樂止典儀贊奉祝帛送燎司祝跪奉祝司帛跪奉篚三叩興司香跪奉香興以次恭送燎所承祭官避立拜位東竢過復位典儀贊望燎贊禮郎引詣望燎位鴻臚寺引陪祀官退贊禮郎引承祭官出壝南左門望燎禮畢仍由壇南左門出退太常寺卿恭請神位還御如奉請儀右送神燎祝帛報祀天神之禮諏日致齋具祝文翰林院隨時撰擬潔壇壝如初先一日割牲御史禮部祠祭司官光祿寺大官署正朝服眂宰宰人瘞毛血如各壇廟常祀儀右眂割牲祀日五鼓太常寺卿率屬入壇具器陳牛一羊一豕一每案登一鉶一簠二簋二籩十豆十鑪一鐙二樂部率太常協律郎入陳設樂懸及樂舞於階下之南東西分列各依其次如式祝帛香尊爵陳設祀官及執事官立位均與祇告禮同右展牲器陳設畢太常寺博士引禮部侍郎一人升壇省眂牲牢齍盛如各壇廟常祀儀右省齍質明太常寺官恭請雲雨風雷神位入壇奉安石座内承祭官暨陪祀執事各官朝服就位迎神初獻讀祝亞獻三獻徹送神視燎行禮儀節及樂章樂舞均與祇告禮同右報祀地祇嵗孟夏常雩後如以祈雨祈晴祗告天神同日並告地祇其報亦如之祗告之禮遣官將事暨文武官咸與祈禱前期致齋太常寺具祝文備器陳潔壇壝内外如祀天神之儀右致齋供具祭日五鼓太常寺卿率屬入壇設五嶽五鎭五陵山四海四瀆凡五案於壇中北向設京畿名山大川天下名山大川凡二案於壇左右東西向每案薦脯醢果實分陳爵六十實酒其前各設香案皆鑪一鐙二中設一案少西供祝版東設一案陳禮神制帛十有六五嶽五鎭皆青赤黄白黑各一四海青赤白黑各一京畿名山大川白一黑一香盤四尊四虛爵十有二西設一案陳禮神制帛十有一五陵山各白一四瀆各黑一天下名山大川白一黑一香盤三尊三虛爵九凡帛每案同篚凡尊實酒疏布冪勺具設洗於階下之西為瘞坎於内壝北右門外樂部率太常協律郎入設樂懸於階下之北編鐘在西柷從編磬在東敔從西應鼓一麾一琴瑟笙簫篴塤箎搏拊之屬東西分比陳樂舞於樂懸之次均南向如式以次序祀官及執事官位承祭官位北階下正中陪祀官位内壝北門外東西各五班均南面太常寺司祝一人立祝案西東面司香四人司帛四人司爵四人立東案東司香三人司帛三人司爵三人立西案西典儀一人立西階下東面司樂協律郎樂工歌工舞佾依懸序立如常位糾儀御史禮部祠祭司官各四人鴻臚寺官二人分立承祭官陪祀官拜位左右掌瘞官率瘞人立瘞坎之西北隅右陳設序位漏未盡承祭官暨陪祀執事各官咸素服詣壇祇竢贊引太常寺贊禮郎二人豫竢於門質明太常寺卿詣神庫上香行禮太常寺官屬詣各神位前跪三叩興奉請入壇恭設石座内五嶽居中五鎭右五陵山左四海次右四瀆次左均北向京畿名山居東京畿大川次東均西向天下名山居西天下大川次西均東向安訖跪叩如初退贊禮郎引承祭官自外壝南右門入循壝東入内壝北右門贊盥洗承祭官盥手引詣階下鴻臚寺序班引陪祀官至内壝北門外典儀贊樂舞生登歌執事官各共廼職武舞執干戚進贊禮郎贊就位承祭官暨陪祀官咸就拜位立典儀贊迎神司香奉香以次進至案前祇竢司樂贊舉迎神樂奏祈豐之章天神樂辭詳見壇後仿此協律郎舉麾工鼓柷樂作贊禮郎贊升壇引承祭官升東階詣五嶽香案前立贊跪承祭官跪贊上香司香跪奉香承祭官上炷香三上瓣香興次詣五鎭五陵山四海四瀆京畿名山大川天下名山大川案前上香畢贊復位引承祭官降階復位贊跪叩興承祭官暨陪祀官三跪九叩興協律郎偃麾工戞敔樂止凡樂以舉麾鼓柷作以偃麾戞敔止後同右盥洗就位迎神典儀贊奠帛爵行初獻禮司樂贊舉初獻樂奏華豐之章有司揭尊冪勺挹酒實爵樂作司樂舉節舞干戚之舞凡舞以節領之導引進退後同司帛奉篚進至各案前跪獻於案三叩興司爵奉爵詣各案南跪奠於墊中皆退司祝詣祝案前跪三叩興奉祝版跪案左贊禮郎贊跪承祭官暨陪祀官皆跪典儀贊讀祝司祝讀祝訖興以祝版跪安於正中篚内叩如初興退樂作贊禮郎贊叩興承祭官暨陪祀官行三叩禮興樂止武功之舞退文舞執羽籥進典儀贊行亞獻禮司樂贊舉亞獻樂奏興豐之章樂作舞羽籥之舞司爵奉爵各奠於左如初獻儀獻畢樂止典儀贊行終獻禮司樂贊舉終獻樂奏儀豐之章樂作舞同亞獻司爵奉爵各奠於右如亞獻儀獻畢樂止文德之舞退右三獻典儀贊徹饌司樂贊舉徹饌樂奏和豐之章樂作有司徹畢樂止典儀贊送神司樂贊舉送神樂奏錫豐之章樂作贊禮郎贊跪叩興承祭官暨陪祀官均行三跪九叩禮興樂止典儀贊奉祝帛送瘞司祝跪奉祝司帛跪奉篚三叩興司香跪奉香興以次恭送瘞所承祭官避立拜位西竢過復位典儀贊望瘞贊禮郎贊詣望瘞位鴻臚寺引陪祀官退贊禮郎引承祭官出壝北右門望瘞禮畢仍由壇南右門出退太常寺卿屬恭請神位還御如儀右送神瘞祝帛報祭之禮致齋具祝文備器陳潔壇壝如初先一日割牲有司眂宰如祀天神之儀右眂割牲祭日五鼓太常寺卿率屬入壇設案如初每案陳豋鉶簠簋籩豆鑪鐙之數共牛羊豕各一與天神壇同樂部率太常協律郎陳設樂懸樂舞各依常次如式祝帛香尊爵陳設祀官及執事官立位均與祇告禮同右展牲器陳設畢禮部侍郎一人升壇省眂牲牢齍盛如報祀天神之儀右省齍質明太常寺官恭請嶽鎭海瀆山川神位入壇奉安石座内承祭官暨陪祀執事各官朝服就位迎神初獻讀祝亞獻三獻徹送神望瘞行禮儀節及樂章樂舞均與天神壇報祀禮同右報祭直省府州縣各建神祇壇祀雲雨風雷境内山川城隍之神嵗春秋仲月諏吉致祭在城文武各官皆與省會以總督若廵撫主之若有故以布政使攝致祭之禮設案一於壇正中南向雲雨風雷神位居中境内山川神位左城隍神位右案陳鉶一簠二簋二籩豆各四案前設俎陳羊一豕一又前設香案一陳祝文香盤鑪鐙西設一案陳帛七尊一爵二十有一福酒胙肉陳於尊俎之次祭祀儀節祀官及執事官序位並如社稷壇儀祭日有司供具執事人豫入序立引班引陪祭官入引贊引主祭官入通贊贊執事者各司其事贊就位引主祭官至階下盥手就拜位立陪祭官按班就東西拜位立均北面迎神上香讀祝行三獻禮祝辭曰維某年月日某官某致祭於雲雨風雷山川城隍之神曰惟神贊襄天澤福佑蒼黎佐靈化以流形生成永頼乘氣機而鼓盪溫肅攸宜磅礴高深長保安貞之吉慿依鞏固實資捍禦之功幸民俗之殷盈仰神明之庇䕶恭修嵗祀正値良辰敬潔豆籩祇陳牲幣尚饗餘儀節與祭社稷同嵗孟夏後諏吉雩祭陳設儀注同前若間不雨及潦諏宜祀之辰具祝文隨時撰擬備牲牢籩豆香帛尊爵鑪鐙守土大吏率屬素服䖍禱為民請命行禮儀節與常祀同既應而報陳設供具朝服行報祀禮儀節均與祈祀同其各府州縣嵗春秋諏吉致祭神祇壇主祭官陪祭官暨各執事並同社稷牲帛祝號陳設器數及行禮儀節與省會同雩若祈若報並如省會之禮右直省神祇祈報嶽鎭海瀆皇帝時廵省方必禮其方嶽若鎭凡方嶽特行親祭盛典凡鎭均遣官致祭親祭方嶽之禮有司諏吉豫期守土官潔埽廟宇内外先一日皇帝乃齋扈從王公百官地方文武官應與祭者畢齋行在太常寺凡祭祀皆贊行在有司襄具祝文翰林院隨時撰擬内閣舍人恭書如祭帝王陵寢之儀右具祝版眂割牲帝王儀與祭陵寢同祭之前夕守土官各因其方為瘞坎於廟門之外工部官張黄幄於廟㦸門内之左鑾儀衛官設洗於幄次夜分太常寺卿屬率守土官入