body:
  text: 欽定四庫全書欽定大清通禮卷二十一嘉禮尊封皇祖妃嬪皇考妃嬪之禮制下禮部諏吉以聞豫期製寳工部製册寳皇貴太妃太妃冊貴太妃太嬪冊印册均送内閣鐫文行禮如儀尊崇詳見儀右諏日具册寳屆期前一日遣官各一人祇告太廟後殿奉先殿如常儀右祇告至日内監設仗均儀皇貴太妃妃以貴太妃仗太下采仗於太妃太嬪宫門外接册寳内監竢於門左右鑾儀衛備采亭於内閣門外五鼓禮部尚書一人朝服詣内閣内閣禮部官奉册寳印於亭内鑾儀校舁行册亭前寳印亭後導以繖仗禮部司官十人前引大學士一人暨禮部尚書後隨恭送至太妃太嬪宫門外授内監内監奉册寳印入獻太妃太嬪内監出告禮成大學士尚書各退右遣官尊封若尊加太妃封號皇帝親詣行禮内監設太妃座於宫内稍東西南向如同日並封妃座皇貴太妃貴太西南東南向僉設旁設太妃座東西禮部鴻臚寺官設案於宫門正中東西肆又設案於門東南北肆武備院官設皇帝拜位於中案前北向辨執事官位奉册寳大學士二人同日並封奉冊寳兼用内閣學士位東案之東西面宣讀官二人同日並封各用宣讀官一人位西檐下侍儀御史二人禮部官二人位西階下均東面鴻臚寺鳴贊二人位東西柱前東西面漏未盡鑾儀衛陳法駕鹵簿於太和殿前如常儀設采亭於内閣門外禮部侍郎内閣學士奉金册金寳及宣讀册文寳印文於亭内鑾儀校舁行禮部官前引如儀由中路降升至太和殿内册亭左肆寳印亭右肆稍僉向如同日並封依位次為左右僉設旁設各從其宜皆冊亭在上亭在寳印下禮部尚書侍郎詣乾清門奏時皇帝禮服乘輿出宫前引後扈如常儀至太和殿北階降輿御殿閱册寳印畢鑾儀校舁亭出皇帝乘輿導引扈衛如初詣太妃宫至宫門階下亭止禮部侍郎内閣學士奉金册金寳由中階升設於中案退大學士二人奉宣讀册文寳印文升中階設於東案就立案東執事官咸入侍立駕至宫門中階下降輿禮部尚書侍郎恭導以下行禮皆恭導陞中階立於門左西向内監轉啟太妃太妃禮服出陞座皇帝就正中拜位北向立大學士進至中案左鳴贊奏進册大學士跪進册文皇帝立受拱舉仍授大學士大學士興陳於中案贊進寳印亦如之大學士皆退自東階降鳴贊贊宣册宣讀官北面跪啟函奉冊宣讀訖納於函贊宣寳印儀同興皆退自西階降内監舉册寳印案進設太妃座前退鳴贊奏跪拜興皇帝行二跪六拜禮太妃起避立座旁太妃降座還内宫禮部尚書奏禮成皇帝降中階乘輿還宫執事官皆退右親進册寳欽定大清通禮巻二十一
