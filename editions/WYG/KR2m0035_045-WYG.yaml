front:
  text: 欽定四庫全書欽定大清通禮卷三十九軍禮
  hash: sha256:02ee249e8bf8c28f0f8173a5a652bdd176cf5964438128a70d99a1b536d9f1cc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0035_WYG_045-1a, image: WYG0655/WYG0655-0402a.png}
body:
  text: 周官九伐之法蒐狩之政掌之司馬而宗伯之職大師大田必備其禮國家承平百有餘年内整六師外攘四夷武功戎備超軼千古爰輯治兵振旅師征受成諸容節著為軍禮若夫古者救日月以太僕贊鼓實夏官之屬故杜佑通典綴之軍禮今仍其義附於篇皇帝大閱之禮閒三嵗兵部奏請舉行得㫖疏上王公大臣名欽命六人總理大閱軍事徧飭八旗火器前鋒䕶軍驍騎諸營各修整戎器甲胄金鼓旗纛之屬移欽天監諏閱武吉日以聞乃下所司戒備如式右簡帥戒辦諏吉前期二月八旗佐領各出弁卒為大閱之衆命八旗都統副都統前鋒統領䕶軍統領各勒所部練兵於演武塲教士衆習旌旗指麾金鼓螺角作止之節知行陣險夷坐起進退之法持五兵之便戰鬭之備嚴眀紀律罔敢不欽前一月有司豫擇大閱之所除地為場總理閱兵王公大臣㑹集統軍将帥率弁卒擐甲合操於内申令如前儀右訓練前二日有司豫於行宫供張武備院卿率官校赴大閱處列御營張幄殿設御座於正中張圓幄於殿後設御用甲胄弓矢於幄内櫜鞬具八旗将校甲兵並赴大閱處依式布歩騎軍營左翼鑲黄正白鑲白正藍四旗在東右翼正黄正紅鑲紅鑲藍四旗在西其前各列漢軍火器營四滿洲火器營四次前鋒營一次䕶軍營驍騎營相閒各四毎營横二十有四丈縱四十丈前後相隔各一丈翼日總理閱兵王公大臣督諸軍各宿軍幕禁止讙譁依分建纛金鼓甲仗威儀悉備右立軍幕前一日鑾儀衛陳大駕鹵簿歩軍統領勒所部辟除御道左右皇帝乘輿出宫幸行宫導從大臣侍衛前後扈從王公百官接駕送駕如儀南郊儀詳吉禮右鑾駕幸行宫屆日五鼓鑾儀衛陳騎駕鹵簿樂部陳鐃歌樂於行宫門外乃饗軍士食命王大臣率内務府官監視之既畢饗諸軍皆貫甲出營列陣列陣之制去陣前百四十有七丈建大纛以為軍表左翼鑲黄正白鑲白正藍以次而東西上右翼正黄正紅鑲紅鑲藍以次而西東上陣内諸軍各按旗依表為隊最前為漢軍火器營滿洲䕶軍火器營驍騎火器營並列而各别其隊漢軍驍騎火器營毎旗鹿角二十長槍二十連耞棍二十綿甲兵八十人左右引繩兵各四人神威将軍礮十各載以車掌礮車兵百十人礮手三十人鳥槍百䕶礮鳥槍兵百人叅領纛十執纛兵三十人小旗二十負旗領催二十人紅旗二麾旗領催二人金五鳴金兵十人鼓一舁鼓兵四人擊鼓兵二人號螺五鳴螺兵五人領以叅領二人散秩官十人驍騎校十人漢軍鳥槍營毎旗纛一執纛領催一人䕶纛兵三人随纛散秩官一人領催二人兵二十人叅領纛五執纛兵十有五人紅旗二麾旗領催二人鳥槍二百二十負小旗領催二十人兵二百人金五鳴金兵十人鼓一舁鼓兵四人擊鼓兵二人號螺十有三鳴螺兵如其數領以叅領二人散秩官五人給使官二人驍騎校七人毎翼統以都統二人毎旗副都統一人滿洲驍騎火器營每旗纛一執纛兵二人子母礮六行則駕以馬發則就地支以木架左右髙下視逺近為節毎礮小旗一負旗随礮領催一人兵九人領以叅領一人散秩官五人驍騎校五人䕶軍鳥槍營毎旗纛二執纛䕶軍四人紅旗一麾旗䕶軍二人小旗十有二負旗什長如其數鳥槍百二十鳥槍䕶軍如其數號螺十鳴螺䕶軍如其數領以䕶軍叅領二人䕶軍校十有四人驍騎鳥槍營毎旗纛二執纛兵四人紅旗一麾旗兵二人小旗十有二負旗領催如其數鳥槍百二十鳥槍兵如其數號螺十鳴螺兵如其數領以叅領二人散秩官七人驍騎校十有四人統以火器營大臣五人合漢軍滿洲火器營統兵大臣十有七人将校七百十有二人兵八千三百七十有六人其後閒二十有五丈為首隊兵八旗前鋒居中八旗䕶軍驍騎各按翼按旗分列前鋒左右前鋒營毎佐領出前鋒一人毎前鋒二人用鳥槍前鋒一人毎旗撥前鋒校八人建小旗八螺五負旗鳴螺兵如其數合為一隊列於各旗漢軍火器之次領以前鋒叅領一人前鋒侍衛一人統以毎翼前鋒統領一人䕶軍營每佐領出䕶軍二人合四人建小旗一每旗建䕶軍統領大纛一䕶以䕶軍叅領五人統以毎翼䕶軍統領一人驍騎營每佐領出領催驍騎二人合四人建小旗一毎旗號螺七叅領纛七䕶以叅領二人散秩官二人驍騎校二人統以毎翼都統二人每旗副都統一人合首隊前鋒䕶軍驍騎統帥十有六人将校二百九十有六人兵四千四百十人中分前鋒營統領一人叅領二人侍衛二人前鋒二百人䕶軍營統領一人叅領八人䕶軍四百人驍騎營副都統二人叅領八人散秩官十有六人驍騎校十有六人驍騎三百二十人再於滿洲火器營内分鳥槍䕶軍叅領四人鳥槍䕶軍百六十人鳥槍驍騎叅領二人鳥槍散秩官四人鳥槍驍騎百六十人於退軍時為殿又後閒十有五丈為次隊兵八旗䕶軍驍騎各按翼按旗分列䕶軍營毎佐領出䕶軍三人毎六人建小旗一毎旗各建䕶軍統領大纛一號螺六領以䕶軍叅領三人統以毎翼䕶軍統領一人驍騎營毎佐領出驍騎一人毎四人建小旗一毎旗各建叅領纛四號螺四毎叅領下出散秩官一人驍騎校一人領以驍騎叅領一人統以毎翼都統一人副都統二人合次隊䕶軍驍騎統帥八人将校百四十有四人兵三千五百二十有八人大軍左右分張兩翼為協隊按旗相屬斜行鴈綴成列䕶軍營毎佐領出䕶軍一人毎四人建小旗一毎旗各建䕶軍統領大纛一䕶以䕶軍叅領二人統以毎翼䕶軍統領一人驍騎營毎佐領出驍騎一人毎四人建小旗一毎旗各建叅領纛三號螺三毎叅領出散秩官一人驍騎校一人領以驍騎叅領一人統以毎翼都統一人副都統二人合協隊䕶軍驍騎統帥八人将校百三十有六人兵千七百六十有四人御營外左右設鑾儀衛蒙古畫角十鑾儀官七人鳴角軍二十有一人其前設五旗諸王蒙古畫角十官十人鳴角軍二十人承𫝊鳴螺親軍十有二人按歩撥乘騎斜行接至鹿角前八旗䕶軍毎旗各出䕶軍叅領一人䕶軍校一人䕶軍四十人滿洲蒙古漢軍合委散秩官八人驍騎校八人驍騎三百二十人禁約讙譁又合委𫝊宣官八人驍騎校八人䕶軍校八人承𫝊軍令總大閱之衆統帥凡四十有九人将校凡千三百六十有一人歩騎卒伍凡萬八千七百七十有一人辨旗纛之等正黄正白正紅正藍四旗各如其色體尚方鑲黄鑲白鑲藍以朱鑲紅以白體方末銳䕶軍旗斜出末銳皆繪金龍裁朱繪為火燄上綴朱纓紅旗則綴黒纓滿洲䕶軍驍騎火器營暨䕶軍營驍騎營皆於旗端標識號帶驍騎帶色從本旗其将領纛上飾豹尾䕶軍帶色以白将纛豹飾如之漢軍火器營将纛製小及半文以飛虎前鋒䕶軍建方旗如其旗之色将纛豹飾如之諸軍指麾小旗惟不裁火燄餘製並如前式辨甲胄之别八旗驍騎鎧甲從其旗之色胄纓将以朱軍以黒八旗䕶軍鎧甲将以白軍以藍胄纓将以黒軍以朱漢軍營舁鹿角軍衣裲襠無袖施礮軍不介胄衣罽袍短鎧餘軍士各從其旗之色若統帥大臣甲則細鎧胄則飾貂尾鴈翎各以其等諸軍既成列司礮以三礮列於軍前乃各息聲待令右列陣軍陣既嚴兵部尚書侍郎詣行宫奏成列司礮舉礮三鐃歌大樂作奏壮軍容之章皇帝乘騎出行宫侍衛二十人前引大臣十人騎而導後䕶領侍衛内大臣二人侍衛班領率豹尾班侍衛執槍十人佩刀十人佩弓矢十人騎而從駕入御營躬御甲胄扈從王公大臣侍衛親軍咸擐甲侍班滿漢九卿記注官蟒袍補服豫於御營前恭竢兵部尚書奏請閱兵皇帝佩刀出御營屬櫜鞬乘騎前張黄龍曲蓋一武備院官掌之兵部尚書侍郎二人騎導前引後扈如前儀總理閱兵王公大臣滿大學士乘騎随從三旗内大臣散秩大臣率親軍舉黄龍大纛三旗侍衛親軍各從侍衛什長親軍校随纛扈蹕有執事王公附豹尾班後随行皇帝入自左翼出右翼由列陣中路行經驍騎䕶軍前鋒諸隊前火器營諸隊後陣前将校甲士各就列廽身以向恭竢駕過後如初皇帝周視隊伍畢還至御營前降騎釋櫜鞬御幄殿諸大臣侍衛咸降騎随入前引大臣分立殿前東西面後扈大臣侍衛翼立御座左右殿外東西列豹尾班侍衛建黄龍大纛各一侍衛親軍按隊環衛總理閱兵王公大臣大學士兵部尚書侍郎立於殿外階上西位東面執事王公侍班九卿記注官分翼立於階上東西面御營前左右列侍衛各六人八旗𫝊令官在其下均立馬以竢滿洲索倫蒙古善馭馬侍衛三十人不擐甲按翼立侍衛後備馭驚軼之馬皇帝賜王公大臣坐各就位一叩坐屆時兵部尚書出班跪奏鳴角開操興復位鑾儀使帥鳴角軍進御營前䝉古大角鳴承𫝊海螺以次遞鳴達於軍陣司礮三舉礮諸軍陣内擊鼓螺角畢鳴承傳之鳴螺兵返騎以次退至御營左右乃行陣擊鼓鳴螺舁鹿角整隊前進鳴金止一字成列領隊甲士麾紅旗槍礮齊發鳴金止再擊鼓鳴螺整隊而進鳴金麾旗發槍礮如是者九初進以二十丈再進以七丈五尺為率至第十進大小礮連環槍齊發無閒鳴金三乃止開鹿角為八門首隊前鋒䕶軍驍騎甲士以次出次隊軍随之火器營兵列於後鹿角門闔諸軍出鹿角外既成列八旗齊鳴螺譟而進左右翼兵鴈綴斜行成列並進軍中鳴金止乃鳴螺振旅而還為殿之滿洲火器營軍及首隊前鋒䕶軍驍騎各立於本旗軍表之下八旗漢軍火器營分鹿角為八行本旗都統建龍纛整隊而退首隊兵殿後兵均鳴螺結隊徐還各列於初成列之地兵部尚書出班跪奏大閱禮成皇帝入御營釋甲胄扈從王公大臣侍衛各退咸解甲具吉服随駕還行宫司礮舉礮三鐃歌清樂作奏鬯皇威之章将帥各率弁兵按隊歸營解甲徹幕申嚴約束依次入城右大閱翼日鑾儀衛陳大駕鹵簿皇帝乘騎囬鑾警蹕如前儀駕還宫羣臣奉叅起居恩賜賞賚各有差右禮成還宫京營八旗弁兵每嵗春秋季月合操四次春日貫甲秋日常服營陣規制如大閱儀仲春孟秋之月按旗登城習鳴螺兵部遣官稽閱嵗為常制䕶軍驍騎官兵一嵗三校騎射本旗都統臨視之前鋒䕶軍三嵗一校騎射兵部疏上領侍衛内大臣八旗都統副都統名毎翼欽命數人㑹本翼統領臨視之八旗滿洲漢軍火器營礮閒三嵗季秋月演試於蘆溝橋都城各門之礮分三之一更遞運往同演命兵部滿尚書一人臨視之右京營訓練直省講武以督撫提鎮為閫帥毎嵗季秋霜降日申令本標弁卒校閱於演武場前一日各營将弁肅隊伍赴校塲豫立軍幕屆日黎眀軍士擐甲列陣中軍建大纛於場正中閫帥以牲醴致祭行二跪六叩禮中軍以下将士均随行禮畢軍門鼓吹節鉞前導閫帥徧閱行陣還登将臺升帳儀衛左右分列諸将擐甲侍臺下中軍詣帳前上行陣圗式請令操兵乃舉旗麾衆合操臺下舉礮三軍中鳴角擊鼓歩騎甲士聞鼓聲依式前進鳴金則止行陣中施發鳥槍連環槍並如京營之製餘若長槍籐牌㓲刀短兵之屬各因其地之宜以教士卒皆有成法其為陣有正有變毎變陣視将臺號纛為指麾之節臺上鳴角三軍中乃鳴金振旅而還閱畢試材官将士騎射技勇申眀賞罰犒勞軍士各釋甲歸營伍漕運河道總督屆期訓練本標弁卒亦如之八旗水師操防之畧練習於四時其出洋信候直省不同毎嵗春秋季月或夏秋之季遇潮平風正日乘戰艦列陣張颿馭風鳴角發礮具如軍律将軍都統副都統親臨校視緑旗水師訓練亦如之駐防将軍都統副都統訓練八旗弁卒及演礮如京營之制右直省閱兵欽定大清通禮卷三十九
