body:
  text: 欽定四庫全書欽定大清通禮卷三十一嘉禮歳季春皇后躬桑之禮前期三月禮部具疏奏聞皇帝承奉皇太后懿㫖下制報可乃徧布諸司供備内務府豫奏以妃嬪二人公主親王福晉以下縣君鎮國公夫人以上三人文三品武二品官以上命婦四人從蠶採桑掌儀司治桑畦飭採桑鈎筐皇后金鈎妃嬪銀鈎均黄筐福晉夫人命婦均鐵鈎朱筐依期畢辦右戒辦皇后既以吉已饗先蠶儀詳吉禮禮畢蠶已生翼日如蠶未生則視蠶生諏日皇后散齋一日從採桑妃嬪福晉夫人命婦畢齋宫殿監侍設案於交泰殿内正中東西肆又設案於左右南北肆率内監至内右門祗候是日執事官咸蟒袍補服黎明内務府官以龍亭一載躬桑筐鈎采亭一載從採桑筐鈎内鑾儀校舁行掌儀司官前導總管暨蠺宫令從由隆宗門至内右門外亭止宫殿監督領侍率蠺宫令暨内監㳟奉筐鈎以次入内右門陳皇后筐鈎於交泰殿中案陳妃嬪福晉夫人筐鈎於左案陳命婦筐鈎於右案皆筐左鈎右畢乃奏時屆皇后吉服出御交泰殿妃嬪隨出侍立皇后先閲鈎次閲筐旣徧還宫妃嬪從入宫殿監侍奉筐鈎仍置各亭内以次舁行出内右門授蠶宫令鑾儀校接舁前引如初至内務府署旗仗前𨗳𨗳迎樂作奏禧平之章辭曰戴勝告時西陵肇典爰舉懿筐爰臨柘館御鞠衣登瑞繭金鈎陳嘉義展及西苑奉宸苑卿自門迎入蠶宫令分陳於採桑所右閲筐鈎屆日蠶宫令率内監潔埽具服殿内外及觀桑臺上下藉以㯶薦設皇后觀桑寳座於㙜北正中南向供御座鋪陳㙜下桑畦東西首行第一株為皇后躬桑位東向執鈎相儀一人在右執筐相儀一人在左東西第二行一株為妃嬪從採位第三行一株為福晉夫人從採位第四行一株為命婦從採位執鈎筐蠶母各二人皆在左右𫝊贊女官二人在臺南左右北面侍班福晉夫人命婦在女官之南東西靣内侍率童監歌採桑詞者十人司金鼓板篴笙簫者二十有四人於臺前東西麾五色采旗者四十人於桑畦外東西分班序列右序位是日黎明蠶宫令啟西苑門從桑侍班福晉夫人命婦及執事女官蠶母蠶婦咸蟒袍補服豫至西苑南門内序立祇候辰正二刻禮部尚書内務府總管詣乾清門告時已初刻宫殿監侍轉奏皇后御龍袍乗輿出宫從桑妃嬪蟒袍乘輿從詣西苑如饗先蠺儀右車駕出宫皇后駕至西苑詣具服殿少竢𫝊贊分引妃嬪福晉夫人命婦就從採位立引侍班之福晉夫人命婦就侍班位立執事女官曁童監咸依位序立典儀奏請皇后行躬桑禮皇后出具服殿前引後從如常儀至桑畦北正中相儀女官一人奉鈎跪進於右一人奉筐跪進於左興皇后右持鈎左持筐東行桑畦外采旗招颭臺前内監鳴金鼓歌採桑辭曰躬耕禮成詔躬桑蠶月吉已迎辰祥金華紫罽五翟光瑞雲彩映椒塗黄壇南宿戒帷宫張西陵展事摇珩璜齋肅恭敬柔雍彰金鈎緑籧懿莒筐尚功司製奉以將柔條在東涵露香鞠衣三摘鳴鳩翔月靈臨賁龍精昌黼黻五色質且良昭事上帝祠蒸嘗儀刑宇宙帥妃嬙衣食滋殖被萬方皇后至東第一株桑前東向採桑一條蠺母二人助採復行至西第一株桑前東向採桑二條蠶母助採亦如之採畢歌止各退皇后以鈎筐授相儀相儀二人跪授於左右興復於龍亭退竢臺隅典儀奏請御觀桑㙜贊引對引命婦恭導皇后陞㙜御座妃嬪以下採桑各蠶婦一人授鈎一人授筐二人助採妃嬪福晉夫人採桑五條命婦採桑九條畢咸釋鈎筐授蠶婦復於采亭妃嬪登臺侍立皇后寳座前左右福晉夫人命婦退入侍班位立執鈎筐者皆退典儀相儀各女官斂諸筐次第置於㙜南𫝊贊引蠺母蠺婦至臺前北面跪典儀舉皇后懿筐授蠶母蠺母恭受次舉妃嬪以下從桑各筐授蠺婦蠶婦受訖皆興奉筐至蠺室切之蠶婦灑箔禮成右親桑蠶母以禮成告典儀典儀跪奏皇后駕興贊引對引恭導皇后詣具服殿典儀奏陞座皇后陞寳座𫝊贊分引妃嬪以下東西序立次福晉次夫人次命婦次蠶母蠶婦東位西上西位東上皆北面𫝊贊贊跪叩興皆行六肅三跪三拜禮興退典儀奏禮畢皇后降座陞輿警蹕妃嬪從還宫如來儀福晉以下皆退右禮成囘宫及蠶成蠶母蠶婦擇繭貯筐以獻皇后皇后獻於皇帝皇太后乃擇吉日皇后行繅三盆手禮採桑妃嬪從繅是日乘輿出宫警蹕如常至織室繅盆前妃嬪侍立蠶母漬繭於盆以手出緒握其總跪進皇后皇后受總親繅三少退立妃嬪進繅以五為節遂布於蠶婦之吉者使繅禮畢乗輿還宫警蹕如來儀右獻繭繅絲欽定大清通禮卷三十一
