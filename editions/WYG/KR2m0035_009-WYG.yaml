body:
  text: 欽定四庫全書欽定大清通禮卷三吉禮宗廟嵗四時饗太廟之禮孟春於上旬諏吉夏秋冬於孟月朔先三日禮部尚書一人詣犧牲所眂牲如儀右眂牲是日昩爽太常寺卿率屬恭進齋戒牌銅人於乾清門均如郊祀儀皇帝乃齋於大内齋宫王公百官各齋於次右致齋書祝版眂割牲郊祀同儀均與先一日昩爽太常寺設黄案一於中和殿御座之南太常寺卿率屬祇候贊事殿内司祝由内閣恭奉太廟後殿中殿祝版暫設太和殿初昕太常寺卿率欽天監博士至乾清門奏時皇帝御補服乘輿出宫至中和殿後降輿御殿立左楹前西向司祝由太和殿恭奉祝版以次行導引如儀至中和殿奉後殿祝版恭設案左奉中殿祝版恭設案右三叩興退太常寺卿二人展祝文贊禮郎布拜褥皇帝詣案前恭閲行三拜禮畢太常寺官恭送祝版奉安太廟神庫内餘如北郊祀儀右閲祝版其日太常寺卿率屬入廟潔蠲殿内外藉以㯶薦恭設後殿列祖列后神座於寢室前肇祖原皇帝正中原皇后配興祖直皇帝左直皇后配景祖翼皇帝右翼皇后配顯祖宣皇帝次左宣皇后配均南向恭設中殿列聖列后神座於前殿太祖髙皇帝正中南向孝慈髙皇后配太宗文皇帝東位西向孝端文皇后孝莊文皇后配世祖章皇帝西位東向孝惠章皇后孝康章皇后配聖祖仁皇帝東次西向孝誠仁皇后孝昭仁皇后孝懿仁皇后孝恭仁皇后配世宗憲皇帝西次東向孝敬憲皇后配展前殿兩廡配饗東通達郡王次武功郡王武功郡王福晉次慧哲郡王慧哲郡王福晉次宣獻郡王宣獻郡王福晉次怡賢親王均西面西信勇公費英東次果毅公額宜都次武勲王揚古利次果毅公圖爾格次雄勇公圖頼次忠達公大學士圖海次超勇親王策凌次勤襄伯大學士鄂爾泰次大學士張廷玉均東面以北為上右設神座將事之夕夜分太常寺卿率屬入廟然炬明鐙具器陳於案各以其序帝后皆同案每案牛一羊一豕一簠二簋二籩十有二豆十有二鑪一鐙二每位豋一鉶一金匕一金箸二南設三案一少西供祝版一東次西向一西次東向分奠帝后每案香盤一每位奉先制帛一色白尊一玉爵三後殿前殿同前殿東案陳壺一實福酒盤一實胙肉東廡五案皆牛一羊一豕一簠二簋二籩十豆十每位鉶一西廡九案皆羊一豕一鉶一簠一簋一籩四豆四又各設案於南東廡奠尊三每案香盤一每位展親制帛一色白爵三西廡奠尊五每位報功制帛一色白餘同東廡凡牲陳於爼凡帛實於篚凡尊實酒承以舟疏布冪勺具工部司官張黄幄於㦸門鑾儀衛官設洗於幄外樂部率太常協律郎設中和韶樂於殿外階上分東西懸陳武功文德二舞於樂懸之次並如郊祀儀右陳設陳設畢太常寺博士引禮部侍郎一人詣後殿前殿神位前省眂牲帛齍盛及籩豆豋鉶之實畢並詣東西廡周眂如儀右省齍辨行禮位前殿門内正中爲皇帝行禮拜位北向殿外階上東西爲王以下公以上拜位階下甬道東西為兩廡分獻官拜位廟庭東西為百官拜位文官郎中以上武官叅領世爵輕車都尉以上東西各五班重行異等均北靣東位西上西位東上辨執事位司拜褥鑾儀衛官二人分立於皇帝拜位左右太常寺司祝一人立祝案西東靣太常寺司香三人宗室官司帛三人司爵九人序立東案之東西面太常寺司香二人宗室官司帛二人司爵六人序立西案之西東靣均北上光祿寺卿二人立東司香之後西面侍衛二人立西司香之後太常寺贊賜福胙一人立西司爵之次均東面北上侍儀禮部尚書侍郎各一人立東案之南西面都察院左都御史副都御史各一人樂部典樂一人立西案之南東面均北上太常寺典儀一人立殿東門外西面階上東西糾儀御史二人禮部祠祭司官二人立於王公拜位之前引王公行禮鴻臚寺官二人分立於糾儀官之次均東西面司樂協律郎樂工序立樂懸之次歌工立樂工之次樂舞生文武八佾分行序立東列歌工之左西列歌工之右北面記注官四人立西階下東面北上糾儀御史四人禮部祠祭司官二人鴻臚寺官二人分立於百官行禮位前均東西面掌燎官率燎人立燎鑪南承祭後殿官拜位設於殿外階上太常寺司祝一人司香四人覺羅官司帛四人司爵八人糾儀御史四人以次序立於殿内均東西面太常寺典儀一人立於殿門外之東掌燎官立位同前右辨位其日五鼔鑾儀衛陳法駕鹵簿北郊祭詳見儀於午門外陳金輦於太和門外陪祀王以下公以上按翼集廟街門外候駕至隨行承祭後殿官分獻官均先竢於廟南門外陪祀百官序立於廟庭左右祇候司祝二人詣神庫祝案前跪三叩興恭奉祝版先後殿次前殿奉安於祝案跪叩如初日出前四刻公一人詣後殿香几前上香退出殿右門外就階上正中行三跪九叩禮覺羅官分詣後殿寢室前跪三叩興恭請四室神位奉安於殿内寳座跪三叩興退王一人詣中殿上香行禮如後殿之儀宗室官分詣中殿寢室前跪三叩興恭請五室神位以次出殿中門太常寺官十人前引由前殿北門入循殿左轉至殿中依序奉安於寳座跪三叩興退均就執事位右請神位太常寺卿赴乾清門奏時皇帝御祭服乗禮輿出宫至太和門外降輿乘金輦鑾儀衛奉輦納陛内大臣侍衛前引後扈如常儀執鑪鐙官左右列行午門嚴鼔導迎樂陳而不作不陪祀王公以下文武各官咸朝服跪送太常寺贊禮郎豫引後殿承祭官由右㦸門入至後殿内垣門外東面立駕入太廟街門左門至神路右降輦納陛扶輦如前儀右贊引左對引太常寺卿二人恭導皇帝至太廟南門入左門詣㦸門幄次少竢太常寺卿告奉安神位畢奏請行禮皇帝出次鑾儀衛官跪奉盥奉巾如儀盥畢入㦸門左門司拜褥官豫布拜褥於殿門内正中贊引對引官恭導皇帝陞東階進前殿左門就拜位前北向立執鑪鐙官止東階下夾階左右立侍衛退至東西陛隅僉立前引内大臣止殿外檐下東西侍立後扈大臣隨侍贊禮郎二人引承祭後殿官由内垣右門入升自西階至中階拜位前立贊禮郎東西各二人引分獻官鴻臚寺官引陪祀王公百官均就拜位序立典儀贊樂舞生登歌執事官各共廼職武舞執干戚進贊引奏就位皇帝就位立後殿典儀贊執事官各共廼職贊禮郎贊就位承祭官就位立右就次盥洗就位典儀贊迎神左右司香奉香盤以次進至各案前恭候司樂贊舉迎神樂奏貽平之章辭曰肇兹區夏世德欽崇九州維宅王業自東戎甲十三奮起飛龍維神格思皇靈顯融協律郎舉麾工鼓柷樂作贊引奏詣香案前曁對引官恭導皇帝詣太祖髙皇帝香案前對引官至祝案前止立司香跪贊引奏跪皇帝跪奏上香司香進香皇帝上炷香三上瓣香興以次詣太宗文皇帝世祖章皇帝聖祖仁皇帝世宗憲皇帝香案前上香儀同贊引奏復位曁對引官恭導皇帝復位立贊引奏跪拜興皇帝行三跪九拜禮王公百官均隨行禮協律郎偃麾工戛敔樂止凡樂以舉麾鼔柷作以偃麾戛敔止後同初迎神時後殿典儀贊同贊禮郎贊詣香案前贊跪贊上香引承祭官詣肇祖原皇帝興祖直皇帝景祖翼皇帝顯祖宣皇帝香案前以次跪上香畢復位行三跪九叩禮如儀右迎神典儀贊奠帛爵行初獻禮司樂贊舉初獻樂奏敉平之章辭曰於皇祖考克配上天越文武功萬邦是宣孝孫受命不忘不愆羮牆永慕時薦斯䖍樂作司樂舉節舞干戚之舞凡舞以節領之導引進退後同有司揭尊冪勺挹酒實爵左右司帛司爵以次進至各神位前司帛跪獻篚奠於案三叩興司爵立獻爵奠於墊中各退樂暫止司祝詣祝案前跪三叩興奉祝版跪案左贊引奏跪皇帝跪羣臣皆跪贊讀祝司祝讀祝辭曰維某年月日孝孫嗣皇帝御名敢昭告於太祖承天廣運聖德神功肇紀立極仁孝睿武端毅欽安弘文定業髙皇帝孝慈昭憲敬順仁徽懿德慶顯承天輔聖髙皇后太宗應天興國弘徳彰武寛溫仁聖睿孝敬敏昭定隆道顯功文皇帝孝端正敬仁懿哲順慈僖莊敏輔天協聖文皇后孝莊仁宣誠憲恭懿至德純徽翊天啟聖文皇后世祖體天隆運定統建極英睿欽文顯武大德弘功至仁純孝章皇帝孝惠仁憲端懿慈淑恭安純德順天翼聖章皇后孝康慈和莊懿恭惠溫穆端靖崇天育聖章皇后聖祖合天弘運文武睿哲恭儉寛裕孝敬誠信中和功德大成仁皇帝孝誠恭肅正惠安和淑懿儷天襄聖仁皇后孝昭靜淑明惠正和安裕欽天順聖仁皇后孝懿溫誠端仁憲穆和恪奉天佐聖仁皇后孝恭宣惠溫肅定裕慈純贊天承聖仁皇后世宗敬天昌運建中表正文武英明寛仁信毅大孝至誠憲皇帝孝敬恭和懿順昭惠佐天翊聖憲皇后曰時屆孟春夏秋冬謹以牲帛醴齊齍盛庻品用展追思伏惟尚饗讀畢興奉祝版跪安神位前篚内三叩興退樂作贊引奏拜興皇帝率羣臣行三拜禮興樂止武功之舞退文舞執羽籥進初奠帛爵時後殿典儀贊奠帛爵行初獻禮有司揭尊冪勺挹酒實爵左右司帛爵以次進至各神位前奠帛獻爵儀同前殿司祝詣祝案前跪三叩興奉祝版跪案左贊禮郎贊跪承祭官跪贊讀祝司祝讀祝辭曰維某年月日孝孫嗣皇帝御名謹遣某官某敢昭告於肇祖原皇帝原皇后興祖直皇帝直皇后景祖翼皇帝翼皇后顯祖宣皇帝宣皇后曰時屆孟春夏秋冬謹以牲帛醴齊齍盛庻品用展追思伏惟尚饗讀畢興奉祝版跪安神位前篚内三叩興退贊禮郎贊叩興承祭官行三叩禮興前殿兩廡贊禮郎引分獻官詣兩廡配饗位前上香執事生揭尊冪勺挹酒實爵奉篚奉爵各分獻退右初獻典儀贊行亞獻禮司樂贊舉亞獻樂奏敷平之章辭曰毖祀精忱洋洋如生尊罍再舉於赫昭明藹然有容愾然有聲我懐靡及顒若中情樂作舞羽籥之舞司爵詣各神位前獻爵於左儀如初獻後殿典儀同時贊行亞獻禮司爵獻爵各神位前如前殿之儀兩廡隨分獻畢樂止右亞獻典儀贊行終獻禮司樂贊舉終獻樂奏紹平之章辭曰粤若祖德誕受方國肆予小子大猷是式欲報之德昊天罔極慇懃三獻中心翼翼樂作舞同亞獻司爵詣各神位前獻爵於右儀如亞獻後殿典儀同時贊行終獻禮司爵獻爵各神位前如前殿之儀兩廡隨分獻畢引分獻官退復拜位立樂止文德之舞退右三獻旣終獻太常寺贊禮郎一人詣拜位前西靣立贊賜福胙光祿寺卿二人奉福胙詣神位前拱舉退祗立於皇帝拜位之右侍衛二人進立於左贊引奏跪皇帝跪左右官皆跪奏飲福酒右官進福酒皇帝受爵拱舉授左官奏受胙右官進胙皇帝受胙拱舉授左官奏拜興皇帝三拜興又奏跪拜興皇帝率羣臣行三跪九拜禮興典儀贊徹饌司樂贊舉徹饌樂奏光平之章辭曰庻物既陳九奏具舉告成於祖亦右皇妣敬徹不遲用終殷祀式禮如兹皇其燕喜樂作徹畢樂止有司徹後殿饌如儀右受胙徹饌皇帝既受福胙太常寺贊禮郎詣神位前跪奏禮畢請還寢室三叩興退司樂贊舉還宫樂奏乂平之章辭曰對越無方陟降無迹寢祏靜淵孔安且吉惟靈在天惟主在室於萬斯年孝思無斁樂作贊引奏跪拜興皇帝率羣臣行三跪九拜禮興樂暫止典儀贊奉祝帛送燎司祝司帛詣神位前咸跪三叩司祝奉祝司帛奉篚興司香跪奉香興以次恭送燎所皇帝轉立拜位旁西向司拜褥官徹拜褥王公百官退避側立東西面竢祝帛過仍布拜褥皇帝復位立後殿贊禮郎贊跪叩興承祭官行三跪九叩禮興典儀贊奉祝帛送燎司祝奉祝司帛奉篚司香奉香恭送燎所如前殿之儀執事生奉兩廡香帛焚燎樂作贊引奏禮成曁對引官恭導皇帝自殿左門降東階由東㦸門出贊禮郎引承祭後殿官退王公二人率宗室覺羅官恭奉後殿前殿神位還寢室上香行禮與迎神同右禮成神