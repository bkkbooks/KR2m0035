body:
  text: 官員喪禮民公侯伯視一品子男各視其等有疾居正寢女居内寝疾革遺疏三品以上官得具遺疏遺言皆書之既終子號哭躃踊去冠被髪徒跣諸婦女子去笄朞功以下丈夫素冠婦人去首飾皆易素服男哭牀東女哭牀西異向作䰟帛結白絹為之為位於尸東前設案奠閣餘生前食飲所餘脯醢酒果用吉噐立喪主以適長子無則長孫承重主婦以亡者之妻無妻及母之喪則以喪主之妻當之䕶喪司賔司書贊祝諸執事人治棺及凡喪具䕶喪者使人上遺疏訃於有司及親屬僚友右初終越日小殮侍者於寢室施幃設浴牀於尸牀前牀東置案陳沐浴巾櫛含具三品以上含用小珠玉五七品以上用金玉屑五襲牀在浴牀西襲事陳其旁常服一稱朝衣冠帶各以其等侍者遷尸浴牀南首諸子哭踊婦人出女喪則男出乃去尸衣覆以殮衾侍者奉湯入哭止沐髪櫛之晞以巾束之抗衾而浴拭以巾訖結襲衣縱置於牀南領舉尸易牀徹浴牀浴具埋巾櫛及餘水於屏處乃去衾襲常服朝服加面巾喪主以下為位而哭喪主及諸子坐於牀東奠北同姓丈夫以服為序坐諸子後西面主婦及諸婦女子坐於牀西同姓婦女以服為序坐諸婦後婢妾又在其後東面均南上尊行丈夫坐東北壁下西上尊行婦女坐西北壁下東上異姓丈夫坐於幃外之東西上異姓婦女坐於幃外之西東上若内喪則同姓丈夫皆坐幃外之東異姓丈夫皆坐幃外之西執事者執含具前喪主起盥親含尸訖哭復位右襲是日執事者帷堂如寢陳殮牀於堂東加殮衣三品以上五稱複三襌二五品以上三稱複二襌一六品以下二稱複一襌一皆以繒複衾一二品以上色絳四品以上色緇五品色青六品色紺七品色灰紟絞皆素帛既辦廼遷尸牀於堂中行殮事畢喪主暨諸子括髪加首絰腰絰皆以麻婦麻髽餘同右小殮三日大殮執事者以棺入承以兩凳棺内奠七星版藉茵褥施綿衾垂其裔於四外屆時奉尸入棺實生時所落齒髪卷衣以塞空處令充實平滿喪主以下憑棺哭踊盡哀乃蓋棺加錠施桼三品以上比葬每月三桼五品以上月再桼七品以上月一桼徹殮牀遷柩其處柩東設靈牀施幃帳枕衾衣冠帶屨之屬設頮盆帨巾於靈牀側皆如生時柩前設靈座奉魂帛几筵供噐具以絳帛為銘旌三品以上長九尺五品以上八尺七品以上七尺題曰某官某公内喪書某封某氏之柩懸以竹杠依靈右執事者陳饌案食品用素噐啟帷行殮奠禮内外就位如寢司祝焚香奠酒喪主以下哭盡哀畢下帷每奠皆同及夜奉魂帛復牀諸子次於中門之外寝苫枕塊不脱絰帶諸婦女子次於中門之内帷幔枕衾皆布素哀至則哭晝夜無時右大殮是日成服五服各以親疏為等斬衰三年子為父母為繼母慈母妾子無母父命他妾養之者養母自幼出繼與人者子之妻同庶子為嫡母所生母庶子之妻同為人後者為所後父母為人後者之妻同女在室及已嫁被出而反在室者為父母嫡孫承重為祖父母若祖父俱亡為髙曽祖後者同承重者之妻同妻為夫妾為家長服生麻布旁及下際不緝麻冠絰菅屨竹杖婦人麻屨不杖餘同齊衰杖朞嫡子衆子為庶母謂父妾有子者嫡子衆子之妻同子為嫁母親生母父卒而改嫁者出母親生母為父所出者嫡孫祖在為祖母承重夫為妻服熟麻布旁及下際緝之麻冠絰草屨桐杖父母在夫為妻不杖婦人麻屨餘同齊衰不杖朞為父卒繼母改嫁而已從之者為改嫁繼母為同居繼父兩無大功以上親者為伯叔父母及姑在室者為兄弟及姊妹在室者為兄弟之子及女在室者祖為嫡孫父母為嫡長子衆子及嫡長子之妻為女在室者為子之為人後者繼母為長子衆子孫為祖父母孫女在室出嫁同女出嫁為父母為人後者為本生父母女在室及雖適人而無夫與子者為其兄弟姊妹及兄弟之子與兄弟之女在室者女適人為兄弟之為父後者婦為夫兄弟之子及女在室者妾為家長之父母家長之妻家長之長子衆子與其所生子冠絰屨同上齊衰五月孫及女孫為曾祖父母服熟桐麻布冠絰如其服草屨婦人麻屨齊衰三月為繼父先同居後不同居者為同居繼父兩有大功以上親者孫及女孫為髙祖父母冠絰屨同上大功九月為從兄弟及姊妹在室者為姑及姊妹已嫁者為人後者為其兄弟及姑姊妹在室者為兄弟之子為人後者祖為衆孫及孫女在室者祖母為嫡孫衆孫父母為衆子婦及女之已嫁者伯叔父母為從子婦及兄弟之女已嫁者婦為夫祖父母本生父母伯叔父母女出嫁為本宗伯叔父母本宗兄弟及兄弟之子本宗姑姊妹及兄弟之女在室者服麤白布冠絰如其服繭布縁屨小功五月為伯叔祖父母為從伯叔父母及從姊妹已嫁者為再從兄弟及姊妹在室者為從兄弟之子及女在室者為祖之姊妹在室者為父從姊妹在室者為兄弟之妻為兄弟之孫及兄弟之孫女在室者為外祖父母為母之兄弟及母之姊妹為姊妹之子祖為嫡孫之婦為人後者為其姑及姊妹之已嫁者婦為夫兄弟之孫及孫女在室者為夫之姑姊妹兄弟及兄弟之妻為夫從兄弟之子及女在室者女出嫁為本宗從兄弟及從姊妹之在室者服稍細白布冠絰如其服屨同上緦麻三月為乳母為曾祖兄弟及曾祖兄弟之妻為祖從兄弟及祖從兄弟之妻為父再從兄弟及父再從兄弟之妻為三從兄弟及姊妹在室者為曾祖之姊妹在室者為祖之從姊妹在室者為父之再從姊妹在室者為兄弟之曾孫及曾孫女之在室者為兄弟之孫女已嫁者為從兄弟之孫及孫女在室者為再從兄弟之子及女在室者為祖之姊妹父之從姊妹及已之再從姊妹已嫁者為從兄弟之女已嫁者為父姊妹之子為母兄弟姊妹之子為妻之父母為女之夫女之子若女為兄弟孫之妻為從兄弟子之妻為從兄弟之妻祖為衆孫婦祖母為嫡孫衆孫婦曾祖父母為曾孫髙祖父母為元孫婦為夫髙曾祖父母為夫之伯叔祖父母及夫祖姑在室者為夫之從伯叔父母及夫從姑在室者為夫之從兄弟姊妹在室出嫁同及從兄弟之妻為夫再從兄弟之子及女在室者為夫從兄弟之女已嫁者為夫從兄弟子之妻從兄弟之孫及孫女在室者為夫兄弟孫之妻兄弟之孫女已嫁者為夫兄弟之曾孫及曾孫女之在室者女出嫁為本宗伯叔祖父母及祖姑之在室者為本宗從伯叔父母及從姑在室者為本宗從兄弟之子及女在室者服細白布絰帶如其服素屨無飾凡喪三年者百日薙髪在喪不飲酒不食肉不處内不入公門不與吉事朞之喪二月薙髪在喪不昏嫁九月五月者踰月薙髪三月者踰旬薙髪在喪均不與燕樂右成服大殮翼日喪主以下夙興侍者設頮水櫛具於靈牀側五服之人各服其服就位侍者收頮櫛具奉魂帛出就靈座朝奠衆哭執事者設果蔬酒饌如生時祝焚香斟酒㸃茶喪主以下詣案前再拜哭盡哀各以其服為序皆男先女後宗親先外姻後復位哭止日中設果筵奠酒及夕又奠均如朝奠儀侍者詣靈牀舒衾枕奉魂帛於牀上退諸子婦哭盡哀乃止夕奠皆如之朔朢則殷奠具盛饌於朝奠行之遇新物則薦如朝奠儀右朝夕奠親賔聞訃告弔於喪主之家未殮至者入門易素服司賓待於㕔事以贈賻儀物授司書入臨尸哭盡哀遂弔喪主持哭喪主以下哭稽顙無辭賓出司賓送成服以後至者各以其服弔具酒果香燭厚則加貨財皆書於狀先使從者持狀通名司書籍記之以禮物入陳靈前喪主以下就位哭司賓出迎賓入詣靈座前舉哀哀止跪焚香酹酒再拜興喪主出帷稽顙哭謝賓答拜慰唁出喪主哭入司賓延客待茶賓退司賓送於門外右親賓弔奠賻若一二品官奉特恩遣官致奠其日喪家設使者奠位於靈前喪主及諸子跪位於靈右主婦跪位於帷内使者素服至喪主率諸子免絰去杖止哭出迎於大門外道右先入就位跪俯伏贊者引使者升中階就位上香執事者酌茶使者立受茶奠茶復授酒使者奠爵三訖少退喪主率諸子降西階下北面三跪九叩謝恩仍至大門外竢使者出跪送乃還苫次若賜諡及恩䘏遣官致祭者其日喪家設讀祝位於靈几之左餘如前位執事者豫陳祭物齎諭祭文從使者至喪主出迎入就位跪俯伏使者就位上香司祝就讀祝位立讀祭文訖復於案退使者奠爵三畢少退喪主以下向闕謝恩送使者與遣官致奠儀同右遣官祭奠品官卒於位與在任遭父母喪者初喪成服朝夕奠皆如前儀擇日扶櫬還家卒於京者兵部給郵符夫馬備行轝儀從各視其品告啟期於親戚僚友啟行前一日行啟奠禮喪主以下就位哭祝詣靈前跪告曰今擇某日奉靈柩還故鄉敬告俯伏興喪主以下稽顙哭再拜興復位盡哀止厥明遷奠告遷於柩前禮亦如之徹祝納魂帛於櫝役人舉轝入遷柩就轝主人以下輟哭視載出大門加幃葢發引儀從在前銘旌魂帛從喪主以下杖哭隨柩及郊親戚僚友祖者向柩設祖奠役人停轝賓向柩再拜主人稽顙哭謝賓退歛儀從遂行主人乘素車途次止宿奉魂帛銘旌於靈柩前凡柩暫停同水行則設奠陸行則上食及朝啟行亦如之至家前一日遣僕戒家人豫於十里外布幕具奠以待至日五服之人各服其服以迎柩至暫駐幕内設奠祝焚香斟酒跪告曰靈輀遠歸将至家親屬來迎敢告俯伏興衆序哭再拜興柩行咸徒歩哭從至家安靈牀於殯所男女各就位哭設奠祝焚香斟酒跪告曰靈輀逺歸至家敢告俯伏興衆哭拜如初受弔朝夕設奠並如前儀右扶喪附官員在外聞喪三年者訃至哭對使者問故又哭盡哀易服如初喪儀訃於有司遂奔喪戴星而行見星而止途中哀至則哭哭辟市邑將至家望其境其城其鄉皆哭至家哭入門升自西階憑棺西面哭踊婦人東面哭踊無算少頃尊卑相向哭細問病終之故復哭乃披髪徒跣婦人不徒跣翼日成服括髪婦人髽皆加麻絰喪期以聞訃日始餘如在家之儀朞以下聞訃者易服為位而哭若奔喪則至家成服若官員在職非本生父母喪雖朞猶從政不奔喪聞訃易素服為位而哭各持其服於私家入公門治事仍常服朞喪者一年不與祭祀之事服滿日於私家為位哭除之右聞喪奔喪三月而葬營葬地及葬具凡墳塋一品九十歩五尺為歩二品八十歩封皆丈有四尺三品七十歩封丈有二尺石獸皆六四品六十歩五品五十歩封皆八尺石獸四六品七品四十歩封皆六尺墓門勒石書某官某公之墓婦人則書某封某氏若合喪則並書之五品以上用碑龜趺螭首六品七品用碣方趺圓首刻壙誌用石二一書如碑碣一詳記姓諱諡字無諡則止書字州邑里居服官遷次及其生卒年月日時葬處坐向所遺子女石字内向以鐵合而束之作神主及主櫝製柩轝下為方牀上編竹格為葢四出檐垂流蘇繒荒繒帷五品以上畵雲氣為飾六品七品素繒無飾五品以上障柩畫翣四六品七品畫翣二皆引布二功布一靈車一埏土為明噐鑪缾燭檠五事儀從各從其品右治葬具擇日開兆喪主率諸子適兆所以宗親或姻賓一人告於土神執事者設案兆左陳酒饌置祝文告者吉服至盥詣案前立執事者二人奉香執壺琖隨立左右告者跪上香再拜酹酒如儀祝奉祝文跪於吿者之左讀曰維某年月日某官某敢告於司土之神今為某官某營建宅兆神其保佑俾無後艱謹以清酌庶羞祇薦於神尚饗讀畢興退告者俯伏興復再拜退遂開壙隨地所宜使子弟幹事者一人留視之喪主以下還右開兆祀土神葬有日豫以啟期告於親戚僚友發引前一日厥明五服之人各服其服入就位哭朝奠訖祝跪告於殯前曰今以吉辰遷柩敢告俯伏興喪主以下哭盡哀再拜役人徹帟遷柩障以翣侍者移靈牀於堂正中靈座几筵仍設祝奉魂帛