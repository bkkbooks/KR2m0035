筵斷杖棄之屏處右大祥中月而禫二十七月既周之日行事屆日夙興執事者設几案於寝堂之中主人率諸子入廟詣考位前啟室焚香再拜跪告曰孝子某将祗薦禮事敢請神主出就正寝俯伏興奉主至寝堂陳於案執事者陳饌案於前喪主及諸子於東壁下就位舉哀婦人哀於房中焚香進果饌酒醴如常儀祝讀告辭曰維某年月日孝子某謹告於顯考某官府君神主禫制有期追遠無及謹以清酌庶羞祗薦禫事尚饗主人以下俯伏興再拜祝焚告文訖奉主復於廟闔室皆退諸子素服終月始服常服右禫嵗逄忌日前期齋厥明主人及子弟素服詣廟設案於所薦神主室前主人盥啟室奉主就案焚香薦蔬果酒饌告曰兹以某府君某官遠諱之辰妣稱某封某氏謹備庶羞清酌恭伸追慕俯伏興及子弟皆再拜如時節薦新之儀禮畢徹納主闔室退右忌日奠嵗寒食或霜降節拜埽壙塋其日主人夙興率子弟素服詣墳塋執事者具酒饌僕人備芟剪草木之噐從既至主人周視封樹僕人剪除荆草訖以次序立墓前焚香供酒饌再拜在列者皆再拜興遂祭土神陳饌墓左上香酹酒主人以下序立再拜退右拜埽士喪禮疾革書遺言既終子號哭躃踊去冠被髪徒跣諸婦女子去笄朞功以下丈夫素冠婦人去首飾皆素服立喪主主婦䕶喪贊祝諸執事人治棺及凡喪具䕶喪者使人訃於有司及戚友執事者帷寝設浴牀於尸牀前襲牀在浴牀西東陳沐浴巾櫛含具含用金銀屑三襲事陳其旁常服一稱冠及禮服各以其等帶鞾皆備侍者遷尸浴牀南首諸子哭踊婦人出女喪則男出廼去尸衣覆以殮衾侍者奉湯及巾櫛入沐浴喪主及諸子止哭視執事者結襲衣縱置於牀南領舉尸易牀徹浴牀浴具埋巾櫛及餘水於屏處廼去衾襲常服禮服加面巾即牀前為位立魂帛設奠陳生前所食脯醢酒果用吉噐喪主以下為位序哭如禮位詳見官員喪儀後同執事者奉含具前喪主起盥含尸訖哭復位越日小殮執事者帷堂陳殮牀於堂東加殮衣複一襌一複衾一紟絞皆備殮畢遷尸於堂喪主暨諸子麻括髪加首絰腰絰皆以麻婦麻髽餘同三日大殮執事者以棺入承以兩凳棺内奠七星版藉茵褥施綿衾垂其裔於四外屆時奉尸入棺實生時所落齒髪卷衣以塞空處喪主以下憑棺哭踊盡哀乃葢棺加錠施桼比葬月再桼徹殮牀遷柩其處柩東設靈牀施幃帳枕衾衣冠帶屨之屬設頮盆帨巾皆如生時柩前設靈座奉魂帛几筵供噐具以絳帛為銘旌長五尺題曰某官封未仕則否顯考某府君之柩婦則書顯妣某氏依靈座之右設殮奠内外序哭如儀及夜奉魂帛復牀諸子次於中門之外寝苫枕塊不脱絰帶諸婦女子次中門之内帷幔枕衾皆布素哀至則哭晝夜無時右初終襲殮是日成服輕重以親疎為等詳見官員喪儀厥明喪主以下夙興侍者設頮水櫛具於靈牀側五服之人各服其服就位侍者收頮櫛具奉魂帛出就靈座設奠焚香斟酒㸃茶喪主以下哭叩盡哀及夕如朝奠禮侍者詣靈牀舒枕衾奉魂帛於牀上衆哭盡哀廼止夕奠皆同朔朢則具殷饌於朝奠行之親賓弔奠如禮見官員喪儀右成服朝夕奠士卒於其職八品九品官以下同或在職遭喪者扶櫬還家聞喪奔喪皆如品官之禮右扶喪奔喪三月而葬營葬地及葬具墳塋周三十歩封髙六尺墓門石碣員首方趺勒曰某官某之墓無官則書庶士某之墓婦則稱某封氏無封則稱某氏刻壙誌式見官員喪儀作神主及櫝製柩轝下為方牀上編竹格為葢四出檐垂流蘇絹荒絹帷無翣引布二靈車一明噐鑪燭檠皆具擇日開兆喪主率諸子適兆所以親賓一人告土神執事者陳酒饌於兆左告者吉服盥就位上香酹酒讀祝祝辭均見官員喪儀下同行禮如儀遂開壙使子弟一人留視之喪主以下還葬有期豫以啟期告於戚友發引前一日厥明五服之人各服其服入就位朝奠訖告遷柩於殯前喪主以下再拜哭盡哀役人入遷柩祝奉魂帛前喪主以下哭從及外堂仍設座於柩前奉魂帛辭於祖禰復於靈座從哭如初及夕祖奠如朝奠儀喪主以下再拜哭盡哀親賓致奠行禮如成服致奠儀賓出喪主以下代哭如初質明五服之人㑹葬者畢㑹執事者陳明噐於大門外納靈車於門内之右役人舉轝入設於㕔事正中喪主以下哭踊廼載喪主輟哭視載牢實載訖設遣奠如祖奠儀役人舁轝祝奉魂帛就靈車奉木版櫝設魂帛後柩出大門施帷葢屬引遂發前明噐次銘旌次靈車轝從外親分執引布在前喪主以下絰杖衰服男在柩旁歩從女在柩後輿從哭不絶聲出城門若里門親賓不至墓者於前途立向柩再拜役人暫停轝喪主哭謝賓退柩行如初及墓執事者豫張靈帷於墓右置靈座几筵設題主案於右設藉柩席薦於壙前鋪陳壙中之事設婦女行帷於羡道之右靈車至帷外止祝奉魂帛於几上奉主櫝置魂帛側柩車至脱載去帷葢方牀下於藉席祝取銘旌縱加柩上喪主及諸子憑棺哭婦女哭羡道西屆時男女以次哭叩辭訣親賓送者再拜辭歸喪主及諸子哭謝遂窆喪主輟哭視執事者整銘旌藏誌石明噐復土喪主以下哭盡哀執事者陳饌於墓左致祭土神如開兆祭儀喪主以下退就靈帷之左序立祝盥復魂帛於廂啟櫝出木版臥置案上宗親善書者一人盥就位題主訖祝奉木主於几上設奠焚香奠酒讀告辭喪主以下哭叩盡哀祝焚告辭奉魂帛埋於墓側奉主納櫝置靈車而返在途不驅喪主以下哭從如來儀右啟殯至葬靈車至家喪主以下哭從入門祝奉木主設几上諸子在寝東服親序在諸子後婦女哭於房中有弔者如在殯儀廼修虞事執事者具饌品數各以其等主人以下就位哭主婦薦羮飯主人獻爵讀祝行禮如時薦儀畢主人奉主納櫝徹哭止衆退百日卒哭儀同虞祭厥明執事者具饌於寢室如常薦禮設亡者案於祖考神案東南啟室陳神主主人率衆先哭於几筵前奉亡者之王如寝諸子以下哭從及寝門止哭陳主於東南案上衆序立焚香進饌讀告辭行禮如常薦儀祝焚告文奉神主復室徹主人奉亡者之主復寝哭隨至几筵前納櫝訖哭止衆退右反哭至祔朞而小祥於忌日行事厥明喪主以下及朞親就内外位哭盡哀焚香進饌酒讀祝行禮儀與卒哭同再朞而大祥先忌一日設案於寝堂東西各一主人率諸子詣寝堂啟室以遞遷改題之事告於祖陳設讀祝行禮如時薦儀廼以紙裹應祧神主陳於西案奉曽祖以下神主臥置東案使子弟善書者一人改題訖復於室遞遷其位虚室中下級以竢闔門出質明主人以下就几筵前序哭陳設行禮如初朞儀主人奉亡者之主躋於寝室再拜闔門徹靈牀靈座罷朝夕奠徹几筵斷杖棄之屏處奉祧主於墓祭而埋於側如儀二十七月既周設几筵於㕔事正中主人以下如寝堂啟室奉新祔神主陳於㕔事几上祗薦禫事主人及諸子位東壁下舉哀婦女哀於房中焚香薦果饌酒醴讀祝如儀畢奉主復於寝室闔門退諸子素服終月始復常服右祥禫嵗逄忌日前期齋厥明主人及子弟素服如寝堂啟室出專薦之主於案焚香薦酒饌讀祝行禮如時節薦新之儀禮畢徹納主闔室退右忌日奠嵗寒食節或霜降節日主人夙興率子弟素服具酒饌詣墓拜埽既至芟除荆草設饌於墓前主人以下序立焚香再拜興别陳饌於墓左祀土神行禮如儀右拜埽庶人喪禮疾革書遺言既終子號哭躃踊去冠被髪徒跣諸婦女子去笄素服朞功以下丈夫素冠婦人去飾男東女西異向環牀哭立喪主主婦使子弟䕶喪事治襲殮之具訃於親友踰時子弟奉湯及巾櫛入婦女出婦喪則男出浴沐喪主及諸子止哭周視徹巾櫛及餘水埋之設襲牀於尸牀前陳衣冠帶舄遷尸於牀襲喪主以下哭踊即牀前為位立魂帛設奠陳生前所食酒饌内外序哭如禮喪主起盥含尸以銀屑三既襲幃堂設殮牀於堂東加殮衣複衾一皆以絹紟絞皆備殮畢遷尸於堂執事者以棺入棺内奠七星版藉槈施綿衾垂其裔於四外屆時奉尸入棺實生時所落齒髪以衣實其空處喪主以下憑棺哭踊盡哀廼葢棺加錠施桼比葬一桼徹殮牀遷柩其處柩東設靈牀施枕席衣被之屬設頮盆帨巾如生時柩前設靈座奉魂帛几筵供噐具設奠内外序哭如儀及夜奉魂帛於牀諸子居柩側寝苦枕塊不脱經帶諸婦女子易常次帷慢枕席用布素哀至則哭晝夜無時右初終襲殮是日成服服制見上厥明五服之人各服其服就位子弟設頮水帨巾於靈牀側歛枕衾奉魂帛出就靈座設奠焚香斟酒㸃荼喪王以下哭叩盡哀及夕設奠亦如之舒枕衾復魂帛於牀徹頮具衆哭盡哀迺止以至於虞朝夕同親賓弔奠如禮若在外聞訃者奔喪成服均如士喪之禮右成服朝夕奠踰月而葬營葬地及葬具墳塋周十八歩封四尺有誌無碣擇吉開壙祀土神作神主備靈車一柩舉一别製布衾衣柩不施帷葢發引前一日喪主以下就位哭朝奠訖奉魂帛辭於祖禰還靈座脯時設祖奠以永遷告喪主以下再拜哭盡哀厥明五服之人畢㑹納靈車於大門内之右納柩舉於㕔事内外各就位哭徹幃遷靈座役人舉柩就載衣以大衾喪主以下哭視載訖設奠柩前如祖奠禮奉魂帛就靈車置主櫝於後廼發引男女以次哭從及慕執事者豫設藉席於壙前設靈座於墓道之右設奠案於座前設題主案於奠案右靈車至奉魂帛於座柩至脱載下於藉席喪主以下憑棺哭婦女哭墓右屆時男女以次哭叩辭訣諸親會葬者均以次哭叩辭歸喪主及諸子哭謝迺窆納柩於壙下誌石復土祀土神如儀喪主以下退就靈座之側序立子弟啟櫝奉木版卧置案上宗親善書者一人題主訖子弟奉置靈座納魂帛於廂設奠讀告辭畢喪主以下哭叩盡哀祝焚告辭奉魂帛埋於墓側奉主納櫝遂行喪主以下哭從如來儀右啟殯至葬靈車至家子弟豫設几筵於殯寝故處奉木主陳之喪主以下序哭如士喪反哭之位廼虞饌品器數視薦禮主人以下就位哭主婦薦羮飯主人薦酒饌讀祝行禮如時薦儀畢主人奉神主納櫝徹哀止衆退百日卒哭設奠行禮儀同虞祭厥明喪主以下夙興哭於几筵前奉主詣寝陳於祖考神室東南以祔告啟室陳設行禮如時薦儀畢仍奉主復於几筵納櫝退右反哭虞祔朞而小祥忌日行事厥明喪主以下及朞親就内外位設奠哭叩如卒哭儀再朞大祥先一日詣寝以改題吿遷於祖考如士喪告遷之儀屆日夙興喪主以下就几筵前序哭設奠行禮儀同初朞主人奉亡者之主躋祔於祖再拜闔門出徹靈牀靈座几筵罷朝夕奠斷杖棄之屏處奉祧主埋於墓側如庶士儀二十七月既周設几案於㕔事奉新祔神主陳之喪主以下就内外位哭奠行禮如常薦儀禮畢復主於寝闔門退諸子素服終月始服常右祥禫忌日主人具饌羞羮飯夙興及子弟素服啟寝室出專薦之主於案焚香薦酒饌行禮如常薦儀畢納主闔室退右忌日奠嵗寒食或霜降節具饌主人率子弟素服拜埽墳墓既至芟除荆草訖設饌於墓前主人以下焚香再拜興别陳選於墓左祀土神行禮如儀右拜埽欽定大清通禮卷五十
