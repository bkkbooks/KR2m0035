婦凡與朝賀及執事者咸朝服自永康右門入進慈寧門於東西丹墀序立内監移丹陛樂於慈寧門檐下北向禮部尚書轉傳内監奏請皇后詣皇太后宫行禮皇后率皇貴妃貴妃妃嬪具禮服陞輿以次出啓祥門前引命婦恭導至徽音左門外降輿入皇后陞丹陛至檐前東向立皇貴妃貴妃妃嬪東西面序立公主福晉暨命婦依次東西面序立皆北上引禮命婦轉傳内監奏請皇太后陞慈寧宫寶座皇太后禮服出中和韶樂作奏豫平之章樂辭見前後仿此陞座樂止引禮命婦引皇后皇貴妃貴妃妃嬪就拜位公主福晉命婦均就拜位北面立引禮命婦奏請行禮丹陛大樂作奏益平之章樂辭見前皇后率皇貴妃貴妃妃嬪行六肅三跪三拜禮公主福晉命婦均隨行禮畢樂止復位引禮命婦轉傳内監奏請皇太后還宫中和韶樂作奏履平之章皇太后還宫樂止引禮命婦奏禮畢引皇后皇貴妃貴妃妃嬪仍由西門出前引命婦引至徽音左門外乘輿還宫各退皇子詣皇太后前行禮如儀皇后千秋節率皇貴妃貴妃妃嬪公主福晉命婦行禮均如前儀右皇后朝賀盛京直省文武官恭遇皇太后萬壽聖節率所屬集公所行禮與皇帝萬壽節儀同右外官慶賀皇后三大節朝賀之禮先期諸王公及内外文武臣工具賀箋送禮部其式曰具官臣某等誠懽誠忭稽首頓首上言伏以箋聨隨時擬撰敬惟皇后陛下隨時臣撰擬等幸際昌期恭逢令節元旦長至伏願隨時臣撰擬等無任瞻天仰聖懽忭之至謹奉箋稱賀以聞右箋賀儀式是日昧爽内監陳皇后儀駕先蠶詳祭儀九鳳黄曲蓋陳於宫檐下正中拂香鑪合盥盤盂缾几倚節繖扇旗𤓰仗陳於階下東西大儀輿儀輿黄輿鳳輿陳於宫門外中和韶樂設於宫檐前丹陛大樂設於宫門内禮部儀制司官自部奉臣工慶賀箋文安龍亭内校尉舁行鼓吹前導導迎樂作奏禧平之章千秋令節辭曰坤德柔靜陰敎順承螽斯麟角允惟嘉應寶冊鐫天慶膺永嗣徽如月恒元旦長至箋文與表文同進樂辭見前由東長安門至午門外陳設恭送内閣如儀右儀駕樂懸陳設質明内監設皇貴妃責妃妃嬪拜位於月臺左右北面設公主福晉以下二品命婦以上拜位於丹陛上按翼分東西班北面序立設引禮命婦二人贊相禮儀自公主福晉暨命婦與賀者依時刻朝服祗候皇后既率妃嬪詣皇太后皇帝前行禮儀見前畢引禮命婦引皇貴妃貴妃妃嬪内監引公主福晉暨命婦赴皇后宫門内各依次立東西面引禮命婦轉傳内監奏請皇后御内殿皇后禮服出中和韶樂作奏淑平之章辭曰承天地道光嗣徽音兮儷我皇椒宫壼敎彰萬國為儀燕翼昌彤管紀芬芳春雲渥環珮鏘安貞德有常敷内政應無疆樂辭三大節同後仿此陞座樂止引禮命婦引皇貴妃貴妃妃嬪就拜位公主福晉命婦俱就拜位行六肅三跪三拜禮丹陛樂作奏正平之章辭曰正坤維兮儷皇極母儀昭萬國福履永綏將六宫承法則樂辭三大節同禮畢復原位立樂止引禮命婦轉傳内監奏請皇后還宫中和韶樂作奏順平之章辭曰瑤樞煥上台椒殿風和麗景開晴旭上蓬萊佳氣氤氲徧九垓祥雲䕶燕禖培麟趾毓蘭荄雉扇影徘徊看瑞靄集宮槐皇后還宫樂止妃嬪退公主以下皆出皇子詣皇后宫行禮如儀右中宫朝賀欽定大清通禮卷十七
