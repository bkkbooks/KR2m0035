body:
  text: 古者朝覲本列賔禮唐開元禮仍用其式然令節稱賀著於史者實自漢始與十七篇覲禮自異考之周禮慶賀繫之嘉禮斯為近之我國家嘉慶駢臻典制矞皇儀文備焉謹與耕桑學校貢舉昏姻諸典禮之切於前民者詳著於篇皇帝三大節朝賀之禮先期諸王大學士率京朝官直省文武率闔屬官具賀表豫送禮部其式曰具官臣某等誠懽誠忭稽首頓首上賀伏以表聨隨時撰擬恭惟皇帝陛下隨時臣撰擬等恭遇熙朝欣逢聖誕元旦長至伏願隨時臣撰擬等無任瞻天仰聖懽忭之至謹奉表稱賀以聞禮部屆期具疏請皇帝御太和殿受賀制報曰可右表賀儀式至日五鼓鑾儀衛率官校入陳法駕鹵簿九龍曲柄黄華蓋一在太和殿檻外正中執者武備院卿一人朝服北面拂二立夏陳列處署收金鑪二金盒二金盥盤一金盂一金缾二金方几一金交椅一夾丹陛左右旗尉二十有二人掌之雲麾使一人治儀正二人次儀刀二十親軍四十人弓矢二十親軍四十人豹尾槍二十䕶軍四十人相閒為十班次殳四親軍八人㦸四親軍八人雲麾使一人治儀正二人整儀尉四人立丹陛上皆東西面次翠華蓋二紫芝蓋二九龍曲柄黄蓋四民尉四十有八人掌之夾兩階戺自階以下丹墀東西五色四季花繖十閒以五色九龍繖十赤素紫素方繖各四民尉六十人掌之鑾儀使一人雲麾使一人治儀正二人整儀尉二人次壽字黄扇八單龍雙龍黄團扇各八單龍雙龍赤團扇各八孔雀扇八雉尾扇八鸞鳳赤方扇八民尉百二十有八人掌之雲麾使一人治儀正二人整儀尉二人次夀幢四紫幢四霓幢四羽葆幢四民尉三十有二人掌之信旛四降引旛四豹尾旛四龍頭旛四民尉三十有二人掌之教孝表節明刑弼教行慶施惠褒功懐逺旌各二振武敷文納言進善旌各二金節四儀鍠􅌁四黄麾四民尉五十有六人掌之雲麾使二人治儀正二人整儀尉二人次驍騎纛二十有四羽林大纛八前鋒大纛八五色銷金龍纛二十民尉百二十人掌之儀鳳翔鸞雲鶴孔雀黄鵠白雉赤烏華蟲振鷺鳴鳶遊鱗彩獅白澤甪端赤熊黄羆辟邪犀牛天馬天鹿為旗二十民尉四十人掌之五嶽旗五四瀆旗四民尉十有八人掌之青龍白虎朱雀神武二十八宿五星為旗三十有七民尉七十有四人掌之甘雨旗四八風旗八雲雷旗各五日月旗各一民尉四十有八人掌之門旗八金鼓旗二翠華旗二民尉二十有四人掌之雲麾使一人治儀正二人整儀尉二人次五色銷金小旗二十每色各四民尉四十人掌之出警旗一入蹕旗一鉞六星六卧𤓰立𤓰各六吾仗御仗引仗各六民尉六十有七人掌之雲麾使一人整儀尉二人次静鞭四在兩階下民尉十有四人掌之治儀正一人仗馬十在静鞭之南䕶軍二十人冠軍使雲麾使二人皆東西面太和門外玉輦一在東金輦一在西民尉各三十有二人奉輦雲麾使一人治儀正一人午門外玉輅駕象一民尉四十有四人金輅駕象一民尉四十有四人象輅駕馬八民尉三十有四人在東木輅駕馬八民尉三十有二人革輅駕馬四民尉三十有二人在西雲麾使一人治儀正二人寳象在五輅之南其三在東其二在西民尉八十人雲麾使一人治儀正二人直前鼓吹大樂掆鼓二十有四金二仗鼓四拍版四横篴十有二掆鼓二十有四畫角二十有四金鉦四小號大號各八署史六十有八人民尉百六十有四人畫角前掆鼓後閒以紅鐙各二民尉六人冠軍使一人整儀尉二人天安門外東西朝象四民尉二十有八人雲麾使一人治儀正二人凡鹵簿親軍䕶軍旗尉民尉各服其服禁語譁者察不整備者樂部率和聲署陳中和韶樂於太和殿檐前東植麾設柷西設敔金編鐘在東玉編磬在西皆十有六懸以虡業樹應鼓於鐘懸之右琴四瑟二笙八篴四簫四塤二箎二排簫二皆東西分比北向樂工北面搏拊設於南東西向樂工東西面歌工在前位如之設丹陛大樂於太和門檐下東大鼓一方響一雲璈二簫二笙管篴各四拍板仗鼓各一樂工二十人西大鼓一方響一樂工十人樂皆北向領樂丞史東西各二人及樂工皆北面節以戲竹執者二人夾丹陛中階立東西面有司設二案於殿内東西楹南皆南北肆禮部儀制司官奉中外臣工賀表載於亭鑾儀衛校自部舁行香亭前表亭後鼓吹前導導迎樂作奏禧平之章萬壽聖節辭曰神聖文武提挈六符綏以眉壽罄宜多祜邁斗維呈瑞圗萬嵗聲山應呼元旦辭曰元正朝享臨御萬方閶闔通啓太平呈象旅貢陳軒樂張徧海隅瞻帝光冬至辭曰黄鐘應律玊琯廻陽書雲薦瑞迎日履長共球集韶濩張奉金函來萬方由東長安門至午門外亭止儀制司官奉王以下在京文武官賀表進太和殿設東案上内閣官奉筆硯設西案上如式右陳設辨侍班官位前引内大臣立御座旁左右僉立豹尾班侍衛佩刀侍衛在御座後左右翼立記注官立前楹西第三柱東面北上内閣大學士學士翰林院侍讀學士侍講學士詹事府詹事少詹事立東檐第三柱西面都察院左都御史副都御史立西檐第三柱東面皆北上辨執事官位樂部典樂一人立檐東植麾之次西面和聲署領樂官六人分立東西懸樂之次東西面宣表官一人立東檐侍班官之次鴻臚寺鳴贊二人立東檐第一柱西面二人立西檐第一柱東面鑾儀衛傳鳴鞭官立丹陛西階每重二人東面糾儀御史二人立西檐第三柱東面御史四人禮部司官四人立丹陛之南御史四人立丹陛之北皆北上東西面又御史四人吏部禮部司官各四人在丹墀之南東西僉立辨百官朝位丹陛上東西各二班親王郡王貝勒為一班貝子入八分公為二班按翼序列左翼立位西面北上拜位北面西上右翼立位東面北上拜位北面東上丹墀内不入八分宗室公以下暨公侯伯子男文武百官立位在鹵簿外値丹陛東西隅東西各九班東西面北上滿官按翼為序左翼在東漢官吏部戶部禮部宗人府通政司翰林院詹事府太常寺光禄寺鴻臚寺國子監吏科户科禮科内閣中書舍人欽天監太醫院以次從左翼之南右翼在西漢官兵部刑部工部都察院大理寺鑾儀衞太僕寺中書科兵科刑科工科順天府京縣五城兵馬司三營以次從右翼之南皆正從同班依品為序拜位在鹵簿内直東西階東西列品級山自北而南各十有八正從異班依品為序皆北面東班西上西班東上外國陪臣立位隨西班末拜位亦如之以其等為序右序班位質明王公暨文武一二品官從皇帝朝於皇太后宫三品以下官㑹午門闕下均行禮畢慈寧儀詳賀宫朝鴻臚寺卿序定王公班次鳴贊序定一二品官班次均由右翼門入引王公至丹陛上引一二品官至丹墀東西鳴贊序定三品以下官班次於午門東由左掖門入昭德門西由右掖門入貞度門均引至丹墀司賔序班序定外國陪臣班次引入西班百官後均依前位立糾儀官暨執事官咸入就位欽天監官於乾清門報時禮部尚書侍郎奏請御殿後扈内大臣二人率豹尾班執槍侍衞十人佩刀侍衞十人於乾清門禮部尚書侍郎於門階下前引大臣十人於太和殿後階下咸左右序立祇候午門鳴鐘鼓皇帝禮服乗輿出宮禮部尚書侍郎恭導後扈内大臣從由保和殿御中和殿座鴻臚寺官引侍班導從各官至殿前按班行三跪九叩禮不贊畢侍班官先趨出外朝就位皇帝駕興禮部尚書侍郎暨前引大臣恭導後扈如初工舉麾鼓柷中和韶樂作中和韶樂以舉麾鼓柷作以偃麾戞敔止後同萬壽聖節奏乾平之章辭曰祥雲扈紫㝠四海臣民祝聖齡淑氣轉階蓂堯籙羲圖燦御屏嵩呼徧在廷天呈瑞地効靈南極拱台星億萬載頌康寧元旦奏元平之章辭曰維天眷我皇四海昇平泰運昌嵗首肇三陽萬國朝正拜帝閶雲物奏嘉祥乗鸞輅建太常時和化日長重九譯盡梯航冬至奏遂平之章辭曰陽囘黍谷春萬國衣冠拜紫宸旭日耀龍鱗雲物呈祥福禄臻堯階蓂莢新熙庶績撫五辰九服共來賔調元化轉洪鈞皇帝御太和殿陞座工偃麾戞敔樂止導從官各就位鑾儀衞官進至中階之右三傳鳴鞭丹墀内三鳴鞭戲竹交丹陛樂作止皆以􅯻竹交為節丹陛樂作奏慶平之章辭曰鳳凰在藪麒麟在郊坰不如國士充陛廷野無遺賢宗有英夙夜在公在公明明鴻臚寺分引王公就拜位引文武百官由鹵簿南轉入拜位皆東西桉班北面序立贊進皆進贊跪皆跪樂暫止贊宣表宣表官自東檐入殿左門至東案前奉表至檐下正中北面跪大學士二人左右跪展表宣表官宣畢仍奉表進復於案退樂作贊叩興王公百官行三跪九叩禮興鴻臚寺官按班引退皆復原位立樂止又贊進鴻臚寺引外國陪臣就西拜位立丹陛樂作奏治平之章辭曰我清世德作求若天行天盡所覆畀我清萬方悅喜來享庭曰予一人業業兢兢凡丹陛樂辭三大節皆同贊行三跪九叩禮畢引退復位立樂止若數國並朝先朝鮮餘國以次遞引行禮皇帝既受賀賜羣臣及外國陪臣坐王公由殿左右門入位東西楹後大學士由殿左門入位東楹王公後導從侍班各官入八分公以下文武百官就原立位咸跪行一叩禮坐尚茶進皇帝茶王公百官就所坐位行一叩禮乃賜王以下文三品武二品官以上暨外國陪臣茶受茶及坐飲畢咸跪行一叩禮鑾儀衞官傳鳴鞭如初衆皆興階下三鳴鞭駕興中和韶樂作萬壽聖節奏泰平之章辭曰皇躬福禄宜永紹鴻圖丕丕基彤陛長仙芝樂奏箾韶丹鳳儀南山獻壽巵人心悅天意隨為德徧羣黎歌樂愷萬年斯元旦奏和平之章辭曰聖人延俊英鈞天樂奏繞彤廷華夷一統寧士庶懽忻樂太平寶鼎御香盈祥煙裊瑞靄生簫韶喜九成齊慶祝萬年齡冬至奏允平之章辭曰皇心克配天玉琯葭灰得氣先彤廷臚唱宣四海共球奏御筵珠斗應璣璿金鏡朗麟鳳騫人間景福全咨屢省懋乾乾皇帝還宫樂止鴻臚寺官分引王公百官以次退禮部儀制司官奉殿上表及午門外亭内直省文武官表送内閣咸退右羣臣朝賀是日内監豫設中和韶樂於乾清宫檐下設丹陛大樂於乾清門内如儀皇帝御太和殿受羣臣朝賀畢乘輿至乾清宫檐前降輿中和韶樂作樂章與外朝同後仿此皇帝陞座樂止皇后率皇貴妃貴妃妃嬪禮服詣乾清宫皇后就正中拜位立皇貴妃貴妃妃嬪稍後左右立均北面丹陛大樂作奏雝平之章辭曰關睢四敎家邦作孚先黄裳元吉地承天六宫仁順化穆宣麟之趾兮萬福之原行六肅三跪三拜禮畢樂止各還後宫内監引皇子升東西階就丹陛上東西拜位北面立東班西上西班東上丹陛大樂作樂章與外朝同行三跪九叩禮畢退立兩旁東西面中和韶樂作皇帝降座樂止皇子皆退皇后千秋節率妃嬪行禮如前儀右内朝賀盛京三大節朝賀之禮是日五鼓内務府官詣大政殿啓扉拂拭御座禮部官恭設香案於殿門外正中南向辨百官拜位於丹墀内將軍副都統户部禮部兵部刑部工部侍郎廵察科道内務府及所屬官弁左翼在東右翼在西奉天府尹丞治中通判京縣以下官從右翼班皆九等以品為差東位西上西位東上均北面鳴贊二人分立班行之北引班二人分立班行左右皆贊禮郎充均東西面漏未盡文武官朝服㑹大清門外祇竢將辨色引班分引至大政殿丹墀内鳴贊贊齊班引班引百官就拜位立贊進少進贊跪叩興百官行三跪九叩禮興贊退引班引由左右門出序退右盛京朝賀儀直省三大節朝賀之禮省㑹守土官豫於公所正中設萬壽龍亭南向設香案於亭之南其日五鼓有司設燎於庭設鐙於門廡敎授訓導二人糾儀學弟子員二人通贊二人引班階下東西班位將軍總督一班廵撫副都統提督學政二班總兵官協領叅領織造郎中督關郎中布政使按察