front:
  text: 欽定四庫全書欽定大清通禮卷三十五嘉禮
  hash: sha256:5b1d29b0891823efe101006e5e0dc06657e6d3310318bceb369669e7c0e2f4a4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0035_WYG_041-1a, image: WYG0655/WYG0655-0365a.png}
body:
  text: 貢舉之禮以子午夘酉歳秋八月如不拘特開恩科年間以二月大比直省府州縣學諸生而賔興之曰鄉試順天鄉試府尹領之府丞提調試闈内外事宜各府州縣禮送學政所錄羣士赴京師國子監録肄業貢監生送府提調官按府州縣簿籍應試諸生序定名册備試卷依時畢辦將届期禮部疏請命正考官一人副考官一人同考官十有八人内簾監試御史収掌官各二人外簾監試御史四人外闈廵察御史四人受卷彌封謄録對讀四所官各四人試前三日𫝊集疏列各官平明朝服㑹午門外闕下祇候㫖下内閣禮部侍郎一人率官屬詣内閣奉疏出承命各官出班餘退侍郎朝服直闕左門前西面立官屬奉疏從考官以下序立於甬道東北面重行西上官屬起函以疏授侍郎各官跪侍郎以次展疏宣㫖訖授官屬納於函退各官均行三跪九叩禮興皆退出東長安門赴順天府筵燕詳筵燕儀遂偕府丞入闈御史㑹封内外諸門以時啟閉稽出入右命試官執事官試前二日廵察御史啟門進試卷及謄錄生醫匠吏役皆捜檢乃入闔門提調官監試御史坐至公堂籖掣四所官各治其事視吏鈐諸生坐號於卷面以辨號舍按冊序次書諸生姓名於版版率五十人以待唱名序進右外簾供備試前一日五鼓順天府尹詣試院考官奏請題目内簾吏𫝊金外簾吏報鼔考官奉奏章立内龍門内提調官立於門外監試御史㑹啟門凡内龍門啟閉𫝊金報鼔為節皆監試御史㑹涖之後仿此考官跪舉奏章授提調官提調官跪接興闔門由中道降鼓吹作監試御史啟外龍門及二門廵察御史㑹啟大門凡大門啟閉以鼓吹為節皆監試廵察御史㑹涖之後仿此府尹立門外丞授府尹如前儀闔門入府尹詣乾清門轉奏皇帝命首場四子書暨二場五言八韻排律詩題目緘封加函府尹奉詣試闈轉授考官啟門闔門均如前儀考官跪接入恭謄並出論題付梓人刋題紙右命試題是日出諸生姓名版分設東西門外持版胥一人主進吏一人平明應試諸生畢集主進吏以版序諸生於門外胥持版先由東西門魚貫序進受照入簽宛平大興二縣涖之又進聼唱名廵察御史涖之又進聼捜檢及大門再聼捜檢皆欽命大臣涖之廼交照入簽主進吏以版出諸生進至二門聼唱名給卷監察御史涖之入外龍門歸號舍晡後畢入御史闔内外門鎖鑰加封㑹提調官視吏徧封諸號舍門禁㫁出入及夜明鐙嚴􅁄垣廵警試日五漏交考官函封題目由提調官轉授府尹送内閣恭進御覽啟門闔門如請題目之儀漏未盡復啟内龍門考官坐門内提調官坐門外吏舁題紙及門提調吏於門外接出闔門以題紙徧布諸生供給官早晩具食飲送號舍皆提調官涖視之越日完卷提調官㑹御史啟號舍門諸生持卷赴至公堂交受卷官鼓吹作啟門各給照出簽序出二場試排律詩欽命題目五經義三場試策均由考官擬題目儀與首場同右考試既畢試受卷官斥去不合式者彌封所糊姓名坐號别鈐内號登諸簿籍謄録所易書以朱對讀所校讐訛錯改注以紫皆提調官涖視之既畢外監試視吏送入内簾内監試視収掌官受卷啟門闔門如初乃分朱卷於同考各官閲以藍筆有佳卷則薦内監試書薦官職銜送考官閲以墨筆入選之􅃃副考官書取正考官書中不入選者批摘瑕疵三場試卷皆如之閲將畢豫擇掲曉日移提調官轉飭内外供辦前三日考官選中式上卷十本宻封具奏由提調官轉授府尹進呈御覽皇帝親定甲乙封還考官均如請題命題之儀考官祗受啟封及中式諸卷各書名次於卷首前一日設案於内簾堂内正副考官府尹案南向提調監試官北向同考官東西向設牓案於中設卷案於考官案前晡後府尹齎印至闈提調監試官啟大門延入遂徧鎖諸門及夜明燭内簾官於内龍門内府尹及外監試官於門外啟門吏奉印前府尹入各官皆入相見揖升堂吏置印於府尹案上外簾吏舁墨卷陳於堂東内簾吏舁中式朱卷陳於卷案書牓吏以牓紙設於牓案均立其次御史封龍門嚴出入衆揖就位吏啟箱取朱卷置案上啟封高唱􅃃面名次及内號堂東吏檢墨􅃃持至案前校對朱墨卷相符遂拆墨卷彌封以墨卷授正考官書名次以朱卷授副考官書姓名别録一紙授吏依次唱姓名及某府州縣某生習某經徧告在位者書牓書題名錄既畢吏歛朱墨􅃃於箱奉印鈐牓封題名録於函置中案上前設香案主考官以下更朝服詣香案前重行北面行三跪九叩禮興𫝊金報鼓自内龍門至大門洞開輿人以采亭入牓出吏奉印前府尹與考官揖出及至公堂陳牓於亭舁行鼔吹前導懸掲順天府衙前各官皆出提調官以題名録送内閣恭進御覽以􅃃送禮部考官復命事竣退翼日筵燕於順天府如儀詳筵燕儀右掲曉直省鄉試布政使司領之監臨以廵撫提調監試以各道或府佐將届期禮部疏列京朝官進士出身資階及格者宻題請每省命考官正一人副一人侍郎宣㫖於午門外如儀給乘𫝊分詣典試之省各省廵撫豫調取所屬科目出身府佐及州縣充内簾同考官及外簾四所官畢竢省㑹布政使司簿籍應試諸生備試卷治試闈内外事冝依時畢辦考官至居館於外提調官資廪餼謹其出入試前二日筵燕於布政司堂上如儀詳筵燕儀遂偕監臨提調監試内外簾各官入闈考官擬題目試士監臨官疏進御覽並達禮部掲曉前夕布政使齎印入闈鈐牓掲牓於布政司衙前翼日筵燕如儀詳筵燕儀監臨官上題名錄解中式朱墨卷考官選試藝每題一篇授布政使刋試録送禮部彚進皇帝仍乗𫝊以事竣復命其試士儀注與順天府鄉試同右直省鄉試鄉試之明年以丑未辰戌嵗三月特䦕恩科間用八月試天下貢士於禮部曰㑹試豫年十一月禮部疏列郎中員外郎主事請命正副提調各一人及本年正月疏請命侍郎一人充知貢舉直省布政使司禮送府州縣所貢士赴京師提調官治試闈内外事宜簿籍直省貢士按府序定名冊備試卷依時畢辦試前五日禮部疏請命考官同考官監試廵察及四所執事各官宣㫖於午門外赴禮部筵燕詳筵燕儀偕知貢舉提調入闈欽命四子書及五言八韻排律詩題目考官擬論題五經題䇿題分三場試貢士並如順天府鄉試之儀旣畢試知貢舉分計各省試卷人數報禮部疏請中額得㫖禮部移知貢舉轉達内簾考官率同考官如額錄取上所取試卷禮部恭進御覽皇帝親定甲乙下考官書牓掲曉懸牓禮部衙前収掌官以卷送内閣考官以事竣復命儀均與順天鄉試同翼日筵燕於禮部如儀詳筵燕儀右㑹試㑹試掲曉後禮部上所貢天下士試䇿殿廷皇帝臨軒發䇿將届期禮部備試卷疏列内閣大學士學士九卿翰林院學士詹事府詹事少詹事銜名題請命讀卷官十有四人疏列閣部院寺進士出身四品以下七品以上官暨給事中御史請命受卷官十人彌封官十有二人収掌官十人書牓中書十有六人印卷禮部官四人監試御史四人前一日下内閣各官備朝服平明㑹午門外闕下祇候禮部侍郎一人率屬詣閣承㫖接疏出宣㫖奉命之讀卷官及執事官行三跪九叩禮如鄉㑹試命官之儀讀卷官宻擬䇿問數事奏請欽定撰題目恭進御覽持至内閣刋題紙宻封以竢右命讀􅃃官執事官届日鴻臚寺設案於太和殿内之東南北肆設案於丹陛上正中東西肆鑾儀衛陳法駕鹵簿樂部和聲署陳樂懸各依常次光禄寺備試案於東西廡下案表諸貢士姓氏名次竒數在東偶數在西質明王公百官記注官及侍班執事各官入陪位如常儀讀􅃃及執事官入序立於丹墀東咸朝服諸貢士吉服㑹午門外禮部侍郎二人分位闕左右門階下序進官屬給試卷鑾儀衛官按名令校尉一人代執筆硯器物鴻臚寺官分引貢士東由左掖門昭徳門西由右掖門貞度門魚貫入序立於丹墀東西之末内閣官奉䇿題設殿内東案上退禮部尚書侍郎詣乾清門奏請御殿午門鳴鐘鼓皇帝禮服乗輿出宫前引後扈如常儀至太和殿北階降輿入工舉麾鼔柷中和韶樂作奏隆平之章樂辭詳見常儀朝陛殿皇帝御太和殿陞座工偃麾戛敔樂止大學士一人進殿左門至東案前奉䇿題由中門闑左出禮部尚書一人進就中檻外大學士西面授䇿題復位立禮部尚書北面跪受興奉至丹陛北面跪設於案三叩興禮部官屬進舉案尚書隨降中階設於丹墀甬道正中鑾儀衛官贊鳴鞭階下三鳴鞭戲竹交丹陛樂作奏慶平之章樂辭詳朝賀儀鴻臚寺官引讀􅃃官執事官就丹墀東拜位北面立聼贊行三跪九叩禮興引退復位樂止次分引貢士就丹墀東西拜位重行北面序立聼贊行禮如前儀鳴鞭駕興中和韶樂作奏顯平之章皇帝還宫樂止讀卷及執事官各歸其次鹵簿樂懸出百官皆退鑾儀校舉試案分列丹墀東西如遇風雨則設两廡下禮部尚書視官屬分給題目引諸貢士列班跪受聼贊三叩興引就案北面對䇿晡後交卷於受卷官以授彌封官糊名送収掌官訖皆出若非親策王公百官不陪位不設鹵簿樂懸餘儀同右臨軒發策𫝊臚前一日内監豫於乾清門内便殿寳座前設御案又設案於御案前之左陳筆硯讀卷官既畢閲卷選上卷十標擬名次宻封申酉刻奉至乾清門啟奏皇帝御便殿陞寳座召讀􅃃官入内閣學士一人奉􅃃在前各官以次入序立於左記注官随入序立於右賜讀卷官坐各於立位行一叩禮序坐内閣學士就御案前啟封恭進御覧皇帝親定甲第命大學士二人就左案一人啟彌封一人依名次書訖宻封内閣學士奉出各官隨出皇帝還宫奉􅃃至内閣啟封付中書舍人書牓内閣學士奉牓詣乾清門請皇帝之寳鈐牓訖仍送入退右讀卷翼日漏未盡所司陳鹵簿樂懸於太和殿外常次設案於殿東及丹陛上均如殿試之儀設雲盤黄蓋於階下設采亭御仗鼔吹於午門外王公百官記注官及侍班執事官序立陪位如常儀大學士一人立殿外東檐下禮部尚書一人立大學士之下宣制官一人立東樂懸之南均西面𫝊臚官立丹陛西階每成一人均東面黎明内閣學士奉牓録詣乾清門進御前内閣官奉黄牓設殿内東案退讀卷官及執事官朝服集東丹墀内諸貢士公服㑹午門外鴻臚寺官引入序立如殿試之儀禮部尚書侍郎詣乾清門奏請御殿遂前導駕午門鳴鐘鼓皇帝禮服乗輿出宫御太和殿中和韶樂作奏隆平之章辭曰啟文明五色雲呈珊網宏䦕羅俊英梧岡彩鳳雝喈鳴氣如珠河似鏡集賢才於蓬瀛樂止鳴鞭丹陛樂作如常儀鴻臚寺官引讀􅃃執事各官就拜位北面聼贊行三跪九叩禮興退復位樂止大學士進殿左門詣東案前奉黄牓出授禮部尚書尚書跪接興陳於丹陛案北面三叩興避立於左鳴贊贊齊班丹陛樂作奏慶平之章辭曰賢闗大啟五緯麗宵光九苞彩鳯鳴髙岡日華五色舜衣裳濟濟蹌蹌多士思皇序班分引諸貢士就拜位重行北面立贊有制諸貢士皆跪樂暫止宣制官宣制曰某年月日策試天下貢士第一甲賜進士及第第二甲賜進士出身第三甲賜同進士出身宣畢傳臚官唱第一甲第一名某以次接𫝊至丹陛下序班引令出班就御道左跪第二名就道右少後第三名就道左又後皆臚𫝊者三以次前跪次唱第二甲某等若干名第三甲某等若干名不引出班唱畢樂作諸進士聼贊行三跪九叩禮興引退復位樂止贊舉牓禮部尚書進就牓案前北面跪奉以興降自中階禮部儀制司官承以雲盤十人前引張黄蓋出太和門中門一甲三名進士隨出序班分引諸進士左出昭徳門右出貞度門鳴鞭中和韶樂作奏顯平之章辭曰海榴舒木槿初榮宣賜宫衣最有名薫来殿角微凉生鳳棲梧麟在囿致皇風於昇平皇帝還宫樂止百官皆退牓至午門外儀制司官陳牓於采亭内跪三叩興御仗鼓吹前導導迎樂作奏禧平之章辭曰賢網寛整才俊畢登疏附先後一人維聖敎澤長多士盈景運䦕龍虎蒸出東長安門懸牓街左順天府府尹觴及第三人酒備繖蓋儀仗迎至公所府尹暨丞供張設席揖譲行酒三廵乃送歸第右𫝊臚放牓𫝊臚次日設恩榮燕於禮部詳筵燕儀越五日狀元率諸進士上表謝恩得㫖陞殿是日鹵簿樂懸陳設如常儀鴻臚寺設案於太和殿檐下之東宣表官一人立於案旁黎明王公百官入陪位狀元奉表率諸進士入序立東西丹墀均如𫝊臚之儀序班引狀元升東階以表恭設案上降階復位鴻臚寺卿二人詣乾清門奏請御殿遂前導駕午門鳴鐘鼓皇帝禮服乗輿出宫御太和殿作樂鳴鞭如常儀丹陛樂作鳴贊贊齊班序班分引狀元及諸進士就拜位重行北面贊進皆進贊跪皆跪樂暫止贊宣表宣表官奉表至殿中檻外北面跪展讀訖興退以表復於案樂作狀元及諸進士聼贊行三跪九叩禮興引退復位樂止鳴鞭作樂皇帝降座還宫序班引狀元及諸進士以次出百官皆退若非得㫖陞殿是日鴻臚寺設案於午門外甬道正中鳴贊二人監禮御史二人立於案前序班引狀元及諸進士由東長安門入至闕下序立甬道左右均東西面狀元奉表詣案北面跪陳於案三叩興退鳴贊贊齊班引狀元及諸進士重行北面贊跪叩興行三跪九叩禮興引退禮部官奉表文送内閣鴻臚寺徹案退右表謝殿試後旬有二日狀元率諸進士詣太學釋奠於先師孔子行禮如儀儀詳吉禮右舍奠釋褐欽定大清通禮卷三十五
