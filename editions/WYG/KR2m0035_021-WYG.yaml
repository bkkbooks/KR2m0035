body:
  text: 致祭先醫之禮景惠殿内中奉太昊伏羲氏左炎帝神農氏右黄帝軒轅氏均南向勾芒風后東位西向祝融力牧西位東向東廡僦貸季岐伯伯高少師雷公伊尹淳于意王叔和皇甫謐葛洪韋慈藏錢乙劉完素李杲皆西向西廡鬼臾區俞跗少俞桐君馬師皇扁鵲張機華陀巢元方孫思邈王冰朱肱張元素朱彦修皆東向以北為上嵗以春冬仲月上甲遣官將事豫日太常寺官具祝版眡割牲太醫院官潔蠲殿廡内外拂拭神座如儀祀日五鼓太常寺官具器陳正殿三皇位前各設一案每案鉶二簠二簋二籩十豆十共牛一羊一豕一前設香案各一陳鑪一鐙二配位東西各設一案每案鉶二簠一簋一籩十豆十羊一豕一鑪一鐙二殿中設一案少西北向供祝版東設一案西向陳禮神制帛三色白香盤三爵九尊一西設一案東向陳素帛二色白香盤二爵六尊一凡牲陳於俎凡帛實於篚凡尊實酒承以舟疏布冪勺具東廡分設三案每案簠一簋一籩四豆四琖十豕肉二統設一案陳鑪一鐙二設案一於南北向陳素帛一香盤一尊一爵三篚冪勺具西廡陳設同太常寺官設洗於咸濟東門内和聲署設樂於西階下器數見祀眞武禮承祭官拜位在殿階上讀祝拜位在殿内正中兩廡太醫院分獻官位甬道左右太常寺司祝司香司帛司爵分立祝案尊案之次典儀立殿外東階掌燎率燎人立於燎鑪南昧爽司祝奉祝版安於祝案承祭官暨分獻官咸朝服豫竢太醫院鴻臚寺官引陪祀太醫院官入咸濟門内左右祇竢至時太常寺贊禮郎二人引承祭官入咸濟東門分獻官隨入贊盥洗承祭官盥手畢引至拜位前立典儀贊執事官各共廼職贊禮郎贊就位承祭官暨分獻官陪祀官均就位立典儀贊迎神樂作辭曰精氣縁乎理調劑觀所頤曰惟古聖嘗草定醫似鐵隨磁沴除吉至化工出自於指萬姓永荷恩施贊禮郎引承祭官由殿左門入詣正中香案前贊跪承祭官跪贊上香司香跪奉香承祭官上炷香三上瓣香興以次詣左右正位前上香如儀配位司香官分詣各案前跪上香兩廡贊禮郎引分獻官分詣兩廡位前上香畢贊復位承祭官復位兩廡分獻官各復位立贊跪叩興承祭官行三跪九叩禮分獻官陪祀官均隨行禮興典儀贊奠帛爵行初獻禮有司揭尊冪勺挹酒實爵司帛奉篚司爵奉爵以次詣各神位前司帛跪奠篚於案三叩興司爵立獻爵奠於墊中畢皆退贊禮郎贊詣讀祝位引承祭官就讀祝位立司祝至祝案前跪三叩興奉祝版跪案左樂暫止贊禮郎贊跪承祭官跪分獻官陪祀官咸跪贊讀祝司祝讀祝辭曰維某年月日皇帝遣某官某致祭於太昊伏羲氏炎帝神農氏黄帝軒轅氏曰古昔聖人德澤深宏創制醫藥拯濟斯世仁壽庶民兹當仲春冬謹以牲醴致祭惟神慈惠蠲除疾疢篤佑朕躬致和天下配以勾芒氏之神祝融氏之神風后氏之神力牧氏之神尚饗讀畢奉祝版跪安太昊伏羲氏神位前篚内叩如初興退樂作贊禮郎贊叩興承祭官暨分獻官陪祀官均行三叩禮興贊復位引承祭官復位立配位及兩廡執事生奠帛獻爵畢各退典儀贊行亞獻禮正位司爵配位及兩廡執事生各奠爵於左如初獻儀典儀贊行終獻禮正位司爵配位及兩廡執事生各奠爵於右儀如亞獻典儀贊徹饌有司徹畢贊送神贊禮郎贊跪叩興承祭官分獻官陪祀官均行三跪九叩禮興樂止典儀贊奉祝帛饌送燎有司奉祝帛香饌及兩廡香帛饌以次恭送燎所如儀贊禮郎引分獻官鴻臚寺官引陪祀官皆退承祭官避立拜位旁西面竢祝帛過復位立典儀贊望燎贊禮郎引承祭官由咸濟東門出詣燎位視燎贊禮郎贊禮畢樂止承祭官退執事各官皆退右祭先醫廟致祭闗帝之禮嵗以春秋仲月諏吉遣官一人將事是日昧爽廟祝潔埽殿宇内外太常寺官具祝版備器陳神位前牛一羊一豕一豋一鉶二簠簋各二籩豆各十鑪一鐙二殿中設一案少西北向供祝版東設一案陳禮神制帛一色白香盤一尊一爵三牲陳於俎帛實於篚尊實酒冪勺具和聲署設樂於西階上器數見祀眞武禮太常寺設洗於東階上承祭官拜位在階上正中司祝司香司帛司爵典儀掌燎各以其職為位如常儀質明承祭官朝服詣廟贊引太常寺贊禮郎二人引承祭官由廟左門入至東階上盥手畢引詣拜位前立典儀贊執事官各共廼職贊禮郎贊就位引承祭官就位立典儀贊迎神樂作辭曰扶植綱常正浩氣昭日星絶倫獨立英爽若生俎豆常馨夏夷胥敬仰神德莫疇並助邦家永太平贊禮郎贊詣上香位引承祭官入殿左門就香案前立贊上香司香跪奉香承祭官上炷香三上瓣香畢贊復位引承祭官復位立贊跪叩興承祭官行三跪九叩禮興典儀贊奠帛爵行初獻禮有司揭尊冪勺挹酒實爵司帛奉篚司爵奉爵各進至神位前司帛跪奠篚於案三叩興司爵立獻爵於案正中各退司祝詣祝案前跪三叩興奉祝版跪案左樂暫止贊禮郎贊跪承祭官跪典儀贊讀祝司祝讀祝辭曰維某年月日皇帝遣某官某致祭於闗帝之神曰惟神秀毓河山名垂今古英風正氣世歴久而彌新大節純心史相傳而莫匹念神靈之顯著命典禮以優隆兹當仲春秋用昭時饗尚其歆格鑒此精䖍尚饗讀畢興以祝版跪安於篚内叩如初興退贊禮郎贊叩興承祭官行三叩禮興典儀贊行亞獻禮司爵獻爵於左贊行終獻禮司爵獻爵於右均如初儀典儀贊徹饌有司徹畢贊送神贊禮郎贊跪叩興承祭官行三跪九叩禮興樂止典儀贊奉祝帛饌送燎有司奉祝帛香饌以次送燎如儀贊望燎贊禮郎引承祭官詣燎位視燎禮畢樂止承祭官及執事官皆退同日祭後殿以太常寺卿一人將事光昭公位中裕昌公左成忠公右均南向位各異案每案羊一豕一鉶二簠簋各二籩豆各八鑪一鐙二殿中設案少西北向供祝版東西各設一案分陳禮神制帛三色白香盤三爵九尊三俎篚冪勺具設洗於後垣門内甬道東承祭官位殿檐下正中司祝司香司帛司爵典儀掌燎各以其職為位如常儀質明承祭官由前左門入後垣中門盥手升階就位迎神引詣正位前上香畢以次詣左右位前上香復位行二跪六叩禮初獻讀祝如儀祝辭曰維某年月日皇帝遣某官某致祭於闗帝之曾祖光昭公祖裕昌公父成忠公曰惟公盛德相承令儀足式歴數傳之積累遂鍾河嶽精靈儲曠代之威名堪作巖廊矩矱殊恩既沛於三世時饗宜錫於上公兹當仲春秋用昭祀事豆籩致潔典禮加隆尚饗凡儀節均與前殿同右春秋祭闗帝廟嵗五月旬有三日致祭闗帝廟前殿神位前陳牛一羊一豕一果實五盤鑪鐙具陳設及行禮儀節與春秋祭同祝辭曰維某年月日皇帝遣某官某致祭於闗帝之神曰惟神純心取義亮節成仁允文允武乃聖乃神功高當世德被生民兩儀正氣歴代明禋英靈丕著封號聿新敬修嵗事顯佑千春尚饗同日並祭後殿太常寺卿一人行禮每案羊一豕一果實五盤典儀不贊徹饌司爵以執事生餘陳設及行禮儀節與春秋祭同祝辭曰維某年月日皇帝遣某官某致祭於闗帝之曾祖光昭公祖裕昌公父成忠公曰禮隆報祀誼重推恩當崧生嶽降之期溯木本水源之始輝煌棟宇憑依已妥於上公修潔豆籩將饗告䖍於仲夏惟神照鑒尚其歆格右五月十三日祭闗帝廟直省府州縣闗帝廟嵗均以春秋仲月及五月旬有三日致祭前殿主祭以地方正官一人後殿以丞史執事以禮生祭日陳設迎神上香奠獻讀祝送神視燎禮儀並與京師祭前後殿同前殿祝辭曰維某年月日某官某致祭於闗帝之神曰惟帝浩氣凌霄丹心貫日扶正統而彰信義威震九州完大節以篤忠貞名高三國神明如在徧祠宇於寰區靈應丕昭薦馨香於歴代屢徵異蹟顯佑羣生恭値仲春秋嘉辰遵行祀典筵陳籩豆几奠牲醪尚饗後殿祝辭曰維某年月日某官某致祭於闗帝之曾祖光昭公祖裕昌公父成忠公曰惟公世澤貽庥靈源積慶德能昌後篤生神武之英善則歸親宜享尊崇之報列上公之封爵錫命優隆合三世之肇禋典章明備恭逢仲春秋諏吉祇事薦馨尚饗右直省府州縣祭闗帝廟直省禦災捍患諸神於民有功德者加封號立專祠祭英衛公伍員於錢塘通祐王李冰於灌安瀾之神張廵於浮梁誠應武肅王錢鏐於臨安顯佑通濟王謝緒於宿遷靜安公張夏於蕭山寜江伯湯紹恩於紹興寜漕公宋禮永濟之神白英於汶上致祭之禮每嵗春秋所在守土官具祝文各隨時撰擬香帛羊一豕一尊一爵三陳設祠内如式質明守土正官一人朝服詣祠行禮儀節與直省祭闗帝廟同右祭直省所在有功德於民神祠前代聖賢名臣忠烈祠墓暨本朝開國勲臣墳墓恭逢皇帝時廵方嶽離御道三十里内者遣官致奠前期翰林院具祝文隨時隨人撰擬太常寺備香帛授遣官齎往祭日守土官於祭所設洗備脯醢果實七盤品物各隨其土産鑪鐙具左設一案供祝文右設一案陳香盤一帛一尊一爵三通贊一人引贊二人司祝香帛爵各一人以所在禮生充黎明遣官朝服至所祭地引贊引詣盥洗所盥手畢通贊贊執事者各司其事引贊贊就位引遣官詣拜位前立通贊贊迎神引贊引遣官詣香案前司香奉香跪於左引贊贊上香遣官上香如常儀贊復位遣官退復位贊跪叩興遣官行二跪六叩禮興通贊贊奠帛爵行初獻禮司帛獻篚司爵獻爵如常儀贊讀祝司祝奉祝文立案左宣讀訖安於篚内退亞獻終獻均如初儀通贊贊送神引贊贊跪叩興遣官行二跪六叩禮興通贊贊奉祝帛送燎執事者各奉祝帛香以次送燎通贊贊望燎引贊引遣官詣燎鑪前視燎禮畢引遣官退執事者皆退右時廵遣祭聖賢忠烈名臣勲臣祠墓祭賢良祠之禮前室祀宗室親王以下貝勒貝子以上後室祀公侯伯以下一二品大臣以上均按代序官同代同官序其年月位均南向嵗春秋仲月諏吉前室遣官一人致祭後室以太常寺卿一人將事所祀王子孫咸與行禮大臣子孫通籍在京者如之祭之日太常寺官入祠供具前室異案各羊一豕一果實五盤鑪一鐙二中設一案少東北向供祝版西設一案東向陳香盤二尊二爵六素帛二色白後室五案共羊一豕一每案果實五盤鑪鐙具東設一案西向陳香盤一尊一爵三素帛一凡牲陳於俎帛實於篚尊實酒冪勺具設洗於前室東階下前後各設燎鑪於垣門内東南隅漏未盡與祭者各服其服畢集於祠垣門内太常寺典儀立前室檻外之東司祝立祝案東司香司帛司爵各以其職為位掌燎率燎人立燎鑪前質明承祭官朝服詣祠贊禮郎二人引前室承祭官由中門入又二人引後室承祭官隨入各至東階下盥手畢升階就拜位前立鴻臚寺官引王以下子孫序立於前室甬道左右引公以下大臣子孫序立於後室庭中左右均北面典儀贊執事官各共廼職贊禮郎贊就位承祭官以下咸就位贊上香前室承祭官詣正中香案前立司香跪奉香承祭官上炷香三上瓣香次詣各香案前上香如儀贊復位承祭官復位贊跪叩興承祭官暨陪祀官均行二跪六叩禮興後室承祭官同時詣中案前上香儀同凡儀節後室均隨前室唱贊行禮典儀贊奠帛爵行初獻禮有司揭尊冪勺挹酒實爵司帛奉篚詣案前跪奠於案三叩興司爵奉爵立獻正中皆退前室後室同司祝詣祝案前跪三叩興奉祝版立案右典儀贊讀祝司祝北面宣讀承祭官立聽陪祀官皆跪聽辭曰維某年月日皇帝遣某官某諭祭賢良祠王大臣等之靈曰功銘鐘鼎尚書崇元祀之文德冠巖廊周禮著大烝之典蓋旂常載績本臣子之素懐而俎豆薦馨乃朝廷之崇報爾親王等望重親賢粹鍾川嶽竭忠誠而體國著勲德於當年大臣等或當列祖開基之日佐命立功或際熙朝極盛之時宣猷贊化或驅除暴