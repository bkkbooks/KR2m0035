body:
  text: 欽定四庫全書史部十三欽定大清通禮目録政書類二儀制之屬卷之一吉禮南郊冬日至大祀孟春上辛祈榖龍見常雩大雩因事祇告升配卷之二北郊夏日至大祭因事祇告升配卷之三宗廟時饗大祫親詣祇告遣官祇告升祔加上尊諡恭進玉册玉寶卷之四奉先殿親饗遣官祭饗親詣祇告遣官祇告月朔望奠獻升祔卷之五陵寢親謁后妃謁奠親饗遣官饗薦寶城上土聖誕奠獻萬夀節奠獻朔望謁奠因事祇告皇子恭謁羣臣恭謁園寢致祭卷之六社稷春秋親祭因事祇告祈報直省常祀直省祈報卷之七朝日親祀遣官夕月親祀遣官卷之八先農親饗遣官直省饗先農先蠶皇后親饗遣妃遣官卷之九厯代帝王親饗遣官時巡親饗時巡遣官因事遣官直省所在専祭卷之十𫝊心殿親詣祇告遣官祇告月朔望常祀卷之十一先師春秋親詣太學釋奠遣官釋奠臨雍釋奠月朔釋菜月望上香賔興釋褐因事祇告親釋奠闕里謁孔林遣官釋奠周公遣官釋奠顔曾孔孟四氏直省釋奠釋菜直省忠孝節孝名宦鄉賢祠卷之十二天神祈祀報祀地祇祈祭報祭直省神祇祈報嶽鎮海瀆時巡親祭方嶽遣官祭方鎮遣官祭所過名山大川時巡所過大川上香嶽鎮海瀆因事遍祭嶽鎮海瀆所在専祭名山大川所在特祭直省山川専祠卷之十三太嵗元旦嵗除迎祖祈報真武廟火神廟炮神卷之十四都城隍廟東嶽廟黑龍潭龍神祠玉泉山龍神祠后土司工神窑神門神倉神卷之十五先醫廟關帝廟直省所在神祠時巡遣祭聖賢忠烈名臣勳臣祠墓賢良祠直省賢良祠京師功臣専祠盛京賢王祠昭忠祠雙忠祠忠勇祠直省祭厲附卷之十六親王世子郡王家祭貝勒貝子宗室公家祭品官家祭庶士家祭庶人家祭卷之十七嘉禮太和殿朝賀盛京朝賀外官朝賀皇太后宫朝賀皇后宫朝賀卷之十八御門聽政常朝升殿常朝坐班盛京升殿盛京坐班卷之十九皇帝登極卷之二十恭上皇太后尊號徽號卷之二十一尊封太妃太嬪卷之二十二大昏卷之二十三皇子昏公主釐降王公以下昏郡主以下出嫁卷之二十四品官昏庶士昏庶人昏卷之二十五册立皇后卷之二十六册封皇貴妃册封貴妃册妃册嬪卷之二十七册封親王世子郡王册封長子貝勒貝子册封公主册封福晉夫人册封郡主縣君郡君卷之二十八頒詔直省迎詔外國迎詔卷之二十九頒朔受朔外國受朔進春直省迎春卷之三十親耕帝藉直省耕藉卷之三十一皇后躬桑卷之三十二恭進實録聖訓恭進玉牒卷之三十三經筵進講卷之三十四臨雍講書闕里講書卷之三十五順天鄉試直省鄉試會試臨軒䇿士臚𫝊表謝卷之三十六時巡省方卷之三十七太和殿燕慈寧宫燕嵗除燕臨雍燕經筵燕修書燕凱旋燕鄉試燕會試燕恩榮燕會武燕燕衍聖公燕外國貢使王公燕卷之三十八順天鄉飲酒直省鄉飲酒卷之三十九軍禮大閲京營訓練直省閲兵卷之四十親征凱旋告至飲至䇿勳告成紀功命將遣使頒敕印納降凱旋告成燕賚卷之四十一獻俘受俘卷之四十二日食救護月食救護直省日月食救護卷之四十三賔禮外國朝貢敕封外國表謝卷之四十四宗室外藩親王相見宗室外藩郡王相見宗室外藩貝勒相見宗室外藩貝子公相見京官敵體相見京師屬官見長官國學師弟子相見直省官敵體相見直省文官見長官直省武職見長官直省官見學政鹽政京府官屬相見直省文武官相見直省滿漢官見士賔友相見受業弟子見師長卑幼見尊長卷之四十五凶禮列聖大喪卷之四十六列后大喪卷之四十七皇貴妃喪貴妃喪妃喪嬪喪貴人喪卷之四十八皇太子喪皇子喪
