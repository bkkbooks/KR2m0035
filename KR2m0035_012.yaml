  text: 欽定四庫全書欽定大清通禮卷六吉禮社稷
  hash: sha256:8f6ac25acad93e85df37284059446521cecfdc1659c5b15a443f2255517ed377
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0035_WYG_012-1a, image: WYG0655/WYG0655-0121a.png}
body:
  text: 歲祭社稷之禮以春秋仲月日用上戊先三日禮部尚書一人詣犧牲所眂牲如儀右眂牲致齊書祝版眂割牲眂祝版北郊同儀均與先一日太常寺卿率屬潔壇敷五土如其方色恭設神座太社位右太稷位左皆北向后土勾龍氏位東西向后稷氏位西東向右敷土設神座祀日五鼓太常寺卿率屬入壇然炬明鐙具器陳於案各以其序太社太稷皆牛一羊一豕一登一鉶簠簋各二籩豆各十有二爐一鐙二配位同壇下設三案一少西南向供祝版一東次西向陳香盤二一西次東向陳香盤二方圭二色一黃一青禮神制帛四色黑尊二玉爵二陶爵四又陶爵六壺一實福酒盤一實胙肉凡牲陳於爼凡玉帛實於篚凡尊實酒承以舟疏布冪勺具工部司官張幄次於㦸門內少東鑾儀衛設洗於次外樂部率太常協律郎設中和韶樂於壝門內左右分東西懸均南向陳文武二舞於樂懸之次如北郊儀右陳設陳設畢太常寺博士引禮部侍郎一人升壇詣正位前省眂齍盛及籩豆登俎之實以次詣配位前周眂如儀右省齍辨行禮位壇壝門外正中為皇帝行禮拜位南向拜殿之前夾甬道左右為陪祭王公拜位左翼居東右翼居西拜殿前東西隅為百官拜位文官郎中以上武官參領世爵輕車都尉以上東西各五班均重行異等東位西上西位東上辨執事位壝門外司拜褥鑾儀衛官二人分立於皇帝拜位左右東西面太常寺司祝一人立祝案西東面司爵四人司玉帛二人司帛二人司香二人光祿寺卿二人太常寺贊賜福胙一人序立西案之西東面司香二人序立東案之東西面侍儀禮部尚書侍郎各一人立東案之南西面都察院左都御史副都御史各一人樂部典樂一人立西案之南東面司樂協律郎樂工歌工舞佾立位與北郊同太常寺典儀一人在樂工之北西位東面接福胙侍衛二人立於壝門外東司拜褥官之次記注官四人立於侍衛之次均西面糾儀御史四人禮部祠祭司官四人分立於陪祀王公百官拜位前引王公百官行禮鴻臚寺官二人分立於御史禮部官之次均東西面掌瘞官率瘞人立壝外西北隅右辨位其日五鼓鑾儀衛陳法駕鹵簿北郊祭詳見儀於午門外陳金輦於太和門外陪祀王以下公以上按翼集壇門外候駕至隨行百官序立於壝門外左右祗俟均東西面司祝恭奉祝版安於祝案日出前四刻禮部尚書一人率太常寺卿屬詣神庫上香行禮恭請神位以次奉安於神座如儀右請神位太常寺卿赴乾清門奏時皇帝御祭服乘禮輿出宫至太和門外降輿乘金輦鑾儀衛奉輦納陛內大臣侍衛前引後扈如常儀提爐官執鐙官左右列行午門鳴鐘鼓導迎樂陳而不作不陪祀王公以下文武各官咸朝服跪送駕出闕右門至壇北門外神路東降輦納陛扶輦如前儀右贊引左對引太常寺卿二人恭導皇帝入自北門之右至幄次少俟太常寺卿告奉安神位畢奏請行禮皇帝出次鑾儀衛官跪奉盥奉巾如儀盥畢司拜褥官豫布拜褥於壝北門外正中贊引對引恭導皇帝由拜殿出至壝北門外就拜位前南向立前引內大臣侍衛執爐鐙官至拜殿外均止立後扈大臣隨侍鴻臚寺官引陪祀王公百官各就拜位序立典儀贊樂舞生登歌執事官各共乃職武舞執干戚進贊引奏就位皇帝就位立右就次盥洗就位典儀贊瘞毛血迎神司正位香二人升東西階分詣神位前祇候司樂贊舉迎神樂奏登平之章辭曰媼神蕃釐兮厚德隆嘉生繁祉兮功化同壇壝儼肅兮風露融我稷翼翼兮黍芃芃望雲駕兮驂鸞龍植璧秉圭兮兾感通協律郎舉麾工鼓柷樂作贊引奏升壇暨對引官恭導皇帝升北階詣太社位前對引官至北階上止立司香跪贊引奏跪皇帝跪奏上香司香進香皇帝上炷香次三上瓣香興以次詣太稷位前上香儀同贊引奏復位暨對引官恭導皇帝復位立司配位香二人由東西階分詣后土勾龍氏后稷氏位前跪上香畢各退贊引奏跪拜興皇帝行三跪九拜禮王公百官均隨行禮協律郎偃麾工戛敔樂止凡樂以舉麾鼓柷作以偃麾戛敔止後同右迎神典儀贊奠玉帛行初獻禮司樂贊舉初獻樂奏茂平之章辭曰恪恭禋祀兮肅且雍清醑既載兮臨齊宫朝踐初舉兮玉帛共洋洋在上兮鑒豫衷樂作司樂舉節舞干戚之舞凡舞以莭領之導引進退後同有司揭尊冪勺挹酒實爵司玉帛奉玉帛司帛奉篚司爵奉爵均由北階升壇司玉帛詣正位前司帛詣配位前各跪獻篚奠於案三叩興司爵分詣正位配位前跪獻爵奠於墊中畢自西階退司祝至祝案前跪三叩興奉祝版升北階左就壇中少西跪樂暫止贊引奏跪皇帝跪羣臣皆跪贊讀祝司祝讀祝辭曰維某年月日皇帝御名敢昭告於社稷之神曰惟神贊輔皇天皇祇發生嘉穀立我蒸民萬世永賴兹當仲春秋謹以玉帛牲醴庶品致祭報謝配以后土勾龍氏后稷氏尚饗讀畢興奉祝版跪安於太社位前篚內三叩興退自西階降樂作贊引奏拜興皇帝率羣臣行三拜禮興樂止武功之舞退文舞執羽籥進右初獻典儀贊行亞獻禮司樂贊舉亞獻樂奏育平之章辭曰樂具入奏兮聲喤喤鬱鬯再升兮賓八鄉厚德配地兮佑家邦綏我豐年兮兆庶康樂作舞羽籥之舞司爵詣各神位前跪奠爵於左儀如初獻獻畢樂止右亞獻典儀贊行終獻禮司樂贊舉終獻樂奏敦平之章辭曰方壇北宇兮神中央盈庭萬舞兮帗低昻酌酒三爵兮桂醑香清雖舊邦兮命溥將樂作舞同亞獻司爵詣各神位前跪奠爵於右如亞獻儀獻畢樂止文德之舞退右三獻既終獻太常寺贊禮郎一人詣祝案前東面立贊賜福胙光祿寺卿二人奉福胙升階至神位前拱舉退降北階左祗立於皇帝拜位之右侍衛二人進立於左贊引奏跪皇帝跪左右官皆跪奏飲福酒右官進福酒皇帝受爵拱舉授左官奏受胙右官進胙皇帝受胙拱舉授左官奏拜興皇帝三拜興又奏跪拜興皇帝率羣臣行三跪九拜禮典儀贊徹饌司樂贊舉徹饌樂奏博平之章辭曰大房籩豆兮儼成行歆此吉蠲兮神迪嘗廢徹不遲兮餘芬芳桐生茂豫兮百穀昌樂作司玉帛詣案前跪叩奉方圭以退樂止右受福胙徹饌典儀贊送神司樂贊舉送神樂奏樂平之章辭曰孔蓋翠旌兮隨風揚龍輈容與兮指天閶咫尺神靈兮隔穹蒼願流景祚兮貺皇章樂作贊引奏跪拜興皇帝率羣臣行三跪九拜禮興樂止右送神典儀贊奉祝帛饌送瘞司祝司帛詣神位前咸跪三叩司祝奉祝司帛奉篚興司香跪奉香司爵跪奉饌興以次恭送瘞所典儀贊望瘞司樂贊舉望瘞樂奏徵平之章辭曰玉既陳兮延景光禮既洽兮恭瘞藏願神聽兮時豫匡垂神祐兮永無疆樂作贊引奏禮成恭導皇帝由壇北門出樂止右望瘞祀畢禮部尚書太常寺卿屬恭請神位復御儀與迎神同皇帝至北門外神路東升禮輿導迎樂作奏祐平之章辭曰分職三大康乂國家平土蕃穀降休中夏薦吉蠲神不遐遍九垓鴹祉嘉午門鳴鐘不陪祀王公百官咸朝服跪迎王公隨駕入至內金水橋恭候皇帝還宫各退太常寺官徹乾清門齊戒牌銅人送寺右乘輿回宫因事祇告之禮遣官一人將事及執事官均致齊一日豫期翰林院具祝文隨事撰擬太常寺卿送內閣恭書受而奉諸神庫飭屬備器陳至日五鼓設太社太稷神座於壇上薦鹿脯鹿醢兔醢棗榛葡萄桃實蓮實爐鐙具階下中設一案少西北向供祝版司祝一人立於案西東面右設一案西向陳香盤二左設一案東向陳禮神制帛二尊一冪勺具爵六司香司帛司爵各一人立於案後糾儀御史左右各一人立於案北均東西面典儀一人立於壝北左門東面雞初鳴遣官豫俟於街門內贊引太常寺贊禮郎一人俟於壝西隅均朝服黎明太常寺卿率屬恭請太社太稷神位入壇恭設座上如常祭儀遣官由街門入南門循壝西行盡壝贊禮郎二人引詣壝北門外拜位前立典儀贊就位執事官各共乃職贊禮郎引遣官就位立典儀贊迎神以下禮儀節次皆典儀唱贊司香奉香升東西階分詣香案前祇俟贊禮郎贊升壇引遣官升北階詣太社位前立贊跪遣官跪贊上香司香跪進香遣官上炷香三上瓣香興凡遣官升降行禮皆贊皆引後同次詣太稷位前上香儀同贊復位引遣官自北階降復位行三跪九叩禮興司帛奉篚司爵揭尊冪勺挹酒實爵行初獻禮以次升北階至神案前跪奠帛於案三叩興奠爵墊中皆退司祝詣祝案前跪三叩興奉祝版升北階至壇上正中跪讀畢興詣太社位前跪安篚內三叩興退遣官三叩興亞獻奠爵於左三獻奠爵於右均如初送神望瘞並同常祭儀贊禮郎贊禮畢引遣官仍由南門出太常寺卿率屬恭請太社太稷神位還御如儀各退右因事祇告孟夏常雩後歲間不雨既祈天神地祇太嵗越七日乃禱於社稷並設配位遣官一人將事文武官應陪祀者咸與祈禱致齊三日前期具祝文潔器陳備脯醢果實祭日陳玉帛樂懸樂舞執事官依次序立與常祀同遣官暨陪祀官素服就位行禮迎神奏延豐之章辭曰九土博厚兮阜嘉生方壇五色兮祀孔明氓力穡兮服耕仰甘膏兮百穀用成熙雲路兮瞻翠旌殷闓澤兮展精誠初獻奏介豐之章辭曰神來格兮宜我黍稷兩圭有邸兮馨明德罍尊湛湛兮干羽飭油雲澍雨兮溥下國亞獻奏滋豐之章辭曰奏齍明兮申載觴龍出泉兮靈安翔周寰宇兮滂洋戴神庥兮悅康終獻奏霈豐之章辭曰帗容與兮奮皇舞聲逺姚兮震靈鼓爵三奏兮縮桂醑號屏來御兮德施普徹饌奏綏豐之章辭曰協笙磬兮告吉蠲神迪嘗兮禮莫愆心齊肅兮增惕乾咨田畯兮其樂有年送神奏貽豐之章辭曰撫懷心兮神聿歸華蓋郅偈兮驂虬騑洪釐渥兮雨祁祁公私霑足兮孰知所為望瘞奏溥豐之章辭曰宣祝嘏兮列瘞繒貺允答兮時欽承髙原下隰兮以莫不興歌率育兮慶三登凡儀節皆典儀唱贊舉樂皆司樂唱贊初獻舞干戚之舞亞獻終獻舞羽籥之舞與常祀同得雨則報用牲牢遣官暨陪祀官朝服行禮如常祀之儀若雨潦祈晴冬旱祈雪禮亦如之右祈報儀直省府州縣各建社稷皆社右稷左異位同壇嵗以春秋仲月上戊日致祭省㑹以總督若巡撫一人主之有故則布政使攝事在城文武官縣丞千總以上咸與祭眂割牲省齍盛以布按二司參政副使等官糾儀以教授訓導司香司帛司爵司祝司饌以丞倅通贊引贊引班以學弟子員間禮儀者充之前期主祭官暨陪祭執事官各於公廨致齊三日掃除壇壝內外祭之前夕掌饌潔備品物置案於神㕑設香燭眂割牲官公服詣案前上香行三叩禮畢宰人牽牲告腯遂割牲以豆取毛血瘞於坎及祭之日雞初鳴執事人入設案一於壇上正中北向陳鉶二實和羮簠二實黍稷簋二實稻梁籩四實形鹽棗栗鹿脯豆四實菁菹鹿醢芹菹兔醢若不能備各就土所有以其類充案前設爼陳羊一豕一又前設香案一陳祝文香盤爐鐙左設一案東向陳篚一實帛二尊一爵六又設福胙於尊爵之次司祝一人司香帛二人司爵二人位案西東面階下之東設洗當階為主祭官拜位其後為陪祭官拜位文東武西班與外朝賀禮同通贊二人位階下左右糾儀官二人分位陪祭官左右均東西面漏未盡主祭官及陪祭官朝服畢集壇外引贊二人引省齍官入壇遍視牲器酒齊饌者告潔退左右引班二人引陪祭官入東西序立東班西面西班東面引贊二人引主祭官入至階下盥手通贊贊執事者各司其事贊就位引贊引主祭官引班引陪祭官咸就拜位立贊迎神引主祭官升詣香案前跪司香跪奉香主祭官三上香興贊復位引主祭官降階復位立贊跪叩興主祭官暨陪祭官行三跪九叩禮贊初獻引主祭官升詣神位前跪司帛跪奉篚主祭官受篚恭獻仍授司帛興奠於案司爵跪奉爵主祭官受爵恭獻仍授司爵興分詣社稷位前各奠正中皆退贊讀祝引主祭官詣香案前跪陪祭官皆跪司祝三叩興奉祝文跪於右讀曰維某年月日某官某致祭於社稷之神曰惟神奠安九土粒食萬邦分五色以表封圻育三農而蕃稼穡恭承守土肅展明禋時屆仲春秋敬修祀典庶丸丸松柏鞏磐石於無疆翼翼黍苗佐神倉於不匱尚饗讀畢三叩興以祝文復於案退贊叩興主祭官暨陪祭官三叩興贊復位引主祭官降階復位立贊亞獻引主祭官升詣神位前獻爵於左贊終獻獻爵於右均如初獻儀贊賜福胙引主祭官升詣香案前跪司爵跪進福酒於右主祭官受爵拱舉司爵接爵興司饌跪進豆肉於左主祭官受豆拱舉司饌接豆興各退贊叩興主祭官三叩興贊復位引主祭官復位立贊送神贊跪叩興主祭官暨陪祭官行三跪九叩禮贊徹饌執事官徹饌贊瘞祝帛執事官奉祝次香次帛次饌詣瘞所禮畢各退監司分駐各府者各主其地社稷之祭其他府州縣皆以長官主之長官有故則佐二以次攝在城文官丞史武官把總皆與祭眂割牲省齍盛府州以佐二縣以丞若史各一人糾儀府以教授訓導州以學正訓導縣以教諭訓導二人執事均用掾史贊相禮儀均於學弟子員內選充祭期牲帛器數及行禮儀節均與省㑹同右直省府州縣祭社稷儀欽定大清通禮卷六
