body:
  text: 進奏事於函飭陪奏官屬吏部轉飭侍班官具吉服朔日逢五逢十日公服依期畢㑹右戒辦至日所司設御榻於乾清門正中榻前設章奏案一辨百官班位乾清門侍衛在御榻左右翼立領侍衛內大臣內大臣散秩大臣及豹尾班執槍侍衛佩刀侍衛在丹陛下左右立東西面記注官在西柱下立侍班翰林科道官在西階下立皆東面大學士啓奏折本在御榻之左內閣學士在其後少南為部院官奏事位尚書左都御史在前侍郎副都御史大理寺卿少卿次之陪奏官又次之皆西面以戶部禮部兵部工部分日首對三法司直第三班吏部直第六班右班位漏未盡部院寺奏事官暨侍班官畢集朝房進至中左門祇候春冬辰正初刻夏秋辰初初刻進至後左門祇候侍衛轉奏得㫖百官以次進至乾清門丹墀東西面魚貫序立記注官翰林科道官於西階西東面序立皇帝御輿至門啓扉降輿出闔扉升座翊衛如儀記注官升西階至西柱下就位立部院奏事官由東階升一人奉疏折旋而西餘入就位西面跪奉疏者至正中北面詣奏案前跪恭設於案興退趨至東楹轉入班跪奏某事畢興少退循東階左降其次各班依序升東階右進奏如前儀至吏部奏事引見侍班官畢退內閣侍讀學士二人升東階詣奏案前北面跪舉本日奏函興退翰林科道及侍衛皆退右進奏百官既畢奏滿內閣學士一人奉折本函升東階折旋而西大學士內閣學士從升依次就位跪記注官進至御榻之右仍東面立奉函學士至正中北面詣奏案前跪恭設於案啓函取折本依次啓奏皇帝降㫖大學士學士承㫖訖興由東階降記注官由西階降皇帝還宫各退右啓奏折本恭遇行幸駐蹕御門聽政奏事及啓奏折本皆如前儀右行在啓奏折本常朝之禮每月五日常朝之期皇帝有㫖升殿謝恩各官具銜名送鴻臚寺列疏交送內閣至日五鼓所司豫設案一於太和殿內之西陳筆硯樂部和聲署入展中和韶樂於殿檐前展丹陛樂於太和門檐下鑾儀衛率官校入陳法駕鹵簿鳴鞭仗馬步輦五輅馴象鼓吹常朝象依次如式侍班執事官王公文武百官班位如朝賀儀右陳設序位漏未盡王公文武百官朝服外國陪臣以時至者服本國服畢㑹闕下質明侍班執事官入就位鴻臚寺官按翼序定王公班次由午門左右門太和門左右門引入序定文武百官班次由午門左右掖門昭德門貞度門引入又序定外國陪臣班次引隨西班百官後入咸就位立鴻臚寺奏請御殿午門鳴鐘鼓皇帝禮服乘輿出宫導從翊衛如朝賀之儀至太和殿北階降輿入工舉麾鼓柷中和韶樂作奏隆平之章孟春辭曰敷天協氣鮮新又蒼龍正晨萬國歡心仰𬗋宸皇天錫嘏懿純陳充庭華瑵金根扇春風風兆人澤如春睿周萬品化洽無垠仲春辭曰所無逸恭已巖廊萬㝢協嘉祥吹律圜鐘諧舜琯負扆當陽栁風初轉芽黃翠甸輕雷蘇百昌發生心皇奉若寬大詔播天常季春辭曰日麗風和遍寰區新榆改火龍旗荏苒晃鸞坡赫如曦皇升座羣辟集瑤珂拂花茵垂佩多天門蕩蕩無偏頗純嘏詠卷阿孟夏辭曰玉宸旦婺中天王御法宫乘朱輅曳長虹六六冷簫諧女鳳萬物被薰風阜財解愠福祿來同仲夏辭曰禁林清反舌無聲登進忠良佞不行南風假大而宣平坐明堂賞五德法乘離以持衡季夏辭曰鼓含少黃宫諧鳳伏庚光赤帝騎龍嚖彼三星正昏中茂對乘時穆聖衷陳金奏宣景風明光覲辟公孟秋辭曰金井桐飄大火流夷則聲清律應秋天行轉蓐收黃茂滿田疇曉光閶闔浮搏拊戞鳴球玉殿千官咸拜手仰宸旒仲秋辭曰乾坤爽氣澄序宫殿清光靜安設九賓而法見叶九和於天端暗靄揚雲罕玲瓏動玉鑾列徽猷兮萬世肅纓冕兮千官季秋辭曰鴻依銀渚菊有黃華隴雲飛木葉下百榖登場罷芳辰逢令嘉黃麾列正衙豹竿移龍鱗射日上朱霞天錫吾皇多稼孟冬辭曰時合黃純熙修司職顓皇執坎持權聽彤廷珮響玉琯風宣懷黃綰白趨丹陛皇儀展於穆同天光華聖日罘罳煥彩暄到齊編仲冬辭曰七日陽來天地仁萬象一中分人從心上起經綸綱紀三才屬大君答陽臨玉宸無私學化鈞包元履德日勞勤品類盛荷陶甄李冬辭曰斗柄將東四序周佳氣滿皇州嘉平吉日諏翠輅充廷立九斿吾皇御大裘法坐侍王侯服舊德布新猷穆若天儀福祿遒皇帝御太和殿升座工偃麾戞敔樂止中和韶樂以舉麾鼓柷作偃麾戞敔止後同鑾儀衛官贊鳴鞭丹墀內三鳴鞭戲竹交丹陛樂作止皆以戲竹交為節丹陛樂作奏慶平之章樂辭同三大節鴻臚寺官引謝恩官出班其餘百官仍按本班立序立贊進皆進贊跪皆跪贊叩興王公百官行三跪九叩禮興贊退各復原位立樂止又贊進鴻臚寺官引外國陪臣進就西班拜位立丹陛樂作奏治平之章樂辭同三大節贊行三跪九叩禮畢鴻臚寺引退復位立樂止乃賜茶儀詳三大節畢丹墀內三鳴鞭中和韶樂作奏顯平之章孟春辭曰淵然至道遊神協天行地文照㝢騰華若早輪清明廣大和誾恩滂洋葭葦霑仁念民生生此辰酌於民瑞惟大有寶則賢臣仲春辭曰肅羣后鳴珮鏘鏘拜手仰顒卭初日曈曨奎壁麗明庶風翔普天和氣休穰洽化鷹成鳩眼良躬清明基宥密恩溥洽達要荒季春辭曰瑞靄祥飇映丹墀紅雲繚繞一人淵默德光昭百花中千門曉銅鶴篆烟飄奏仙音駕退朝促耕布榖飛靈沼盈耳說農勞孟夏辭曰麥秋滿野登桑濃繭已成玉衡正泰階平上下交孚寰海靖婦子樂盈寧罄天亘地茂豫桐生仲夏辭曰槿初榮敷與朱明天稷星邊漢影萌紅輪照九神嘉生念農藝夏暑雨穆皇心以靡寧季夏辭曰彌六合黎元祝頌奉三無帝念淵冲蓊鬱𤣥雲淹宸楓大雨時行黍稷芃虞琴奏皇在宫勤思劇月農孟秋辭曰鷹祭蟬鳴屆白藏御廩初登榖始嘗秋回禁陛凉皇居奠總章恩膏正溥將零露浥瀼瀼六合顒顒齊所卬挈珠囊仲秋辭曰雲髙漢回參見露白飇清蛚寒汔告成夫萬寶祇祝釐於三壇瑞榖岐而秀玉粢好且完喜盈寧兮百室納嘉慶兮天歡季秋辭曰鞭鳴鐘動簾捲煙斜漾金風香衣駕天屣言還暇黃雲香滿車村村晝響耞處深宫心區夏重恤民家黼扆豳風圖畫孟冬辭曰寰海豐穰農夫之慶深宫理化揮絃念艱難稼穯不敢游畋琳琅萬卷環天祿三餘愛清晏探研時幾敕命明良喜起所寶惟賢仲冬辭曰順氣祥風翺九垠太史正書雲沈幾先物福生人淵默雷聲秉道真八方以序均天根月窟循昭乎若日正三辰不逺復以修身季冬辭曰太室黃雲𬗋氣䝉時雪報年豐天關槖籥充臘鼓催春大地通皇家寶緒隆契合動昭融月西朓日東生萬載回環不息同皇帝還宫樂止鴻臚寺分引王公百官依次出退右朝儀常朝日坐班之禮先期八旗部院寺具朝官名册送六科至日黎明王公百官朝服畢㑹闕下鴻臚寺官序定王公班位於太和門外東西各二班按翼分列親王郡王貝勒一班貝子入八分公一班皆東西面北上聖駕巡幸日王公常服位門外左右午序百官班位於午門外朝房前東西各九班東班鑲黃正白鑲白正藍四旗吏部戶部禮部宗人府通政司翰林院詹事府太常寺光祿寺鴻臚寺國子監吏科戶科禮科內閣中書欽天監太醫院以次在左翼四旗之南西班正黃正紅鑲紅鑲藍四旗兵部刑部工部都察院大理寺鑾儀衛太僕寺中書科兵科刑科工科順天府京縣五城兵馬司三營以次在右翼四旗之南公侯伯以下世爵暨文武品官各依序為位詳見三大節皆東西面重行北上糾儀御史二人吏部禮部司官各二人分位東西班首糾儀御史二人吏部禮部司官各二人分位東西班末均東西面北上右班位列坐之節春冬以辰正夏秋以卯正屆時門校禁斷行人糾儀官就位左翼諸王率羣公入午門左門右翼諸王率羣公入午門右門就位未入八分公以下文武百官各以次就位坐吏部禮部官屬受銜名糾儀官起繞班行視不如儀者糾之上下一匝還復位坐少頃王率羣公出百官皆退右坐班皇帝時巡盛京特行慶典升殿受賀之禮豫日羣臣具賀表送盛京禮部屆日鴻臚寺設詔案表案各一於崇政殿內東旁又設案一於丹陛正中鑾儀衛陳法駕鹵簿於崇政殿外樂部陳中和韶樂於殿階下陳丹陛大樂於丹墀南工部官設臺於大政殿外鴻臚寺官設案於臺上禮部官陳表於龍亭內校尉自部舁行作樂前導至大清門亭止奉表進崇政殿恭設於表案內閣官奉詔書陳於詔案如式黎明內外王公百官朝服朝鮮國朝臣服本國服畢集皇帝率王公朝於皇太后行宫百官㑹於大清門外均隨行禮畢鴻臚寺官序王公暨二品以上官班次於崇政殿前丹墀左右序三品以下百官班次於大清門外左右外藩王公台吉等朝鮮國陪臣各為一班附於班末耆老領催等於大政殿外東西禮部尚書侍郎奏請御殿皇帝禮服乘輿出宫御崇政殿作樂鳴鞭羣臣表賀行禮均如三大節朝賀儀是日頒詔布告天下頒詔詳儀升殿樂奏元平之章辭曰維天眷我清一統車書四海寧法駕涖陪京祠謁珠丘展孝誠陟降舊宫庭思祖德答天明佳氣繞龍旍暾聖日海東升羣臣行禮樂奏慶平之章辭曰重熙纍洽紘瀛被仁風穆如神孫臨鎬豐橋山禮成御故宫零露瀼瀼有來雍雍外藩行禮奏治平之章辭曰萬方合敬同愛所親尊思木有本水有源東西朔南咸駿奔純固恪恭日子雲孫還宫樂奏和平之章辭曰文思洽九瀛神孫繼治洊升平皇初七德成締造艱難景命膺撫序惕中情凝旒竚若奉盈昭兹萬億齡列祖武敬其繩右盛京朝賀盛京常朝之禮月朔及逢五日盛京文武官於大政殿八旗朝堂前坐班其日黎明百官朝服㑹朝堂辨定班位鑲黃正白鑲白正藍四旗在東正黃正紅鑲紅鑲藍四旗在西奉天府堂屬官在鑲藍之南其班將軍一班副都統五部侍郎一班巡察御史奉天府尹府丞一班協領城守尉一班五部郎中佐領治中五部員外郎五品世職一班五部主事通判京縣知縣防禦一班七品筆帖式七品世職司庫經歷驍騎校一班八品筆帖式教授一班九品筆帖式司獄一班東位西面西位東面皆北上春冬辰正夏秋卯正就各朝堂前按班列坐禮部贊禮郎左右各一人自班首繞行受銜名畢少頃各退右盛京坐班欽定大清通禮卷十八
