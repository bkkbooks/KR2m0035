front:
  text: 欽定四庫全書欽定大清通禮卷十八嘉禮御門聽政之禮常日部院章奏未奉聖㫖者折本下內閣積若干件得㫖御門聽政內閣宣布在京部院寺各部院寺官檢所應
  hash: sha256:37b9a0b236166d54fd0ccca05afef17be43431d72485a386b4aebf4ce6e53e32
