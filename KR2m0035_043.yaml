等官席印卷供給官席提調官左稍後供事官醫官席檐下縣令以下委辦供給官席露臺上均東西向平明主考以下官詣午門承㫖謝恩畢赴燕監試御史至二門内降輿主考副都統至堂下降輿治中通判迎於儀門外尹丞迎於堂檐下禮生引至香案前聼贊行三跪九叩禮揖讓升堂縣佐官分表花幣府尹立堂檐下執事官授爵酌酒府尹南向揖酹酒三偕丞揖主考都統監試官就位府佐揖同考官就位主考各官揖尹丞如之酒三行饌冄舉燕畢復詣香案前行一跪三叩禮主考以下乗輿出送如迎禮掲曉翼日復燕是日府堂陳設布席如前儀設鄉貢士席於階下第一名席稍前西向諸貢士席東西向黎明主考各官朝服貢士吉服赴午門謝恩畢諸貢士先詣府署二門俟主考以下至皆一揖讓過隨入尹丞以下迎如前儀禮生引詣香案前行禮畢簪花升堂和聲署樂作貢士序立階下北面再拜主考都統監試監臨提調同考官答揖府佐官外簾執事官縣令以下均答拜畢各就位登歌鹿鳴之章燕畢謝恩行禮如儀主考以下皆出送如迎禮武鄉試入闈掲曉筵燕儀並同直省文武鄉試入闈揭曉筵燕於布政使司堂上以布政使主席儀均與順天府燕同右鄉試燕㑹試入闈賜有事各官燕於禮部以禮部尚書主席前期所司戒光祿寺庀饌至日露臺上望闕設香案樂部和聲署陳樂於臺南禮部精膳司官朝服視布席堂上東當後楣設總裁知貢舉副都統席西向西當前楣設禮部尚書侍郎席東向左右楹外席各三行同考監試御史叅領叅將廵察外簾四所供給收掌各官席分行依次陳設南北相向又設鳴贊醫官監門廵綽等官席於露臺上左右皆相向黎明縂裁以下官朝服赴午門承㫖謝恩畢咸集金水橋禮部官屬入請赴燕各官由東長安門詣部主席迎於堂檐下鴻臚寺官引詣香案前北面序立聼贊行三跪九叩禮畢揖譲升堂和聲署樂作儀制司官分表花幣光祿寺官舉壺酌酒授主席主席立堂檐下西面酹酒三乃揖縂裁官就位正席獻爵少退揖總裁官答揖乃揖知貢舉副都統各就位光祿寺官分獻同考以下官酒總裁官詣主席席前酢如獻禮各就席坐光禄寺官供饌燕畢各官起席徹鴻臚寺官復引詣香案前行一跪三叩禮主席送縂裁官如初儀羣官各退掲曉翼日復燕儀同武舉㑹試入闈徹闈燕有事各官於兵部儀與文㑹試同右㑹試燕殿試𫝊臚翼日賜燕於禮部曰恩榮燕讀卷執事各官暨諸進士咸與燕前期禮部疏請命大臣主席届日望闕設香案樂部和聲署陳樂光祿寺具饌如禮闈儀禮部精膳司官朝服視布席主席大臣讀卷官鑾儀衛使席當後楣西向禮部尚書侍郎席當前楣東向均専席左右楹外席各三行左一行為受卷官席二行為收掌官席三行為書牓官席右一行為彌封官席二行為監試官䕶軍叅領席三行為書牓官印卷官席供給官席露臺左鳴贊官席露臺右均相向二人共席一甲進士専席於供給官之左二甲一名三甲一名進士共席於一甲之後均北向露臺下二甲席於左三甲席於右均共席左右相向平明諸進士吉服先㑹禮部各官朝服㑹於金水橋辰刻禮部官屬入請赴燕主席暨各官由東長安門詣部禮部尚書侍郎出迎於堂檐下乃率諸進士重行北面聼贊行三跪九叩禮畢升堂旅揖和聲署樂作主席為一甲進士簪花吏人分表金花於堂上下席間序班引一甲進士詣堂檐下東面立諸進士序立露臺上見讀卷官再拜讀卷官答揖次見主席官禮部尚書侍郎鑾儀使均答揖次見執事官再拜執事官均答拜畢主席出詣堂檐下西面立光祿寺官酌酒授爵主席受爵揖酹酒三光祿寺官以次授一甲進士酒皆奉爵立飲卒三爵三揖主席答揖各官就位諸進士咸就位坐和聲署升歌啓天門之章光祿寺官行酒供饌如儀燕畢各官出席率諸進士詣香案前行一跪三叩禮席徹衆官退送如初迎禮諸進士皆隨出右恩榮燕武舉殿試𫝊臚後燕有事各官暨諸進士於兵部曰㑹武燕儀與恩榮燕同右㑹武燕衍聖公來朝入覲畢賜燕於禮部以禮部尚書主席其日設香案於露臺上樂部和聲署備樂光祿寺官具饌所司視布席設賓主席於後堂西當後楣賓主席均東向以南為上博士席於右楹外北向以西為上届時速賓衍聖公入儀門降輿博士隨入主席迎賔於堂檐下肅揖並揖博士鴻臚寺官引詣香案前北面序立聼贊行三跪九叩禮畢升堂揖如初光䘵寺官酌酒授爵主席酹酒三揖賓即席奠爵奠箸少退揖賓答揖賔詣主席前酬禮如之咸坐和聲署升歌洙泗發源長之章酒三廵樂止供饌畢主賔興席徹鴻臚寺官復引詣案前行一跪三叩禮賔退主席送如初迎儀羣官各退右燕衍聖公東南海外諸國陪臣進貢入朝畢賜燕於禮部以禮部侍郎主席其日設香案於露臺上光禄寺庀饌所司視布席堂上正中位主席當後楣西向其右為正使席副使席正使下人専席通事從官席副使後從人席於西楹外二人共席均南向以東為上貢使至部歩入儀門主席率詣香案前行三跪九叩禮畢升堂貢使見主席行一跪三叩禮主席答揖三乃即席主席舉爵貢使即席一叩飲酒三廵供饌燕畢謝恩如儀貢使辭各退右燕外國貢使外藩䝉古王貝勒貝子公來京朝賀元旦畢下五旗宗室王公各按旗諏吉日燕㑹一次每旗以親王郡王一人主席諸王以下咸與陪燕禮部尚書侍郎一人率屬觀禮届日府内陳設庀饌和聲署備樂堂上設賓主席賔席居右東向主席居左西向禮部尚書侍郎席於主席之次均専席北上設從官席於堂門外東向禮部司官席扵其次均共席乃速賓賓至主人出迎行禮叙坐從官行禮就位並如儀詳賓禮王公相見儀和聲署樂作陳雜劇於門外執事官行酒進饌燕畢從官行禮先出主賓興席徹賔拜辭主人答禮送如初迎儀羣官各退右王公