  text: 欽定四庫全書欽定大清通禮卷三十七嘉禮
  hash: sha256:9a7c86756e132045394d5861de4020462eee384e4a7a8bf236f70af5502ad310
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0035_WYG_043-1a, image: WYG0655/WYG0655-0379a.png}
body:
  text: 太和殿筵燕之禮恭遇皇帝萬夀聖節元旦及大慶典豫日禮部疏請舉行筵燕領侍衛内大臣奏請命進酒大臣既得㫖乃徧布諸司供備届日尚茶庀茶尚膳庀御饌王以下入八分公以上進饌筵牲酒光祿寺供酒席两翼供羊辰刻法駕鹵簿樂懸依次陳設於太和殿詳見朝賀儀笳吹隊舞雜技百戲竢於殿外東隅尚膳總領内管領豫於寳座前設御筵加黄冪武備院張黄幕於丹陛上正中内務府掌儀司設反坫於幕内尊爵金巵壺勺具禮部張青幕扵丹墀内鹵簿之後東西各八光祿寺每幕置尊陳官饌具席皆有冪右陳設乃布席領侍衛内大臣内務府大臣禮部理藩院尚書侍郎朝服視席布内外王公額駙台吉及入班大臣等席於殿内東西各七行東席西向當東楹西席東向當西楹均北上寳座左右布後扈大臣席稍後僉向寳座前左右布前引大臣席東西相向寳座後左右布領侍衛内大臣席又西布日講起居注官席均南向殿門外西檐下布左都御史副都御史席東向丹陛左右布一二品大臣一二品世爵暨侍衛席東西向東當東懸之外西當西懸之外北上禮部尚書侍郎席於黄幕左内務府總管席於黄幕右丹墀左右青幕内布三品以下文武百官席按翼為序如常朝之位均東西向外國陪臣來朝者席於西班之末東向右布席已刻内外諸王貝勒貝子公額駙台吉等朝服集太和門外文武大臣百官朝服外國陪臣服本國服集午門外午刻鴻臚寺官引宗室王公暨大臣理藩院官引外藩王公台吉在丹陛上又引文武百官在丹墀内分翼序立禮部尚書奏請御殿皇帝禮服乗輿出宫前引後扈如常儀午門鳴鐘鼓中和韶樂作奏隆平之章樂辭見朝賀儀後同皇帝降輿入殿北門陞御座樂止階下三鳴鞭鴻臚寺理藩院官分引内外王公台吉暨入班大臣等由殿左右門入就位行一叩禮坐鴻臚寺引一二品大臣暨一二品世爵侍衛等官就丹陛上又引三品以下文武各官就丹墀青幕内按翼依次於本位行一叩禮又引外國陪臣於右翼班次之末就位行一叩禮皆坐右就位廼進茶丹陛清樂作奏海宇昇平日之章尚茶暨侍衛執事官舉茶案以次由中道進至檐下進茶官奉茶入殿中門王以下咸就本位跪進茶官自寳座中陛升跪進皇帝茶興立於右王以下行一叩禮進茶官跪受茶甌由右陛降出中門羣臣咸坐侍衛内務府䕶軍等分賜王以下文武百官暨外國陪臣茶各於坐行一叩禮飲訖復叩坐尚茶徹茶案樂止右進茶尚膳縂領䕶軍叅領内管領入殿由東西陛升展御筵冪執事官並徹王以下席冪各退廼進酒内務府掌儀司官三人由黄幕内一人奉壺一人奉爵一人執金巵以次進至殿中門閾外之左西面立丹陛清樂作奏玉殿雲䦕之章進爵大臣興離席釋補服王以下皆興進爵大臣入殿中門北靣跪王以下咸於坐跪掌儀司官舉壺實酒扵爵由中門入西靣跪授爵興退進爵大臣奉爵興自寳座中陛升至御前當右北靣跪恭進皇帝酒興由右陛降復位行一叩禮王以下皆隨行禮進爵大臣興由右陛升跪受爵仍由中陛降復位跪掌儀司官入跪受虚爵以退廼以金巵酌酒承㫖賜進爵大臣酒王以下起立掌儀司官入立授巵進爵大臣受巵行一叩禮飲卒巵掌儀司官立受虗巵退進爵大臣叩如初興王以下皆坐進爵大臣出殿右門加補服入席坐執事官分恩賜果食於羣臣各於坐行一叩禮樂止右羣臣奉觴上壽廼進饌尚膳以饌入恭進於皇帝前中和清樂作奏萬象清寜之章執事官分恩賜餚饌於羣臣叩如前儀尚膳率屬舁反坫案至殿中階下領侍衛内大臣東西各二人興離席視侍衛行殿陛諸王大臣酒光祿寺官行丹墀青幕内文武各官曁外國陪臣酒王以下各就本位行一叩禮飲畢叩如初坐樂止右行羣臣酒是時禮部滿尚書侍郎率官屬引慶隆舞進司章東靣奏歌司舞飾靣具乗禺馬進揚烈舞司弦司筝司阮司節司拍司抃諸樂人各奏其技喜起舞大臣十有八人朝服由殿左門入詣正中跪三叩興退立於左循歌聲按對起舞歌辭曰於鑠皇清受命於天光延鴻祚億萬斯年天䦕令節瑞啟階蓂共球萬國聖壽千齡粤自我先肇基俄朶長白之山鵲啣朱果綿綿𤓰瓞長發其祥篤生列祖積慶重光式擴舊疆東訖海表聖聖相承永世克紹一章赫赫神功龍飛崛起戎甲十三奮迹伊始復讎靖難首克圗倫天戈一指震懾強鄰九姓潛侵滅跡如埽䝉古五部來奉大號明師四路五日而殲定鼎遼瀋都城巖巖陣雲五色江冰夜凝天助有徳應運而興二章天亶聰明覆幬下國逺服邇歸誕敷文徳四方來附雲集景從建長命官庶職是綜爰創國書頡文羲畫聲協元音萬古不易爰定軍制采旐央央或純或閒永奠八方締造鴻模創成大業錫福無疆慶鍾千葉三章佑啟哲嗣光闡前猷昭宗駿徳誕迓天庥擕貳綏懷朝鮮歸欵世奉東藩釐爾圭瓚三十五部厥角稱臣西北佛土重譯来賓濯征有明耀師齊魯電掃郊圻有而弗取畧地松杏屢殪敵軍百戰百克用集大勲四章帝徳廣運昭受鴻名建國紀元永定大清敦睦九族彜倫式叙尚徳親賢股肱心膂三館是闢鑑古崇儒郊社禘嘗式賁皇圖爵秩以班六曹承政百工允釐萬邦表正威鑠函夏徳配蒼穹敬承無斁駿烈豐功五章帝授神器統一寰瀛剪滅臣冦乾坤載清一著戎衣若雨甘雨大告武成作神人主躬親大政飭紀整綱制禮作樂昭示典常納諫任賢慎微慮逺定律省刑萬世垂憲克勤克儉忠厚䦕基景命維新兢業自持六章聖神建極道冠百王六十一年福祚久長天縱聰明冲齡御宇孝奉兩宫徳隆千古三孽蠢動一舉蕩平海氛永靖浪息長鯨親御六師三征沙漠威肅恵懐鋤頑撫弱禹功底績虞典時廵敷天率土莫不尊親七章惟天行徤神聖則之典學勤政作君作師無逸為箴宵衣旰食一人憂勞綏此萬國文經武緯地平天成中和立極玉振金聲億萬斯年覲光揚烈敬天勤民體元作哲天鑒孔彰翼翼後王儀型皇祖帝祚遐昌八章瑤圗炳煥六合雍熙星輝雲爛風雨以時翕受嘉祥調和玉燭治靄皇風道光帝籙東漸西被北爕南諧梯航琛賮畢致堯階日升月恒萬邦䝉福撃壤歌衢嵩呼華祝秩秩盛儀洋洋頌聲紹休烈祖永慶昇平九章大臣每對舞畢行三叩禮歌闋退又引歌笳吹樂人入殿歌辭曰人君之樂恃此紀綱兆民之樂恃我君王室家孔宜夫君之力朋友有成和輯之徳一章瞻彼中林芃芃萬木旃檀有香生是使獨萬類咸若攘攘芸芸民之父母首出一人二章大海之水不可量天府寳藏奚渠央良朋和睦益無方聖有謨訓垂無疆三章惟安惟和心意所欲無貳無虞朋友式榖四章遵王之路兮愆尤希素位而行兮夫奚疑五章載飛載翔惟翮是憑為聲為律惟心是經射之能中惟指是憑交之能善惟和斯恒六章日將出兮明星煌煌壽斯徴兮秀眉其龎三十維壯五十遲暮莫親祖母莫尊祖父七章鷇之成雛兮孚化之功羽用為儀兮賦命之隆八章嗟余生之歡樂兮似黃離之盈昃感韶光之荏苒兮似葉上之青色九章一人首出萬國尊親湛恩汪濊普被生民百花敷榮一日悦目灌頂寳光萬衆所伏十章維勤斯哲安不可懷溺兹小樂至樂難期十一章乾照無私聖敎無類謨訓洋洋鑒斯不昧十二章惴惴原獸思全其身兢兢庶士思庇後昆十三章息影原野消聲山澤虚棄此身良足可惜令名是期永永無斁十四章際聖明時良我福只横被㤙澤良我䘵只十五章騏驥不羣蹇驢鴻鵠不偕斥鷃騶虞不邇狐狸聖哲不昵愚賤十六章福慧天亶誠㦲難覯通人達士豈奚易逅十七章䓤兮蒨兮山有芳蘭僮兮祁分首有妙鬘十八章歌畢又歌番部合奏樂辭曰元縡是依明神是祗一心至誠昭事勤只巍巍大君永底烝民中心愛戴稽首来臣念人生之無常兮合勤修夫善行信百行之咸善兮終和平而神聼一章大君至聖敎敷率土敉寕萬邦拜跪奉主二章丕顯元后恵懐萬方國彦棐恭協贊邦常率土之濱誠意溥將咸拜稽首依戴聖皇三章皇皇聖明無逺弗燭林林衆庶無思不服元元恵心為善去惡聖人之邦長生永樂四章承乾體元惟我聖君光開草昧惟我聖君綱紀庶政惟我聖君父母萬國惟我聖君惟我聖君兮覆幬如天惟我聖君兮自新新民惟我聖君兮中外乂安惟我聖君兮羣慝消淪拜手稽首兮頌溢兆民五章大地茫茫大海滄滄豈伊無寳求之奚方自古在昔為君為王膺圖御宇命不于常實心實政恵此萬邦聖御大寳繄惟我皇繄惟我皇兮疇可與之頡頏六章歌畢内務府官引朝鮮國俳入陳百戱畢咸退右樂舞入侑行酒畢樂舞退尚膳升徹御筵降王以下咸起立王公大臣出殿左右門鴻臚寺理藩院官引王公至丹陛拜位序立引文武大臣降東西階丹墀内百官出幕咸就東西拜位序立北面聼贊行一跪三叩禮丹陛大樂作奏慶平之章禮畢樂止鳴鞭如初中和韶樂作奏顯平之章皇帝還宫樂止羣臣皆退所司徹席幕各退右謝恩慈寜宫筵燕之禮恭遇皇太后萬壽聖節元旦元旦設燕於次日及諸慶典豫日禮部疏請得㫖下所司戒備内務府奏請欽命進爵命婦尚膳内管領庀皇太后皇后御饌皇貴妃貴妃妃嬪燕席親王郡王進饌筵牲酒光禄寺庀席届日内鑾儀衛設皇太后儀駕鹵簿内監設樂懸均如朝賀儀公主福晉夫人命婦咸朝服集永康右門外祗竢武備院張黄幕於慈寕門外階下正中内管領設反坫於幕下尊爵金巵壺勺具尚膳女官内管領妻入殿布席寳座前設皇太后御筵加黄冪寳座之東為皇后御筵西南向稍後左右為皇貴妃貴妃妃嬪筵東西向再後左右為公主福晉以下鄉君入八分公夫人以上席重行殿外丹陛左右為公侯伯子男滿一二品大臣命婦席均重行東西向北上席皆加冪右陳設布席辰刻内監引公主福晉以下二品以上命婦自永康右門入慈寕門序立於東西丹墀内已刻禮部尚書侍郎轉𫝊内監奏請皇后詣皇太后宫筵燕皇后率皇貴妃貴妃妃嬪具禮服陞輿以次出啟祥門前引命婦八人恭導由慈祥門入至徽音左門外降輿入皇后進至殿内東向立皇貴妃貴妃妃嬪隨入東西序立公主福晉夫人命婦按翼升丹陛東西面序立均北上引禮女官轉𫝊内監奏請皇太后御慈寜宫皇太后禮服出中和韶樂作奏豫平之章樂辭詳朝賀儀後同陞寳座樂止引禮女官引公主福晉夫人以次入殿就燕位次引大臣命婦就燕位皇后率妃嬪以下各於本位行一拜禮坐公主福晉以下皆一叩各就位坐廼進茶丹陛清樂作奏海宇昇平日之章尚茶女官率尚茶婦舉茶案由中道進至殿檐下國外正中北面跪進茶女官奉茶入殿中門由中陛升至皇太后寳座前跪進茶興東面立皇后率妃嬪以下行一拜禮公主福晉以下随行禮坐女官跪受茶甌由右陛降退出殿中門侍衛妻進皇后茶次分賜皇貴妃貴妃妃嬪公主福晉夫人命婦茶皇后率妃嬪以下行一拜禮飲畢復拜如初尚茶女官率尚茶婦徹茶案退樂止右就位進茶廼進酒尚膳女官内管領妻入殿展皇太后御筵皇后御筵冪以次展妃嬪以下席冪各退司爵女官自黄幕内奉壺爵金巵以次進至殿中門閾外之左西面立丹陛清樂作奏玉殿雲䦕之章進爵命婦興離席皇后以下皆興進爵命婦入殿北面跪皇后率妃嬪以下皆跪女官舉壺實酒於爵由中門入西靣跪授爵興退進爵命婦奉爵興自寳座中陛升當右北面跪恭進皇太后酒興由右陛降復位一叩皇后率妃嬪以下行一拜禮坐進爵命婦興由右陛升跪受爵由中陛降復位跪女官入跪受虚爵廼以金巵酌酒承懿㫖賜進爵命婦酒女官入立授巵進爵命婦受巵行一叩禮飲卒巵女官立受虚巵退進爵命婦復叩如初興退入席坐執事女