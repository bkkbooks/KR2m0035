front:
  text: 欽定四庫全書欽定大清通禮卷二十八嘉禮頒詔之禮是日禮部官設案於堂上設香亭龍亭於
  hash: sha256:4100dd476f36a989f9dd753febfe06fcf74dce722e97cf51c7044ca1e602de84
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0035_WYG_034-1a, image: WYG0655/WYG0655-0334a.png}
body:
  text: 午門外樂部和聲署陳樂於香亭南内務府官設金鳳朶雲於天安門樓雉口正中工部官設臺於樓内東楹之南鴻臚寺設案於臺上南北肆宣詔鴻臚寺官四人立臺下鳴贊二人立金鳳左右八旗領催五城耆老集外金水橋前東西祗候皇帝受賀禮畢還宫禮部儀制司官以雲盤承詔書恭奉出太和中門導以繖仗官屬前引尚書侍郎從百官隨出至午門外設於龍亭行一跪三叩禮興校尉舁行導引如初導迎樂作登極頒詔樂陳而不作奏禧平之章辭曰申命重巽綸下九閽勾出萌達百昌咸振象魏懸鞀鐸廵徳意宣天地春至天安門鴻臚寺官引百官出豫往金水橋南東西按班序立領催耆老别為班隨後立皆北面龍亭由東道升樓設於正中南向奉詔官進跪叩如初恭奉詔書登臺恭設案上退立臺東禮部官移龍亭下樓陳於門外鳴贊贊有制衆皆跪宣詔官登臺西面展詔書先宣滿文後漢文畢復於案退贊跪叩興百官及領催耆老三跪九叩興鴻臚寺官引退奉詔官奉詔書置朶雲内綵䋲懸繫自金鳯口中啣下禮部官接受仍設於龍亭跪叩校尉舁行導引如初由大清門詣禮部陳於堂中尚書侍郎率屬行三跪九叩禮恭鐫謄黄頒行天下右宣詔書詔下直省之禮禮部按直省督撫駐劄之地行取閣部院寺筆帖式乘𫝊齎詔前往頒布工部給龍旗繖仗前導所經府州縣五里之内文武官朝服跪迎軍民伏道右候過省㑹有司豫於公廨設屏南向屏前設詔案又前設香案案東設臺階下為文武官拜位文東武西重行異等如朝賀儀詳見三大節紳士班於文官之末耆老軍民集於武官之末皆北面宣詔官一人展詔官二人立臺下西靣通贊者立香案左右引禮生立百官班位左右皆東西靣詔及郊守土官備龍亭旗仗出迎使者承詔書以架奉陳龍亭内乘馬後隨鼓樂前導總督暨同城文武大僚率所屬文武官朝服出迎道右跪候過興先至公𪠘門外序立紳士耆老軍民畢會詔至門跪迎如初禮使者下馬從龍亭入衆隨入使者奉詔書陳於案退立案東西面引禮生引羣官就位北靣立通贊贊跪叩興衆行三跪九叩禮贊宣詔使者奉詔授宣詔官復位立宣詔官跪接登臺展詔官二人從升均西靣展詔書宣讀訖復於案皆降衆聼贊復行三跪九叩禮如初退使者以詔授督撫恭鐫謄黄頒學政鹽政織造管闗兩司道府轉頒所屬州縣衛將軍提鎮協將轉頒所屬營汛至日宣布軍民均與省㑹儀同右頒詔直省詔下朝鮮國之禮禮部豫列内大臣侍衛禮部滿侍郎内閣滿學士銜名奏請命正副使各一人啟程有日使者赴禮部領詔書工部給御仗旗繖使者乘𫝊以行至朝鮮國境其國守土吏治館𫝊所經地文武官跪接候過如直省之儀將及國王遣其重臣出郊迎接詔書前期於國門外治館舍供張備龍亭香亭儀仗鼔樂祇候於館設屏於王殿上正中前列詔案香案設國王拜位於殿階上設衆官拜位於庭内東西重行異等皆北靣宣讀官一人立詔案之東展詔官二人立宣讀官南均西靣司禮二人位國王拜位之北皆東西靣使者旣及國迎接官迎詔書至館恭設龍亭内馳報國王王率其國陪臣朝服郊迎迎接官以龍亭行香亭儀仗鼓樂前導使者乗馬從國王以下咸跪候過興隨行入國門至殿内使者於殿門外下馬從入龍亭設於殿中使者立於龍亭東西面儀仗陳於階下樂懸陳於門内引禮引國王升階就拜位北靣引班引衆官均就拜位北面立司禮贊跪王率衆官皆跪贊叩興樂作國王以下行三跪九叩禮興樂止使者進於龍亭奉詔書授宣詔官復位宣詔官跪受詣開讀案展詔官進立左右展詔宣詔官西面宣讀訖跪授使者復於龍亭執事者退使者復位立司禮贊叩興國王率陪臣行三跪九叩禮如初使者奉詔書授國王國王跪受付所司頒行使者與國王揖讓行禮辭出國王拜送於大門外適館國王詣館饗燕致饔餼如禮及歸拜送於國門外使歸至京以事竣復命於朝右朝鮮國迎接詔書欽定大清通禮卷二十八
