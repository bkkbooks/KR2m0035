front:
  text: 欽定四庫全書欽定大清通禮卷四十三賓禮
  hash: sha256:fafc772c21c295881b14d0549afdbea3f2d38da278d3f754933859c6f8ef9537
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0035_WYG_049-1a, image: WYG0655/WYG0655-0427c.png}
body:
  text: 周禮大行人掌賓客之禮儀九州以外謂之蕃國各以其貴寶為摯國家聲教暨訖四夷來賓徼外山海諸國典之禮部百餘年來敕封燕賚諸典儀文詳洽爰輯為賓禮而百官士民相見儀節以類附於後朝貢之禮凡四夷屬國按期修職貢遣其陪臣齎表文方物來朝京師貢使將入境朝鮮以禮部通官二人迎於盛京鳯凰城安南琉球緬甸暹羅荷蘭蘇祿南掌諸國貢道所經之省督撫遣佐二雜職官一人迎於邉界西洋以內務府司官及西洋人供職欽天監者各一人迎於廣東皆給以郵符經過地方有司供其次舍廪餼車舟夫馬沿途營汛遞遣官軍防護以達於京畿禮部豫行工部修飾館舍備器用薪炭戶部給粟米芻豆光祿寺給牲魚酒漿蔬果之屬既至提督㑹同四譯館鴻臚寺少卿飭屬延接入館以時稽其人衆均其飲食右迎來貢使就館翼日撿其方物表文暨從官各服本國朝服以俟禮部儀制司官設表案於堂上正中黎眀館卿朝服率貢使詣部由左角門入恭俟階下之左正使奉表在前副使次之從官在後禮部侍郎一人出詣案左立儀制司官二人鴻臚寺鳴贊二人分立於左右楹南均朝服館卿先升階立左楹鳴贊之右鳴贊贊進表司賓序班二人引貢使升階立副使從升少後立從官隨序立贊跪貢使以下皆跪贊接表正使舉表館卿恭接以授侍郎侍郎受表陳於案正中復位贊叩興正使以下行三跪九叩禮興序班引退館卿率以出儀制司官送表內閣俟命下禮部以方物分納所司右進表貢方物貢使上表訖恭遇大朝常期皇帝御太和殿百官行禮畢序班引貢使暨從官詣丹墀西班末聽贊行禮賜坐賜茶如儀詳見嘉禮若不遇朝期禮部諏日奏請召見館卿豫戒貢使及通事官習肄禮儀至日率貢使服其國公服通事補服詣宫門外祗俟皇帝常服御便殿領侍衛內大臣內大臣侍衛左右侍立如常儀禮部尚書一人蟒袍補服引貢使入通事隨入至丹墀西行三跪九叩禮畢引由西階升至殿門外跪皇帝降㫖慰問禮部尚書承𫝊通事轉諭貢使貢使對詞通事譯言禮部尚書代奏禮畢興引自西階降出退如待以優禮是日皇帝御便殿侍衛如前議政大臣暨八旗大臣咸蟒袍補服入殿按翼侍立禮部尚書引貢使至丹墀西行三跪九叩禮興引由西階升入殿右門立右翼大臣之末通事隨入稍後立皇帝有㫖賜坐領侍衛內大臣內大臣議政大臣八旗都統副都統禮部尚書就立位一叩序坐貢使隨跪叩坐乃賜茶尚茶進皇帝茶衆跪叩侍衛遍授大臣及貢使茶咸跪受一叩坐飲畢跪叩如初皇帝降㫖慰問貢使跪聆答奏皆禮部尚書承𫝊通事譯言如前儀禮畢禮部尚書引貢使出至朝房承㫖賜貢使尚方飲食訖館卿率以退翼日黎眀領赴午門外謝恩鴻臚寺𫝊贊序班引班貢使就丹墀西北面行三跪九叩禮如儀退右朝見朝貢禮畢禮部疏請頒賜國王並燕賚貢使及其從官從人既得㫖移諸司供備屆日所司陳賜物於午門外道左皮幣布帛白金陳於案馬陳於庭鞍轡具惟朝鮮國王及貢使賜馬館卿朝服率貢使暨從官各服其國朝服由東長安門天安門端門至西朝房前東面序立祇候禮部侍郎一人立案南西面主客司官從立御史四人鴻臚寺鳴贊二人分立御道左右東西面序班二人立貢使之北東面均朝服鳴贊贊齊班序班引貢使至西丹墀內以次序立北面東上贊進衆進贊跪叩興行三跪九叩禮畢主客司官奉頒給國王賜物前授貢使貢使跪受轉授從人乃以次頒貢使及從官從人賜物主客吏奉授各跪受訖贊叩興復行三跪九叩禮興引退館卿率貢使及從官從人出賜燕於禮部如儀詳見嘉禮畢皆退右燕賚事竣貢使將回國光祿寺備牲酒果蔬禮部侍郎一人詣館舍筵燕如在部儀朝鮮南掌仍以迎接官伴送出境安南琉球緬甸暹羅荷蘭蘇祿禮部奏遣司官一人伴送西洋以原迎官二人給郵符沿途供館舍車舟飲食官軍防護如初來禮至貢道所經省㑹賜燕司道一人主之儀與禮部燕同督撫大吏别遣官送出境自京伴送官以事竣復命於朝右送往敕封外國之禮凡朝貢之國世子嗣位權攝國事遣其陪臣請命於朝禮部疏聞得㫖報可工部製節內閣撰敕印世𫝊授均送禮部禮部奏遣正副封使各一人持節齎敕往封朝鮮封使以內大臣禮部滿侍郎內閣滿學士侍衛充服色儀從各從其品安南琉球以翰林院侍讀侍講編修檢討六科給事中禮部郎中員外郎主事內閣中書充特賜一品麒麟服儀從皆視一品啓行之日工部給龍旗御仗牌繖兵部給乘𫝊防護官軍皆候於禮部大門內禮部儀制司官設案於堂上正中陳節於左陳敕於右尚書侍郎二人於案左右立儀制司官二人隨其後均朝服封使朝服詣部至堂中跪儀制司官一人奉節一人奉敕各授尚書侍郎以授正副使皆恭接以興出儀門外官軍接奉加節衣負敕書乘馬行旗仗前導使者易征衣乘𫝊偕行右遣使封使入所封國境其國邊吏供備館𫝊夫馬所經之地文武官出郊跪接如迎詔書之儀將及國嗣封國王遣其陪臣出郊迎接敕書勞使者飾館舍供張於國門之外備龍亭香亭旗仗鼓樂祇候於館列屏於王殿上設案於正中前設香案均南向設國王受封位於香案南拜位於受封位之南設衆官拜位於庭內東西皆北面贊禮二人位國王拜位之北引禮二人位贊禮之南引班四人位衆官拜位之北皆東西面樂陳於門內儀仗陳於庭中皆左右分列使者既及國迎接官迎至館恭設節敕於龍亭內馳報國王王率其國陪臣朝服郊迎迎接官以龍亭行香亭旗仗鼓樂前導使者乘馬從國王以下咸跪候過興隨入國門至府龍亭入中門升階陳於正中使者及階下馬從升執事者脫節衣奉節授正使持前行奉敕授副使隨行入殿使者陳節敕於中案皆退立案東宣讀官立於使者之後引禮引國王就拜位北面引班引衆官均就拜位北面立贊禮贊跪王率陪臣皆跪贊叩興國王以下行三跪九叩禮興國王進至受封位前贊禮贊跪國王跪副使進奉敕書付宣讀官西面展讀訖以敕書授國王國王祇受轉授從官跪接以興副使復位國王三叩興退至拜位前贊跪叩興國王以下復行三跪九叩禮興率其陪臣出俟門外正使奉節詣龍亭執事者加節衣陳於亭舁出使者隨出國王以下跪送使者以節詣館國王乃易常服適館勞使者揖讓行禮畢退饗燕致饔餼如儀及歸率其陪臣跪送節於國門外如初迎禮使者回朝以事竣復命還節並賜服於所司右國王受封使者既還朝國王乃修表文具方物遣其陪臣詣闕謝恩廩餼燕賚均如常朝貢之儀右國王表謝若外夷歸誠初奉朝命者禮部奏請命正副使持節齎敕印往封儀與前同若荒逺阻絶之區以敕書授來使齎回儀制司官設案於午門外甬道上正中陳敕尚書一人立案左儀制司官隨其後鴻臚寺鳴贊二人立甬道左右均朝服館卿率來使朝服入至西丹墀內祇俟鳴贊贊授敕序班引詣案前北面贊跪來使跪儀制司官一人奉敕授尚書以授來使恭接授從官興退詣丹墀之西聽贊行三跪九叩禮畢乃恭齎回國以授其國王遣使詣闕謝恩如儀欽定大清通禮卷四十三
