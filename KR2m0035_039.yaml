front:
  text: 欽定四庫全書欽定大清通禮卷三十三嘉禮皇帝經筵之禮嵗春秋仲月皇帝將舉
  hash: sha256:dd1ac5daa0dd9c1c2610cf31bf92a2e7f1798d976d56cf6e9479730f57b0199f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0035_WYG_039-1a, image: WYG0655/WYG0655-0356a.png}
body:
  text: 經筵禮部承㫖諏吉奏聞豫期翰林院奏定滿漢講官各二人直講經書掌院學士曁直講官擬篇目撰講章豫進御覽欽定翰林院恭繕以竢右戒辦屆期祗告傳心殿先聖先師皇帝親詣於前一日遣官於届日黎明將事如儀詳見吉禮右祗告是日五鼓所司潔掃文華殿内外武備院官供御座鋪陳禮部鴻臚寺官設皇帝書案於御座前南向設講案於殿内正中北向黎明翰林院官恭奉御覽講章陳於皇帝書案書左經右奉進講副本陳於講案書設案左經設案右畢退右陳設辨班位講官滿八人位殿内東柱之南西面漢八人位西柱之南記注官在柱西均東面侍班内閣大學士吏部户部禮部尚書侍郎通政司使副使詹事府詹事少詹事位滿講官之後東班西面兵部刑部工部尚書侍郎都察院左都御史副都御史大理寺卿少卿位漢講官之後西班東面若衍聖公來朝居東班之首侍儀東班給事中二人西班監察御史二人位於班末鴻臚寺卿二人鳴贊二人位東西檐下皆東西面北上丹墀立位以品為序東西靣迎駕南上送駕北上拜位序品亦如之東位西上西位東上重行北面右序位大昕講官侍班侍儀曁執事官吉服集文華殿丹墀内按班序立禮部侍郎二人詣乾清門奏時遂前導駕皇帝常服乘輿出宫扈衛如常儀由後左門出左翼門詣文華殿丹陛上降輿御寳座後扈内大臣立御座旁左右導駕禮部侍郎於門外左右侍衛於階下左右立記注官升西階入殿右門就位鳴贊官升東西階就位立贊齊班􅊰官侍班糾儀各官就丹墀拜位立贊跪叩興行二跪六叩禮興鴻臚寺卿一人引滿講官升東階北由殿左門闑右入侍班官升階南由闑左入一人引漢講官升西階北由殿右門闑左入侍班官升階南由闑右入左右糾儀官隨入咸依位序立鴻臚寺卿退就檐下立鳴贊贊進講滿漢直講官出班詣講案前跪三叩興退復位滿直講官一人出東班南行數武西趨及中門左棖前折旋北靣就案左展書宣講畢却退折旋東趋復位漢直講官一人出西班東趨逾中闑及左棖前折旋北面就案左講書畢却退折旋西趨復位皇帝闡發書義講官曁侍班官跪聆畢興又滿直講官一人出班西趨逾中闑就案右漢直講官一人出班東趨就案右先後講經畢却退復位皇帝闡發經義各官跪聆亦如之鴻臚寺卿引由左右門出降階就丹墀拜位北面序立内監設坐􅂒於殿内東西二行各官聼贊行禮如初右進講鴻臚寺卿復引各官升東西階進殿内按品分行序立皇帝賜羣臣坐皆一叩列坐賜茶如儀詳朝賀儀仍引出降階至丹墀東西序立禮部侍郎奏禮成恭導皇帝陞輿還宫扈衛如來儀翰林院官奉講章正本授内監各官咸退是日燕在位各官於協和門詳筵燕儀右禮成還宫欽定大清通禮卷三十三
